########################################################################################
# Dagster Cloud: Config for Dagster Cloud's hosted resources
########################################################################################
dagsterCloud:
  # Specify the Dagster Cloud deployments (e.g. dev, staging, prod) that the agent
  # should serve.
  deployments:
    - prod

  # Specify whether the agent should also serve branch deployments for your
  # organization.
  branchDeployments: true

########################################################################################
# Dagster Cloud Agent: Configuration for the Dagster Cloud (User) Agent
########################################################################################
dagsterCloudAgent:
  resources:
    requests:
      cpu: 500m # Autopilot minimum of 500m required for using pod anti affinity
      memory: 2.0Gi # extended-duration minimum (safe-to-evict: "false")
    limits:
      cpu: 750m
      memory: 2.5Gi

  podSecurityContext:
    runAsUser: 1001 # provided non-root user in image versions 0.14.0 and above

  terminationGracePeriodSeconds: 60

  env:
    # Reduce cleanup delay for orphaned code server deployments left by previous
    # agent IDs after Helm upgrades. Defaults: grace=3600s, interval=1800s.
    # With replicas: 1, each upgrade leaves 1 orphaned deployment per location;
    # the 10-min heartbeat expiry + 15-min grace period ensures replacements are
    # reconciled before orphans are deleted.
    DAGSTER_CLOUD_CLEANUP_SERVER_GRACE_PERIOD_SECONDS: "900"
    DAGSTER_CLOUD_CLEANUP_SERVER_CHECK_INTERVAL: "600"

  readinessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - test -f /tmp/finished_initial_reconciliation_sentinel.txt
    failureThreshold: 60 # 10 min (60 × 10s) for initial reconciliation
    initialDelaySeconds: 0
    periodSeconds: 10

  # maxSurge: 200% surges the new pod above the current replica for zero-downtime
  # Helm upgrades. Combined with requiredDuringSchedulingIgnoredDuringExecution
  # hostname anti-affinity, this requires a distinct node briefly. On Autopilot
  # this is provisioned on demand; a stalled rollout indicates capacity exhaustion.
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0%
      maxSurge: 200%

  # Single replica minimizes k8s Service churn from dual-agent reconciliation
  # (both replicas independently recreate code server Deployments/Services on
  # every control-plane update, doubling ClusterIP transitions and gRPC gaps).
  replicas: 1

  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  # Reference the cluster-scoped Custom ComputeClass `dagster-agent` defined
  # in .k8s/dagster/compute-classes.yaml. Built-in classes (`General-Purpose`,
  # etc.) are not on this cluster's compute-class allowlist. Single t2d
  # priority — image is amd64-only, no arm64 fallback. GKE warns that
  # `safe-to-evict: "false"` (extended-duration) combined with a CCC
  # nodeSelector "may lead to unexpected behavior" — per docs, GKE silently
  # drops extended-duration when a pod targets a CCC, so the agent's
  # autoscaler-eviction protection is unspecified. Accept the warning and
  # watch for unexpected scale-down churn; if it fires repeatedly, drop the
  # CCC nodeSelector (revert to default Autopilot placement) or drop the
  # annotation (sacrifice autoscaler-eviction protection for explicit machine
  # family).
  nodeSelector:
    cloud.google.com/compute-class: dagster-agent

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - dagster-cloud-agent
          topologyKey: kubernetes.io/hostname

  additionalPodSpecConfig:
    priorityClassName: dagster-agent

  # Agent container securityContext — not set because the agent runs Dagster's
  # own image (UID 1001), not ours (UID 1234). Spec Section 2 covers workspace
  # and run pods only. The Helm chart does support this field.

########################################################################################
# Workspace: Configuration for pods (launched by the agent) that run Dagster user code
########################################################################################
workspace:
  serverProcessStartupTimeout: 300

  # Raw k8s configuration for the Kubernetes Deployment created for each code location.
  serverK8sConfig:
    containerConfig:
      env:
        - name: DAGSTER_GRPC_MAX_WORKERS
          value: "20"
      resources:
        # Autopilot minimum of 0.5 vCPU & 2 GiB required for scale-out pods using
        # workload separation: https://docs.cloud.google.com/kubernetes-engine/docs/concepts/autopilot-resource-requests#workload-separation
        requests:
          cpu: 500m
          memory: 2.0Gi
        limits:
          # Bumped from 750m to 1000m on 2026-04-24 after a kipptaf code
          # server pod hit the GKE High CPU Limit alert (self-resolved in
          # 68s). Dagster+ Hybrid's sensor/schedule/asset daemons run in
          # the control plane, but code servers still serve sensor
          # evaluations, workspace snapshots, and gRPC health checks —
          # kipptaf's large definitions module (every integration) bursts
          # above 750m during sensor eval waves. Priority tier (0) is
          # unchanged, so topology preferences and dagster-run preemption
          # behavior are unaffected.
          cpu: 1000m
          memory: 2.5Gi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1234
        runAsGroup: 1234
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    podTemplateSpecMetadata: # raw config for the pod's metadata
      annotations:
        operator.1password.io/auto-restart: "true"
    podSpecConfig:
      # Reference the cluster-scoped Custom ComputeClass `dagster-codeserver`
      # defined in .k8s/dagster/compute-classes.yaml. Priorities (spot t2a →
      # on-demand t2a → t2d) are enforced by GKE at provisioning time; a
      # single nodeSelector value satisfies Warden's one-value-per-pod rule
      # for `cloud.google.com/compute-class`.
      nodeSelector:
        cloud.google.com/compute-class: dagster-codeserver
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              managed_by: K8sUserCodeLauncher
              deployment_name: prod
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              managed_by: K8sUserCodeLauncher
              deployment_name: prod

  # Raw k8s configuration for the Kubernetes Job and Pod created for each run. See:
  # https://docs.dagster.io/deployment/guides/kubernetes/customizing-your-deployment
  runK8sConfig:
    jobSpecConfig:
      # backoffLimit is retries (not total attempts): 1 = 2 total pod attempts
      # before K8s marks the Job Failed. Kept low so genuine application errors
      # surface quickly via Dagster's run retry (dagster/will_retry).
      backoffLimit: 1
      # K8s sets the DisruptionTarget pod condition when a pod is terminated by
      # priority-class preemption, eviction API (node drain), graceful node
      # shutdown, or taint-based eviction. On Autopilot, GKE system-critical
      # pods (priority > 1000) routinely preempt our dagster-run pods
      # (priority 1000) to land kube-dns, fluent-bit, metrics-agent, etc. —
      # this is unavoidable cluster-wide behavior. podFailurePolicy with
      # action=Ignore makes the Job controller treat those disruptions as
      # not-a-failure: the Job transparently replaces the pod without counting
      # against backoffLimit. Genuine app failures (non-zero exits without
      # DisruptionTarget) still consume the retry budget as before.
      # GA in K8s 1.31+; cluster is on 1.34.4.
      podFailurePolicy:
        rules:
          - action: Ignore
            onPodConditions:
              - type: DisruptionTarget
    containerConfig:
      # Autopilot enforces special minimum values for resource requests on extended
      # duration Pods: https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-resource-requests#workload-separation
      resources:
        requests:
          cpu: 500m
          memory: 2.0Gi
        limits:
          # Bumped from 1000m to 1750m to cover non-dbt step pods whose p95 CPU
          # usage is ~950m with observed peaks to 1.45 cores. 1750m gives ~20%
          # headroom above the 14-day max, staying below the most aggressive
          # per-asset dbt override (2250m). Dbt assets keep their own higher
          # per-asset limit overrides in Python asset definitions.
          cpu: 1750m
          memory: 2.5Gi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1234
        runAsGroup: 1234
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    podTemplateSpecMetadata: # raw config for the pod's metadata
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    podSpecConfig:
      priorityClassName: dagster-run
      # Reference the cluster-scoped Custom ComputeClass `dagster-run` defined
      # in .k8s/dagster/compute-classes.yaml. No spot tier — run/step pods
      # carry `safe-to-evict: "false"` and cannot be evicted without consuming
      # Dagster retry budget. Priorities: on-demand t2a → t2d.
      nodeSelector:
        cloud.google.com/compute-class: dagster-run
      affinity:
        # Hard-block run/step pods from sharing a node with code servers
        # (eliminates preemption-driven code server evictions) or with the
        # agent (protects the single-replica agent from kubelet node-pressure
        # eviction by bursty run workloads). Each term is evaluated
        # independently — a candidate node is rejected if EITHER selector
        # matches a pod already on it. Autopilot provisions new nodes on
        # demand when existing nodes can't satisfy the constraint; per-pod
        # billing means this adds only startup latency, not direct cost.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  managed_by: K8sUserCodeLauncher
                  deployment_name: prod
              topologyKey: kubernetes.io/hostname
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: dagster-cloud-agent
              topologyKey: kubernetes.io/hostname

  # Specify TTL for user code servers.
  # By default full deployment servers do not have a TTL.
  # Branch deployments servers have a default TTL of 24 hours
  # The max code servers defaults to 25, and only applies to servers with TTL.
  serverTTL:
    branchDeployments:
      ttlSeconds: 3600

  onlyAllowUserDefinedK8sConfigFields:
    containerConfig:
      resources: true
      env: true
      volumeMounts: true
    podSpecConfig:
      nodeSelector: true
      affinity: true
      volumes: true
    podTemplateSpecMetadata:
      annotations: true
    jobSpecConfig:
      ttlSecondsAfterFinished: true
    jobMetadata:
      annotations: true

########################################################################################
# Extra Manifests: (Optional) Create additional k8s resources within this chart
########################################################################################
extraManifests:
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: dca-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/instance: user-cloud
          app.kubernetes.io/name: dagster-cloud-agent
          component: agent
          deployment: agent
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kippcamden-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kippcamden
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kippmiami-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kippmiami
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kippnewark-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kippnewark
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kipppaterson-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kipppaterson
  - apiVersion: scheduling.k8s.io/v1
    kind: PriorityClass
    metadata:
      name: dagster-run
    value: 1000
    globalDefault: false
    preemptionPolicy: PreemptLowerPriority
    description: >-
      Elevates run/step pods above default priority (0) so kubelet evicts code
      server pods first during node memory pressure.
  - apiVersion: scheduling.k8s.io/v1
    kind: PriorityClass
    metadata:
      name: dagster-agent
    value: 1000
    globalDefault: false
    preemptionPolicy: PreemptLowerPriority
    description: >-
      Elevates agent pods to the same priority as run/step pods so the scheduler
      cannot preempt them to fit run workloads.
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kipptaf-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kipptaf
