########################################################################################
# Dagster Cloud: Config for Dagster Cloud's hosted resources
########################################################################################
dagsterCloud:
  # Specify the Dagster Cloud deployments (e.g. dev, staging, prod) that the agent
  # should serve.
  deployments:
    - prod

  # Specify whether the agent should also serve branch deployments for your
  # organization.
  branchDeployments: true

########################################################################################
# Dagster Cloud Agent: Configuration for the Dagster Cloud (User) Agent
########################################################################################
dagsterCloudAgent:
  resources:
    requests:
      cpu: 500m # Autopilot minimum of 500m required for using pod anti affinity
      memory: 2.0Gi # extended-duration minimum (safe-to-evict: "false")
    limits:
      cpu: 750m
      memory: 2.5Gi

  podSecurityContext:
    runAsUser: 1001 # provided non-root user in image versions 0.14.0 and above

  terminationGracePeriodSeconds: 15

  readinessProbe:
    exec:
      command:
        - /bin/bash
        - -c
        - test -f /tmp/finished_initial_reconciliation_sentinel.txt
    failureThreshold: 60 # 10 min (60 × 10s) for initial reconciliation
    initialDelaySeconds: 0
    periodSeconds: 10

  # maxSurge: 200% brings pod count to 4 during upgrades. Combined with
  # requiredDuringSchedulingIgnoredDuringExecution hostname anti-affinity,
  # this requires 4 distinct nodes briefly. On Autopilot this is provisioned
  # on demand; a stalled rollout indicates capacity exhaustion.
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0%
      maxSurge: 200%

  # Number of replicas of the agent service to keep up at a given time.
  replicas: 2

  annotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 30
          preference:
            matchExpressions:
              - key: cloud.google.com/compute-class
                operator: In
                values:
                  - General-Purpose
        - weight: 20
          preference:
            matchExpressions:
              - key: cloud.google.com/compute-class
                operator: In
                values:
                  - Scale-Out
        - weight: 10
          preference:
            matchExpressions:
              - key: cloud.google.com/compute-class
                operator: In
                values:
                  - Balanced
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - dagster-cloud-agent
          topologyKey: kubernetes.io/hostname

  additionalPodSpecConfig:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: dagster-cloud-agent

  # Agent container securityContext — not set because the agent runs Dagster's
  # own image (UID 1001), not ours (UID 1234). Spec Section 2 covers workspace
  # and run pods only. The Helm chart does support this field.

########################################################################################
# Workspace: Configuration for pods (launched by the agent) that run Dagster user code
########################################################################################
workspace:
  # Raw k8s configuration for the Kubernetes Deployment created for each code location.
  serverK8sConfig:
    containerConfig:
      resources:
        # Autopilot minimum of 0.5 vCPU & 2 GiB required for scale-out pods using
        # workload separation: https://docs.cloud.google.com/kubernetes-engine/docs/concepts/autopilot-resource-requests#workload-separation
        requests:
          cpu: 500m
          memory: 2.0Gi
        limits:
          cpu: 750m
          memory: 2.5Gi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1234
        runAsGroup: 1234
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    podTemplateSpecMetadata: # raw config for the pod's metadata
      annotations:
        operator.1password.io/auto-restart: "true"
    podSpecConfig:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: cloud.google.com/gke-spot
                    operator: In
                    values:
                      - "true"
            - weight: 40
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - Scale-Out
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
            - weight: 30
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - General-Purpose
            - weight: 20
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - Scale-Out
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
            - weight: 10
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - Balanced
      terminationGracePeriodSeconds: 15

  # Raw k8s configuration for the Kubernetes Job and Pod created for each run. See:
  # https://docs.dagster.io/deployment/guides/kubernetes/customizing-your-deployment
  runK8sConfig:
    jobSpecConfig:
      backoffLimit: 1
    containerConfig:
      # Autopilot enforces special minimum values for resource requests on extended
      # duration Pods: https://cloud.google.com/kubernetes-engine/docs/concepts/autopilot-resource-requests#workload-separation
      resources:
        requests:
          cpu: 500m
          memory: 2.0Gi
        limits:
          cpu: 1000m
          memory: 2.5Gi
      securityContext:
        runAsNonRoot: true
        runAsUser: 1234
        runAsGroup: 1234
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    podTemplateSpecMetadata: # raw config for the pod's metadata
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    podSpecConfig:
      priorityClassName: dagster-run
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 40
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - Scale-Out
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
            - weight: 30
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - General-Purpose
            - weight: 20
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - Scale-Out
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
            - weight: 10
              preference:
                matchExpressions:
                  - key: cloud.google.com/compute-class
                    operator: In
                    values:
                      - Balanced

  # Specify TTL for user code servers.
  # By default full deployment servers do not have a TTL.
  # Branch deployments servers have a default TTL of 24 hours
  # The max code servers defaults to 25, and only applies to servers with TTL.
  serverTTL:
    branchDeployments:
      ttlSeconds: 900

  onlyAllowUserDefinedK8sConfigFields:
    containerConfig:
      resources: true
      env: true
      volumeMounts: true
    podSpecConfig:
      nodeSelector: true
      affinity: true
      volumes: true
    podTemplateSpecMetadata:
      annotations: true
    jobSpecConfig:
      ttlSecondsAfterFinished: true
    jobMetadata:
      annotations: true

########################################################################################
# Extra Manifests: (Optional) Create additional k8s resources within this chart
########################################################################################
extraManifests:
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: dca-pdb
    spec:
      maxUnavailable: 1
      selector:
        matchLabels:
          app.kubernetes.io/instance: user-cloud
          app.kubernetes.io/name: dagster-cloud-agent
          component: agent
          deployment: agent
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kippcamden-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kippcamden
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kippmiami-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kippmiami
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kippnewark-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kippnewark
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kipppaterson-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kipppaterson
  - apiVersion: scheduling.k8s.io/v1
    kind: PriorityClass
    metadata:
      name: dagster-run
    value: 1000
    globalDefault: false
    preemptionPolicy: PreemptLowerPriority
    description: >-
      Elevates run/step pods above default priority (0) so kubelet evicts code
      server pods first during node memory pressure.
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kipptaf-pdb
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          deployment_name: prod
          managed_by: K8sUserCodeLauncher
          location_name: kipptaf
