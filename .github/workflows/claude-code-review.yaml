name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review]
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - scripts/**
      - mcp/**
      - "!**/*.md"

jobs:
  claude-review:
    if: github.actor != 'dependabot[bot]' && !github.event.pull_request.draft

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@44423bdec74b97d67543eb16c110546762c110b2 # v1.0.181
        with:
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/dbt-labs/dbt-agent-skills.git
            https://github.com/dagster-io/skills.git
            https://github.com/obra/superpowers.git
          plugins: |
            superpowers@superpowers-dev
            context7@claude-plugins-official
            dagster-expert@dagster
            dignified-python@dagster
            dbt@dbt-agent-marketplace
          track_progress: true
          prompt: >-
            /superpowers:requesting-code-review ${{ github.repository
            }}/pull/${{ github.event.pull_request.number }}.

            Apply dignified-python for Python standards, dagster-expert for
            Dagster assets and pipelines, and
            dbt:using-dbt-for-analytics-engineering for dbt models and
            transformations.

            Also evaluate the changed code through the /simplify lens: reuse
            (prefer existing macros, models, and helpers over reinventing),
            simplification, efficiency, and altitude and dead-code cleanup. This
            job has read-only repo access, so report these as review findings
            only; do not apply or commit fixes.

            For SQL and dbt changes, read src/dbt/CLAUDE.md (and the nearest
            per-project CLAUDE.md) and verify the code follows its SQL
            conventions, SQL column ordering (ST06), and SQL formatting
            sections. Examples: max one level of function nesting, no QUALIFY,
            no ORDER BY in models, no SELECT DISTINCT or row_number() = 1 to
            mask upstream duplicates, no subqueries against tables or CTEs, cast
            early and once, correct ON vs WHERE placement, and no pass-through
            import CTEs. Cite the specific convention for each violation.

            Environment: you run in GitHub Actions with NO warehouse or data
            access. No BigQuery connection, and none of the cube, dbt, dagster,
            or bigquery MCP servers are available. You cannot run queries, `dbt
            show`, `dbt compile`, or materialize any model. Do not state
            data-dependent claims (row counts, null rates, join fan-out, grain
            or duplicate violations, value distributions) as fact. When a
            finding depends on the data, label it "needs local verification" and
            give the exact query or dbt command the author should run.

            Review what is checkable statically: SQL and Jinja logic,
            ref()/source() wiring, incremental and materialization config, join
            grain inferred from schema, test coverage, and PII exposure. Before
            reporting a repo-convention violation, confirm the convention
            against existing models with git grep; do not invent naming or style
            rules the codebase does not already follow. Report every issue with
            a severity label; do not withhold lower-severity findings.
          allowed_bots: dbt-cloud
          include_fix_links: false
          use_sticky_comment: true
          display_report: true
          claude_args: --model opus
