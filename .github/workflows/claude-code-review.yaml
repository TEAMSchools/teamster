name: Claude Code Review

on:
  pull_request:
    types: [opened, ready_for_review]
    paths-ignore:
      - uv.lock
      - trunk.yaml
      - package-lock.yml

jobs:
  claude-review:
    if: github.actor != 'dependabot[bot]' && !github.event.pull_request.draft

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
            https://github.com/dbt-labs/dbt-agent-skills.git
            https://github.com/dagster-io/skills.git
          plugins: code-review@claude-code-plugins
          track_progress: true
          prompt:
            "/code-review:code-review ${{ github.repository }}/pull/${{
            github.event.pull_request.number }}"
          allowed_bots: dbt-cloud
          include_fix_links: false
          use_sticky_comment: true
