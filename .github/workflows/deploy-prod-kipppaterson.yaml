name: kipppaterson

permissions:
  contents: read
  pull-requests: write
  id-token: write

on:
  workflow_dispatch: null
  push:
    branches:
      - main
    paths:
      - .github/workflows/dagster-cloud-deploy.yaml
      - .github/workflows/deploy-prod-kipppaterson.yaml
      - Dockerfile
      - uv.lock
      - src/dbt/amplify/**
      - src/dbt/deanslist/**
      - src/dbt/finalsite/**
      - src/dbt/kipppaterson/**
      - src/dbt/pearson/**
      - src/dbt/powerschool/**
      - src/teamster/code_locations/kipppaterson/**
      - src/teamster/core/**
      - src/teamster/libraries/amplify/**
      - src/teamster/libraries/couchdrop/**
      - src/teamster/libraries/extracts/**
      - src/teamster/libraries/dbt/**
      - src/teamster/libraries/deanslist/**
      - src/teamster/libraries/dlt/**
      - src/teamster/libraries/finalsite/**
      - src/teamster/libraries/pearson/**
      - src/teamster/libraries/sftp/**
      - src/teamster/libraries/ssh/**
      - "!**/CLAUDE.md"
  pull_request:
    paths:
      - .github/workflows/dagster-cloud-deploy.yaml
      - .github/workflows/deploy-prod-kipppaterson.yaml
      - Dockerfile
      - uv.lock
      - src/teamster/code_locations/kipppaterson/**
      - src/teamster/core/**
      - src/teamster/libraries/amplify/**
      - src/teamster/libraries/couchdrop/**
      - src/teamster/libraries/extracts/**
      - src/teamster/libraries/dbt/**
      - src/teamster/libraries/deanslist/**
      - src/teamster/libraries/dlt/**
      - src/teamster/libraries/finalsite/**
      - src/teamster/libraries/pearson/**
      - src/teamster/libraries/sftp/**
      - src/teamster/libraries/ssh/**
      - "!**/CLAUDE.md"
    types:
      - opened
      - synchronize
      - reopened
      - closed
      - ready_for_review

jobs:
  dagster-cloud-deploy:
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/dagster-cloud-deploy.yaml
    with:
      code-location: kipppaterson
    secrets: inherit
