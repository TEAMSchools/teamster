name: Cube model check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - src/cube/model/**
      - scripts/check-cube-pii-coverage.py

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pii-coverage:
    name: PII coverage check
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Check PII coverage
        run: uv run scripts/check-cube-pii-coverage.py
