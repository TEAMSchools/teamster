models:
  - name: fct_sample
    description: Sample fact for unit testing.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_id
              - academic_year
          config:
            severity: warn
    columns:
      - name: surrogate_key
        data_type: string
        data_tests:
          - unique
          - not_null
      - name: student_id
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: created_timestamp
        data_type: timestamp
  - name: dim_sample
    columns:
      - name: dim_key
        data_type: string
        data_tests:
          - unique:
              config:
                severity: warn
