cubes:
  - name: student_assessment_administrations
    public: false
    sql_table: kipptaf_marts.dim_assessment_administrations

    joins:
      # administration date -> the conformed dates cube (no role-play); the fact
      # surfaces the completion date (date_taken) as an unjoined degenerate dim,
      # so dates is reached by a single path and there is no diamond.
      - name: dates
        sql: >
          {dates.date_day} = CAST({CUBE}.administered_date_key AS TIMESTAMP)
        relationship: many_to_one

      - name: student_assessments
        sql: "{student_assessments.assessment_key} = {CUBE}.assessment_key"
        relationship: many_to_one

    dimensions:
      - name: assessment_administration_key
        description: >-
          Surrogate key for the administration occurrence. Primary key.
        sql: assessment_administration_key
        type: string
        primary_key: true

      # FK to student_assessments — descriptors come from that cube, not here.
      - name: assessment_key
        description: FK to student_assessments (canonical-representative row).
        sql: assessment_key
        type: string

      - name: administration_period
        description: >-
          Scheduling period distinguishing administrations within an academic
          year. NJ state: testing season (Fall, Winter, Spring). FL state: FLDOE
          window. College: College Board round. Null for Illuminate and AP.
        sql: administration_period
        type: string
        public: true

      - name: test_type
        description: >-
          Official vs Practice for college-entrance administrations. Null for
          Illuminate, state, and AP.
        sql: test_type
        type: string
        public: true

      - name: source_assessment_id
        description: >-
          Illuminate assessment id carried to the administration grain (the
          canonical id). Null for non-Illuminate branches.
        sql: source_assessment_id
        type: number
        public: true
