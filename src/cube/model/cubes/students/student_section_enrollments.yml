cubes:
  - name: student_section_enrollments
    public: false
    sql_table: kipptaf_marts.dim_student_section_enrollments

    joins:
      - name: student_school_enrollments
        sql: >
          {student_school_enrollments.student_enrollment_key} =
          {CUBE}.student_enrollment_key
        relationship: many_to_one

      - name: course_sections
        sql: "{course_sections.course_section_key} = {CUBE}.course_section_key"
        relationship: many_to_one

      - name: terms
        sql: "{terms.term_key} = {CUBE}.term_key"
        relationship: many_to_one

      # Lead teacher name/attributes. many_to_one — one lead per enrollment
      # after dbt resolution — so no fan-out. Joins the staff_lead_teacher
      # role-play cube (extends staff) so the lead-teacher members can't collide
      # with the homeroom-teacher staff join reached transitively via
      # student_school_enrollments.
      - name: staff_lead_teacher
        sql: "{staff_lead_teacher.staff_key} = {CUBE}.lead_teacher_staff_key"
        relationship: many_to_one

    dimensions:
      - name: student_section_enrollment_key
        description: >-
          Surrogate key (cc_dcid, _dbt_source_project). Primary key — one row
          per CC record.
        sql: student_section_enrollment_key
        type: string
        primary_key: true

      - name: student_enrollment_key
        description:
          FK to student_school_enrollments (resolved school enrollment stint).
        sql: student_enrollment_key
        type: string
        public: true

      # FKs — descriptors come from the joined cubes.
      - name: course_section_key
        description: FK to course_sections.
        sql: course_section_key
        type: string

      - name: term_key
        description: FK to terms.
        sql: term_key
        type: string

      - name: academic_year
        description: >-
          KIPP academic year (July start) the section enrollment falls in. The
          calendar year the academic year begins (e.g., 2025 for 2025-26). This
          is the canonical academic_year for the assessment-scores views.
        sql: academic_year
        type: number
        public: true

      - name: entry_date
        description: >-
          Date the student enrolled in this section. Cast to TIMESTAMP for Cube
          time joins.
        sql: CAST(entry_date AS TIMESTAMP)
        type: time
        public: true

      - name: exit_date
        description: >-
          Date the student left this section. Cast to TIMESTAMP for Cube time
          joins.
        sql: CAST(exit_date AS TIMESTAMP)
        type: time
        public: true

      - name: is_dropped_section
        description: >-
          TRUE if this section enrollment was dropped mid-term (negative section
          id + early exit).
        sql: is_dropped_section
        type: boolean
        public: true

      - name: is_dropped_course
        description: >-
          TRUE if all enrollments for this student x course x year were dropped.
        sql: is_dropped_course
        type: boolean
        public: true

      # Degenerate FK to staff — teacher name comes via the staff join.
      - name: lead_teacher_staff_key
        description: FK to staff — the section's Lead Teacher.
        sql: lead_teacher_staff_key
        type: string

      - name: is_homeroom
        description:
          TRUE when this is a homeroom section (HR course-number prefix).
        sql: is_homeroom
        type: boolean
        public: true

      - name: is_current_section_enrollment
        description: >-
          TRUE for the most-recent section enrollment among a student's
          sequential enrollments in the same course within an academic year.
          Filter with is_homeroom to select the current homeroom section.
        sql: is_current_section_enrollment
        type: boolean
        public: true

    measures:
      - name: count_students
        description: >-
          Distinct students with a section enrollment in the filtered slice.
          Answers "how many students does this teacher teach?" when grouped by
          the lead teacher. count_distinct on the student, so it is fan-safe.
        sql: "{students.student_key}"
        type: count_distinct
        public: true
