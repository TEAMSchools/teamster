cubes:
  - name: student_enrollments
    public: false
    sql_table: kipptaf_marts.fct_student_attendance_daily

    joins:
      - name: dates
        sql: "{dates.date_day} = CAST({CUBE}.date_key AS TIMESTAMP)"
        relationship: many_to_one

      # Location, student identity, grade, and status are all reached via
      # student_enrollment_stints (single FK route, no diamond). The prior
      # direct locations join is removed because fct_student_attendance_daily
      # has no location_key column.
      - name: student_enrollment_stints
        sql: >
          {student_enrollment_stints.student_enrollment_key} =
          {CUBE}.student_enrollment_key
        relationship: many_to_one

    dimensions:
      - name: student_attendance_daily_key
        description: >-
          Surrogate key derived from student_number, _dbt_source_project, and
          calendardate. Primary key of the underlying attendance daily fact.
        sql: student_attendance_daily_key
        type: string
        primary_key: true

      - name: student_enrollment_key
        description: >-
          FK to student_enrollment_stints (the stint dimension). Surrogate key
          from student_number, _dbt_source_project, academic_year, entrydate.
        sql: student_enrollment_key
        type: string

      - name: is_current_record
        description: >-
          TRUE on the school's latest attendance day that has occurred (per
          school × academic year, capped at today). Default point-in-time
          enrollment anchor — drives count_students at year / no grouping.
        sql: is_current_record
        type: boolean
        public: true

      - name: is_month_end_record
        description: >-
          TRUE on the school's latest attendance day of each calendar month. Use
          for month-granularity point-in-time enrollment trends.
        sql: is_enrollment_month_end_record
        type: boolean
        public: true

      - name: is_week_end_record
        description: >-
          TRUE on the school's latest attendance day of each PowerSchool school
          week. Group the weekly trend by dates_school_week_start_date (not
          Cube's native ISO week).
        sql: is_enrollment_week_end_record
        type: boolean
        public: true

      - name: is_latest_record
        description: >-
          TRUE on the last attendance day of each enrollment stint. Per-stint
          "served" marker — not a period-end anchor; distinct from
          is_current_record.
        sql: is_latest_record
        type: boolean
        public: true

    measures:
      - name: count_students
        description: >-
          Distinct students enrolled, point-in-time. Counts each student once as
          of the most recent in-session school day in your query: the exact date
          if you filter to one (filter dates_date_day to a single date, e.g.
          2025-10-01 for the fall count), otherwise each school's latest
          in-session day in the period (today for the current year, the last day
          of school for completed years). Group by month or week to trend the
          point-in-time headcount over the year. Matches the topline Total
          Enrollment methodology — enrollment is by entry/exit dates, not
          status. Note: when no single date is pinned, schools that end on
          different days are each counted as of their own last day, so a network
          total can mix as-of dates within the final weeks of a year. A week or
          month with no in-session days (e.g. winter or February break) has no
          point-in-time snapshot and reads as 0 in a trend — read trends on
          instructional periods, or carry the prior value forward in the BI
          layer (the daily fact is in-session-days only by design).
        sql: "{student_enrollment_stints.student_key}"
        type: count_distinct
        public: true
