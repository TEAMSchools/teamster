cubes:
  - name: dim_student_enrollments
    sql_table: kipptaf_marts.dim_student_enrollments

    joins:
      - name: dim_students
        sql: "{dim_students.student_key} = {CUBE}.student_key"
        relationship: many_to_one

    dimensions:
      - name: student_enrollment_key
        sql: student_enrollment_key
        type: string
        primary_key: true

      - name: student_key
        sql: student_key
        type: string

      # degenerate — no dim_locations join declared here to avoid a diamond
      # path with attendance's direct location_key FK to dim_locations
      - name: location_key
        sql: location_key
        type: string

      - name: academic_year
        sql: academic_year
        type: number

      - name: grade_level
        sql: grade_level
        type: number

      - name: graduation_year
        sql: graduation_year
        type: number

      - name: entry_date
        sql: CAST(entry_date_key AS TIMESTAMP)
        type: time

      - name: exit_date
        sql: CAST(exit_date_key AS TIMESTAMP)
        type: time

      - name: is_retained_year
        sql: is_retained_year
        type: boolean

    measures:
      - name: count_students
        sql: student_enrollment_key
        type: count_distinct
