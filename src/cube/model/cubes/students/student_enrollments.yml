cubes:
  - name: student_enrollments
    public: false
    sql_table: kipptaf_marts.fct_student_enrollment_daily

    joins:
      - name: dates
        sql: "{dates.date_day} = CAST({CUBE}.date_key AS TIMESTAMP)"
        relationship: many_to_one

      # No direct students join: student identity is reached via
      # student_enrollment_stints (dim_student_enrollments carries student_key),
      # keeping a single FK route to students per the strict-chain rule. The
      # locations diamond below is the one documented exception (src/cube/CLAUDE.md).
      - name: locations
        sql: "{locations.location_key} = {CUBE}.location_key"
        relationship: many_to_one

      - name: student_enrollment_stints
        sql: >
          {student_enrollment_stints.student_enrollment_key} =
          {CUBE}.student_enrollment_key
        relationship: many_to_one

    dimensions:
      - name: student_enrollment_daily_key
        description: >-
          Surrogate key derived from student_number, _dbt_source_project, and
          date_key. Primary key for this fact.
        sql: student_enrollment_daily_key
        type: string
        primary_key: true

      - name: student_enrollment_key
        description: >-
          FK to student_enrollment_stints (the stint dimension). Surrogate key
          from student_number, _dbt_source_project, academic_year, entrydate.
        sql: student_enrollment_key
        type: string

      - name: location_key
        description: Surrogate key. FK to locations.
        sql: location_key
        type: string

      - name: enrollment_date
        description: The in-session school day this row represents.
        sql: CAST(date_key AS TIMESTAMP)
        type: time
        public: true

      - name: is_current_record
        description: >-
          TRUE on the school's last in-session day of the academic year that has
          actually occurred (capped at today). Per-school period-end-as-of-now
          marker — drives the default count_students at year / no grouping.
        sql: is_current_record
        type: boolean
        public: true

      - name: is_month_end_record
        description: >-
          TRUE on the school's last in-session day of the calendar month that
          has occurred (capped at today). Use with timeDimensions granularity
          "month".
        sql: is_month_end_record
        type: boolean
        public: true

      - name: is_week_end_record
        description: >-
          TRUE on the school's last in-session day of the ISO week that has
          occurred (capped at today). Use with timeDimensions granularity
          "week".
        sql: is_week_end_record
        type: boolean
        public: true

      - name: is_latest_record
        description: >-
          TRUE on each student-stint's last enrolled in-session day of the
          academic year (one row per stint). Marks each student's last enrolled
          day — NOT a period-end marker; distinct from is_current_record.
        sql: is_latest_record
        type: boolean
        public: true

    measures:
      - name: count_students
        description: >-
          Distinct students enrolled, point-in-time. Counts each student once as
          of the most recent in-session school day in your query: the exact date
          if you filter to one (filter dates_date_day to a single date, e.g.
          2025-10-01 for the fall count), otherwise each school's latest
          in-session day in the period (today for the current year, the last day
          of school for completed years). Group by month or week to trend the
          point-in-time headcount over the year. Matches the topline Total
          Enrollment methodology — enrollment is by entry/exit dates, not
          status. Note: when no single date is pinned, schools that end on
          different days are each counted as of their own last day, so a network
          total can mix as-of dates within the final weeks of a year. A week or
          month with no in-session days (e.g. winter or February break) has no
          point-in-time snapshot and reads as 0 in a trend — read trends on
          instructional periods, or carry the prior value forward in the BI
          layer (the daily fact is in-session-days only by design).
        sql: "{student_enrollment_stints.student_key}"
        type: count_distinct
        public: true
