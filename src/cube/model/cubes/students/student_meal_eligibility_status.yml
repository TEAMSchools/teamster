cubes:
  - name: dim_student_meal_eligibility_status
    public: false
    sql_table: kipptaf_marts.dim_student_meal_eligibility_status

    dimensions:
      - name: student_meal_eligibility_status_key
        sql: student_meal_eligibility_status_key
        type: string
        primary_key: true

      - name: student_enrollment_key
        sql: student_enrollment_key
        type: string
        public: false

      - name: effective_date_start_key
        sql: effective_date_start_key
        type: string
        public: false

      - name: effective_date_end_key
        sql: effective_date_end_key
        type: string
        public: false

      - name: is_meal_eligible
        description: >-
          TRUE if the student was eligible for free, reduced-price, or direct
          certification meals on this attendance date.
        sql: is_meal_eligible
        type: boolean
        public: true

      - name: meal_eligibility
        description: >-
          Meal eligibility category on this attendance date. Values: F (Free), R
          (Reduced), FDC (Free Direct Certification), P (Paid), Unknown. Sourced
          from Titan for Newark/Camden; PowerSchool lunchstatus for Paterson and
          Miami.
        sql: meal_eligibility
        type: string
        public: true
