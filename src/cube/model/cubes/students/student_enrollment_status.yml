cubes:
  - name: student_enrollment_status
    public: false
    # Grain: enrollment stint × ell_span × iep_span × meal_span.
    # Fan-out occurs when any status changes mid-enrollment (rare in practice).
    # Use count_students (count_distinct on student_enrollment_key) for all
    # headcount measures — always correct regardless of fan-out.
    # For point-in-time queries, filter each status's effective_date_start ≤ date
    # AND effective_date_end ≥ date to collapse to one row per enrollment.
    sql: |
      SELECT
        CONCAT(
          se.student_enrollment_key,
          '|', COALESCE(ell.student_ell_status_key, ''),
          '|', COALESCE(iep.student_iep_status_key, ''),
          '|', COALESCE(mel.student_meal_eligibility_status_key, '')
        )                                         AS student_enrollment_status_key,
        se.student_enrollment_key,
        se.student_key,
        se.location_key,
        se.academic_year,
        se.grade_level,
        se.graduation_year,
        se.entry_date_key,
        se.exit_date_key,
        se.is_retained_year,
        COALESCE(ell.is_ell, false)               AS is_ell,
        ell.effective_date_start_key              AS ell_effective_date_start_key,
        ell.effective_date_end_key                AS ell_effective_date_end_key,
        COALESCE(iep.is_iep, false)               AS is_iep,
        iep.iep_classification,
        iep.special_education_code,
        iep.special_education_name,
        iep.special_education_placement,
        iep.effective_date_start_key              AS iep_effective_date_start_key,
        iep.effective_date_end_key                AS iep_effective_date_end_key,
        COALESCE(mel.is_meal_eligible, false)     AS is_meal_eligible,
        mel.meal_eligibility,
        mel.effective_date_start_key              AS meal_effective_date_start_key,
        mel.effective_date_end_key                AS meal_effective_date_end_key,
      FROM kipptaf_marts.dim_student_enrollments AS se
      LEFT JOIN kipptaf_marts.dim_student_ell_status AS ell
        ON ell.student_enrollment_key = se.student_enrollment_key
      LEFT JOIN kipptaf_marts.dim_student_iep_status AS iep
        ON iep.student_enrollment_key = se.student_enrollment_key
      LEFT JOIN kipptaf_marts.dim_student_meal_eligibility_status AS mel
        ON mel.student_enrollment_key = se.student_enrollment_key

    joins:
      - name: dates
        sql: >
          {dates.date_day} BETWEEN CAST({CUBE}.entry_date_key AS TIMESTAMP) AND
          CAST({CUBE}.exit_date_key AS TIMESTAMP)
        relationship: one_to_many

      - name: students
        sql: "{students.student_key} = {CUBE}.student_key"
        relationship: many_to_one

      - name: locations
        sql: "{locations.location_key} = {CUBE}.location_key"
        relationship: many_to_one

    dimensions:
      - name: student_enrollment_status_key
        sql: student_enrollment_status_key
        type: string
        primary_key: true

      - name: student_enrollment_key
        description: >-
          Surrogate key for the enrollment stint. Not unique in this cube when a
          student's ELL, IEP, or meal eligibility status changes mid-enrollment
          — always use count_students for headcount.
        sql: student_enrollment_key
        type: string
        public: true

      - name: student_key
        sql: student_key
        type: string

      - name: location_key
        sql: location_key
        type: string

      - name: academic_year
        description: >-
          KIPP academic year (July start). The calendar year in which the
          academic year begins (e.g., 2025 for the 2025–26 school year).
        sql: academic_year
        type: number
        public: true

      - name: grade_level
        description: Grade level. 0 = Kindergarten, -2 = Preschool.
        sql: grade_level
        type: number
        public: true

      - name: graduation_year
        description: Student's projected graduation year.
        sql: graduation_year
        type: number
        public: true

      - name: entry_date
        sql: CAST(entry_date_key AS TIMESTAMP)
        type: time
        public: true

      - name: exit_date
        sql: CAST(exit_date_key AS TIMESTAMP)
        type: time
        public: true

      - name: is_retained_year
        description: >-
          TRUE if the student repeated this grade level in the same school
          compared to the prior academic year.
        sql: is_retained_year
        type: boolean
        public: true

      - name: is_ell
        description: >-
          TRUE if the student was classified as an English Language Learner
          during this status span. False (COALESCE) when no ELL record exists —
          the student was not ELL, not that data is missing. For point-in-time
          queries, also filter ell_effective_date_start ≤ date AND
          ell_effective_date_end ≥ date.
        sql: is_ell
        type: boolean
        public: true

      - name: ell_effective_date_start
        description:
          First date of this ELL status span, clipped to the enrollment stint.
        sql: CAST(ell_effective_date_start_key AS TIMESTAMP)
        type: time
        public: true

      - name: ell_effective_date_end
        description: >-
          Last date of this ELL status span. 9999-12-31 means the span is
          open-ended (current status).
        sql: CAST(ell_effective_date_end_key AS TIMESTAMP)
        type: time
        public: true

      - name: is_iep
        description: >-
          TRUE if the student had an active IEP during this status span. False
          (COALESCE) when no IEP record exists.
        sql: is_iep
        type: boolean
        public: true

      - name: iep_classification
        description: >-
          Special education program classification (e.g., Resource Center,
          In-Class Resource, Self-Contained, No IEP).
        sql: iep_classification
        type: string
        public: true

      - name: special_education_code
        description: >-
          NJ state special education code. Newark and Camden only; null for
          Paterson and Miami.
        sql: special_education_code
        type: string
        public: true

      - name: special_education_name
        description:
          Human-readable label for the NJ state special education code.
        sql: special_education_name
        type: string
        public: true

      - name: special_education_placement
        description: NJ state special education placement category.
        sql: special_education_placement
        type: string
        public: true

      - name: iep_effective_date_start
        description:
          First date of this IEP status span, clipped to the enrollment stint.
        sql: CAST(iep_effective_date_start_key AS TIMESTAMP)
        type: time
        public: true

      - name: iep_effective_date_end
        description: >-
          Last date of this IEP status span. 9999-12-31 means the span is
          open-ended (current status).
        sql: CAST(iep_effective_date_end_key AS TIMESTAMP)
        type: time
        public: true

      - name: is_meal_eligible
        description: >-
          TRUE if the student was Free, Reduced, or FDC eligible during this
          status span. False (COALESCE) when no meal record exists (Paid).
        sql: is_meal_eligible
        type: boolean
        public: true

      - name: meal_eligibility
        description: >-
          Meal eligibility code: F (Free), R (Reduced), FDC (Free Direct
          Certification), P (Paid), or Unknown.
        sql: meal_eligibility
        type: string
        public: true

      - name: meal_effective_date_start
        description:
          First date of this meal eligibility span, clipped to the enrollment
          stint.
        sql: CAST(meal_effective_date_start_key AS TIMESTAMP)
        type: time
        public: true

      - name: meal_effective_date_end
        description: >-
          Last date of this meal eligibility span. 9999-12-31 means the span is
          open-ended (current status).
        sql: CAST(meal_effective_date_end_key AS TIMESTAMP)
        type: time
        public: true

    measures:
      - name: count_students
        description: >-
          Count of distinct enrollment stints. Always correct — deduplicates on
          student_enrollment_key regardless of status-span fan-out.
        sql: student_enrollment_key
        type: count_distinct
