cubes:
  - name: dim_student_iep_status
    public: false
    sql_table: kipptaf_marts.dim_student_iep_status

    dimensions:
      - name: student_iep_status_key
        sql: student_iep_status_key
        type: string
        primary_key: true

      - name: student_enrollment_key
        sql: student_enrollment_key
        type: string
        public: false

      - name: effective_date_start_key
        sql: effective_date_start_key
        type: string
        public: false

      - name: effective_date_end_key
        sql: effective_date_end_key
        type: string
        public: false

      - name: is_iep
        description: >-
          TRUE if the student had an active Individualized Education Program on
          this attendance date. Derived from SCD2 spans; NULL when no span
          covers the date (absence of a row = no IEP).
        sql: is_iep
        type: boolean
        public: true

      - name: iep_classification
        description: >-
          IEP placement classification on this attendance date. Examples:
          Resource Center, In-Class Resource, Self-Contained. NULL when no IEP
          span covers the date.
        sql: iep_classification
        type: string
        public: true

      - name: special_education_code
        description: >-
          NJ state special education code (Newark and Camden only; NULL for
          Miami and Paterson).
        sql: special_education_code
        type: string
        public: true

      - name: special_education_name
        description: >-
          Human-readable label for the NJ special education code (Newark and
          Camden only; NULL for Miami and Paterson).
        sql: special_education_name
        type: string
        public: true

      - name: special_education_placement
        description: >-
          NJ special education placement category (Newark and Camden only; NULL
          for Miami and Paterson).
        sql: special_education_placement
        type: string
        public: true
