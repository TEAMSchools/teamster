cubes:
  - name: attendance
    public: false
    sql_table: kipptaf_marts.fct_student_attendance_daily

    joins:
      - name: dim_dates
        sql: "{dim_dates.date_day} = CAST({CUBE}.date_key AS TIMESTAMP)"
        relationship: many_to_one

      - name: dim_locations
        sql: "{dim_locations.location_key} = {CUBE}.location_key"
        relationship: many_to_one

      # compound join avoids a diamond path through dim_locations
      - name: dim_school_calendars
        sql: >
          {dim_school_calendars.date_key} = {CUBE}.date_key AND
          {dim_school_calendars.location_key} = {CUBE}.location_key
        relationship: many_to_one

      - name: dim_student_enrollments
        sql: >
          {dim_student_enrollments.student_enrollment_key} =
          {CUBE}.student_enrollment_key
        relationship: many_to_one

      - name: dim_terms
        sql: "{dim_terms.term_key} = {CUBE}.term_key"
        relationship: many_to_one

    dimensions:
      - name: student_attendance_daily_key
        description: >-
          Surrogate key derived from student_number, _dbt_source_relation, and
          calendardate. Primary key for this fact.
        sql: student_attendance_daily_key
        type: string
        primary_key: true

      - name: student_number
        sql: student_number
        type: number
        public: false

      - name: attendance_date
        sql: CAST(date_key AS TIMESTAMP)
        type: time
        public: true

      - name: academic_year
        description:
          KIPP academic year (July start) in which this attendance date falls.
        sql: academic_year
        type: number
        public: true

      - name: semester
        description: Semester code for the attendance date (e.g., S1, S2).
        sql: semester
        type: string
        public: true

      - name: attendance_code
        description:
          Attendance identifier set by school. Examples Tardy, Absent, etc.
        sql: attendance_code
        type: string
        public: true

      - name: attendance_category
        description: >-
          Coarse attendance category derived from the is_* flags with priority
          ordering (suspension > absent > tardy > present). Values:
          Out-of-School Suspension, In-School Suspension, Absent, Tardy,
          Present. Use this column for GROUP BY in BI tools; use the raw
          attendance_code for specific-code drill-down.
        sql: attendance_category
        type: string
        public: true

      - name: attendance_value
        description: >-
          Daily attendance value — a real number, typically a fraction of 1
          where 1 is a full attendance day. Used with membership_value to
          compute ADA. Precision depends on the source SIS's attendance mode
          (full-day vs period-level vs day-part); see source_model for
          provenance.
        sql: attendance_value
        type: number
        public: true

      - name: membership_value
        description: >-
          The amount of a student's membership this school claims. If a student
          attends more than one school each one will only be able to claim a
          certain portion of the membership. The largest number for this will
          usually be 1 and fractions expressed as decimals. Like .5 or .25.
        sql: membership_value
        type: number
        public: true

      - name: present_weight
        description: >-
          Weighted presence value. 0.67 for tardy (T-prefix codes), otherwise
          equals attendance_value. Fractional by design — not a 0/1 flag.
        sql: present_weight
        type: number
        public: true

      - name: is_absent
        description:
          1 if the student was absent, 0 if present. Sum-friendly flag.
        sql: is_absent
        type: number
        public: true

      - name: is_tardy
        description:
          1 if the student was tardy (T-prefix attendance code), 0 otherwise.
        sql: is_tardy
        type: number
        public: true

      - name: is_ontime
        description: 1 if the student arrived on time (non-tardy), 0 if tardy.
        sql: is_ontime
        type: number
        public: true

      - name: is_oss
        description: >-
          1 if the student received out-of-school suspension on this date (OS,
          OSS, OSSP, SHI codes), 0 otherwise.
        sql: is_oss
        type: number
        public: true

      - name: is_iss
        description: >-
          1 if the student received in-school suspension on this date (S, ISS
          codes), 0 otherwise.
        sql: is_iss
        type: number
        public: true

      - name: is_suspended
        description: >-
          1 if the student was suspended (any type) on this date. Union of
          is_oss and is_iss codes.
        sql: is_suspended
        type: number
        public: true

      - name: is_truant
        description: >-
          TRUE if the student meets regional truancy criteria. Miami: 15+
          absences in 90-day rolling window. NJ regions: projected absences
          reach 50+ for the year.
        sql: is_truant
        type: boolean
        public: true

      - name: enroll_status
        description: >-
          PowerSchool enrollment status at the time of the attendance record. 0
          = active; 2 = transferred out. Use to exclude transferred-out students
          from chronic-absence metrics.
        sql: enroll_status
        type: number
        public: true

      - name: is_ca_eligible
        description: >-
          TRUE if this student-day is included in chronic absence calculations.
          Transferred-out students (enroll_status = 2) are excluded for the
          current academic year only; prior-year records are always eligible.
        sql: is_ca_eligible
        type: boolean
        public: false

      - name: is_chronically_absent
        description: >-
          TRUE if the student's cumulative ADA through this date is at or below
          90%. Computed on full membership days only (membership_value = 1).
          Filter to a single date to get YTD CA status as of that date.
        sql: is_chronically_absent
        type: boolean
        public: true

      - name: ada_tier
        description: >-
          ADA tier based on cumulative attendance rate through this date. Tier 1
          = 95%+ (on track). Tier 2 = 90–94% (at risk). Tier 3 = 80–89%
          (chronic). Tier 4 = below 80% (severe chronic).
        sql: ada_tier
        type: string
        public: true

    measures:
      - name: count_students
        sql: student_enrollment_key
        type: count_distinct
        public: true
        filters:
          - sql: "{CUBE}.membership_value > 0"

      - name: _sum_attendance_value
        sql: attendance_value
        type: sum
        public: false

      - name: _sum_membership_value
        sql: membership_value
        type: sum
        public: false

      - name: avg_daily_attendance
        description:
          Average Daily Attendance (ADA) — SUM(attendance_value) /
          SUM(membership_value)
        sql: "{_sum_attendance_value} / NULLIF({_sum_membership_value}, 0)"
        type: number
        format: percent
        public: true

      - name: pct_tardy
        description: Percentage of membership days where the student was tardy
        sql: is_tardy
        type: avg
        format: percent
        public: true
        filters:
          - sql: "{CUBE}.membership_value = 1"

      - name: count_truants
        description: >-
          Students meeting truancy criteria across the filtered period. For a
          point-in-time snapshot, filter to a single date.
        sql: student_enrollment_key
        type: count_distinct
        public: true
        filters:
          - sql: "{CUBE}.is_truant = true"
          - sql: "{CUBE}.membership_value > 0"

      - name: pct_truant
        description: Percentage of students meeting truancy criteria
        sql: "1.0 * {count_truants} / NULLIF({count_students}, 0)"
        type: number
        format: percent
        public: true

      - name: count_absent_days
        description:
          Total number of absence days (sum of is_absent on membership days).
        sql: is_absent
        type: sum
        public: true
        filters:
          - sql: "{CUBE}.membership_value > 0"

      - name: _count_ca_eligible_students
        description: >-
          Denominator for CA rate — distinct students on full membership days
          (membership_value = 1) who are CA-eligible (is_ca_eligible = true).
          Must be used with a single date filter. Uses student_number to avoid
          double-counting students with multiple enrollment records in the same
          year.
        sql: student_number
        type: count_distinct
        public: false
        filters:
          - sql: "{CUBE}.membership_value = 1"
          - sql: "{CUBE}.is_ca_eligible = true"

      - name: count_chronically_absent
        description: >-
          Students with cumulative ADA ≤ 90% as of the filtered date (YTD
          chronic absence). Must be filtered to a single date — the running ADA
          accumulates from the start of the academic year through that date, so
          the result is "how many students were chronically absent as of X?"
          Filtering to a date range or omitting the date filter will overcount
          by including students who were CA at any point in the period.
        sql: student_number
        type: count_distinct
        public: true
        filters:
          - sql: "{CUBE}.is_chronically_absent = true"
          - sql: "{CUBE}.membership_value = 1"
          - sql: "{CUBE}.is_ca_eligible = true"

      - name: pct_chronically_absent
        description: >-
          YTD chronic absence rate as of the filtered date —
          count_chronically_absent / _count_ca_eligible_students. Must be
          filtered to a single date. See count_chronically_absent for details.
        sql:
          "1.0 * {count_chronically_absent} /
          NULLIF({_count_ca_eligible_students}, 0)"
        type: number
        format: percent
        public: true
