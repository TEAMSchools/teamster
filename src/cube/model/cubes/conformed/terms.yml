cubes:
  - name: dim_terms
    public: false
    sql_table: kipptaf_marts.dim_terms

    dimensions:
      - name: term_key
        sql: term_key
        type: string
        description:
          "Surrogate key for this dimension. Hash composition uses term type,
          code, name, start date, region, and school ID as internal inputs;
          region and school ID are not exposed as mart columns (reachable via
          region_key and location_key FK traversal)."
        primary_key: true

      - name: location_key
        sql: location_key
        type: string
        description:
          "Foreign key to dim_locations. Surrogate key derived from the location
          name. Nullable when the period is region-wide or when the school is
          not present in dim_locations."

      - name: term_type
        sql: "{CUBE}.`type`"
        type: string

      - name: term_code
        sql: term_code
        type: string
        description: "Short code for the period (e.g., Q1, Q2, PM1, Fall)."

      - name: term_name
        sql: term_name
        type: string
        description: "Display name for the period."

      - name: academic_year
        sql: academic_year
        type: number
        description: "Academic year this period falls within."

      - name: fiscal_year
        sql: fiscal_year
        type: number
        description: "Fiscal year this period falls within."

      - name: grade_band
        sql: grade_band
        type: string
        description:
          "Grade band (ES, MS, HS). Nullable when not school-specific."

      - name: start_date
        sql: CAST(start_date AS TIMESTAMP)
        type: time

      - name: end_date
        sql: CAST(end_date AS TIMESTAMP)
        type: time

      - name: is_current
        sql: is_current
        type: boolean
        description:
          "TRUE if the current date falls within this period, or if the period
          is the latest for its type in a past academic year."
