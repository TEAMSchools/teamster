cubes:
  - name: dim_terms
    public: false
    sql_table: kipptaf_marts.dim_terms

    dimensions:
      - name: term_key
        description: >-
          Surrogate key for this dimension. Hash composition uses term type,
          code, name, start date, region, and school ID as internal inputs;
          region and school ID are not exposed as mart columns. Region
          attributes are reachable via dim_terms → dim_locations → dim_regions
          FK traversal.
        sql: term_key
        type: string
        primary_key: true

      - name: location_key
        description: >-
          Foreign key to dim_locations. Surrogate key derived from the location
          name. Nullable when the period is region-wide or when the school is
          not present in dim_locations.
        sql: location_key
        type: string

      - name: term_type
        description:
          Category of period (e.g., academic, PM, survey, assessment, fiscal).
        sql: "{CUBE}.`type`"
        type: string
        public: true

      - name: term_code
        description: Short code for the period (e.g., Q1, Q2, PM1, Fall).
        sql: term_code
        type: string
        public: true

      - name: term_name
        description: Display name for the period.
        sql: term_name
        type: string
        public: true

      - name: academic_year
        description: >-
          KIPP academic year (July start) this term falls within. Calendar year
          in which the academic year begins (e.g., 2025 for the 2025–26 school
          year) — opposite of typical FY conventions where FY2025 ends in 2025.
        sql: academic_year
        type: number
        public: true

      - name: fiscal_year
        description: Fiscal year this period falls within.
        sql: fiscal_year
        type: number

      - name: grade_band
        description: Grade band (ES, MS, HS). Nullable when not school-specific.
        sql: grade_band
        type: string

      - name: start_date
        sql: CAST(start_date AS TIMESTAMP)
        type: time

      - name: end_date
        sql: CAST(end_date AS TIMESTAMP)
        type: time

      - name: is_current
        description: >-
          TRUE if the current date falls within this period, or if the period is
          the latest for its type in a past academic year.
        sql: is_current
        type: boolean
