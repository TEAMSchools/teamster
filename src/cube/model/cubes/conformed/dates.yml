cubes:
  - name: dim_dates
    public: false
    sql_table: kipptaf_marts.dim_dates

    dimensions:
      - name: date_key
        description:
          Calendar date. Primary key and join target for all mart models.
        sql: date_key
        type: string
        primary_key: true

      - name: date_day
        description:
          Timestamp cast of date_key. Required by Cube for date dimension joins.
        sql: date_timestamp
        type: time
        public: true

      - name: academic_year
        description: >-
          KIPP academic year (July start). The calendar year in which the
          academic year begins (e.g., 2025 for the 2025-26 school year). For
          filtering by year, prefer academic_year_label (the unambiguous
          "2025-2026" string form) over this integer.
        sql: academic_year
        type: number
        public: true

      - name: academic_year_label
        description: >-
          Full span label for the academic year (e.g. "2025-2026" for the year
          beginning July 2025). Use this as the canonical filter surface when
          querying by year — it is unambiguous regardless of SY vs. start-year
          notation. academic_year 2025 = academic_year_label "2025-2026" = SY26.
          The integer academic_year is retained for sort/group/math only.
        sql: >-
          CONCAT(CAST(academic_year AS STRING), '-', CAST(academic_year + 1 AS
          STRING))
        type: string
        public: true

      - name: fiscal_year
        description: >-
          KIPP fiscal year (July start). The calendar year in which the fiscal
          year ends (e.g., 2026 for FY2026 which begins July 2025).
        sql: fiscal_year
        type: number
        public: true

      - name: is_current_academic_year
        description: >-
          TRUE if this date's academic_year matches the dbt project's
          current_academic_year var. Manually controlled — rolls over only on
          var update + mart rebuild.
        sql: is_current_academic_year
        type: boolean
        public: true

      - name: year_number
        description: Calendar year.
        sql: year_number
        type: number
        public: true

      - name: quarter_number
        description: Calendar quarter (1-4).
        sql: quarter_number
        type: number
        public: true

      - name: month_number
        description: Month number (1-12).
        sql: month_number
        type: number
        public: true

      - name: month_name
        description: Full month name (January, February, etc.).
        sql: month_name
        type: string
        public: true

      - name: day_of_week
        description: Day of week (1=Sunday through 7=Saturday).
        sql: day_of_week
        type: number
        public: true

      - name: day_of_week_name
        description: Full day name (Monday, Tuesday, etc.).
        sql: day_of_week_name
        type: string
        public: true

      - name: is_weekday
        description: TRUE for Monday through Friday.
        sql: is_weekday
        type: boolean
        public: true

      - name: school_week_start_date
        sql: CAST(school_week_start_date AS TIMESTAMP)
        type: time
        public: true

      - name: school_week_end_date
        sql: CAST(school_week_end_date AS TIMESTAMP)
        type: time
        public: true

      - name: calendar_week_start_date
        sql: CAST(calendar_week_start_date AS TIMESTAMP)
        type: time
        public: true

      - name: calendar_week_end_date
        sql: CAST(calendar_week_end_date AS TIMESTAMP)
        type: time
        public: true
