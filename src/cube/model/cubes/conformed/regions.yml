cubes:
  - name: dim_regions
    public: false
    sql_table: kipptaf_marts.dim_regions

    dimensions:
      - name: region_key
        sql: region_key
        type: string
        description: "Surrogate key derived from region name."
        primary_key: true

      - name: region_name
        sql: "{CUBE}.`name`"
        type: string

      - name: state
        sql: state
        type: string
        description: "US state (NJ or FL)."

      - name: timezone
        sql: timezone
        type: string
        description: "IANA timezone identifier."
