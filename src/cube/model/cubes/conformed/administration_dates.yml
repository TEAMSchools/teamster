cubes:
  - name: administration_dates
    public: false
    sql_table: kipptaf_marts.dim_dates

    dimensions:
      - name: date_key
        description: Calendar date. Primary key and join target.
        sql: date_key
        type: string
        primary_key: true

      - name: date_day
        description: >-
          Timestamp cast of date_key. Required by Cube for date dimension joins.
        sql: date_timestamp
        type: time
        public: true

      - name: academic_year
        description: >-
          KIPP academic year (July start) the administration date falls in. The
          calendar year the academic year begins (e.g., 2025 for 2025-26).
        sql: academic_year
        type: number
        public: true

      - name: year_number
        description: Calendar year.
        sql: year_number
        type: number
        public: true

      - name: quarter_number
        description: Calendar quarter (1-4).
        sql: quarter_number
        type: number
        public: true

      - name: month_number
        description: Month number (1-12).
        sql: month_number
        type: number
        public: true

      - name: month_name
        description: Full month name (January, February, etc.).
        sql: month_name
        type: string
        public: true
