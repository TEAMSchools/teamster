cubes:
  - name: staff_status
    public: false
    sql_table: kipptaf_marts.dim_staff_status

    joins:
      - name: staff
        sql: "{staff.staff_key} = {CUBE}.staff_key"
        relationship: many_to_one

    dimensions:
      - name: staff_status_key
        sql: staff_status_key
        type: string
        primary_key: true

      - name: staff_key
        sql: staff_key
        type: string
        public: true

      - name: status_code
        sql: status_code
        type: string
        public: true

      - name: status_name
        sql: status_name
        type: string
        public: true

      - name: effective_start_date
        sql: CAST(effective_start_date AS TIMESTAMP)
        type: time
        public: true

      - name: effective_end_date
        sql: CAST(effective_end_date AS TIMESTAMP)
        type: time
        public: true

      - name: is_current
        sql: is_current
        type: boolean
        public: true
