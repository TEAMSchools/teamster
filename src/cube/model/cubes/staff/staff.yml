cubes:
  - name: staff
    public: false
    sql_table: kipptaf_marts.dim_staff

    # reporting_chain bakes the requester's email at compile time
    # (COMPILE_CONTEXT, Jinja-preprocessed by Cube). An absent email resolves
    # to '' -> matches no manager -> default deny, the safe failure mode.
    # cube.js injects this segment for staff queries unless the user has
    # cube-access-staff-all. The email already arrives from a signed-JWT
    # Workspace identity; it is also single-quote-escaped before interpolation
    # as defense-in-depth against SQL injection.
    segments:
      - name: reporting_chain
        sql: |
          {%- set sc = COMPILE_CONTEXT.get('securityContext', {}) %}
          {%- set user_email = sc.get('email', '') %}
          {%- set safe_email = user_email.replace("'", "''") %}
          {CUBE}.staff_key IN (
            SELECT h.descendant_staff_key
            FROM kipptaf_marts.bridge_staff_hierarchy AS h
            INNER JOIN kipptaf_marts.dim_staff AS mgr
              ON mgr.staff_key = h.ancestor_staff_key
            WHERE mgr.google_email = '{{ safe_email }}'
          )

    dimensions:
      - name: staff_key
        sql: staff_key
        type: string
        primary_key: true

      - name: staff_unique_id
        sql: staff_unique_id
        type: number
        public: true
        meta:
          pii: true

      - name: full_name
        sql: full_name
        type: string
        public: true
        meta:
          pii: true

      - name: first_name
        sql: first_name
        type: string
        public: true
        meta:
          pii: true

      - name: last_name
        sql: last_name
        type: string
        public: true
        meta:
          pii: true

      - name: birth_date
        sql: CAST(birth_date AS TIMESTAMP)
        type: time
        public: true
        meta:
          pii: true

      - name: gender_identity
        sql: gender_identity
        type: string
        public: true
        meta:
          pii: true

      - name: race
        sql: race
        type: string
        public: true
        meta:
          pii: true

      - name: is_hispanic
        sql: is_hispanic
        type: boolean
        public: true
        meta:
          pii: true

      - name: work_email
        sql: work_email
        type: string
        public: true
        meta:
          pii: true

      - name: personal_email
        sql: personal_email
        type: string
        public: true
        meta:
          pii: true

      - name: personal_cell_phone
        sql: personal_cell_phone
        type: string
        public: true
        meta:
          pii: true

      - name: active_directory_username
        sql: active_directory_username
        type: string
        public: true
        meta:
          pii: true

      - name: google_email
        sql: google_email
        type: string
        public: true
        meta:
          pii: true

      - name: original_hire_date
        sql: CAST(original_hire_date AS TIMESTAMP)
        type: time
        public: true

      - name: rehire_date
        sql: CAST(rehire_date AS TIMESTAMP)
        type: time
        public: true
