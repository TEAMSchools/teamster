cubes:
  - name: staff_benefits
    public: false
    sql_table: kipptaf_marts.fct_staff_benefits_enrollments

    joins:
      - name: dates
        sql: >
          {dates.date_day} BETWEEN CAST({CUBE}.start_date AS TIMESTAMP) AND
          CAST({CUBE}.end_date AS TIMESTAMP)
        relationship: one_to_many

      - name: staff
        sql: "{staff.staff_key} = {CUBE}.staff_key"
        relationship: many_to_one

    dimensions:
      - name: staff_benefits_enrollment_key
        sql: staff_benefits_enrollment_key
        type: string
        primary_key: true

      - name: staff_key
        sql: staff_key
        type: string
        public: true

      # Benefits plan fields can reveal health information (ADA-protected) —
      # gated under cube-access-staff-benefits in the views.
      - name: plan_type
        sql: plan_type
        type: string
        public: true
        meta:
          pii: true

      - name: plan_name
        sql: plan_name
        type: string
        public: true
        meta:
          pii: true

      - name: coverage_level
        sql: coverage_level
        type: string
        public: true
        meta:
          pii: true

      - name: enrollment_start_date
        sql: CAST(start_date AS TIMESTAMP)
        type: time
        public: true

      - name: enrollment_end_date
        sql: CAST(end_date AS TIMESTAMP)
        type: time
        public: true
