cubes:
  - name: staff_attrition
    public: false
    sql_table: kipptaf_marts.fct_staff_attrition

    joins:
      # fct_staff_attrition FKs to dim_staff_status (staff_status_key), not to
      # dim_staff directly. Staff identity is reached by traversing
      # staff_attrition -> staff_status -> staff.
      - name: staff_status
        sql: "{staff_status.staff_status_key} = {CUBE}.staff_status_key"
        relationship: many_to_one

    dimensions:
      - name: staff_attrition_key
        sql: staff_attrition_key
        type: string
        primary_key: true

      - name: academic_year
        sql: academic_year
        type: number
        public: true

      - name: attrition_type
        sql: "`type`"
        type: string
        public: true

      - name: cutoff_date
        sql: CAST(cutoff_date AS TIMESTAMP)
        type: time
        public: true

      - name: is_attrition
        sql: is_attrition
        type: boolean
        public: true

      # termination_reason / termination_effective_date are gated under
      # cube-access-staff-pii in the views (specific to the individual's exit).
      - name: termination_reason
        sql: termination_reason
        type: string
        public: true
        meta:
          pii: true

      - name: termination_effective_date
        sql: CAST(termination_effective_date AS TIMESTAMP)
        type: time
        public: true
        meta:
          pii: true
