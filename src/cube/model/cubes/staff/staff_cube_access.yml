cubes:
  - name: staff_cube_access
    public: false
    # Exposes only the three access-control role attributes from
    # dim_staff_cube_access (job_function_level/code, department_group) as
    # queryable dimensions for the staff views' access_policy remit and display.
    # Surfaced onto the staff views via a Cube join from staff_work_history on
    # staff_key (see staff_work_history.yml) — attached there rather than on
    # `staff` because the manager alias staff_manager extends `staff` and would
    # inherit a staff-level join, creating an ambiguous second path to
    # staff_cube_access in staff_directory (which joins both). The scope columns
    # (staff_*_scope, region_key, location_abbreviation, ...) are NOT exposed
    # here — resolveAccess reads those directly from dim_staff_cube_access to
    # build the securityContext; only these three role attributes need to be
    # queryable dimensions.
    sql_table: kipptaf_marts.dim_staff_cube_access

    dimensions:
      - name: staff_key
        description: Surrogate staff key; the join key to the staff dimension.
        sql: staff_key
        type: string
        primary_key: true
        public: false

      - name: job_function_level
        description: >-
          Numeric seniority level for the staff member's current job function
          (higher = more senior). Used by the staff_pii
          reporting_chain_or_below_rank scope: viewers see staff with a level
          numerically greater than their own.
        sql: job_function_level
        type: number
        public: true

      - name: job_function_code
        description: >-
          Short code for the staff member's current job function category (e.g.
          TEACH, TIR). Used by the staff_pii teaching_staff scope to restrict
          access to classroom teachers and teacher-in-residence.
        sql: job_function_code
        type: string
        public: true

      - name: department_group
        description: >-
          Broad department grouping for the staff member's current role (e.g.
          Academics, Ops). Department axis of the shared staff sensitive remit
          (staff_department_scope = own_group).
        sql: department_group
        type: string
        public: true
