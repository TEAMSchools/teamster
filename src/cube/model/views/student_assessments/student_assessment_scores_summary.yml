views:
  - name: student_assessment_scores_summary
    description: >-
      Aggregated assessment proficiency across internal Illuminate interims and
      NJ/FL state assessments. One row per filter slice — never per score.
      pct_proficient (mastery rate) is the headline, source-agnostic metric;
      avg_scale_score and avg_percent_correct are only meaningful within a
      single source/subject/grade. No direct student identifiers — demographic
      dimensions are aggregate breakdowns only. State assessment rows have null
      response_type / percent_correct and null administration dates by design.

    cubes:
      - join_path: student_assessment_scores
        includes:
          - count_scores
          - count_students
          - pct_proficient
          - pct_proficient_formative
          - pct_proficient_crq
          - avg_percent_correct
          - avg_scale_score
          - enrollment_resolution
          - proficiency_level
          - performance_band_label_number
          - is_mastery
          - response_type
          - response_type_code
          - response_type_root_description

      - join_path: student_assessment_scores.student_assessment_administrations.student_assessments
        includes:
          - title
          - academic_subject
          - assessment_type
          - category
          - module_code
          - module_type
          - grade_level_tested
          - scope
          - is_internal_assessment

      - join_path: student_assessment_scores.student_assessment_administrations
        includes:
          - administration_period
          - test_type

      - join_path: >-
          student_assessment_scores.student_assessment_administrations.dates
        includes:
          - academic_year
          - month_number
          - month_name

      - join_path: student_assessment_scores.student_section_enrollments.course_sections.courses
        includes:
          - discipline
          - course_title
          - course_code
          - is_foundations

      - join_path: student_assessment_scores.student_section_enrollments
        includes:
          - is_dropped_section
          - is_dropped_course

      - join_path: student_assessment_scores.student_section_enrollments.student_school_enrollments
        includes:
          - grade_level
          - graduation_year
          - year_in_network
          - is_retained_year

      - join_path: >-
          student_assessment_scores.student_section_enrollments.student_school_enrollments.student_enrollment_status
        includes:
          - is_ell
          - is_iep
          - iep_classification
          - special_education_code
          - special_education_name
          - special_education_placement
          - is_meal_eligible
          - meal_eligibility

      - join_path: >-
          student_assessment_scores.student_section_enrollments.student_school_enrollments.students
        includes:
          - gender_identity
          - race
          - is_gifted

      - join_path: >-
          student_assessment_scores.student_section_enrollments.student_school_enrollments.locations
        includes:
          - location_name
          - abbreviation
          - grade_band
          - campus
          - city

      - join_path: >-
          student_assessment_scores.student_section_enrollments.student_school_enrollments.locations.regions
        includes:
          - region_name
          - state

      - join_path: student_assessment_scores.student_section_enrollments.terms
        includes:
          - semester
          - term_name
          - term_code
          - term_type

    meta:
      folders:
        - name: Assessment
          members:
            - title
            - academic_subject
            - assessment_type
            - category
            - module_code
            - module_type
            - grade_level_tested
            - scope
            - is_internal_assessment
            - administration_period
            - test_type
            - enrollment_resolution
            - proficiency_level
            - performance_band_label_number
            - is_mastery
            - response_type
            - response_type_code
            - response_type_root_description
        - name: Date
          members:
            - academic_year
            - month_number
            - month_name
        - name: Course
          members:
            - discipline
            - course_title
            - course_code
            - is_foundations
        - name: Term
          members:
            - semester
            - term_name
            - term_code
            - term_type
        - name: Location
          members:
            - location_name
            - abbreviation
            - grade_band
            - campus
            - city
            - region_name
            - state
        - name: Student
          members:
            - gender_identity
            - race
            - is_gifted
        - name: Status
          members:
            - is_ell
            - is_iep
            - iep_classification
            - special_education_code
            - special_education_name
            - special_education_placement
            - is_meal_eligible
            - meal_eligibility
        - name: Enrollment
          members:
            - grade_level
            - graduation_year
            - year_in_network
            - is_retained_year
            - is_dropped_section
            - is_dropped_course

    access_policy:
      # No PII tier — view contains no direct student identifiers.
      # Demographic dimensions (race, gender_identity, etc.) are
      # aggregate breakdowns only.
      - group: cube-access-student-data
        member_level:
          includes: "*"
