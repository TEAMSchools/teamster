views:
  - name: staff_staffing_positions_detail
    description: >-
      Row-level staffing positions (budgeted seat tracker). One row per position
      version. effective_end_date is null for the current active version. Filter
      to a single academic_year or a point-in-time date to avoid fan-out —
      without a filter each version expands one row per day in its effective
      range.

      This view is standalone: dim_staffing_positions has no shared key to the
      work-assignment family (Seat Tracker and ADP have no common identifier).
      Headcount comparisons against work assignments require matching on
      location and position_title, not on a surrogate key.

      Incumbent staff identifiers are gated — see access_policy.

    cubes:
      - join_path: staff_staffing_positions
        includes:
          - location_key
          - incumbent_staff_key
          - recruiter_staff_key
          - academic_year
          - recruitment_group
          - home_department_name
          - position_title
          - is_active
          - status
          - status_detail
          - is_mid_year_hire
          - effective_start_date
          - effective_end_date

      - join_path: staff_staffing_positions.dates
        prefix: true
        includes:
          - date_day
          - academic_year
          - month_name

      - join_path: staff_staffing_positions.locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - grade_band
          - city

      - join_path: staff_staffing_positions.locations.regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: staff_staffing_positions.staff
        prefix: true
        includes:
          - staff_key
          - full_name
          - first_name
          - last_name
          - work_email

    meta:
      folders:
        - name: Position
          members:
            - academic_year
            - recruitment_group
            - home_department_name
            - position_title
            - is_active
            - status
            - status_detail
            - is_mid_year_hire
            - effective_start_date
            - effective_end_date
        - name: Incumbent
          members:
            - incumbent_staff_key
            - recruiter_staff_key
            - staff_staff_key
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
        - name: Location
          members:
            - location_key
            - locations_location_name
            - locations_abbreviation
            - locations_grade_band
            - locations_city
            - regions_region_name
            - regions_state
        - name: Date
          members:
            - dates_date_day
            - dates_academic_year
            - dates_month_name

    access_policy:
      # Purely additive: each block uses explicit includes only — no excludes.
      # detail-access: position planning, location, and date fields plus the
      # incumbent/recruiter surrogate keys (not identifiers).
      # cube-access-staff-pii: incumbent staff identifiers.
      - group: detail-access
        member_level:
          includes:
            - location_key
            - incumbent_staff_key
            - recruiter_staff_key
            - academic_year
            - recruitment_group
            - home_department_name
            - position_title
            - is_active
            - status
            - status_detail
            - is_mid_year_hire
            - effective_start_date
            - effective_end_date
            - dates_date_day
            - dates_academic_year
            - dates_month_name
            - locations_location_name
            - locations_abbreviation
            - locations_grade_band
            - locations_city
            - regions_region_name
            - regions_state
            - staff_staff_key
      - group: cube-access-staff-pii
        member_level:
          includes:
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
