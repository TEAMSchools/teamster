views:
  - name: staff_memberships_detail
    description: >-
      Row-level staff membership/program enrollments. One row per staff member x
      program x enrollment period (e.g., leader and teacher development
      programs). Without a date filter, each enrollment spans its full date
      range; filter to a single date (effective_start_date or dates_date_day)
      for a point-in-time snapshot. Direct staff identifiers are gated via
      access_policy; program and category names are not treated as PII.

    cubes:
      - join_path: staff_memberships
        includes:
          - staff_key
          - membership_code
          - membership_description
          - category_code
          - category_description
          - effective_start_date
          - effective_end_date

      - join_path: staff_memberships.dates
        prefix: true
        includes:
          - date_day
          - academic_year
          - month_name

      - join_path: staff_memberships.staff
        prefix: true
        includes:
          - staff_unique_id
          - full_name
          - first_name
          - last_name
          - work_email
          - gender_identity
          - race
          - is_hispanic

    meta:
      folders:
        - name: Membership
          members:
            - membership_code
            - membership_description
            - category_code
            - category_description
            - effective_start_date
            - effective_end_date
        - name: Date
          members:
            - dates_date_day
            - dates_academic_year
            - dates_month_name
        - name: Staff
          members:
            - staff_key
            - staff_staff_unique_id
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic

    access_policy:
      # Purely additive: each block uses explicit includes only — no excludes.
      # detail-access: program/category, date range, demographic, date fields.
      # cube-access-staff-pii: direct staff identifiers.
      - group: detail-access
        member_level:
          includes:
            - staff_key
            - membership_code
            - membership_description
            - category_code
            - category_description
            - effective_start_date
            - effective_end_date
            - dates_date_day
            - dates_academic_year
            - dates_month_name
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic
      - group: cube-access-staff-pii
        member_level:
          includes:
            - staff_staff_unique_id
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
