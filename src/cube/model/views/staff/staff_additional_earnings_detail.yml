views:
  - name: staff_additional_earnings_detail
    description: >-
      Row-level additional earnings by work assignment. One row per work
      assignment x earning type x version (Type 2 SCD). Filter is_current = true
      for current earnings rates, or filter to a single date for a point-in-time
      snapshot. Without a date filter, each version fans out to one row per
      calendar day in its effective range.

      Earning fields (rate_amount, earning_code, earning_description) are
      dollar-adjacent and require cube-access-staff-compensation. Direct staff
      identifiers are gated separately — see access_policy.

    cubes:
      - join_path: staff_additional_earnings
        includes:
          - work_assignment_key
          - effective_start_date
          - effective_end_date
          - is_current
          - earning_code
          - earning_description
          - rate_amount

      - join_path: staff_additional_earnings.dates
        prefix: true
        includes:
          - date_day
          - academic_year
          - month_name

      - join_path: staff_additional_earnings.staff_work_history
        prefix: true
        includes:
          - status_name
          - position_title
          - worker_type
          - department_name
          - business_unit_name
          - is_primary_position

      - join_path: staff_additional_earnings.staff_work_history.staff
        prefix: true
        includes:
          - staff_key
          - staff_unique_id
          - full_name
          - first_name
          - last_name
          - work_email
          - gender_identity
          - race
          - is_hispanic

    meta:
      folders:
        - name: Earnings
          members:
            - effective_start_date
            - effective_end_date
            - is_current
            - earning_code
            - earning_description
            - rate_amount
        - name: Assignment
          members:
            - work_assignment_key
            - staff_work_history_status_name
            - staff_work_history_position_title
            - staff_work_history_worker_type
            - staff_work_history_department_name
            - staff_work_history_business_unit_name
            - staff_work_history_is_primary_position
        - name: Date
          members:
            - dates_date_day
            - dates_academic_year
            - dates_month_name
        - name: Staff
          members:
            - staff_staff_key
            - staff_staff_unique_id
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic

    access_policy:
      # Purely additive: each block uses explicit includes only — no excludes.
      # detail-access: assignment context, demographic, and date fields.
      # cube-access-staff-compensation: dollar-adjacent earning fields.
      # cube-access-staff-pii: direct staff identifiers.
      - group: detail-access
        member_level:
          includes:
            - work_assignment_key
            - effective_start_date
            - effective_end_date
            - is_current
            - dates_date_day
            - dates_academic_year
            - dates_month_name
            - staff_work_history_status_name
            - staff_work_history_position_title
            - staff_work_history_worker_type
            - staff_work_history_department_name
            - staff_work_history_business_unit_name
            - staff_work_history_is_primary_position
            - staff_staff_key
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic
      - group: cube-access-staff-compensation
        member_level:
          includes:
            - rate_amount
            - earning_code
            - earning_description
      - group: cube-access-staff-pii
        member_level:
          includes:
            - staff_staff_unique_id
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
