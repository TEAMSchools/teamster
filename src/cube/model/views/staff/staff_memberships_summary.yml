views:
  - name: staff_memberships_summary
    description: >-
      Aggregated staff membership/program enrollments. One row per filter slice
      — never per employee. No direct staff identifiers. Demographic dimensions
      (gender_identity, race, is_hispanic) are aggregate breakdowns only. Use a
      date filter for a point-in-time count of active enrollments.

    cubes:
      - join_path: staff_memberships
        includes:
          - membership_code
          - membership_description
          - category_code
          - category_description

      - join_path: staff_memberships.dates
        prefix: true
        includes:
          - date_day
          - academic_year
          - month_name

      - join_path: staff_memberships.staff
        prefix: true
        includes:
          - gender_identity
          - race
          - is_hispanic

    meta:
      folders:
        - name: Membership
          members:
            - membership_code
            - membership_description
            - category_code
            - category_description
        - name: Date
          members:
            - dates_date_day
            - dates_academic_year
            - dates_month_name
        - name: Staff Demographics
          members:
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic

    access_policy:
      # No direct staff identifiers — demographic dimensions are aggregate
      # breakdowns only.
      - group: summary-access
        member_level:
          includes: "*"
