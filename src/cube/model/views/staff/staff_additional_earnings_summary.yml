views:
  - name: staff_additional_earnings_summary
    description: >-
      Aggregated additional earnings. One row per filter slice — never per
      employee. No direct staff identifiers. Demographic dimensions
      (gender_identity, race, is_hispanic) are aggregate breakdowns only.
      Earning fields (earning_code, earning_description) are dollar-adjacent and
      require cube-access-staff-compensation — see access_policy.

    cubes:
      - join_path: staff_additional_earnings
        includes:
          - is_current
          - effective_start_date
          - earning_code
          - earning_description

      - join_path: staff_additional_earnings.dates
        prefix: true
        includes:
          - date_day
          - academic_year
          - month_name

      - join_path: staff_additional_earnings.staff_work_history
        prefix: true
        includes:
          - status_name
          - position_title
          - worker_type
          - department_name
          - business_unit_name

      - join_path: staff_additional_earnings.staff_work_history.staff
        prefix: true
        includes:
          - gender_identity
          - race
          - is_hispanic

    meta:
      folders:
        - name: Earnings
          members:
            - effective_start_date
            - is_current
            - earning_code
            - earning_description
        - name: Assignment
          members:
            - staff_work_history_status_name
            - staff_work_history_position_title
            - staff_work_history_worker_type
            - staff_work_history_department_name
            - staff_work_history_business_unit_name
        - name: Date
          members:
            - dates_date_day
            - dates_academic_year
            - dates_month_name
        - name: Staff Demographics
          members:
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic

    access_policy:
      # Purely additive: each block uses explicit includes only — no excludes.
      # summary-access: aggregate-safe assignment, demographic, and date
      # dimensions.
      # cube-access-staff-compensation: dollar-adjacent earning fields, gated
      # even in the summary view.
      - group: summary-access
        member_level:
          includes:
            - is_current
            - effective_start_date
            - dates_date_day
            - dates_academic_year
            - dates_month_name
            - staff_work_history_status_name
            - staff_work_history_position_title
            - staff_work_history_worker_type
            - staff_work_history_department_name
            - staff_work_history_business_unit_name
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic
      - group: cube-access-staff-compensation
        member_level:
          includes:
            - earning_code
            - earning_description
