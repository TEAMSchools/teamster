views:
  - name: staff_attrition_detail
    description: >-
      Row-level staff attrition. One row per staff member x academic year x
      attrition methodology (foundation, nj_compliance, recruitment). Filter to
      a single attrition_type before comparing cohorts across years — mixing
      types double-counts staff. is_attrition = true identifies staff who did
      not return by the methodology's return-check date. Coverage begins with
      the ADP era (2021+); pre-Dayforce staff are excluded.

      Contains direct staff identifiers and the individual's termination context
      — see access_policy for PII gating.

    cubes:
      - join_path: staff_attrition
        includes:
          - academic_year
          - attrition_type
          - cutoff_date
          - is_attrition
          - termination_reason
          - termination_effective_date

      - join_path: staff_attrition.staff_status.staff
        prefix: true
        includes:
          - staff_key
          - staff_unique_id
          - full_name
          - first_name
          - last_name
          - work_email
          - gender_identity
          - race
          - is_hispanic

    meta:
      folders:
        - name: Attrition
          members:
            - academic_year
            - attrition_type
            - cutoff_date
            - is_attrition
            - termination_reason
            - termination_effective_date
        - name: Staff
          members:
            - staff_staff_key
            - staff_staff_unique_id
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic

    access_policy:
      # Purely additive: each block uses explicit includes only — no excludes.
      # Cube's OR semantics unions all matching blocks, so having multiple
      # groups always adds access, never blocks it.
      # detail-access: base attrition, demographic, and date fields.
      # cube-access-staff-pii: direct staff identifiers and the individual's
      # termination context.
      - group: detail-access
        member_level:
          includes:
            - staff_staff_key
            - academic_year
            - attrition_type
            - cutoff_date
            - is_attrition
            - staff_gender_identity
            - staff_race
            - staff_is_hispanic
      - group: cube-access-staff-pii
        member_level:
          includes:
            - termination_reason
            - termination_effective_date
            - staff_staff_unique_id
            - staff_full_name
            - staff_first_name
            - staff_last_name
            - staff_work_email
