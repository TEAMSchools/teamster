views:
  - name: attendance_summary
    description: >-
      Aggregated student attendance for ADA, tardy rate, and truancy breakdowns.
      One row per filter slice — never per student-day. ADA is always
      SUM(attendance_value) / SUM(membership_value); never average a per-row
      ratio. attendance_category is the coarse rollup (Present, Absent, Tardy,
      In-School Suspension, Out-of-School Suspension); use it for GROUP BY
      breakdowns instead of attempting to sum the boolean is_* flags. No direct
      student identifiers — demographic dimensions are aggregate breakdowns
      only.

      Chronic absence query patterns — always use exactly one of the two: (1)
      Year-end / year-over-year: filter is_latest_record = true and group by
      academic_year. Returns the final CA snapshot per year. Use for "CA rate in
      2023 vs 2024 vs 2025." (2) Point-in-time: filter to a single date_day.
      Returns CA accumulated from the start of the year through that date. Use
      for same-point-in-year comparisons like "CA as of November 1 each year."
      Omitting both overcounts; combining both is valid only when the date is
      today.

      For point-in-time truancy or count-of-students snapshots, also filter to a
      single date_day. Truancy criteria are regional: Miami uses 15+ absences in
      a 90-day rolling window; NJ regions use projected 50+ absences for the
      year.

    cubes:
      - join_path: attendance
        includes:
          - count_students
          - avg_daily_attendance
          - pct_tardy
          - pct_ontime
          - count_truants
          - pct_truant
          - count_absent_days
          - count_chronically_absent
          - pct_chronically_absent
          - pct_tier_1_2
          - pct_tier_3
          - semester
          - attendance_category
          - ada_tier
          - is_truant
          - is_chronically_absent
          - is_latest_record

      - join_path: attendance.dim_dates
        prefix: true
        includes:
          - date_day
          - month_number
          - month_name
          - quarter_number
          - school_week_start_date

      - join_path: attendance.dim_student_enrollments.dim_locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - grade_band
          - campus
          - city

      - join_path: attendance.dim_student_enrollments.dim_locations.dim_regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: attendance.dim_student_enrollments
        prefix: true
        includes:
          - grade_level
          - graduation_year
          - is_retained_year

      - join_path: attendance.dim_student_enrollments.dim_students
        prefix: true
        includes:
          - gender_identity
          - race
          - is_gifted
          - is_ell

      - join_path: attendance.dim_terms
        prefix: true
        includes:
          - academic_year
          - term_name
          - term_code
          - term_type

    meta:
      folders:
        - name: Attendance
          members:
            - attendance_category
            - ada_tier
            - is_truant
            - is_chronically_absent
        - name: Date
          members:
            - dim_dates_date_day
            - dim_dates_month_number
            - dim_dates_month_name
            - dim_dates_quarter_number
            - dim_dates_school_week_start_date
        - name: Term
          members:
            - dim_terms_academic_year
            - dim_terms_term_name
            - dim_terms_term_code
            - dim_terms_term_type
        - name: Location
          members:
            - dim_locations_location_name
            - dim_locations_abbreviation
            - dim_locations_grade_band
            - dim_locations_campus
            - dim_locations_city
            - dim_regions_region_name
            - dim_regions_state
        - name: Student
          members:
            - dim_students_gender_identity
            - dim_students_race
            - dim_students_is_gifted
            - dim_students_is_ell
        - name: Enrollment
          members:
            - dim_student_enrollments_grade_level
            - dim_student_enrollments_graduation_year
            - dim_student_enrollments_is_retained_year
        - name: Filter
          members:
            - semester
            - is_latest_record

    access_policy:
      # No PII tier — view contains no direct student identifiers.
      # Demographic dimensions (race, gender_identity, etc.) are
      # aggregate breakdowns only.
      - group: cube-access-student-data
        member_level:
          includes: "*"
