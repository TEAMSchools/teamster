views:
  - name: attendance_detail
    description: >-
      Row-level student attendance. One row per student × school day with
      attendance recorded. Use for drill-down, individual investigations, or
      breakdowns that need raw codes; for ADA / truancy roll-ups, use
      attendance_summary instead. ADA is always SUM(attendance_value) /
      SUM(membership_value); never average a per-row ratio. attendance_value
      (0.0–1.0) is the fractional attendance contribution; membership_value
      (0.0–1.0) is the school's claim on the student that day (split across
      schools if dual-enrolled); present_weight equals attendance_value but
      tardies count 0.67. attendance_category is the coarse rollup (Present,
      Absent, Tardy, In-School Suspension, Out-of-School Suspension);
      attendance_code is the raw SIS code for specific drill-down. is_in_session
      and is_membership_day come from dim_school_calendars and are joined on
      (date_key, dim_student_enrollments.location_key). Contains direct student
      identifiers — see access_policy for PII gating.

      CA, tier, and truancy base measures default to year-end snapshots when
      queried without an anchor — no filter required for year-over-year
      comparisons. For a point-in-time result, add a single date_day equality
      filter. For month-over-month or week-over-week trends, use the _month_end
      or _week_end named measures. Truancy criteria are regional: Miami uses 15+
      absences in a 90-day rolling window; NJ regions use projected 50+ absences
      for the year.

    cubes:
      - join_path: attendance
        includes:
          - count_students
          - avg_daily_attendance
          - pct_tardy
          - pct_ontime
          - count_truants
          - pct_truant
          - count_truants_year_end
          - pct_truant_year_end
          - count_truants_month_end
          - pct_truant_month_end
          - count_truants_week_end
          - pct_truant_week_end
          - count_absent_days
          - count_chronically_absent
          - pct_chronically_absent
          - pct_tier_1_2
          - pct_tier_3
          - count_chronically_absent_year_end
          - pct_chronically_absent_year_end
          - pct_tier_1_2_year_end
          - pct_tier_3_year_end
          - count_chronically_absent_month_end
          - pct_chronically_absent_month_end
          - pct_tier_1_2_month_end
          - pct_tier_3_month_end
          - count_chronically_absent_week_end
          - pct_chronically_absent_week_end
          - pct_tier_1_2_week_end
          - pct_tier_3_week_end
          - attendance_date
          - attendance_code
          - attendance_category
          - ada_tier
          - attendance_value
          - membership_value
          - present_weight
          - is_absent
          - is_tardy
          - is_ontime
          - is_oss
          - is_iss
          - is_suspended
          - is_truant
          - is_chronically_absent
          - is_latest_record
          - is_month_end_record
          - is_week_end_record

      - join_path: attendance.dim_dates
        prefix: true
        includes:
          - academic_year
          - academic_year_label
          - date_day
          - month_number
          - month_name
          - quarter_number
          - school_week_start_date
          - day_of_week_name
          - is_weekday

      - join_path: attendance.dim_student_enrollments.dim_locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - grade_band
          - campus
          - city

      - join_path: attendance.dim_student_enrollments.dim_locations.dim_regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: attendance.dim_student_enrollments
        prefix: true
        includes:
          - student_enrollment_key
          - grade_level
          - graduation_year
          - entry_date
          - exit_date
          - is_retained_year

      - join_path: attendance.dim_student_enrollments.dim_students
        prefix: true
        includes:
          - student_key
          - full_name
          - birth_date
          - lea_student_identifier
          - state_student_identifier
          - gender_identity
          - race
          - enrollment_status
          - is_gifted

      - join_path: attendance.dim_student_ell_status
        prefix: true
        includes:
          - is_ell

      - join_path: attendance.dim_student_iep_status
        prefix: true
        includes:
          - is_iep
          - iep_classification
          - special_education_code
          - special_education_name
          - special_education_placement

      - join_path: attendance.dim_student_meal_eligibility_status
        prefix: true
        includes:
          - is_meal_eligible
          - meal_eligibility

      - join_path: attendance.dim_terms
        prefix: true
        includes:
          - semester
          - term_name
          - term_code
          - term_type

      - join_path: attendance.dim_school_calendars
        prefix: true
        includes:
          - is_in_session
          - is_membership_day

    meta:
      folders:
        - name: Attendance
          members:
            - attendance_code
            - attendance_category
            - ada_tier
            - attendance_value
            - membership_value
            - present_weight
            - is_absent
            - is_tardy
            - is_ontime
            - is_oss
            - is_iss
            - is_suspended
            - is_truant
            - is_chronically_absent
        - name: Date
          members:
            - dim_dates_academic_year
            - dim_dates_academic_year_label
            - attendance_date
            - dim_dates_date_day
            - dim_dates_month_number
            - dim_dates_month_name
            - dim_dates_quarter_number
            - dim_dates_school_week_start_date
            - dim_dates_day_of_week_name
            - dim_dates_is_weekday
        - name: Term
          members:
            - dim_terms_semester
            - dim_terms_term_name
            - dim_terms_term_code
            - dim_terms_term_type
        - name: Location
          members:
            - dim_locations_location_name
            - dim_locations_abbreviation
            - dim_locations_grade_band
            - dim_locations_campus
            - dim_locations_city
            - dim_regions_region_name
            - dim_regions_state
        - name: Student
          members:
            - dim_students_student_key
            - dim_students_full_name
            - dim_students_birth_date
            - dim_students_lea_student_identifier
            - dim_students_state_student_identifier
            - dim_students_gender_identity
            - dim_students_race
            - dim_students_enrollment_status
            - dim_students_is_gifted
            - dim_student_ell_status_is_ell
            - dim_student_iep_status_is_iep
            - dim_student_iep_status_iep_classification
            - dim_student_iep_status_special_education_code
            - dim_student_iep_status_special_education_name
            - dim_student_iep_status_special_education_placement
            - dim_student_meal_eligibility_status_is_meal_eligible
            - dim_student_meal_eligibility_status_meal_eligibility
        - name: Enrollment
          members:
            - dim_student_enrollments_student_enrollment_key
            - dim_student_enrollments_grade_level
            - dim_student_enrollments_graduation_year
            - dim_student_enrollments_entry_date
            - dim_student_enrollments_exit_date
            - dim_student_enrollments_is_retained_year
        - name: Calendar
          members:
            - dim_school_calendars_is_in_session
            - dim_school_calendars_is_membership_day
        - name: Filter
          members:
            - is_latest_record
            - is_month_end_record
            - is_week_end_record

    access_policy:
      - group: cube-access-student-data
        member_level:
          includes: "*"
          excludes:
            - dim_students_full_name
            - dim_students_birth_date
            - dim_students_lea_student_identifier
            - dim_students_state_student_identifier
            - dim_students_salesforce_contact_id
            - dim_students_district_student_identifier
      - group: cube-access-student-pii
        member_level:
          includes: "*"
