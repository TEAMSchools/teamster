views:
  - name: attendance_detail

    cubes:
      - join_path: attendance
        includes:
          - count_students
          - avg_daily_attendance
          - pct_tardy
          - count_truants
          - pct_truant
          - attendance_date
          - academic_year
          - semester
          - attendance_code
          - attendance_category
          - attendance_value
          - membership_value
          - present_weight
          - is_absent
          - is_tardy
          - is_ontime
          - is_oss
          - is_iss
          - is_suspended
          - is_truant

      - join_path: attendance.dim_dates
        prefix: true
        includes:
          - date_day
          - month_number
          - month_name
          - quarter_number
          - school_week_start_date
          - day_of_week_name
          - is_weekday

      - join_path: attendance.dim_locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - grade_band
          - campus
          - city

      - join_path: attendance.dim_locations.dim_regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: attendance.dim_student_enrollments
        prefix: true
        includes:
          - student_enrollment_key
          - grade_level
          - graduation_year
          - entry_date
          - exit_date
          - is_retained_year

      - join_path: attendance.dim_student_enrollments.dim_students
        prefix: true
        includes:
          - student_key
          - full_name
          - birth_date
          - lea_student_identifier
          - state_student_identifier
          - gender_identity
          - race
          - meal_eligibility_status
          - enrollment_status
          - is_gifted
          - is_ell
          - has_iep

      - join_path: attendance.dim_terms
        prefix: true
        includes:
          - term_name
          - term_code
          - term_type

      - join_path: attendance.dim_school_calendars
        prefix: true
        includes:
          - is_in_session
          - is_membership_day

    access_policy:
      - group: cube-access-student-data
        member_level:
          includes: "*"
          excludes:
            - dim_students_full_name
            - dim_students_birth_date
            - dim_students_lea_student_identifier
            - dim_students_state_student_identifier
            - dim_students_salesforce_contact_id
            - dim_students_district_student_identifier
      - group: cube-access-student-pii
        member_level:
          includes: "*"
