views:
  - name: student_attendance_summary
    description: >-
      Aggregated student attendance for ADA, tardy rate, and truancy breakdowns.
      One row per filter slice — never per student-day. ADA is always
      SUM(attendance_value) / SUM(membership_value); never average a per-row
      ratio. attendance_category is the coarse rollup (Present, Absent, Tardy,
      In-School Suspension, Out-of-School Suspension); use it for GROUP BY
      breakdowns instead of attempting to sum the boolean is_* flags. No direct
      student identifiers — demographic dimensions are aggregate breakdowns
      only.

      CA and truancy base measures default to year-end snapshots when queried
      without an anchor — no filter required for year-over-year comparisons. For
      a point-in-time result, add a single date_day equality filter. For
      month-over-month or week-over-week trends, use the _month_end or _week_end
      named measures. Truancy criteria are regional: Miami uses 15+ absences in
      a 90-day rolling window; NJ regions use projected 50+ absences for the
      year.

    cubes:
      - join_path: student_attendance
        includes:
          - count_students
          - avg_daily_attendance
          - pct_tardy
          - pct_ontime
          - count_truants
          - pct_truant
          - count_truants_year_end
          - pct_truant_year_end
          - count_truants_month_end
          - pct_truant_month_end
          - count_truants_week_end
          - pct_truant_week_end
          - count_absent_days
          - count_chronically_absent
          - pct_chronically_absent
          - pct_tier_1_2
          - pct_tier_3
          - count_chronically_absent_year_end
          - pct_chronically_absent_year_end
          - pct_tier_1_2_year_end
          - pct_tier_3_year_end
          - count_chronically_absent_month_end
          - pct_chronically_absent_month_end
          - pct_tier_1_2_month_end
          - pct_tier_3_month_end
          - count_chronically_absent_week_end
          - pct_chronically_absent_week_end
          - pct_tier_1_2_week_end
          - pct_tier_3_week_end
          - attendance_category
          - ada_tier
          - is_truant
          - is_chronically_absent
          - is_latest_record
          - is_month_end_record
          - is_week_end_record

      - join_path: student_attendance.dates
        prefix: true
        includes:
          - date_day
          - month_number
          - month_name
          - quarter_number
          - school_week_start_date

      - join_path: student_attendance.student_enrollments.locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - grade_band
          - campus
          - city

      - join_path: student_attendance.student_enrollments.locations.regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: student_attendance.student_enrollments
        prefix: true
        includes:
          - grade_level
          - graduation_year
          - is_retained_year
          - is_ell
          - is_iep
          - iep_classification
          - special_education_code
          - special_education_name
          - special_education_placement
          - is_meal_eligible
          - meal_eligibility

      - join_path: student_attendance.student_enrollments.students
        prefix: true
        includes:
          - gender_identity
          - race
          - is_gifted

      - join_path: student_attendance.terms
        prefix: true
        includes:
          - academic_year
          - semester
          - term_name
          - term_code
          - term_type

    meta:
      folders:
        - name: Attendance
          members:
            - attendance_category
            - ada_tier
            - is_truant
            - is_chronically_absent
        - name: Date
          members:
            - dates_date_day
            - dates_month_number
            - dates_month_name
            - dates_quarter_number
            - dates_school_week_start_date
        - name: Term
          members:
            - terms_academic_year
            - terms_semester
            - terms_term_name
            - terms_term_code
            - terms_term_type
        - name: Location
          members:
            - locations_location_name
            - locations_abbreviation
            - locations_grade_band
            - locations_campus
            - locations_city
            - regions_region_name
            - regions_state
        - name: Student
          members:
            - students_gender_identity
            - students_race
            - students_is_gifted
        - name: Status
          members:
            - student_enrollments_is_ell
            - student_enrollments_is_iep
            - student_enrollments_iep_classification
            - student_enrollments_special_education_code
            - student_enrollments_special_education_name
            - student_enrollments_special_education_placement
            - student_enrollments_is_meal_eligible
            - student_enrollments_meal_eligibility
        - name: Enrollment
          members:
            - student_enrollments_grade_level
            - student_enrollments_graduation_year
            - student_enrollments_is_retained_year
        - name: Filter
          members:
            - is_latest_record
            - is_month_end_record
            - is_week_end_record

    access_policy:
      # No PII tier — view contains no direct student identifiers.
      # Demographic dimensions (race, gender_identity, etc.) are
      # aggregate breakdowns only.
      - group: summary-access
        member_level:
          includes: "*"
