views:
  - name: student_enrollments_detail
    description: >-
      Row-level point-in-time student enrollment drill-down — one row per
      enrolled student-day. Use for roster exports and questions like "who was
      enrolled on October 1?". Same measures as the summary view plus the
      student-identifier members and the enrollment_date time dimension.

      count_students is point-in-time (as of the most recent in-session day in
      the query, or the pinned enrollment_date). count_students_served counts
      ever-enrolled in the period. count_students_active is active-status only
      (current-roster, not historical). Detail-view count_students for a fixed
      date equals the summary view's for the same filter.

    cubes:
      - join_path: student_enrollments
        includes:
          - count_students
          - count_students_served
          - count_students_active
          - count_students_oct01
          - count_students_oct15
          - count_students_mar15
          - student_enrollment_daily_key
          - student_enrollment_key
          - grade_level
          - is_current_record
          - is_month_end_record
          - is_week_end_record
          - is_latest_record

      - join_path: student_enrollments.dates
        prefix: true
        includes:
          - date_day
          - month_number
          - month_name
          - quarter_number
          - academic_year

      - join_path: student_enrollments.locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - grade_band
          - campus
          - city

      - join_path: student_enrollments.locations.regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: student_enrollments.students
        prefix: false
        includes:
          - student_key
          - full_name
          - birth_date
          - lea_student_identifier
          - state_student_identifier
          - gender_identity
          - race
          - is_gifted
          - enrollment_status

    meta:
      folders:
        - name: Enrollment
          members:
            - student_enrollment_daily_key
            - student_enrollment_key
            - grade_level
        - name: Date
          members:
            - dates_date_day
            - dates_month_number
            - dates_month_name
            - dates_quarter_number
            - dates_academic_year
        - name: Location
          members:
            - locations_location_name
            - locations_abbreviation
            - locations_grade_band
            - locations_campus
            - locations_city
            - regions_region_name
            - regions_state
        - name: Student
          members:
            - student_key
            - full_name
            - birth_date
            - lea_student_identifier
            - state_student_identifier
            - gender_identity
            - race
            - is_gifted
            - enrollment_status
        - name: Filter
          members:
            - is_current_record
            - is_month_end_record
            - is_week_end_record
            - is_latest_record

    access_policy:
      - group: cube-access-student-data
        member_level:
          includes: "*"
          excludes:
            - full_name
            - birth_date
            - lea_student_identifier
            - state_student_identifier
            - district_student_identifier
            - salesforce_contact_id
      - group: cube-access-student-pii
        member_level:
          includes: "*"
