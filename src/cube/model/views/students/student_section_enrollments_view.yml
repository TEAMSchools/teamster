views:
  - name: student_section_enrollments_view
    description: >-
      Student section enrollments — row-level (one row per student x section
      enrollment) and aggregate headcounts in a single view. Use for per-teacher
      class rosters (filter to a lead teacher) and section drill-down.
      count_students is a distinct-student headcount, correct per teacher —
      grouped by lead teacher it answers "how many students does this teacher
      teach?". Contains direct student identifiers — see access_policy for PII
      gating.

    cubes:
      - join_path: student_section_enrollments
        includes:
          - count_students
          - student_section_enrollment_key
          - student_enrollment_key
          - academic_year
          - entry_date
          - exit_date
          - is_dropped_section
          - is_dropped_course
          - is_homeroom
          - is_current_section_enrollment
          - lead_teacher_staff_key

      - join_path: student_section_enrollments.staff_lead_teacher
        prefix: true
        includes:
          - full_name
          - first_name
          - last_name

      - join_path: student_section_enrollments.course_sections.courses
        includes:
          - discipline
          - course_title
          - course_code
          - credit_type
          - is_foundations

      - join_path: student_section_enrollments.course_sections
        includes:
          - identifier
          - period

      - join_path: student_section_enrollments.terms
        includes:
          - semester
          - term_name
          - term_code
          - term_type

      - join_path: student_section_enrollments.student_school_enrollments
        prefix: false
        includes:
          - grade_level
          - graduation_year
          - year_in_network
          - is_retained_year

      - join_path: student_section_enrollments.student_school_enrollments.students
        prefix: false
        includes:
          - student_key
          - full_name
          - birth_date
          - lea_student_identifier
          - state_student_identifier
          - gender_identity
          - race
          - enrollment_status
          - is_gifted

      - join_path: student_section_enrollments.student_school_enrollments.locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - region_key
          - grade_band
          - campus
          - city

      - join_path: student_section_enrollments.student_school_enrollments.locations.regions
        prefix: true
        includes:
          - region_name
          - state

    meta:
      folders:
        - name: Teacher
          members:
            - lead_teacher_staff_key
            - staff_lead_teacher_full_name
            - staff_lead_teacher_first_name
            - staff_lead_teacher_last_name
        - name: Course
          members:
            - discipline
            - course_title
            - course_code
            - credit_type
            - is_foundations
            - identifier
            - period
        - name: Term
          members:
            - semester
            - term_name
            - term_code
            - term_type
        - name: Location
          members:
            - locations_location_name
            - locations_abbreviation
            - locations_region_key
            - locations_grade_band
            - locations_campus
            - locations_city
            - regions_region_name
            - regions_state
        - name: Student
          members:
            - student_key
            - full_name
            - birth_date
            - lea_student_identifier
            - state_student_identifier
            - gender_identity
            - race
            - enrollment_status
            - is_gifted
        - name: Enrollment
          members:
            - student_section_enrollment_key
            - student_enrollment_key
            - academic_year
            - entry_date
            - exit_date
            - is_homeroom
            - is_current_section_enrollment
            - is_dropped_section
            - is_dropped_course
            - grade_level
            - graduation_year
            - year_in_network
            - is_retained_year

    access_policy:
      # Row-level location scoping (was queryRewrite.studentRowFilters). A viewer
      # holds exactly one student-<scope> group (buildGroups); none => no group =>
      # default-deny. row_level uses this view's flat location member names (see
      # the includes/folders below), not cube-qualified paths.
      # Teacher fields (staff_lead_teacher_* names, lead_teacher_staff_key) ride
      # the wildcard include — staff-directory-tier info, not student PII.
      - group: student-region
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: locations_region_key
              operator: equals
              values: ["{ securityContext.region_key }"]
      - group: student-school
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: locations_abbreviation
              operator: equals
              values: ["{ securityContext.location_abbreviation }"]
      - group: student-network
        member_level:
          includes: "*"
        # network: no row_level (sees all locations)
