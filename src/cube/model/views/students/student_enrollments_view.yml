views:
  - name: student_enrollments_view
    description: >-
      Point-in-time student enrollment — row-level (one row per enrolled
      student-day, for roster exports and questions like "who was enrolled on
      October 1?"; pin a single date by filtering dates_date_day) and aggregate
      headcount breakdowns in a single view.

      count_students is point-in-time (as of the most recent in-session day in
      the query, or the pinned date).

    cubes:
      - join_path: student_enrollments
        includes:
          - count_students
          - student_attendance_daily_key
          - student_enrollment_key
          - is_current_record
          - is_month_end_record
          - is_week_end_record
          - is_latest_record

      - join_path: student_enrollments.dates
        prefix: true
        includes:
          - date_day
          - month_number
          - month_name
          - quarter_number
          - academic_year
          - school_week_start_date

      - join_path: student_enrollments.student_school_enrollments.locations
        prefix: true
        includes:
          - location_name
          - abbreviation
          - region_key
          - grade_band
          - campus
          - city

      - join_path: student_enrollments.student_school_enrollments.locations.regions
        prefix: true
        includes:
          - region_name
          - state

      - join_path: student_enrollments.student_school_enrollments.students
        prefix: false
        includes:
          - student_key
          - full_name
          - birth_date
          - lea_student_identifier
          - state_student_identifier
          - gender_identity
          - race
          - is_gifted
          - enrollment_status

      - join_path: student_enrollments.student_school_enrollments
        prefix: false
        includes:
          - grade_level
          - graduation_year
          - is_retained_year

      - join_path: student_enrollments.student_school_enrollments.student_enrollment_status
        prefix: false
        includes:
          - is_ell
          - is_iep
          - iep_classification
          - special_education_code
          - special_education_name
          - special_education_placement
          - is_meal_eligible
          - meal_eligibility

    meta:
      folders:
        - name: Enrollment
          members:
            - student_attendance_daily_key
            - student_enrollment_key
            - grade_level
            - graduation_year
            - is_retained_year
        - name: Status
          members:
            - is_ell
            - is_iep
            - iep_classification
            - special_education_code
            - special_education_name
            - special_education_placement
            - is_meal_eligible
            - meal_eligibility
        - name: Date
          members:
            - dates_date_day
            - dates_month_number
            - dates_month_name
            - dates_quarter_number
            - dates_academic_year
            - dates_school_week_start_date
        - name: Location
          members:
            - locations_location_name
            - locations_abbreviation
            - locations_region_key
            - locations_grade_band
            - locations_campus
            - locations_city
            - regions_region_name
            - regions_state
        - name: Student
          members:
            - student_key
            - full_name
            - birth_date
            - lea_student_identifier
            - state_student_identifier
            - gender_identity
            - race
            - is_gifted
            - enrollment_status
        - name: Filter
          members:
            - is_current_record
            - is_month_end_record
            - is_week_end_record
            - is_latest_record

    access_policy:
      # Row-level location scoping (was queryRewrite.studentRowFilters). A viewer
      # holds exactly one student-<scope> group (buildGroups); none => no group =>
      # default-deny. row_level uses this view's flat location member names (see
      # the includes/folders below), not cube-qualified paths.
      - group: student-region
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: locations_region_key
              operator: equals
              values: ["{ securityContext.region_key }"]
      - group: student-school
        member_level:
          includes: "*"
        row_level:
          filters:
            - member: locations_abbreviation
              operator: equals
              values: ["{ securityContext.location_abbreviation }"]
      - group: student-network
        member_level:
          includes: "*"
        # network: no row_level (sees all locations)
