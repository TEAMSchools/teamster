locations:
  - location_name: kippmiami
    code_source:
      module_name: teamster.code_locations.kippmiami.definitions
    build:
      directory: ./
      registry: us-central1-docker.pkg.dev/teamster-332318/teamster/kippmiami
    working_directory: /app
    container_context:
      k8s:
        volume_mounts:
          - name: secret-volume
            readOnly: true
            mountPath: /etc/secret-volume
          - name: deanslist-keys
            readOnly: true
            mountPath: /etc/deanslist
        volumes:
          - name: secret-volume
            projected:
              sources:
                - secret:
                    name: op-ps-ssh-kippmiami
                    items:
                      - key: password
                        path: powerschool_ssh_password.txt
          - name: deanslist-keys
            projected:
              sources:
                - secret:
                    name: op-deanslist-api
        server_k8s_config:
          pod_spec_config:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: location_name
                          operator: In
                          values:
                            - kippmiami
                    topologyKey: kubernetes.io/hostname
          container_config:
            env:
              - name: COUCHDROP_SFTP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: password
              - name: COUCHDROP_SFTP_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: username
              - name: IREADY_SFTP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-iready-sftp
                    key: password
              - name: IREADY_SFTP_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: op-iready-sftp
                    key: username
              - name: PS_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-ps-db-kippmiami
                    key: password
              - name: PS_SSH_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-ps-ssh-kippmiami
                    key: password
