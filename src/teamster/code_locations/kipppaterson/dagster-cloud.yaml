locations:
  - location_name: kipppaterson
    code_source:
      module_name: teamster.code_locations.kipppaterson.definitions
    build:
      directory: ./
      registry: us-central1-docker.pkg.dev/teamster-332318/teamster/kipppaterson
    working_directory: /app
    container_context:
      k8s:
        volume_mounts:
          - name: deanslist-keys
            readOnly: true
            mountPath: /etc/deanslist
        volumes:
          - name: deanslist-keys
            projected:
              sources:
                - secret:
                    name: op-deanslist-api-kipppaterson
        server_k8s_config:
          pod_spec_config:
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: location_name
                          operator: In
                          values:
                            - kipppaterson
                    topologyKey: kubernetes.io/hostname
          container_config:
            env:
              - name: COUCHDROP_SFTP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: password
              - name: COUCHDROP_SFTP_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: username
              - name: COUCHDROP_SFTP_HOST
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: URL
              - name: AMPLIFY_SFTP_HOST
                valueFrom:
                  secretKeyRef:
                    name: op-amplify-sftp-kipppaterson
                    key: URL
              - name: AMPLIFY_SFTP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-amplify-sftp-kipppaterson
                    key: password
              - name: AMPLIFY_SFTP_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: op-amplify-sftp-kipppaterson
                    key: username
              - name: FINALSITE_CREDENTIAL_ID
                valueFrom:
                  secretKeyRef:
                    name: op-finalsite-api-kipppaterson
                    key: username
              - name: FINALSITE_SECRET
                valueFrom:
                  secretKeyRef:
                    name: op-finalsite-api-kipppaterson
                    key: password
        run_k8s_config:
          container_config:
            env:
              - name: COUCHDROP_SFTP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: password
              - name: COUCHDROP_SFTP_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: username
              - name: COUCHDROP_SFTP_HOST
                valueFrom:
                  secretKeyRef:
                    name: op-couchdrop-sftp
                    key: URL
              - name: AMPLIFY_SFTP_HOST
                valueFrom:
                  secretKeyRef:
                    name: op-amplify-sftp-kipppaterson
                    key: URL
              - name: AMPLIFY_SFTP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: op-amplify-sftp-kipppaterson
                    key: password
              - name: AMPLIFY_SFTP_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: op-amplify-sftp-kipppaterson
                    key: username
              - name: FINALSITE_CREDENTIAL_ID
                valueFrom:
                  secretKeyRef:
                    name: op-finalsite-api-kipppaterson
                    key: username
              - name: FINALSITE_SECRET
                valueFrom:
                  secretKeyRef:
                    name: op-finalsite-api-kipppaterson
                    key: password
