name: focus
version: 1.0.0
config-version: 2
require-dbt-version: [">=1.3.0", <2.0.0]

profile: focus

model-paths: [models]
analysis-paths: [analyses]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets:
  - target
  - dbt_packages

vars:
  current_academic_year: 0
  current_fiscal_year: 0
  focus_schema: null
  local_timezone: UTC

models:
  +schema: focus
  focus:
    staging:
      +contract:
        enforced: true
