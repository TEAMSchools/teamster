# Dagster-only profile (defer + prod). Developers use .dbt/profiles.yml for
# full target support (defer/dev/staging/prod).
kipptaf:
  target: prod
  outputs:
    defer:
      type: bigquery
      schema: zz_dagster_kipptaf
      method: oauth
      project: teamster-332318
      threads: 40
    prod:
      type: bigquery
      schema: kipptaf
      method: oauth
      project: teamster-332318
      threads: 40
      job_retries: 3
      job_execution_timeout_seconds: 900
