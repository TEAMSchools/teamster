data_tests:
  - name: test_base_powerschool__course_enrollments_no_studyear_course_overlap
    description: >-
      Within a (student, year, course) — `cc_studyear` is PowerSchool's
      composite student+year identifier — consecutive enrollment rows must not
      have date ranges that overlap by more than one day. A single shared
      boundary day (one row's `cc_dateleft` equal to the next row's
      `cc_dateenrolled`) is a normal sequential transfer and is allowed;
      multi-day overlap is a source-side defect that causes scaffold's
      date-between join to fan out an admin to multiple schools.
    config:
      meta:
        dagster:
          ref:
            name: base_powerschool__course_enrollments

  - name: dim_student_iep_status__no_overlapping_spans
    description: >-
      Within a `student_key` partition, consecutive IEP status spans must not
      overlap. A `lead(effective_date_start_key)` value less than or equal to
      the current row's `effective_date_end_key` indicates two
      simultaneously-active classifications for the same student in the same
      source — most often caused by EdPlan emitting two snapshot rows with
      overlapping date ranges and different `spedlep` values.

  - name: dim_student_ell_status__no_overlapping_spans
    description: >-
      Within a `student_key` partition, consecutive ELL status spans must not
      overlap. Every emitted row implies `is_ell = true`; overlapping spans
      indicate a single source emitted two simultaneous LEP windows for the same
      student — typically the primary `lepbegindate` and a secondary
      `lepbegindate2` with overlapping ranges.

  - name: dim_student_meal_eligibility_status__no_overlapping_spans
    description: >-
      Within a `student_key` partition, consecutive meal-eligibility spans must
      not overlap. The NJ leg trims each Titan annual window's end to
      day-before-next-row's-start so academic-year boundary overlaps don't
      surface in the dim.
