data_tests:
  - name: test_stg_google_sheets__finalsite__status_crosswalk_single_year
    description: >-
      status_crosswalk must hold config for exactly one academic year at a time
      (a documented convention, not an enforced constraint) --
      int_finalsite__current_academic_year derives "the current Finalsite cycle"
      via max(file_year), which silently returns NULL if the table is empty and
      silently favors the wrong year if two years' config accumulate. Both
      failure modes must fail loudly here instead.
    config:
      severity: error
      meta:
        dagster:
          ref:
            name: stg_google_sheets__finalsite__status_crosswalk

  - name: test_int_surveys__manager_survey_details__terms_coverage
    description: >-
      Warns when int_surveys__manager_survey_details has a
      (campaign_academic_year, campaign_reporting_term) tuple with no matching
      (name='Manager Survey', type='SURVEY') row in
      stg_google_sheets__reporting__terms. Surfaces Manager Survey admin-tuple
      coverage gaps that would otherwise drop archive rows at the
      fct_survey_submissions terms join.
    config:
      meta:
        dagster:
          ref:
            name: int_surveys__manager_survey_details

  - name: test_base_powerschool__course_enrollments_no_studyear_course_overlap
    description: >-
      Within a (student, year, course) — `cc_studyear` is PowerSchool's
      composite student+year identifier — consecutive enrollment rows must not
      have date ranges that overlap by more than one day. A single shared
      boundary day (one row's `cc_dateleft` equal to the next row's
      `cc_dateenrolled`) is a normal sequential transfer and is allowed;
      multi-day overlap is a source-side defect that causes scaffold's
      date-between join to fan out an admin to multiple schools.
    config:
      meta:
        dagster:
          ref:
            name: base_powerschool__course_enrollments

  - name: dim_work_assignment_primary__no_overlapping_primary_spans
    description: >-
      Within a `staff_key` partition, the primary-position spans (joined from
      `dim_work_assignment_primary` to `dim_staff_work_assignments`, filtered to
      `is_primary_position`) must not overlap. A `lead(effective_start_date)`
      value less than or equal to the current row's `effective_end_date` means a
      staff member had two simultaneously-primary work assignments — which would
      fan out any point-in-time lookup that resolves a single primary assignment
      per staff at a date (e.g. the Cube `staff_reporting_relationships` manager
      resolver). Guards the primary-exclusivity invariant that resolver's grain
      depends on.
    config:
      meta:
        dagster:
          ref:
            name: dim_work_assignment_primary

  - name: dim_student_iep_status__no_overlapping_spans
    description: >-
      Within a `student_key` partition, consecutive IEP status spans must not
      overlap. A `lead(effective_date_start_key)` value less than or equal to
      the current row's `effective_date_end_key` indicates two
      simultaneously-active classifications for the same student in the same
      source — most often caused by EdPlan emitting two snapshot rows with
      overlapping date ranges and different `spedlep` values.
    config:
      severity: error
      meta:
        dagster:
          ref:
            name: dim_student_iep_status

  - name: dim_student_ell_status__no_overlapping_spans
    description: >-
      Within a `student_key` partition, consecutive ELL status spans must not
      overlap. Every emitted row implies `is_ell = true`; overlapping spans
      indicate a single source emitted two simultaneous LEP windows for the same
      student — typically the primary `lepbegindate` and a secondary
      `lepbegindate2` with overlapping ranges.
    config:
      severity: error
      meta:
        dagster:
          ref:
            name: dim_student_ell_status

  - name: dim_student_meal_eligibility_status__no_overlapping_spans
    description: >-
      Within a `student_key` partition, consecutive meal-eligibility spans must
      not overlap. The NJ leg trims each Titan annual window's end to
      day-before-next-row's-start so academic-year boundary overlaps don't
      surface in the dim.
    config:
      severity: error
      meta:
        dagster:
          ref:
            name: dim_student_meal_eligibility_status

  - name: test_assessment_completion
    config:
      enabled: false
      meta:
        dagster:
          ref:
            name: int_assessments__scaffold

  - name: test_current_courses_on_lookup
    config:
      enabled: false
      meta:
        dagster:
          ref:
            name: base_powerschool__course_enrollments

  - name: test_dim_regions_business_unit_code_coverage
    description: >-
      Asserts `dim_regions` has every `business_unit_code` that downstream FKs
      target. `dim_regions` is derived from
      `int_adp_workforce_now__workers__work_assignments__organizational_units__pivot`
      filtered to `business_unit_code is not null` — if ADP stops emitting a
      code that location/staff models still hash on, the chain orphans silently.
      This test fires before that happens.
    config:
      severity: error
      meta:
        dagster:
          ref:
            name: dim_regions

  - name: test_incorrect_student_number_pearson
    config:
      meta:
        dagster:
          ref:
            name: int_pearson__all_assessments

  - name: test_people__locations_drift
    description: >-
      Returns rows when the canonical-grain location master and the alias
      crosswalk drift apart. Two-direction check: `missing_in_master` — alias
      `clean_name` not present as a master `location_name` (INNER-join consumers
      would silently drop these aliases; LEFT-join consumers would propagate
      NULL canonical attrs); `missing_in_alias` — master `location_name` not
      present as an alias `clean_name` (aliases are how upstream typed strings —
      PowerSchool school names, ADP location strings, Zendesk slugs — resolve to
      a canonical row, so a master row without aliases is unreachable from most
      upstream lookups).
    config:
      severity: error
      meta:
        dagster:
          ref:
            name: stg_google_sheets__people__locations

  - name: test_sf_contact_note_duplicate
    config:
      meta:
        dagster:
          ref:
            name: stg_kippadb__contact_note

  - name: int_assessments__resolved_section_enrollments__unique_per_score
    description: >-
      Asserts that int_assessments__resolved_section_enrollments contains one
      row per score. The score grain spans all three source branches (internal,
      state_nj, state_fl): (powerschool_student_number, _dbt_source_project,
      source_type, canonical_assessment_id, academic_year,
      administration_period, subject_area). NULL-safe via format("%T|...") so
      NULL canonical_assessment_id on state rows and NULL
      academic_year/administration_period on internal rows do not collapse the
      distinct count.
    config:
      meta:
        dagster:
          ref:
            name: int_assessments__resolved_section_enrollments

  - name: int_collegeboard__ap_unpivot__crosswalk_resolves
    description: >-
      Returns one row per `stg_collegeboard__ap.ap_number_ap_id` that has no
      matching `college_board_id` in
      `stg_google_sheets__collegeboard__ap_id_crosswalk`. Each row is an
      unresolved CB-file student whose AP scores are dropped from
      `int_assessments__ap_assessments`. Ops signal to add the missing IDs to
      the crosswalk; failure rows persist in `kipptaf_dbt_test__audit` for
      direct query.
    config:
      meta:
        dagster:
          ref:
            name: int_collegeboard__ap_unpivot

  - name: rpt_focus__demographics__language_crosswalk_resolves
    description: >-
      Returns one row per `int_finalsite__contact_custom_attributes` record
      whose non-null `lang_parent_ss` has no matching `finalsite_language` in
      `stg_google_sheets__focus__language_code_crosswalk`. Each row is a
      Finalsite language value that falls through to a null Focus code in
      `rpt_focus__demographics` (LANG / PRIMARY_HOME_LANG / NATIVE_PARENT_LANG).
      Ops signal to add the missing value to the crosswalk sheet; failure rows
      persist in `kipptaf_dbt_test__audit` for direct query.
    config:
      meta:
        dagster:
          ref:
            name: int_finalsite__contact_custom_attributes

  - name: dim_student_section_enrollments__no_multi_stint_overlap
    description: >-
      Warns when a non-dropped course-enrollment (cc) record overlaps more than
      one school enrollment stint. dim_student_section_enrollments resolves
      these to a single stint (covering-first, else earliest), so a nonzero
      count is a known, monitored condition (baseline ~147, almost all genuine
      mid-year drop/re-enroll) rather than a failure. Growth signals new
      boundary-spanning sections to review.
    config:
      meta:
        dagster:
          ref:
            name: dim_student_section_enrollments
