models:
  - name: int_seat_tracker__snapshot
    columns:
      - name: staffing_model_id
        data_type: string
      - name: staffing_status
        data_type: string
      - name: status_detail
        data_type: string
      - name: is_mid_year_hire
        data_type: boolean
      - name: plan_status
        data_type: string
      - name: academic_year
        data_type: string
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: teammate
        data_type: string
      - name: is_open
        data_type: boolean
      - name: is_staffed
        data_type: boolean
      - name: is_active
        data_type: boolean
      - name: is_new_hire
        data_type: boolean
      - name: valid_from
        data_type: date
      - name: valid_to
        data_type: date
        description: Conditional on valid_from, valid_to.
