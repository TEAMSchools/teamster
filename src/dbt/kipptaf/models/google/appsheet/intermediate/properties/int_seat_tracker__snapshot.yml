models:
  - name: int_seat_tracker__snapshot
    columns:
      - name: location_key
        data_type: string
        description: >
          MD5 surrogate key for the canonical school location. Null when
          adp_location does not resolve through int_people__location_crosswalk.
        data_tests:
          - relationships:
              arguments:
                to: ref("dim_locations")
                field: location_key
      - name: staffing_model_id
        data_type: string
      - name: staffing_status
        data_type: string
      - name: status_detail
        data_type: string
      - name: is_mid_year_hire
        data_type: boolean
      - name: plan_status
        data_type: string
      - name: adp_location
        data_type: string
      - name: entity
        data_type: string
      - name: academic_year
        data_type: int64
      - name: teammate_employee_number
        data_type: int64
      - name: is_open
        data_type: boolean
      - name: is_staffed
        data_type: boolean
      - name: is_active
        data_type: boolean
      - name: is_new_hire
        data_type: boolean
      - name: valid_from
        data_type: date
      - name: valid_to
        data_type: date
        description: Conditional on valid_from, valid_to.
