models:
  - name: stg_google_appsheet__illuminate_assessments_extension
    columns:
      - name: assessment_id
        data_type: int64
      - name: administered_at
        data_type: date
      - name: module_type
        data_type: string
      - name: module_sequence
        data_type: int64
      - name: regions_assessed
        data_type: string
      - name: grade_level
        data_type: int64
      - name: subject
        data_type: string
      - name: regions_report_card
        data_type: string
      - name: regions_progress_report
        data_type: string
      - name: illuminate_grade_level_id
        data_type: int64
      - name: module_code
        data_type: string
      - name: regions_assessed_array
        data_type: array<string>
        description: >-
          `regions_assessed` split on comma, trimmed, deduped, and empty-string
          filtered. Consumers can `cross join unnest(regions_assessed_array)` to
          get one row per (assessment, region) without the whitespace-variant
          collapse that requires DISTINCT downstream.
