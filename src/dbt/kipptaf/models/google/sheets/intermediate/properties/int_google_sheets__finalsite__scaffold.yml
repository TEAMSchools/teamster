models:
  - name: int_google_sheets__finalsite__scaffold
    config:
      contract:
        enforced: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - region
              - schoolid
              - grade_level
              - goal_granularity
              - goal_type
              - goal_name
              - goal_value
              - grouped_status_timeframe
          config:
            store_failures: true
    columns:
      - name: academic_year
        data_type: int64
      - name: org
        data_type: string
      - name: region
        data_type: string
      - name: schoolid
        data_type: int64
      - name: school
        data_type: string
      - name: grade_level
        data_type: int64
      - name: school_level
        data_type: string
      - name: goal_granularity
        data_type: string
      - name: goal_type
        data_type: string
      - name: goal_name
        data_type: string
      - name: goal_value
        data_type: numeric
      - name: grouped_status_timeframe
        data_type: string
