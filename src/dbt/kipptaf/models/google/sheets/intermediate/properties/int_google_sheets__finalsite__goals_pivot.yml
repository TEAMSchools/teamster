models:
  - name: int_google_sheets__finalsite__goals_pivot
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - enrollment_academic_year
              - region
              - schoolid
              - grade_level
              - goal_type
              - goal_granularity
              - enrollment_type
          config:
            severity: error
    columns:
      - name: enrollment_academic_year
        data_type: int64
      - name: region
        data_type: string
      - name: schoolid
        data_type: int64
      - name: school
        data_type: string
      - name: grade_level
        data_type: int64
      - name: goal_granularity
        data_type: string
      - name: goal_type
        data_type: string
      - name: enrollment_type
        data_type: string
      - name: seat_target
        data_type: numeric
        description: Total seats/capacity the school is targeting for the year.
      - name: fdos_target
        data_type: numeric
        description: Enrollment target as of First Day of School.
      - name: budget_target
        data_type: numeric
        description:
          The enrollment number the school's budget was built against.
      - name: new_student_target
        data_type: numeric
        description: Target count of new (not returning) students to enroll.
      - name: re_enroll_projection
        data_type: numeric
        description: >
          Projected count of currently-enrolled students expected to persist
          (return) -- "persistence," not "retention"; retention refers to grade
          repetition in this org's vocabulary and is a distinct, unrelated
          concept.
