models:
  - name: stg_google_sheets__people__locations
    description: |
      One row per logical school location from the canonical people locations
      Google Sheet master. This is the 38-row canonical-grain source for all
      school location data including addresses, IDs, and regional attributes.
      Pathways and Whittier filtering is deferred to dim_locations.
    columns:
      - name: location_key
        data_type: string
        description: |
          Canonical location surrogate key (`MD5(location_name)`). Single source
          of truth — every downstream consumer selects this directly rather than
          recomputing the hash.
        data_tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error
      - name: location_name
        data_type: string
        description: |
          Canonical school name (source column: Name). Primary key — one row
          per logical school. Used as the join key for canonical-grain location
          lookups across the network.
        data_tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error
      - name: region
        data_type: string
        description: |
          Canonical region name derived from dagster_code_location. One of
          Newark, Camden, Miami, Paterson; null for any other code location
          value (e.g., network-level entries).
      - name: business_unit
        data_type: string
        description: |
          Legal-entity name the location rolls up to (source column: Region).
          Matches dim_regions.legal_entity (e.g., "TEAM Academy Charter School",
          "KIPP Cooper Norcross Academy"). The sheet's Region column captures
          legal entities, not canonical region names.
      - name: powerschool_school_id
        data_type: int64
        description: |
          PowerSchool school ID. Join key for PowerSchool data.
      - name: reporting_school_id
        data_type: int64
        description: |
          Reporting school ID used to roll multi-campus schools up to a single
          reporting unit.
      - name: grade_band
        data_type: string
        description: |
          Grade band served by the location (e.g., ES, MS, HS).
      - name: is_campus
        data_type: boolean
        description: |
          True when the location represents a physical campus (vs. an
          administrative unit).
      - name: is_pathways
        data_type: boolean
        description: |
          True when the location is a KIPP Forward post-secondary (Pathways)
          program. Pathways rows are excluded from analytics scope in
          dim_locations.
      - name: abbreviation
        data_type: string
        description: |
          Short location abbreviation (e.g., SPARK, NCA). Not always populated
          for every location.
      - name: deanslist_school_id
        data_type: int64
        description: |
          DeansList school ID (nullable — not every school is in DeansList).
      - name: dagster_code_location
        data_type: string
        description: |
          Dagster code location identifier (e.g., kippnewark, kippcamden,
          kippmiami, kipppaterson). Source for the derived region column.
      - name: head_of_schools_employee_number
        data_type: int64
        description: |
          Employee number of the head of schools responsible for this location.
      - name: adp_location_code
        data_type: int64
        description: |
          ADP work-location numeric code (`home_work_location__name_code__code_value`
          in ADP). Stable single-valued identifier — joined directly from
          `int_adp_workforce_now__workers__work_assignments`. NULL for canonical
          rows that have no ADP presence (KIPP Legacy Middle, KIPP Miami -
          Poinciana Campus, KIPP NJ).
      - name: grow_location_id
        data_type: string
        description: |
          Grow (observation platform) location identifier. STRING type for
          downstream FK uniformity.
      - name: campus_name
        data_type: string
        description: |
          Parent campus name for multi-school campuses (e.g., two schools that
          share a building). Null when the location is not grouped under a
          named campus.
      - name: address
        data_type: string
        description: |
          Single-line street address for the location.
      - name: city
        data_type: string
        description: |
          City where the location is situated.
      - name: postal_code
        data_type: string
        description: |
          Postal (ZIP) code as a STRING to preserve leading zeros for
          New Jersey five-digit codes.
