models:
  - name: stg_google_sheets__state_test_comparison_demographics
    description: >
      Reference sheet for state assessment comparisons to external entities
      (City LEA, State, Neighborhood Schools) broken out by demographic group,
      as available from official sources. ALG01 has a special case for school
      level — overall comparisons by entity are split by HS and MS, but
      demographic groupings combine MS and HS (assessment grades 8+) because
      official sources do not provide demographic breakdowns by school level.
      ALG02 totals are 10th-grade only; demographic group totals include all
      students who took ALG02 regardless of grade. GEO01 follows the same
      pattern for grades 9 and 10.
    columns:
      - name: academic_year
        data_type: int64
        description: Academic year the benchmarks apply to.

      - name: test_name
        data_type: string
        description: State assessment test name (e.g. NJSLA, NJGPA).

      - name: season
        data_type: string
        description: Testing season (always Spring for benchmarks).

      - name: school_level
        data_type: string
        description: >
          School level the benchmark applies to (ES, MS, HS, or hybrid MS_HS for
          ALG01, or HS_09 and HS_10 for ALG02, GEO01).

      - name: grade_range_band
        data_type: string
        description: Grade band for the benchmark (e.g. 3-8, HS).

      - name: discipline
        data_type: string
        description: Subject discipline (Math, ELA, Science, Social Studies).

      - name: test_code
        data_type: string
        description: State assessment test code (e.g. ELA05, ALG01).

      - name: region
        data_type: string
        description: >
          Network region the comparison applies to (Newark, Camden, Miami,
          Paterson).

      - name: comparison_entity
        data_type: string
        description: >
          External entity being compared to (City, State, Neighborhood Schools).

      - name: comparison_demographic_group
        data_type: string
        description: >
          Raw demographic group label from the source sheet (e.g. Grade,
          Race/Ethnicity, Gender).

      - name: comparison_demographic_subgroup
        data_type: string
        description: >
          Raw demographic subgroup label from the source sheet (e.g. Grade - 05,
          Black or African American, Female).

      - name: percent_proficient
        data_type: float64
        description: Percent of students scoring proficient or above.

      - name: total_students
        data_type: int64
        description: Total number of students tested.

      - name: comparison_demographic_group_aligned
        data_type: string
        description: >
          Demographic group after alignment — Grade rows with subgroups 08/09/10
          are remapped to 'Total'.

      - name: comparison_demographic_subgroup_aligned
        data_type: string
        description: >
          Demographic subgroup after alignment — Grade group rows are remapped
          to 'All Students'.

      - name: total_proficient_students
        data_type: float64
        description: >
          Derived count of proficient students (percent_proficient *
          total_students, rounded to 0 decimal places).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - test_code
              - region
              - comparison_entity
              - comparison_demographic_group
              - comparison_demographic_subgroup
          config:
            store_failures: true
