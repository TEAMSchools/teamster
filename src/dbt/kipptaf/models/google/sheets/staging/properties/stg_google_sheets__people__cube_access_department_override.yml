models:
  - name: stg_google_sheets__people__cube_access_department_override
    description: >-
      Cube access department special-access override, maintained by the data
      team in Google Sheets. One row per ADP department whose staff receive a
      broad access grant regardless of job function. Matched on department_name;
      takes precedence over the role crosswalk. Sensitive-field scopes use the
      per-field enum; location/department scopes bound them.
    columns:
      - name: department
        data_type: string
        description: ADP assigned department name (matches department_name).
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: student_summary_location_scope
        data_type: string
        description: Student aggregate location breadth.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]
              config:
                severity: error
      - name: student_detail_location_scope
        data_type: string
        description: Student row-level location breadth.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]
              config:
                severity: error
      - name: student_pii_scope
        data_type: string
        description: Student PII field visibility.
        data_tests:
          - accepted_values:
              arguments:
                values: [all, none]
              config:
                severity: error
      - name: staff_location_scope
        data_type: string
        description: Location remit bounding the staff sensitive fields.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]
              config:
                severity: error
      - name: staff_department_scope
        data_type: string
        description: Department remit bounding the staff sensitive fields.
        data_tests:
          - accepted_values:
              arguments:
                values: [all, own_group, none]
              config:
                severity: error
      - name: staff_pii_scope
        data_type: string
        description:
          Staff PII field visibility (per-field sensitive scope enum).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: staff_compensation_scope
        data_type: string
        description: Staff compensation field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: staff_observations_scope
        data_type: string
        description: Staff observation field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: staff_benefits_scope
        data_type: string
        description: Staff benefits field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
