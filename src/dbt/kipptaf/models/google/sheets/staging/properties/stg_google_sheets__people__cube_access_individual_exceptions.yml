models:
  - name: stg_google_sheets__people__cube_access_individual_exceptions
    description: >-
      Cube access individual-exception overrides, maintained by the data team in
      Google Sheets. One row per staff member (keyed on employee_number) who
      requires an access grant that differs from their role or department
      mapping. Takes precedence over both the department override and the role
      crosswalk. Scope columns follow the same vocabulary as the other access
      crosswalks; a NULL scope column falls through to the next tier. The notes
      column is free-text documentation only — it is not read by
      dim_staff_cube_access.
    columns:
      - name: employee_number
        data_type: string
        description: ADP employee number (matches dim_staff.employee_number).
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: student_location_scope
        data_type: string
        description: >-
          Student data location breadth. A non-none scope grants every student
          view and all fields, including PII. NULL falls through to the
          department override or role crosswalk.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]
              config:
                severity: error
      - name: staff_location_scope
        data_type: string
        description: >-
          Location remit bounding the staff sensitive fields. NULL falls through
          to the department override or role crosswalk.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]
              config:
                severity: error
      - name: staff_department_scope
        data_type: string
        description: >-
          Department remit bounding the staff sensitive fields. NULL falls
          through to the department override or role crosswalk.
        data_tests:
          - accepted_values:
              arguments:
                values: [all, own_group, none]
              config:
                severity: error
      - name: staff_pii_scope
        data_type: string
        description:
          Staff PII field visibility (per-field sensitive scope enum).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: staff_compensation_scope
        data_type: string
        description: Staff compensation field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: staff_observations_scope
        data_type: string
        description: Staff observation field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: staff_benefits_scope
        data_type: string
        description: Staff benefits field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
              config:
                severity: error
      - name: notes
        data_type: string
        description: >-
          Free-text reason for the exception, for sheet-level auditing only. Not
          read by dim_staff_cube_access.
