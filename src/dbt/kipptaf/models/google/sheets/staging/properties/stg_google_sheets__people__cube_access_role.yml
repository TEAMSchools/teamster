models:
  - name: stg_google_sheets__people__cube_access_role
    description: >-
      Cube access role crosswalk, maintained by the data team in Google Sheets.
      One row per (job_function_code, entity, department_type) tuple, mapping
      each role to its location scope, student/staff access levels, and
      per-field visibility scopes. The sentinel `any` in entity /
      department_type matches any value for codes whose access does not vary by
      those dimensions.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - job_function_code
              - entity
              - department_type
          config:
            severity: error
    columns:
      - name: job_function_code
        data_type: string
        description: ADP job function code (CHIEF, EDHOS, SL, TEACH, ...).
        data_tests:
          - not_null:
              config:
                severity: error
      - name: entity
        data_type: string
        description: KTAF, Region, or the sentinel `any`.
        data_tests:
          - not_null:
              config:
                severity: error
      - name: department_type
        data_type: string
        description: instructional, non-instructional, or the sentinel `any`.
        data_tests:
          - not_null:
              config:
                severity: error
      - name: job_function_level
        data_type: int64
        description: Org rank for the role (1 = Chief, 6 = Teacher, 7 = Intern).
      - name: scope_level
        data_type: string
        description: >-
          Location scope tier — network, region, school,
          network_department_group, region_department_group, or none.
      - name: student_access_level
        data_type: string
        description: Student data access — detail, summary, or none.
      - name: staff_access_level
        data_type: string
        description: >-
          Staff data access — detail, detail_below_rank, detail_reporting_chain,
          or none.
      - name: student_pii_scope
        data_type: string
        description: Student PII field visibility — all or none.
      - name: staff_pii_scope
        data_type: string
        description: >-
          Staff PII field visibility — all, reporting_chain, teaching_staff, or
          none.
      - name: staff_compensation_scope
        data_type: string
        description: Staff compensation field visibility (same vocabulary).
      - name: staff_benefits_scope
        data_type: string
        description: Staff benefits field visibility (same vocabulary).
      - name: staff_observations_scope
        data_type: string
        description: Staff observation field visibility (same vocabulary).
