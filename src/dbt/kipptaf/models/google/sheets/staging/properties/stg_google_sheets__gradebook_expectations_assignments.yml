models:
  - name: stg_google_sheets__gradebook_expectations_assignments
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - Academic_Year
              - Region
              - School_Level
              - Quarter
              - Week_Number
              - assignment_category_code
          config:
            severity: error
    columns:
      - name: Academic_Year
        data_type: int64
      - name: Region
        data_type: string
      - name: School_Level
        data_type: string
      - name: Quarter
        data_type: string
      - name: Week_Number
        data_type: int64
      - name: Notes
        data_type: string
      - name: assignment_category_code
        data_type: string
      - name: assignment_category_name
        data_type: string
      - name: assignment_category_term
        data_type: string
      - name: expectation
        data_type: int64
