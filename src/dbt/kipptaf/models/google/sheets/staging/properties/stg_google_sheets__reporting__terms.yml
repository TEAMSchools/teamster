models:
  - name: stg_google_sheets__reporting__terms
    description: >-
      Analyst-maintained Google Sheet mapping reporting periods across domains
      (quarterly grade reporting, literacy assessment windows, OKR cycles,
      etc.). Source of truth for dim_terms. Each row represents one term
      instance for one domain type at one school (or region-wide).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - name
              - school_id
              - region
              - powerschool_year_id
          config:
            severity: error
            where: "type = 'RT'"
    columns:
      - name: type
        data_type: string
        description: >-
          Category identifier for the term row. Values include `RT` (reporting
          term / quarter), `LIT` (literacy assessment window), `AR` (academic
          round), `O3` (OKR cycle), `WT` (walkthrough cycle), `SURVEY`, and
          others. Filter to the right type before joining from a domain-specific
          fact.
      - name: code
        data_type: string
        description: >-
          Type-prefixed shorthand identifier (e.g., `RT1`..`RT4` for
          reporting-term quarters; `LIT1`..`LIT4` for literacy windows). NOT the
          upstream source-system term name — for RT-type rows, join PowerSchool
          `term_name` against `name`, not `code`.
      - name: name
        data_type: string
        description: >-
          Human-readable term name aligned with upstream source vocabulary
          (e.g., `Q1`..`Q4` or `T1`..`T3` for RT-type rows; free-form for other
          types). This is the field to match against
          `base_powerschool__gpa_term.term_name` and similar PS-derived
          identifiers.
      - name: start_date
        data_type: date
        description: First date of the term window (inclusive).
      - name: end_date
        data_type: date
        description: Last date of the term window (inclusive).
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) this term falls within.
      - name: fiscal_year
        data_type: int64
        description: Fiscal year this term falls within.
      - name: powerschool_year_id
        data_type: int64
        description: >-
          PowerSchool `yearid` convention — integer `starting_year − 1990`
          (e.g., `35` for SY25-26). Already in yearid form; do NOT apply `−
          1990` again when joining to PS.
      - name: powerschool_term_id
        data_type: int64
        description: PowerSchool term table primary key for this term.
      - name: school_id
        data_type: int64
        description: >-
          PowerSchool school ID. Null for region-wide or network-wide term rows.
      - name: region
        data_type: string
        description: >-
          Region label (e.g., `Newark`, `Camden`, `Miami`, `Paterson`). May also
          contain legal-entity or district names for some rows — inconsistent
          upstream.
      - name: grade_band
        data_type: string
        description: Grade band (`ES`, `MS`, `HS`). Null when not band-specific.
      - name: lockbox_date
        data_type: date
        description: >-
          Date after which grade data for the term is locked for reporting.
          Surfaces on `dim_terms` as `data_freeze_date`.
      - name: is_current
        data_type: boolean
        description: >-
          TRUE if the term's date range covers today OR if the term is the
          latest of its type in a past academic year. Broader than a strict
          "active today" flag.
      - name: city
        data_type: string
        description: >-
          Canonical city column for region mapping. Drives the `dim_terms →
          dim_locations` join (`t.city = ll.region`) and feeds
          `dim_locations.region_key` downstream.
