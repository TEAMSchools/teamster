models:
  - name: stg_google_sheets__focus__enrollment_code_crosswalk
    description: >
      Crosswalk mapping a Finalsite lifecycle action to the corresponding Focus
      Add enrollment code.
    columns:
      - name: finalsite_lifecycle_action
        data_type: string
        description: Lifecycle action value as recorded in Finalsite.
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: focus_enrollment_code
        data_type: string
        description:
          Focus Add enrollment code that corresponds to the Finalsite lifecycle
          action.
