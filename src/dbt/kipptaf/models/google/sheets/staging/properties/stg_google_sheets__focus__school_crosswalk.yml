models:
  - name: stg_google_sheets__focus__school_crosswalk
    description: >
      Crosswalk mapping a Finalsite assigned school name to the corresponding
      Focus school ID (SCH_ID).
    columns:
      - name: finalsite_assigned_school
        data_type: string
        description: School name as assigned in Finalsite.
        data_tests:
          - not_null:
              config:
                severity: error
          - unique:
              config:
                severity: error
      - name: focus_school_id
        data_type: string
        description: Focus SCH_ID that corresponds to the Finalsite school name.
