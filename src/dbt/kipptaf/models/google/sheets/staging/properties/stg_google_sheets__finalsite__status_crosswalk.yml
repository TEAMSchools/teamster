models:
  - name: stg_google_sheets__finalsite__status_crosswalk
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dagster_partition_key
              - enrollment_type
              - detailed_status
          config:
            severity: error
    columns:
      - name: _dagster_partition_key
        data_type: string
      - name: enrollment_type
        data_type: string
      - name: detailed_status
        data_type: string
      - name: detailed_status_ranking
        data_type: int64
      - name: detailed_status_branched_ranking
        data_type: int64
      - name: valid_detailed_status
        data_type: boolean
      - name: fs_status_field
        data_type: string
      - name: qa_flag
        data_type: boolean
      - name: status_enrollment
        data_type: string
      - name: status_group_numerator
        data_type: string
      - name: status_group_denominator
        data_type: string
      - name: conversion_metric_numerator_1
        data_type: string
      - name: conversion_metric_numerator_2
        data_type: string
      - name: conversion_metric_numerator_3
        data_type: string
      - name: conversion_metric_denominator_1
        data_type: string
      - name: conversion_metric_denominator_2
        data_type: string
      - name: file_year
        data_type: int64
      - name: finalsite_current_academic_year
        data_type: int64
        description: >-
          The currently valid Finalsite academic year (start-year form, e.g.
          2026 for AY2026-2027), derived as max(file_year) over every row.
          Distinct from the var('current_academic_year') network year -- raw
          Finalsite ingestion timing isn't a reliable signal for "the current
          year" since two academic years' student data can be live
          simultaneously with a non-standardized per-region rollover cadence;
          status_crosswalk's single-active-year convention (guarded by
          test_stg_google_sheets__finalsite__status_crosswalk_single_year) is
          the reliable anchor instead, so this resolves to that single year on
          every row. Consumers needing "the current Finalsite cycle" collapse to
          one row (select distinct finalsite_current_academic_year) rather than
          hardcoding a year or reading a var.
        data_tests:
          - not_null:
              config:
                severity: error
