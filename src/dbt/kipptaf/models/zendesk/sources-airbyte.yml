sources:
  - name: zendesk
    schema:
      "{%- if target.name in ['defer', 'dev'] -%}zz_{{ env_var('GITHUB_USER',
      'dev') }}_{%- elif target.name == 'staging' -%}zz_stg_{%- endif -%}{{
      project_name }}_zendesk"
    tables:
      - name: groups
      - name: organizations
      - name: ticket_audits
      - name: ticket_fields
      - name: ticket_metrics
      - name: tickets
      - name: user_identities
      - name: users
      - name: articles
        config:
          enabled: false
      - name: organization_memberships
        config:
          enabled: false
      - name: organization_fields
        config:
          enabled: false
      - name: user_fields
        config:
          enabled: false
