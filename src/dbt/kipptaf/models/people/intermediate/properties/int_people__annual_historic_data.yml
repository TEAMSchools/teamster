models:
  - name: int_people__annual_historic_data
    columns:
      - name: employee_number
        data_type: int64
      - name: adp_associate_id
        data_type: string
      - name: preferred_first_name
        data_type: string
      - name: preferred_last_name
        data_type: string
      - name: legal_first_name
        data_type: string
      - name: legal_last_name
        data_type: string
      - name: current_status
        data_type: string
      - name: termination_date
        data_type: date
      - name: current_legal_entity
        data_type: string
      - name: current_location
        data_type: string
      - name: current_role
        data_type: string
      - name: current_dept
        data_type: string
      - name: race_ethnicity_reporting
        data_type: string
      - name: gender
        data_type: string
        description: M=Male F=Female. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: gender
      - name: samaccountname
        data_type: string
      - name: current_manager
        data_type: string
      - name: manager_samaccountname
        data_type: string
      - name: current_position_id
        data_type: string
      - name: payroll_group_code
        data_type: string
      - name: payroll_file_number
        data_type: string
      - name: is_manager
        data_type: boolean
      - name: worker_original_hire_date
        data_type: date
      - name: worker_rehire_date
        data_type: date
      - name: worker_termination_date
        data_type: date
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: historic_legal_entity
        data_type: string
      - name: historic_location
        data_type: string
      - name: historic_role
        data_type: string
      - name: historic_dept
        data_type: string
      - name: historic_salary
        data_type: numeric
      - name: effective_date_start
        data_type: date
      - name: effective_date_end
        data_type: date
      - name: historic_position_status
        data_type: string
      - name: overall_score
        data_type: float64
      - name: overall_tier
        data_type: int64
      - name: pm_term
        data_type: int64
        description: Computed expression.
      - name: etr_score
        data_type: int64
        description: Computed expression.
      - name: etr_tier
        data_type: int64
        description: Computed expression.
      - name: so_score
        data_type: int64
        description: Computed expression.
      - name: so_tier
        data_type: int64
        description: Computed expression.
      - name: most_recent_hire_date
        data_type: date
        description:
          First non-null of worker_rehire_date, worker_original_hire_date.
      - name: is_hispanic
        data_type: boolean
        description: Conditional on ethnicity_code.
