models:
  - name: int_people__years_experience
    config:
      materialized: table
    columns:
      - name: employee_number
        data_type: int64
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: years_teaching_at_kipp
        data_type: float64
      - name: years_teaching_in_njfl
        data_type: numeric
      - name: years_teaching_outside_njfl
        data_type: numeric
      - name: years_exp_outside_kipp
        data_type: numeric
      - name: years_at_kipp_total
        data_type: float64
      - name: years_experience_total
        data_type: float64
        description: Derived from years_at_kipp, years_exp_outside_kipp.
      - name: years_teaching_total
        data_type: float64
        description:
          Derived from years_teaching_at_kipp, years_teaching_in_njfl,
          years_teaching_outside_njfl.
