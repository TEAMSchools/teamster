models:
  - name: int_people__location_crosswalk
    description: |
      One row per location alias — multiple raw `name` spellings map to the
      same canonical `location_clean_name`. Use this model when joining on
      alternate school-name spellings (e.g., ADP home_work_location_name,
      SchoolMint Grow observation school_name). For one-row-per-logical-school,
      use stg_google_sheets__people__locations.
    columns:
      - name: location_name
        data_type: string
        data_tests:
          - unique
      - name: location_clean_name
        data_type: string
      - name: location_abbreviation
        data_type: string
      - name: location_grade_band
        data_type: string
      - name: location_region
        data_type: string
      - name: location_powerschool_school_id
        data_type: int64
      - name: location_deanslist_school_id
        data_type: int64
      - name: location_reporting_school_id
        data_type: int64
      - name: location_is_campus
        data_type: boolean
      - name: location_is_pathways
        data_type: boolean
      - name: location_dagster_code_location
        data_type: string
      - name: location_head_of_schools_employee_number
        data_type: int64
      - name: campus_name
        data_type: string
      - name: head_of_schools_sam_account_name
        data_type: string
