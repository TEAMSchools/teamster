models:
  - name: stg_people__employee_numbers
    config:
      materialized: incremental
      incremental_strategy: merge
      full_refresh: false
      on_schema_change: fail
      unique_key: adp_associate_id
      merge_update_columns:
        - adp_associate_id
    columns:
      - name: employee_number
        data_type: int64
      - name: adp_associate_id
        data_type: string
        description: >-
          ADP worker identifier (~9 chars). Equals
          `stg_adp_workforce_now__workers.worker_id__id_value` — NOT
          `associate_oid`. When joining ADP work-assignment models to this
          column, bridge through `stg_adp_workforce_now__workers.associate_oid →
          worker_id__id_value` rather than joining `associate_oid` directly.
      - name: adp_associate_id_legacy
        data_type: string
      - name: is_active
        data_type: boolean
