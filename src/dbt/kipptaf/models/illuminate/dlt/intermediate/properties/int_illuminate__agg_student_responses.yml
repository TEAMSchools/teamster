models:
  - name: int_illuminate__agg_student_responses
    columns:
      - name: student_assessment_id
        data_type: int64
      - name: student_id
        data_type: int64
      - name: assessment_id
        data_type: int64
      - name: date_taken
        data_type: date
      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp
      - name: version_id
        data_type: int64
      - name: mastered
        data_type: boolean
      - name: percent_correct
        data_type: numeric
      - name: number_of_questions
        data_type: int64
      - name: answered
        data_type: int64
      - name: performance_band_id
        data_type: int64
      - name: performance_band_level
        data_type: int64
      - name: performance_band_set_id
        data_type: int64
      - name: response_type_code
        data_type: string
      - name: response_type_root_description
        data_type: string
      - name: response_type
        data_type: string
        description: Derived from _dbt_source_relation.
      - name: response_type_id
        data_type: int64
        description: First non-null of standard_id, reporting_group_id.
      - name: response_type_description
        data_type: string
        description:
          The description of the assignment. First non-null of
          standard_description, label.
      - name: points_possible
        data_type: numeric
        description: First non-null of points_possible, raw_score_possible.
      - name: points
        data_type: numeric
        description: The actual points student received for this section.
