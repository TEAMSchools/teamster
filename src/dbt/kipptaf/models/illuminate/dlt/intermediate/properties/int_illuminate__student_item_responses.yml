models:
  - name: int_illuminate__student_item_responses
    columns:
      - name: student_assessment_response_id
        data_type: int64
        data_tests:
          - unique:
              config:
                store_failures: true
      - name: student_assessment_id
        data_type: int64
      - name: assessment_id
        data_type: int64
      - name: version_id
        data_type: int64
      - name: field_id
        data_type: int64
      - name: field_order
        data_type: int64
      - name: response_id
        data_type: int64
      - name: response
        data_type: string
      - name: is_correct
        data_type: boolean
      - name: points
        data_type: numeric
      - name: manual_score
        data_type: boolean
