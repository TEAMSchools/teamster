models:
  - name: int_illuminate__assessments
    columns:
      - name: assessment_id
        data_type: int64
      - name: title
        data_type: string
        description:
          Stores a title name for the teacher and is used for sorting purposes.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: title
      - name: description
        data_type: string
        description: The description of the assignment.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: user_id
        data_type: int64
      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp
      - name: administered_at
        data_type: date
      - name: code_scope_id
        data_type: int64
      - name: code_subject_area_id
        data_type: int64
      - name: reports_db_virtual_table_id
        data_type: int64
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: local_assessment_id
        data_type: string
      - name: intel_assess_guid
        data_type: string
      - name: guid
        data_type: string
      - name: tags
        data_type: string
      - name: edusoft_guid
        data_type: string
      - name: performance_band_set_id
        data_type: int64
      - name: als_guid
        data_type: string
      - name: curriculum_associate_guid
        data_type: string
      - name: allow_duplicates
        data_type: boolean
      - name: itembank_assessment_id
        data_type: int64
      - name: locked
        data_type: boolean
      - name: show_in_parent_portal
        data_type: boolean
      - name: administration_window_start_date
        data_type: date
      - name: administration_window_end_date
        data_type: date
      - name: is_hybrid_x_obsolete
        data_type: boolean
      - name: assessment_type
        data_type: string
      - name: duplicate_from_assessment_id
        data_type: int64
      - name: creator_local_user_id
        data_type: string
      - name: creator_username
        data_type: string
      - name: creator_first_name
        data_type: string
        description: Students' first name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: first_name
            contains_pii: true
      - name: creator_last_name
        data_type: string
        description: Students last name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: last_name
            contains_pii: true
      - name: creator_email_1
        data_type: string
      - name: performance_band_set_description
        data_type: string
        description: The description of the assignment.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: scope
        data_type: string
        description: Conditional on code_translation, is_grade_k_1.
      - name: subject_area
        data_type: string
      - name: academic_year_clean
        data_type: int64
        description: Derived from academic_year.
