models:
  - name: int_illuminate__assessments
    data_tests:
      # Source `academic_year` (year of June end) sometimes disagrees with the
      # AY derived from `administered_at`. Caused by "Copy of …" duplication in
      # Illuminate carrying the prior year's tag. Downstream effect: wrong
      # canonicalization → cross-school groups in response_rollup. Tracked in
      # #3801 for academic ops cleanup; failures land in dbt_test__audit.
      - dbt_utils.expression_is_true:
          name: int_illuminate__assessments__academic_year_matches_administered_at
          arguments:
            expression: |-
              administered_at is null
              or academic_year = if(
                  extract(month from administered_at) <= 6,
                  extract(year from administered_at),
                  extract(year from administered_at) + 1
              )
    columns:
      - name: assessment_id
        data_type: int64
      - name: title
        data_type: string
      - name: description
        data_type: string
      - name: user_id
        data_type: int64
      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp
      - name: administered_at
        data_type: date
      - name: code_scope_id
        data_type: int64
      - name: code_subject_area_id
        data_type: int64
      - name: reports_db_virtual_table_id
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: local_assessment_id
        data_type: string
      - name: intel_assess_guid
        data_type: string
      - name: guid
        data_type: string
      - name: tags
        data_type: string
      - name: edusoft_guid
        data_type: string
      - name: performance_band_set_id
        data_type: int64
      - name: als_guid
        data_type: string
      - name: curriculum_associate_guid
        data_type: string
      - name: allow_duplicates
        data_type: boolean
      - name: itembank_assessment_id
        data_type: int64
      - name: locked
        data_type: boolean
      - name: show_in_parent_portal
        data_type: boolean
      - name: administration_window_start_date
        data_type: date
      - name: administration_window_end_date
        data_type: date
      - name: is_hybrid_x_obsolete
        data_type: boolean
      - name: assessment_type
        data_type: string
      - name: duplicate_from_assessment_id
        data_type: int64
      - name: creator_local_user_id
        data_type: string
      - name: creator_username
        data_type: string
      - name: creator_first_name
        data_type: string
      - name: creator_last_name
        data_type: string
      - name: creator_email_1
        data_type: string
      - name: performance_band_set_description
        data_type: string
      - name: scope
        data_type: string
        description: Conditional on code_translation, is_grade_k_1.
      - name: subject_area
        data_type: string
      - name: academic_year_clean
        data_type: int64
        description: Derived from academic_year.
