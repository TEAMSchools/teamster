    columns:
      - name: repository_id
        data_type: int64
      - name: repository_row_id
        data_type: int64
      - name: student_id
        data_type: int64
      - name: field_name
        data_type: string
      - name: value
        data_type: string
        description: The value of the item stored in an alpha field.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gen
            source_column: value
      - name: title
        data_type: string
