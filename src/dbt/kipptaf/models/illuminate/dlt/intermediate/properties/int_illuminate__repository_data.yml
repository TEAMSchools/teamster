          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: title
      - name: scope
        data_type: string
      - name: subject_area
        data_type: string
      - name: date_administered
        data_type: date
      - name: field_label
        data_type: string
      - name: local_student_id
        data_type: int64
