models:
  - name: int_illuminate__performance_band_sets
    # config:
    #   materialized: table
    columns:
      - name: performance_band_set_id
        data_type: int64
      - name: description
        data_type: string
        description: The description of the assignment.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: district_default
        data_type: boolean
      - name: hidden
        data_type: boolean
      - name: user_id
        data_type: int64
      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp
      - name: deleted_at
        data_type: timestamp
      - name: performance_band_id
        data_type: int64
      - name: color
        data_type: string
        description:
          "Indicates the color displayed for the assignment. Valid values: Red,
          Yellow, Blue, Orange,Purple, Green, etc... Required."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__districtteachercategory
            source_column: color
      - name: is_mastery
        data_type: boolean
      - name: label
        data_type: string
      - name: label_number
        data_type: numeric
      - name: minimum_value
        data_type: float64
      - name: maximum_value
        data_type: float64
        description:
          Derived from label_number, minimum_value, performance_band_set_id.
