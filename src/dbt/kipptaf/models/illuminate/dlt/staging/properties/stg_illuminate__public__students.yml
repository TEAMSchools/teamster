    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - local_student_id
    columns:
      - name: student_id
        data_type: int64
      - name: local_student_id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
