      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp
      - name: deleted_at
        data_type: timestamp
      - name: body
        data_type: string
      - name: sort_order
        data_type: string
      - name: is_rubric
        data_type: bool
      - name: sheet_label
        data_type: string
