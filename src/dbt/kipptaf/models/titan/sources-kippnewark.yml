sources:
  - name: kippnewark_titan
    schema:
      "{%- if target.name == 'dev' -%}zz_{{ env_var('GITHUB_USER', 'dev') }}_{%-
      elif target.name == 'staging' -%}zz_stg_{%- endif -%}kippnewark_titan"
    tables:
      - name: stg_titan__person_data
        config:
          meta:
            dagster:
              group: titan
              asset_key:
                - kippnewark
                - titan
                - stg_titan__person_data
      - name: stg_titan__income_form_data
        config:
          enabled: false
          meta:
            dagster:
              group: titan
              asset_key:
                - kippnewark
                - titan
                - stg_titan__income_form_data
