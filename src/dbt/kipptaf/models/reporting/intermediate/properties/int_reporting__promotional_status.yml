models:
  - name: int_reporting__promotional_status
    columns:
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: term_name
        data_type: string
      - name: ada_term_running
        data_type: float64
      - name: n_absences_y1_running
        data_type: float64
      - name: n_absences_y1_running_non_susp
        data_type: float64
      - name: iready_reading_recent
        data_type: string
      - name: iready_math_recent
        data_type: string
      - name: n_failing
        data_type: int64
      - name: n_failing_core
        data_type: int64
      - name: projected_credits_cum
        data_type: float64
      - name: projected_credits_y1_term
        data_type: float64
      - name: dibels_composite_level_recent_str
        data_type: string
      - name: dibels_composite_level_recent
        data_type: int64
      - name: star_math_level_recent
        data_type: int64
      - name: star_reading_level_recent
        data_type: int64
      - name: fast_ela_level_recent
        data_type: int64
      - name: fast_math_level_recent
        data_type: int64
      - name: attendance_status
        data_type: string
      - name: attendance_status_hs_detail
        data_type: string
      - name: academic_status
        data_type: string
      - name: exemption
        data_type: string
      - name: overall_status
        data_type: string
        description:
          Categorical mapping of academic_status, attendance_status,
          grade_level, n_failing_core, region.
