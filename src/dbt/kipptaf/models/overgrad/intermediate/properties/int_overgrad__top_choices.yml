models:
  - name: int_overgrad__top_choices
    description: >
      Student-level pivot of Overgrad top-choice school data, enriched with ECC
      and application outcomes from KIPPADB. One row per student. When a student
      has tagged multiple schools with the same rank, the first school
      alphabetically is used for all rank-specific columns.
    columns:
      - name: contact_id
        data_type: string
        description: Salesforce contact ID.
        data_tests:
          - unique:
              config:
                severity: error
      - name: has_overgrad_1st_choice
        data_type: boolean
        description: >-
          Derived from top_choice_schools.
      - name: overgrad_1st_choice_school_name
        data_type: string
        description: >-
          Derived from rn_choice_dedup, top_choice_schools, university_name.
      - name: overgrad_2nd_choice_school_name
        data_type: string
        description: >-
          Derived from rn_choice_dedup, top_choice_schools, university_name.
      - name: overgrad_3rd_choice_school_name
        data_type: string
        description: >-
          Derived from rn_choice_dedup, top_choice_schools, university_name.
      - name: overgrad_1st_choice_ecc
        data_type: numeric
        description: >-
          Derived from adjusted_6_year_minority_graduation_rate,
          rn_choice_dedup, top_choice_schools.
      - name: overgrad_1st_choice_is_submitted
        data_type: boolean
        description: >-
          Derived from is_submitted, rn_choice_dedup, top_choice_schools.
      - name: overgrad_1st_choice_is_accepted
        data_type: boolean
        description: >-
          Derived from is_accepted, rn_choice_dedup, top_choice_schools.
