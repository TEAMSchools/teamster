models:
  - name: int_overgrad__top_choices
    description: >
      Student-level pivot of Overgrad top-choice school data, enriched with
      ECC and application outcomes from KIPPADB. One row per student.
      When a student has tagged multiple schools with the same rank, the first
      school alphabetically is used for all rank-specific columns.
    data_tests:
      - unique:
          column_name: contact_id
          config:
            store_failures: true
    columns:
      - name: contact_id
        data_type: string
        description: Salesforce contact ID.
      - name: has_overgrad_1st_choice
        data_type: boolean
        description: >
          True if the student has tagged at least one school as #1 Choice in
          Overgrad.
      - name: overgrad_1st_choice_school_name
        data_type: string
        description: >
          Name of the student's #1 Choice school in Overgrad. When multiple
          schools share the #1 Choice rank, the first alphabetically is used.
      - name: overgrad_2nd_choice_school_name
        data_type: string
        description: >
          Name of the student's #2 Choice school in Overgrad. When multiple
          schools share the #2 Choice rank, the first alphabetically is used.
      - name: overgrad_3rd_choice_school_name
        data_type: string
        description: >
          Name of the student's #3 Choice school in Overgrad. When multiple
          schools share the #3 Choice rank, the first alphabetically is used.
      - name: overgrad_1st_choice_ecc
        data_type: numeric
        description: >
          Adjusted 6-year minority graduation rate (ECC) for the student's
          #1 Choice school, sourced from the KIPPADB account record matched
          on IPEDS ID. Null if the school has no matching KIPPADB account.
      - name: overgrad_1st_choice_is_submitted
        data_type: boolean
        description: >
          True if the student has a submitted KIPPADB application to their
          #1 Choice school. False if a KIPPADB application exists but has not
          been submitted. Null if no matching KIPPADB application record exists.
      - name: overgrad_1st_choice_is_accepted
        data_type: boolean
        description: >
          True if the student has an accepted KIPPADB application to their
          #1 Choice school. False if a KIPPADB application exists but was not
          accepted. Null if no matching KIPPADB application record exists.
