models:
  - name: int_overgrad__choice_counts
    description: >
      Student-level rollup of Overgrad top-choice school rankings. One row per
      student. Counts how many schools the student has tagged as #1, #2, or #3
      Choice in Overgrad, and flags students who have tagged more than one
      school with the same rank (a data quality issue).
    columns:
      - name: contact_id
        data_type: string
        description: >
          Salesforce contact ID (sourced from student__external_student_id in
          Overgrad admissions records).
        data_tests:
          - unique:
              config:
                severity: error
      - name: n_overgrad_1st_choice
        data_type: int64
        description: Derived from top_choice_schools. #1 Choice in Overgrad.
      - name: n_overgrad_2nd_choice
        data_type: int64
        description: Derived from top_choice_schools. #2 Choice in Overgrad.
      - name: n_overgrad_3rd_choice
        data_type: int64
        description: Derived from top_choice_schools. #3 Choice in Overgrad.
      - name: has_duplicate_overgrad_1st_choice
        data_type: boolean
        description: Derived from top_choice_schools. #1 Choice.
      - name: has_duplicate_overgrad_2nd_choice
        data_type: boolean
        description: Derived from top_choice_schools. #2 Choice.
      - name: has_duplicate_overgrad_3rd_choice
        data_type: boolean
        description: Derived from top_choice_schools. #3 Choice.
