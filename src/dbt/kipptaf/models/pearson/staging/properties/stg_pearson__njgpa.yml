models:
  - name: stg_pearson__njgpa
    config:
      materialized: table
    columns:
      - name: subject_area
        data_type: string
        description:
          Normalized from `subject` ('English Language Arts/Literacy' → 'English
          Language Arts').
      - name: module_code
        data_type: string
        description:
          Normalized from `testcode` (SC05/SC08/SC11 remapped to
          SCI05/SCI08/SCI11).
      - name: administration_period
        data_type: string
        description: Normalized from `period` ('FallBlock' → 'Fall').
      - name: _dbt_source_project
        data_type: string
        description: Source project
          (extract_code_location(_dbt_source_relation)) — e.g., 'kippnewark' /
          'kippcamden'. Per #3142, materialized at the union model so consumers don't re-derive per-call.
      - name: test_date
        data_type: date
        description:
          Earliest online unit start date across all attempted units, or the
          paper attempt create date when no online unit datetimes are present.
          Null when no unit datetime or paper date is available.
