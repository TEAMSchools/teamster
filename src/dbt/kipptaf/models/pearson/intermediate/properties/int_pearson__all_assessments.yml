models:
  - name: int_pearson__all_assessments
    description: >
      Network-level union of Pearson state assessment results (PARCC, NJSLA,
      NJSLA Science, NJGPA) enriched with student crosswalk lookups and
      standardized metadata. Computes aligned demographic labels, proficiency
      banding, and subject/test-code normalization for use in reporting and
      demographic comparison models.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - studenttestuuid
    columns:
      - name: _dbt_source_relation
        data_type: string
        description: Source relation identifier from dbt_utils.union_relations.

      - name: academic_year
        data_type: int64
        description: Academic year the assessment was administered.

      - name: americanindianoralaskanative
        data_type: string
        description: >
          American Indian or Alaska Native race indicator from Pearson ('Y' or
          null).

      - name: asian
        data_type: string
        description: Asian race indicator from Pearson ('Y' or null).

      - name: assessment_name
        data_type: string
        description: Assessment program name (e.g. NJSLA, NJGPA, PARCC).

      - name: assessmentgrade
        data_type: string
        description: Assessment grade level as reported by Pearson.

      - name: assessmentyear
        data_type: string
        description: Assessment year as reported by Pearson (string format).

      - name: blackorafricanamerican
        data_type: string
        description:
          Black or African American race indicator from Pearson ('Y' or null).

      - name: discipline
        data_type: string
        description: Subject discipline category (Math, ELA, Science, etc.).

      - name: hispanicorlatinoethnicity
        data_type: string
        description:
          Hispanic or Latino ethnicity indicator from Pearson ('Y' or null).

      - name: is_proficient
        data_type: boolean
        description:
          Whether the student scored at or above the proficiency threshold.

      - name: is_bl_fb
        data_type: boolean
        description: >
          Whether the student scored at the Below or Far Below proficiency band.

      - name: nativehawaiianorotherpacificislander
        data_type: string
        description: >
          Native Hawaiian or Other Pacific Islander race indicator from Pearson
          ('Y' or null).

      - name: period
        data_type: string
        description: >
          Testing period from Pearson (e.g. Spring, FallBlock); used to derive
          admin and season. Spring is the only period officially reported.

      - name: firstname
        data_type: string
        description: Student first name as reported by Pearson.

      - name: lastorsurname
        data_type: string
        description: Student last name or surname as reported by Pearson.

      - name: subject
        data_type: string
        quote: true
        description:
          Full subject name as reported by Pearson (e.g. English Language
          Arts/Literacy, Mathematics).

      - name: testcode
        data_type: string
        description: Raw test code from Pearson (e.g. ELA05, SC08, ALG01).

      - name: studenttestuuid
        data_type: string
        description:
          Globally unique identifier for the student's test-taking event.

      - name: test_grade
        data_type: int64
        description: Numeric grade level at which the test was taken.

      - name: testperformancelevel_text
        data_type: string
        description:
          Performance level label as reported by Pearson (e.g. 'Level 4').

      - name: testperformancelevel
        data_type: float64
        description: Numeric performance level as reported by Pearson.

      - name: testscalescore
        data_type: float64
        description: Student's raw scale score on the assessment.

      - name: testscorecomplete
        data_type: float64
        description: Score completeness indicator as reported by Pearson.

      - name: twoormoreraces
        data_type: string
        description: Two or more races indicator from Pearson ('Y' or null).

      - name: white
        data_type: string
        description: White race indicator from Pearson ('Y' or null).

      - name: results_type
        data_type: string
        description:
          Always 'Actual' for Pearson results (no preliminary scores).

      - name: district_state
        data_type: string
        description: >
          Network district/state identifier; always 'KTAF NJ' for this model.

      - name: statestudentidentifier
        data_type: string
        description: State student identifier cast to string.

      - name: localstudentidentifier
        data_type: int64
        description: >
          Local student identifier — resolved from the Pearson student crosswalk
          when available, otherwise the raw value from the source file. Used to
          work around incorrect studentidentifiers provided during testing.

      - name: aligned_test_code
        data_type: string
        description: >
          Test code normalized for stacked reporting across assessment programs
          — science codes SC05, SC08, SC11 are remapped to SCI05, SCI08, SCI11
          to match the standard codes used across all sources; all other codes
          pass through unchanged.

      - name: race_ethnicity
        data_type: string
        description: >
          Single-character race/ethnicity code derived from Pearson indicator
          flags using a priority hierarchy (T, H, I, A, B, P, W).

      - name: illuminate_subject
        data_type: string
        description: >
          Standardized subject label for Illuminate/reporting — ELA subjects map
          to 'Text Study'; Algebra I, Algebra II, and Geometry map to
          'Mathematics'; all others pass through unchanged.

      - name: njsla_aggregated_proficiency
        data_type: string
        description: >
          Aggregated proficiency band for NJSLA: levels 1-2 = 'Below/Far Below',
          level 3 = 'Approaching', level 4+ = 'At/Above'; null for non-NJSLA
          assessments.

      - name: lep_status
        data_type: boolean
        description: >
          Whether the student is classified as an English Learner/EL, derived
          from the englishlearnerel indicator.

      - name: iep_status
        data_type: string
        description: >
          IEP status label — 'Has IEP' when studentwithdisabilities is 'IEP' or
          'B', otherwise 'No IEP'.

      - name: admin
        data_type: string
        quote: true
        description: >
          Testing administration period with 'FallBlock' normalized to 'Fall';
          reserved word alias for Tableau.

      - name: season
        data_type: string
        description: >
          Testing season with 'FallBlock' normalized to 'Fall'; same logic as
          admin.

      - name: aligned_subject
        data_type: string
        description: >
          Subject normalized for stacked reporting across assessment programs —
          'English Language Arts/Literacy' is shortened to 'English Language
          Arts' to match the label used in other sources; all other subjects
          pass through unchanged.

      - name: is_proficient_int
        data_type: int64
        description:
          Integer representation of is_proficient (1 = true, 0 = false).

      - name: aligned_aggregate_ethnicity
        data_type: string
        description: >
          Race/ethnicity label normalized for stacked reporting across
          assessment programs — expands the single-character race_ethnicity code
          to a full label (e.g. B = 'African American', H = 'Hispanic') that
          matches the demographic labels used in comparison sources; null maps
          to 'Blank'.

      - name: aligned_ml_status
        data_type: string
        description: >
          Multilingual learner status normalized for stacked reporting across
          assessment programs — 'ML' when lep_status is true, 'Not ML'
          otherwise, using the label convention shared across comparison
          sources.

      - name: aligned_iep_status
        data_type: string
        description: >
          IEP status normalized for stacked reporting across assessment programs
          — 'Students With Disabilities' or 'Students Without Disabilities',
          using the label convention shared across comparison sources.
