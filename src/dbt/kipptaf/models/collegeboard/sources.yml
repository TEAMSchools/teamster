sources:
  - name: collegeboard
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      {%- endif -%}kipptaf_collegeboard
    tables:
      - name: src_collegeboard__psat
        external:
          location: "{{ var('cloud_storage_uri_base') }}/collegeboard/psat/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix:
              "{{ var('cloud_storage_uri_base') }}/collegeboard/psat/"
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              group: collegeboard
              asset_key:
                - kipptaf
                - collegeboard
                - psat
      - name: src_collegeboard__ap
        external:
          location: "{{ var('cloud_storage_uri_base') }}/collegeboard/ap/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix:
              "{{ var('cloud_storage_uri_base') }}/collegeboard/ap/"
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              group: collegeboard
              asset_key:
                - kipptaf
                - collegeboard
                - ap
      - name: src_collegeboard__sat
        external:
          location: "{{ var('cloud_storage_uri_base') }}/collegeboard/sat/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              group: collegeboard
              asset_key:
                - kipptaf
                - collegeboard
                - sat
