models:
  - name: int_fldoe__all_assessments
    description: >-
      Union of FLDOE state assessment results (EOC, FAST, Science, FSA) across
      kippmiami source relations, sourced from the kippmiami
      int_fldoe__all_assessments intermediate which resolves student_number via
      the FLEID lookup. Joined to the iReady scale-score crosswalk to expose
      sublevel and points-to-proficiency / points-to-growth derivations.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - student_id
              - academic_year
              - administration_window
              - assessment_subject
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: test_code
        data_type: string
      - name: academic_year
        data_type: int64
      - name: administration_window
        data_type: string
      - name: season
        data_type: string
      - name: discipline
        data_type: string
      - name: assessment_subject
        data_type: string
      - name: scale_score
        data_type: int64
      - name: achievement_level
        data_type: string
      - name: is_proficient
        data_type: boolean
      - name: assessment_grade
        data_type: string
      - name: performance_level
        data_type: int64
      - name: student_id
        data_type: string
      - name: assessment_name
        data_type: string
      - name: student_number
        data_type: int64
        description: >-
          PowerSchool student_number resolved in the upstream kippmiami
          int_fldoe__all_assessments model by joining FLDOE student_id (FLEID)
          to stg_powerschool__u_studentsuserfields.fleid. Null when no PS Miami
          student carries the matching FLEID.
      - name: sublevel_number
        data_type: int64
      - name: sublevel_name
        data_type: string
      - name: achievement_level_int
        data_type: int64
      - name: scale_for_proficiency
        data_type: int64
        description: Conditional on scale_low, sublevel_number.
      - name: points_to_proficiency
        data_type: int64
        description: Conditional on scale_low, scale_score, sublevel_number.
      - name: scale_for_growth
        data_type: int64
        description: Conditional on scale_high, sublevel_number.
      - name: points_to_growth
        data_type: int64
        description: Conditional on scale_high, scale_score, sublevel_number.
      - name: scale_score_prev
        data_type: int64
        description:
          LAG of scale_score partitioned by student_id, academic_year,
          assessment_subject ordered by administration_window.
