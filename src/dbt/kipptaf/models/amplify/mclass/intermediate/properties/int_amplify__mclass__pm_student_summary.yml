models:
  - name: int_amplify__mclass__pm_student_summary
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: surrogate_key
        data_type: string
        description:
          "Hash of student_primary_id, school_year, pm_period, measure, and
          probe_number. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.surrogate_key."
      - name: alternate_assessment
        data_type: string
      - name: approved_accommodations
        data_type: string
      - name: assessing_teacher_name
        data_type: string
        description:
          "Name of the teacher who administered the assessment. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessing_teacher_name."
      - name: assessment_edition
        data_type: string
        description:
          "Assessment edition (e.g., 'DIBELS 8th Edition'). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessment_edition."
      - name: assessment
        data_type: string
        description:
          "Assessment name (e.g., 'mCLASS'). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessment."
      - name: classed
        data_type: string
      - name: date_of_birth
        data_type: string
        description:
          "Student date of birth. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.date_of_birth."
      - name: disability
        data_type: string
        description:
          "Disability indicator. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.disability."
      - name: district_name
        data_type: string
        description:
          "District name. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.district_name."
      - name: district_primary_id
        data_type: string
        description:
          "District primary identifier. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.district_primary_id."
      - name: economically_disadvantaged
        data_type: string
        description:
          "Economically disadvantaged indicator. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.economically_disadvantaged."
      - name: ell_status
        data_type: string
        description:
          "English Language Learner status. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.ell_status."
      - name: english_proficiency
        data_type: string
      - name: enrollment_date
        data_type: string
      - name: external_program
        data_type: string
      - name: gender
        data_type: string
        description:
          "Student gender. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.gender."
      - name: hispanic_or_latino_ethnicity
        data_type: string
        description:
          "Hispanic or Latino ethnicity indicator. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.hispanic_or_latino_ethnicity."
      - name: home_language
        data_type: string
        description:
          "Student home language. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.home_language."
      - name: iep_status
        data_type: string
        description:
          "Individualized Education Program status. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.iep_status."
      - name: internal_program
        data_type: string
      - name: meal_status
        data_type: string
        description:
          "Free/reduced meal status. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.meal_status."
      - name: migrant
        data_type: string
        description:
          "Migrant status indicator. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.migrant."
      - name: municipality_name
        data_type: string
      - name: municipality_primary_id
        data_type: string
      - name: primary_id_student_number
        data_type: int64
      - name: race
        data_type: string
        description:
          "Student race. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.race."
      - name: reporting_class_id
        data_type: string
      - name: reporting_class_name
        data_type: string
      - name: school_name
        data_type: string
        description:
          "School name. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.school_name."
      - name: school_year
        data_type: string
        description:
          "School year range (e.g., '2025-2026'). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.school_year."
      - name: secondary_school_id
        data_type: string
      - name: section_504
        data_type: string
        description:
          "Section 504 plan indicator. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.section_504."
      - name: special_education
        data_type: string
        description:
          "Special education status. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.special_education."
      - name: specific_disability
        data_type: string
        description:
          "Specific disability category. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.specific_disability."
      - name: state
        data_type: string
        description:
          "State abbreviation. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.state."
      - name: student_first_name
        data_type: string
        description:
          "Student first name. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.student_first_name."
      - name: student_id_district_id
        data_type: int64
      - name: student_id_state_id
        data_type: string
      - name: student_last_name
        data_type: string
        description:
          "Student last name. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.student_last_name."
      - name: student_middle_name
        data_type: string
      - name: student_primary_id
        data_type: int64
        description:
          "Student primary identifier (student number). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.student_primary_id."
      - name: title_1
        data_type: string
      - name: measure
        data_type: string
        description:
          "Expanded measure name with abbreviation (e.g., 'Reading Fluency
          (ORF)'). Unmapped values pass through. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.measure."
      - name: pm_period
        data_type: string
        description:
          "Progress monitoring period (e.g., 'BOY->MOY'). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.pm_period."
      - name: probe_number
        data_type: int64
        description:
          "Probe sequence number within the PM period. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.probe_number."
      - name: total_number_of_probes
        data_type: int64
        description:
          "Total number of probes expected in the PM period. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.total_number_of_probes."
      - name: _dagster_partition_fiscal_year
        data_type: int64
      - name: _dagster_partition_date
        data_type: date
      - name: _dagster_partition_hour
        data_type: int64
      - name: _dagster_partition_minute
        data_type: int64
      - name: sync_date
        data_type: date
        description:
          "Date the assessment data was synced. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.sync_date."
      - name: assessing_teacher_staff_id
        data_type: string
        description:
          "Staff ID of the assessing teacher. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessing_teacher_staff_id."
      - name: assessment_grade
        data_type: string
        description:
          "Grade level of the assessment administered. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessment_grade."
      - name: enrollment_grade
        data_type: string
        description:
          "Student enrollment grade level. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.enrollment_grade."
      - name: primary_id_student_id_district_id
        data_type: int64
      - name: measure_standard_score
        data_type: numeric
        description:
          "Raw assessment score, cast from the source score column. Source:
          Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.measure_standard_score."
      - name: measure_standard_score_change
        data_type: numeric
      - name: academic_year
        data_type: int64
        description:
          "Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.academic_year."
      - name: measure_name_code
        data_type: string
        description:
          "Short measure abbreviation extracted from the expanded measure name
          parenthetical (e.g., 'ORF' from 'Reading Fluency (ORF)'). Source:
          Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.measure_name_code."
      - name: region
        data_type: string
      - name: measure_name
        data_type: string
        description:
          "Full measure name derived from measure_name_code (e.g., 'Oral Reading
          Fluency'). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.measure_name."
      - name: assessment_grade_int
        data_type: int64
        description:
          "Assessment grade as integer (K mapped to 0). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessment_grade_int."
      - name: enrollment_grade_int
        data_type: int64
        description:
          "Enrollment grade as integer (K mapped to 0). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.enrollment_grade_int."
      - name: school
        data_type: string
      - name: multi_district_organization_name
        data_type: string
        description:
          "Multi-district organization name. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.multi_district_organization_name."
      - name: reporting_group_name
        data_type: string
        description:
          "Reporting group name. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.reporting_group_name."
      - name: school_primary_id
        data_type: int64
        description:
          "School primary identifier. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.school_primary_id."
      - name: enrollment_class_name
        data_type: string
        description:
          "Enrollment class name(s), pipe-delimited when multiple. Source:
          Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.enrollment_class_name."
      - name: enrollment_class_id
        data_type: string
        description:
          "Enrollment class ID(s), pipe-delimited when multiple. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.enrollment_class_id."
      - name: assessment_class_name
        data_type: string
        description:
          "Class name for the assessment context. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessment_class_name."
      - name: assessment_class_id
        data_type: string
        description:
          "Class ID for the assessment context. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.assessment_class_id."
      - name: title_i
        data_type: string
        description:
          "Title I participation indicator. Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline.title_i."
      - name: _dagster_partition_key
        data_type: string
        description:
          "Dagster partition key (school year). Source: Amplify
          stg_amplify__mclass__sftp__pm_student_summary_aimline._dagster_partition_key."
      - name: additional_student_id_primarysisid
        data_type: int64
      - name: assessing_teacher_staff_id_teachernumber
        data_type: string
      - name: official_teacher_staff_id
        data_type: string
      - name: official_teacher_name
        data_type: string
      - name: client_date
        data_type: date
