models:
  - name: int_amplify__all_assessments
    columns:
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: region
        data_type: string
      - name: student_number
        data_type: int64
      - name: assessment_type
        data_type: string
      - name: assessment_grade
        data_type: string
        description: Grade level of the assessment administered.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: assessment_grade
      - name: assessment_grade_int
        data_type: int64
        description: Assessment grade as integer (K mapped to 0).
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: assessment_grade_int
      - name: period
        data_type: string
      - name: round_number
        data_type: int64
      - name: month_round
        data_type: string
      - name: start_date
        data_type: date
      - name: end_date
        data_type: date
      - name: matching_season
        data_type: string
      - name: client_date
        data_type: date
      - name: sync_date
        data_type: date
        description: Date the assessment data was synced.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: sync_date
      - name: measure_name
        data_type: string
        description:
          Full measure name derived from measure_name_code (e.g., 'Oral Reading
          Fluency').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: measure_name
      - name: measure_name_code
        data_type: string
        description:
          Short measure abbreviation extracted from the expanded measure name
          parenthetical (e.g., 'ORF' from 'Reading Fluency (ORF)').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: measure_name_code
      - name: measure_standard
        data_type: string
      - name: measure_standard_score
        data_type: float64
        description: Raw assessment score, cast from the source score column.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: measure_standard_score
      - name: measure_standard_level
        data_type: string
      - name: measure_standard_level_int
        data_type: int64
      - name: measure_percentile
        data_type: float64
      - name: measure_semester_growth
        data_type: string
      - name: measure_year_growth
        data_type: string
      - name: probe_number
        data_type: int64
        description: Probe sequence number within the PM period.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: probe_number
      - name: total_number_of_probes
        data_type: int64
        description: Total number of probes expected in the PM period.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: total_number_of_probes
      - name: score_change
        data_type: numeric
      - name: boy_probe_eligible
        data_type: string
      - name: moy_probe_eligible
        data_type: string
      - name: boy_composite
        data_type: string
      - name: moy_composite
        data_type: string
      - name: eoy_composite
        data_type: string
      - name: benchmark_goal_season
        data_type: string
      - name: aggregated_measure_standard_level
        data_type: string
      - name: foundation_measure_standard_level
        data_type: string
      - name: overall_probe_eligible
        data_type: string
      - name: actual_row_count
        data_type: int64
