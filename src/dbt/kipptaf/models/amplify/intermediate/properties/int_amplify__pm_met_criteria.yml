models:
  - name: int_amplify__pm_met_criteria
    columns:
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: region
        data_type: string
      - name: admin_season
        data_type: string
      - name: assessment_grade
        data_type: string
        description: Grade level of the assessment administered.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: assessment_grade
      - name: assessment_grade_int
        data_type: int64
        description: Assessment grade as integer (K mapped to 0).
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: assessment_grade_int
      - name: measure_standard
        data_type: string
      - name: round_number
        data_type: int64
      - name: benchmark_goal
        data_type: int64
      - name: round_growth_words_goal
        data_type: int64
      - name: cumulative_growth_words
        data_type: int64
      - name: pm_goal_criteria
        data_type: string
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: measure_name_code
        data_type: string
        description:
          Short measure abbreviation extracted from the expanded measure name
          parenthetical (e.g., 'ORF' from 'Reading Fluency (ORF)').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: measure_name_code
      - name: measure_standard_score
        data_type: float64
        description: Raw assessment score, cast from the source score column.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: measure_standard_score
      - name: start_date
        data_type: date
      - name: end_date
        data_type: date
      - name: completed_test_round
        data_type: boolean
      - name: met_measure_standard_goal
        data_type: int64
      - name: met_admin_benchmark_goal
        data_type: int64
      - name: met_measure_name_code_goal
        data_type: int64
      - name: met_pm_round_criteria
        data_type: int64
      - name: met_pm_round_overall_criteria
        data_type: int64
