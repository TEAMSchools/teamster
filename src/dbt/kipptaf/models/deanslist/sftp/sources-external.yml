sources:
  - name: deanslist
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      {%- endif -%}kipptaf_deanslist
    tables:
      - name: src_deanslist__reconcile_attendance
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/deanslist/reconcile_attendance/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - deanslist
                - reconcile_attendance
      - name: src_deanslist__reconcile_suspensions
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/deanslist/reconcile_suspensions/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - deanslist
                - reconcile_suspensions
