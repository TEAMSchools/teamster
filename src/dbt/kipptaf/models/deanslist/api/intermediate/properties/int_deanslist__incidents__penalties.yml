models:
  - name: int_deanslist__incidents__penalties
    config:
      materialized: table
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: |-
              start_date is null or start_date >= '2000-01-01'
          config:
            severity: warn
      - dbt_utils.expression_is_true:
          arguments:
            expression: |-
              end_date is null or end_date >= '2000-01-01'
          config:
            severity: warn
    columns:
      - name: school_id
        data_tests:
          - relationships:
              arguments:
                to: ref("stg_google_sheets__people__location_crosswalk")
                field: deanslist_school_id
