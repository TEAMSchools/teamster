models:
  - name: int_deanslist__incidents
    config:
      materialized: table
    columns:
      - name: location_key
        data_type: string
        description: >
          MD5 surrogate key for the canonical school location. Null when
          school_id does not match any deanslist_school_id in
          stg_google_sheets__people__locations.
        data_tests:
          - relationships:
              arguments:
                to: ref("dim_locations")
                field: location_key
