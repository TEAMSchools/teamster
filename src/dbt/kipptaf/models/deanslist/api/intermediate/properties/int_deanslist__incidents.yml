models:
  - name: int_deanslist__incidents
    config:
      materialized: table
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: |-
              close_ts_date is null or close_ts_date >= '2000-01-01'
          config:
            severity: warn
    columns:
      - name: location_key
        data_type: string
        description: >
          MD5 surrogate key for the canonical school location. Null when
          school_id does not match any deanslist_school_id in
          stg_google_sheets__people__locations.
        data_tests:
          - relationships:
              arguments:
                to: ref("dim_locations")
                field: location_key
