models:
  - name: dim_staff_cube_access
    description: >-
      Cube access configuration per staff member. One row per Google email.
      Determines which Cube views and columns each user can query. Currently a
      hardcoded data-team allowlist; will be derived from the staff roster per
      spec 2026-06-03-cube-security-redesign (#4102).
    data_tests:
      - unique:
          column_name: staff_google_email
    columns:
      - name: staff_google_email
        description:
          Staff Google Workspace email — matches the email claim in the Cube
          JWT.
        data_type: string
        constraints:
          - type: not_null
            warn_unsupported: false
      - name: student_access_level
        description: >-
          Access tier for student-domain views. 'detail' allows row-level views;
          'summary' allows summary views only; null means no student data
          access.
        data_type: string
      - name: staff_access_level
        description: >-
          Access tier for staff-domain views. 'detail' allows row-level views;
          'summary' allows summary views only; null means no staff data access.
        data_type: string
      - name: student_pii
        description: >-
          TRUE if user may see student PII columns (full_name, birth_date,
          lea/state identifiers) in detail views.
        data_type: boolean
      - name: staff_pii
        description: >-
          TRUE if user may see staff PII columns (personal contact info, DOB, AD
          username, staff_unique_id) in detail views.
        data_type: boolean
      - name: staff_compensation
        description: TRUE if user may see compensation columns (wages, rates).
        data_type: boolean
      - name: staff_benefits
        description: TRUE if user may see benefits data.
        data_type: boolean
      - name: location_scope
        description: >-
          Row-level location scope. 'network' = no filter (all locations);
          'region' = filtered to location_scope_key region; 'school' = filtered
          to location_scope_key school abbreviation.
        data_type: string
      - name: location_scope_key
        description: >-
          The specific region key or school abbreviation for region/school
          scopes. Null for network scope.
        data_type: string
