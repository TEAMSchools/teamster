models:
  - name: dim_staff_cube_access
    description: >-
      Cube access-control resolution, one row per active primary staff member
      keyed on staff_key. Resolves each person's current role to the student
      location scope, the staff sensitive-field remit (location + department),
      and the per-field sensitive scopes, derived from the current primary work
      assignment and the Google Sheets access crosswalks (department
      special-access override taking precedence over the role mapping). Read by
      cube.js's resolveAccess, matched on google_email, to build the
      securityContext groups and location/department allow-lists that each
      view's access_policy reads; not exposed as a Cube. The staff directory and
      aggregate summary are open — these scopes only constrain sensitive fields.
      Unresolved roles emit 'none' (deny), never NULL.
    data_tests:
      # The all_in_scope and teaching_staff PII policies AND both remit axes
      # (allowed_abbreviations from staff_location_scope, allowed_department_groups
      # from staff_department_scope) with no fallback, so a none on EITHER axis
      # empties the remit → IN () → zero PII rows, silently. reporting_chain
      # ignores the remit and reporting_chain_or_below_rank falls back to the
      # staff_key chain, so neither is guarded here. A remit-scoped viewer missing
      # an axis is a resolution bug, not intended state.
      - dbt_utils.expression_is_true:
          arguments:
            expression: |
              staff_pii_scope not in ('all_in_scope', 'teaching_staff')
              or (
                staff_location_scope != 'none'
                and staff_department_scope != 'none'
              )
          config:
            severity: warn
    columns:
      - name: staff_key
        data_type: string
        description: >-
          Primary key — generate_surrogate_key([employee_number]), matching
          dim_staff.
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: google_email
        data_type: string
        description: >-
          Resolve-only lookup for the Cube JWT boundary; the active+primary
          Google email so a recycled address cannot resolve to a stale identity.
        data_tests:
          - not_null:
              config:
                severity: warn
          - unique:
              config:
                severity: warn

      - name: region_key
        data_type: string
        description: >-
          Viewer's region identity key (from dim_locations). cube.js filters on
          this for a region location scope. NULL when location does not resolve.

      - name: location_abbreviation
        data_type: string
        description: >-
          Viewer's school abbreviation (from dim_locations). cube.js filters on
          this for a school location scope. NULL when location does not resolve.

      - name: department_group
        data_type: string
        description: >-
          Viewer's functional department grouping from the rollup crosswalk;
          cube.js filters on this for an own_group department scope.

      - name: entity
        data_type: string
        description: >-
          KTAF or Region, derived from business_unit_name (KIPP TEAM and Family
          Schools Inc. = KTAF, all others = Region).

      - name: job_function_code
        data_type: string
        description: Current ADP job function code (CHIEF, SL, TEACH, ...).

      - name: job_function_level
        data_type: int64
        description: >-
          Org rank from the role crosswalk (1 = Chief, 6 = Teacher); drives the
          below-rank branch of reporting_chain_or_below_rank. NULL when the role
          does not resolve.

      - name: student_location_scope
        data_type: string
        description: >-
          Student data location breadth — network, region, school, or none. The
          only gating on student data: a viewer with a non-none scope sees every
          student view and all fields, including PII.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]

      - name: staff_location_scope
        data_type: string
        description: >-
          Location remit bounding the staff sensitive fields — network, region,
          school, or none. Constrains rows only when a sensitive field is
          queried.
        data_tests:
          - accepted_values:
              arguments:
                values: [network, region, school, none]

      - name: staff_department_scope
        data_type: string
        description: >-
          Department remit bounding the staff sensitive fields — all, own_group,
          or none.
        data_tests:
          - accepted_values:
              arguments:
                values: [all, own_group, none]

      - name: staff_pii_scope
        data_type: string
        description: >-
          Staff PII field visibility — per-field sensitive scope enum (none,
          all_in_scope, reporting_chain_or_below_rank, reporting_chain,
          teaching_staff).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff

      - name: staff_compensation_scope
        data_type: string
        description: Staff compensation field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff

      - name: staff_observations_scope
        data_type: string
        description: Staff observation field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff

      - name: staff_benefits_scope
        data_type: string
        description: Staff benefits field visibility (same vocabulary).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - none
                  - all_in_scope
                  - reporting_chain_or_below_rank
                  - reporting_chain
                  - teaching_staff
