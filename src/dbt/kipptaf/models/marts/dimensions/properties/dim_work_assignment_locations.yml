models:
  - name: dim_work_assignment_locations
    description: >-
      Work assignment location dimension with derived Type 2 SCD tracking. One
      row per assignment x location change point. Detects changes to the
      canonical location_key only — address mutations on the same canonical
      location no longer cut redundant SCD2 boundaries. FK to
      dim_staff_work_assignments via work_assignment_key; FK to dim_locations
      via location_key.
    columns:
      - name: work_assignment_location_key
        data_type: string
        description: >-
          Surrogate primary key derived from item_id and effective_date_start.
          Generated with generate_surrogate_key(["item_id",
          "effective_date_start"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Foreign key to dim_staff_work_assignments. Surrogate key derived from
          item_id. Generated with generate_surrogate_key(["item_id"]).
        constraints:
          - type: foreign_key
            to: ref('dim_staff_work_assignments')
            to_columns: [work_assignment_key]
            warn_unsupported: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: location_key
        data_type: string
        description: >-
          Canonical location FK. Resolved upstream in
          int_adp_workforce_now__workers__work_assignments via the canonical
          master on adp_location_code. NULL when the ADP location has no
          canonical mapping.
        constraints:
          - type: foreign_key
            to: ref('dim_locations')
            to_columns: [location_key]
            warn_unsupported: false
        data_tests:
          # TODO: #3686 — adp_location vs dim_locations.location_name coverage
          # gap (same class as #3672). Promote to error once crosswalk is clean.
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key

      - name: effective_start_date
        data_type: date
        description: >-
          Date this location version was first observed, derived from the daily
          partition date where the location_key changed.

      - name: effective_end_date
        data_type: date
        description: >-
          Last date this location version was effective. Computed as one day
          before the next version's effective_start_date, or 9999-12-31 for the
          current version.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if this is the most recent location version for the work
          assignment (effective_end_date = 9999-12-31).
