models:
  - name: dim_assessment_targets
    description: >-
      Assessment performance targets dimension. One row per academic year x
      school x state assessment code x grade level x subject area. Contains
      percent-proficient goals at grade, school, region, organization, and band
      levels. Sourced from the academic goals Google Sheet.
    columns:
      - name: assessment_target_key
        data_type: string
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: location_key
        data_type: string
        description: >-
          Surrogate key.

      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: school_id
        data_type: int64
        description: >-
          PowerSchool school number.

      - name: state_assessment_code
        data_type: string
        description: >-
          State assessment test code (e.g., ELA05, ALG1, SCI08).

      - name: illuminate_subject_area
        data_type: string
        description: >-
          Subject area label as used in Illuminate.

      - name: assessment_grade_level
        data_type: int64
        description: >-
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: grade_level
      - name: grade_goal
        data_type: float64
        description: >-
          Target percent proficient for this grade level.

      - name: school_goal
        data_type: float64
        description: >-
          Target percent proficient for this school.

      - name: region_goal
        data_type: float64
        description: >-
          Target percent proficient for this region.

      - name: organization_goal
        data_type: float64
        description: >-
          Organization-wide target percent proficient.

      - name: grade_band_goal
        data_type: float64
        description: >-
          Target percent proficient for this grade band (ES, MS, HS).

      - name: assessment_band_goal
        data_type: float64
        description: >-
          Target percent proficient for this assessment band.

      - name: school_level
        data_type: string
        description: >-
          School level classification (ES, MS, HS).

      - name: region
        data_type: string
        description: >-
          Network region (Newark, Camden, Miami, Paterson).
