models:
  - name: dim_job_postings
    description: >-
      Job posting dimension. One row per unique job posting identified by the
      combination of job_title, department_internal, and job_city. Deduplicates
      SmartRecruiters application records to a single posting per
      title-department-city grain, keeping the most recently opened posting.
    columns:
      - name: job_posting_key
        data_type: string
        description: >-
          Surrogate primary key derived from job_title, department_internal, and
          job_city. Generated with generate_surrogate_key(["job_title",
          "department_internal", "job_city"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: position_title
        data_type: string
        description: Title of the job posting as entered in SmartRecruiters.

      - name: department_name
        data_type: string
        description: >-
          Internal department name associated with the job posting in
          SmartRecruiters.

      - name: organizational_hierarchy
        data_type: string
        description: >-
          Organizational hierarchy field value for the department, used for
          reporting rollups in SmartRecruiters.

      - name: city
        data_type: string
        description:
          City where the job posting is located as entered in SmartRecruiters.

      - name: recruiter_names
        data_type: string
        description: >-
          Name(s) of the recruiter(s) assigned to the job posting in
          SmartRecruiters.
