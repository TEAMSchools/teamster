models:
  - name: dim_staff_observation_rubric_measurements
    description: >-
      Measurement item dimension for staff observation rubrics. One row per
      measurement item per rubric. Contains the measurement name, strand
      (measurement group) hierarchy, and weighting. Foreign keys to
      dim_staff_observation_rubrics via staff_observation_rubric_key.
    columns:
      - name: staff_observation_rubric_measurement_key
        data_type: string
        description: >-
          Surrogate primary key derived from rubric_id and measurement_id.
          Generated with generate_surrogate_key(["mgm.rubric_id",
          "mgm.measurement_id"]).
        data_tests:
          - unique
          - not_null

      - name: staff_observation_rubric_key
        data_type: string
        description: >-
          Foreign key to dim_staff_observation_rubrics. Surrogate key derived
          from rubric_id.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_observation_rubrics')
                field: staff_observation_rubric_key

      - name: measurement_name
        data_type: string
        description: >-
          Display name of the measurement item from the measurements catalog.

      - name: measurement_description
        data_type: string
        description: >-
          Description of the measurement item from the measurements catalog.

      - name: measurement_scale_min
        data_type: int64
        description: >-
          Minimum possible score for this individual measurement.

      - name: measurement_scale_max
        data_type: int64
        description: >-
          Maximum possible score for this individual measurement.

      - name: strand_name
        data_type: string
        description: >-
          Name of the measurement group (strand) this measurement belongs to.

      - name: strand_key
        data_type: string
        description: >-
          Short key code for the strand within the rubric.

      - name: strand_weight
        data_type: int64
        description: >-
          Weight of the strand in overall rubric score calculation.

      - name: strand_description
        data_type: string
        description: >-
          Description of the measurement group (strand).

      - name: measurement_key
        data_type: string
        description: >-
          Short key code for the measurement within its strand.

      - name: measurement_weight
        data_type: float64
        description: >-
          Weight of this measurement within its strand for score calculation.

      - name: is_private_measurement
        data_type: boolean
        description: >-
          TRUE if this measurement is marked private within the rubric.

      - name: is_required
        data_type: boolean
        description: >-
          TRUE if this measurement is required to be scored during observation.

      - name: is_excluded
        data_type: boolean
        description: >-
          TRUE if this measurement is excluded from scoring calculations.
