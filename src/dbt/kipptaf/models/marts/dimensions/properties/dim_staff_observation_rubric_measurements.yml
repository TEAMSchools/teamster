models:
  - name: dim_staff_observation_rubric_measurements
    description: >-
      Measurement item dimension for staff observation rubrics. One row per
      measurement item per rubric. Contains the measurement name, strand
      (measurement group) hierarchy, and weighting. Foreign keys to
      dim_staff_observation_rubrics via staff_observation_rubric_key.
    columns:
      - name: staff_observation_rubric_measurement_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: staff_observation_rubric_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_observation_rubrics')
                field: staff_observation_rubric_key

      - name: rubric_id
        data_type: string
        description: >-
          SchoolMint Grow rubric identifier this measurement belongs to.

      - name: measurement_id
        data_type: string
        description: >-
          SchoolMint Grow unique identifier for the measurement item.

      - name: measurement_name
        data_type: string
        description: >-
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: measurement_description
        data_type: string
        description: >-
          The description of the assignment.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: measurement_row_style
        data_type: string
        description: >-
          Row display style for the measurement in SchoolMint Grow UI.

      - name: measurement_scale_min
        data_type: int64
        description: >-
          Minimum possible score for this individual measurement.

      - name: measurement_scale_max
        data_type: int64
        description: >-
          Maximum possible score for this individual measurement.

      - name: measurement_group_id
        data_type: string
        description: >-
          SchoolMint Grow identifier for the measurement group (strand).

      - name: strand_name
        data_type: string
        description: >-
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: strand_key
        data_type: string
        description: >-
          Short key code for the strand within the rubric.

      - name: strand_weight
        data_type: int64
        description: >-
          The overall weight of this assignment. This value multiplied by Points
          Possible shows the actualpoints of this assignment for total possible
          points for this section. Defaults to 1.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: weight
      - name: strand_description
        data_type: string
        description: >-
          The description of the assignment.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: measurement_key
        data_type: string
        description: >-
          Short key code for the measurement within its strand.

      - name: measurement_weight
        data_type: float64
        description: >-
          The overall weight of this assignment. This value multiplied by Points
          Possible shows the actualpoints of this assignment for total possible
          points for this section. Defaults to 1.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: weight
      - name: is_private_measurement
        data_type: boolean
        description: >-
          TRUE if this measurement is marked private within the rubric.

      - name: require_measurement
        data_type: boolean
        description: >-
          TRUE if this measurement is required to be scored during observation.

      - name: exclude_measurement
        data_type: boolean
        description: >-
          TRUE if this measurement is excluded from scoring calculations.
