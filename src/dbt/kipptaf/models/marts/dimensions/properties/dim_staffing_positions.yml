models:
  - name: dim_staffing_positions
    description: >-
      Staffing position dimension. Type 2 slowly-changing dimension — one row
      per budgeted position per version (snapshot interval). Sourced from the
      AppSheet seat tracker via dbt snapshot. Contains department, position
      title, location, staffing status, active flag, and mid-year-hire flag for
      each position version. Foreign keys to dim_locations (location_key) and
      dim_staff for the position incumbent and recruiter as role-playing
      dimensions (both nullable).
    columns:
      - name: staffing_position_key
        data_type: string
        description: >-
          Surrogate primary key derived from dbt_scd_id (snapshot row
          identifier). Generated with generate_surrogate_key(["dbt_scd_id"]).
        data_tests:
          - unique
          - not_null

      - name: location_key
        data_type: string
        description: >-
          Foreign key to dim_locations. Surrogate key derived from adp_location
          (home work location name).
        data_tests:
          # TODO: #3686 — adp_location vs dim_locations.location_name coverage
          # gap (same class as #3672). Promote to error once crosswalk is clean.
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
              config:
                severity: warn

      - name: incumbent_staff_key
        data_type: string
        description: >-
          Foreign key to dim_staff for the incumbent (staff member filling the
          position). Surrogate key derived from the teammate employee number.
          Nullable — open positions have no incumbent.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: recruiter_staff_key
        data_type: string
        description: >-
          Foreign key to dim_staff for the assigned recruiter. Surrogate key
          derived from the recruiter employee number. Nullable — positions may
          have no assigned recruiter.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: staffing_position_natural_key
        data_type: string
        description: >-
          The dbt snapshot SCD identifier (dbt_scd_id). Uniquely identifies this
          specific version of a staffing position.

      - name: academic_year
        data_type: int64
        description: >-
          Academic year this position version belongs to.

      - name: recruitment_group
        data_type: string
        description: >-
          Grouping used to assign recruiting responsibility for this position.

      - name: home_department_name
        data_type: string
        description: >-
          ADP department name for this position (adp_dept from seat tracker).

      - name: title
        data_type: string
        description:
          ADP job title for this position (adp_title from seat tracker).

      - name: is_active
        data_type: boolean
        description: >-
          Whether this position is active in the staffing plan. True when
          plan_status is 'Active' or 'TRUE'; false otherwise (including
          'Inactive' and null).

      - name: status
        data_type: string
        description: >-
          Current staffing status of this position version (e.g., Open,
          Staffed).

      - name: status_detail
        data_type: string
        description: >-
          Detailed status label providing context for status (e.g., New Hire,
          Transfer In, Backfill).

      - name: is_mid_year_hire
        data_type: boolean
        description: >-
          TRUE if this position is flagged as a mid-year hire in the seat
          tracker.

      - name: effective_start_date
        data_type: date
        description: >-
          Date this version of the position became effective (dbt_valid_from
          cast to date).

      - name: effective_end_date
        data_type: date
        description: >-
          Date this version of the position expired (dbt_valid_to cast to date).
          NULL for the current active version.
