models:
  - name: dim_terms
    description: >-
      Generalized term/period dimension. One row per named period per region.
      Covers academic terms, performance management rounds, survey windows,
      assessment administration windows, and fiscal periods. Region is nullable
      for org-wide periods like fiscal quarters. Conformed dimension joinable
      from any fact or dimension that operates within a defined time period.
    columns:
      - name: term_key
        data_type: string
        description: >-
          Surrogate key derived from term type, code, name, start date, region,
          and school ID.
        data_tests:
          - unique
          - not_null

      - name: term_type
        data_type: string
        description: >-
          Indicates the Type of the day, such as Holiday, In Session, or Not in
          Session.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: type
      - name: term_code
        data_type: string
        description: >-
          The code value that is stored in the database, such as Home and Work
          for phone types and Mand F for gender types. Indexed with the Code
          Type column. Required

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__codeset
            source_column: code
      - name: term_name
        data_type: string
        description: >-
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: term_start_date
        data_type: date
        description: >-
          The start date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: start_date
      - name: term_end_date
        data_type: date
        description: >-
          The end date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: end_date
      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: fiscal_year
        data_type: int64
        description: >-
          Fiscal year this period falls within.

      - name: region
        data_type: string
        description: >-
          Region this period applies to. Nullable for org-wide periods.

      - name: school_id
        data_type: int64
        description: >-
          PowerSchool school ID. Nullable when the period is region-wide.

      - name: grade_band
        data_type: string
        description: >-
          Grade band (ES, MS, HS). Nullable when not school-specific.

      - name: lockbox_date
        data_type: date
        description: >-
          Date after which grades are locked for this period.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if the current date falls within this period, or if the period is
          the latest for its type in a past academic year.

      - name: powerschool_year_id
        data_type: int64
        description: >-
          PowerSchool year_id for joining to PowerSchool term tables.

      - name: powerschool_term_id
        data_type: int64
        description: >-
          PowerSchool term_id for joining to PowerSchool term tables.
