models:
  - name: dim_assessment_administrations
    description: >-
      Per-scheduled-occurrence dimension paralleling dim_survey_administrations.
      One row per distinct administration event, identified by an 8-input
      surrogate key: assessment_type, module_code, administered_date,
      academic_year, _dbt_source_project, administration_period,
      source_assessment_id, and test_type. Covers internal Illuminate
      assessments, NJ and FL state assessments, Official college-entrance
      assessments (SAT, ACT, PSAT), AP assessments, and Practice
      college-entrance assessments. Branches that do not populate a given
      scheduling column carry a typed NULL for that column (e.g. Illuminate and
      AP carry NULL administration_period; state branches carry NULL
      source_assessment_id).
    columns:
      - name: assessment_administration_key
        data_type: string
        description: >-
          Surrogate key derived from assessment_type, module_code,
          administered_date, academic_year, _dbt_source_project,
          administration_period, source_assessment_id, and test_type. Primary
          key.
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: assessment_key
        data_type: string
        description: >-
          FK to dim_assessments. Resolves to the canonical-representative member
          row for Illuminate (the canonical id is itself the representative
          member id) and the 1:1 row for state assessments. Lets consumers read
          canonical descriptors (title, academic_subject, type,
          grade_level_tested, module_type) without denormalizing them onto this
          dim.
        constraints:
          - type: foreign_key
            to: ref('dim_assessments')
            to_columns: [assessment_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_assessments')
                field: assessment_key

      - name: administered_date_key
        data_type: date
        description: >-
          FK to dim_dates. Date the assessment administration occurred. Null for
          sources that don't capture an exact date (state, AP) -- the
          administration is identified by academic_year and
          administration_period instead.
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
              # Three upstream rows carry sentinel dates (1900-01-01,
              # 1982-02-27) outside dim_dates' 2000-01-01 floor.
              config:
                where: administered_date_key >= '2000-01-01'

      - name: _dbt_source_project
        data_type: string
        description: >-
          Dagster code location identifying the district the administration is
          scoped to (kippnewark, kippcamden, kippmiami, kipppaterson). Null for
          college-entrance and AP assessments which are region-agnostic. For
          Illuminate, derived by unnesting the regions_assessed list — a
          multi-region assessment produces one row per district.

      - name: administration_period
        data_type: string
        description: >-
          The scheduling period that distinguishes one administration of the
          same assessment from another within the same academic year. For
          college-entrance assessments (Official and Practice), this is the
          College Board administration round (e.g. Sept, Oct, Nov). For NJ state
          assessments, this is the testing season (Fall, Winter, Spring), with
          the upstream value FallBlock normalized to Fall. For FL state
          assessments, this is the administration window as reported by FLDOE.
          Null for Illuminate and AP assessments.

      - name: source_assessment_id
        data_type: int64
        description: >-
          Illuminate assessment identifier carried through to the administration
          grain. Populated for Illuminate assessments only; null for all other
          branches. Acts as a discriminator within the hash so that
          region-specific copies of the same Illuminate module checkpoint remain
          distinct administration rows.

      - name: test_type
        data_type: string
        description: >-
          Distinguishes Official from Practice administrations for
          college-entrance assessments. Values are Official or Practice. Null
          for all non-college branches (Illuminate, state, AP).
