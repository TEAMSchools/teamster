models:
  - name: dim_work_assignment_jobs
    description: >-
      Work assignment job dimension with derived Type 2 SCD tracking. One row
      per assignment x job change point. Detects changes to jobTitle and jobCode
      via daily payload-hash comparison. FK to dim_staff_work_assignments via
      work_assignment_key.
    columns:
      - name: work_assignment_job_key
        data_type: string
        description: >-
          Surrogate primary key derived from item_id and effective_date_start.
          Generated with generate_surrogate_key(["item_id",
          "effective_date_start"]).
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Foreign key to dim_staff_work_assignments. Surrogate key derived from
          item_id. Generated with generate_surrogate_key(["item_id"]).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: job_title
        data_type: string
        description: >-
          Free-text job title for the work assignment, from ADP WorkAssignment
          jobTitle.

      - name: job_code
        data_type: string
        description: >-
          ADP job code value for the work assignment, from WorkAssignment
          jobCode.codeValue.

      - name: job_code_name
        data_type: string
        description: >-
          Display name for the job code, coalesced from longName and shortName
          of WorkAssignment jobCode.

      - name: effective_date_start
        data_type: date
        description: >-
          Date this job version was first observed, derived from the daily
          partition date where the job attribute hash changed.

      - name: effective_date_end
        data_type: date
        description: >-
          Last date this job version was effective. Computed as one day before
          the next version's effective_date_start, or 9999-12-31 for the current
          version.

      - name: is_current_record
        data_type: boolean
        description: >-
          TRUE if this is the most recent job version for the work assignment
          (effective_date_end = 9999-12-31).
