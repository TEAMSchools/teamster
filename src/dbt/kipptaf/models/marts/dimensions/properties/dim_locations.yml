models:
  - name: dim_locations
    description: >-
      School and office location dimension. One row per school or office.
      Conformed dimension. Region context is reached via the region_key FK to
      dim_regions. Campus is a physical site grouping where multiple schools
      share a building.
    columns:
      - name: location_key
        data_type: string
        description: >-
          Surrogate key derived from location name.
        data_tests:
          - unique
          - not_null

      - name: region_key
        data_type: string
        description: >-
          Foreign key to dim_regions. Surrogate key derived from the canonical
          region. Nullable when the location has no region mapping (e.g.,
          network-level locations).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_regions')
                field: region_key

      - name: location_name
        data_type: string
        description: >-
          Canonical location name.

      - name: abbreviation
        data_type: string
        description: >-
          Short display name for the location.

      - name: grade_band
        data_type: string
        description: >-
          Grade band served (ES, MS, HS).

      - name: campus
        data_type: string
        description: >-
          Physical campus name. Multiple schools may share a campus.

      - name: is_campus
        data_type: boolean
        description: >-
          TRUE if this location record represents a campus-level entity.
