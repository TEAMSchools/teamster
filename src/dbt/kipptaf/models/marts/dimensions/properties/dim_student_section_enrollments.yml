models:
  - name: dim_student_section_enrollments
    description: >-
      Student section enrollment dimension. One row per CC record — each
      enrollment of a student into a section. Multiple rows per student x
      section are possible when a student drops and re-enrolls in the same
      section within a year. FK to dim_student_enrollments via
      student_enrollment_key, dim_course_sections via course_section_key, and
      dim_terms via term_key (nullable when CC term does not map to a reporting
      term).
    columns:
      - name: student_section_enrollment_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          District-assigned student identification number. Surrogate key.

      - name: course_section_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          Surrogate key.

      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: date_enrolled
        data_type: date
        description: >-
          Date the student enrolled in this section (cc_dateenrolled from
          PowerSchool).

      - name: date_left
        data_type: date
        description: >-
          Date the student left this section (cc_dateleft from PowerSchool).

      - name: is_dropped_section
        data_type: boolean
        description: >-
          TRUE if this specific section enrollment was dropped by the student
          mid-term, as determined by PowerSchool sectionid sign and exit date
          logic.

      - name: is_dropped_course
        data_type: boolean
        description: >-
          TRUE if all enrollments for this student x course x year were dropped,
          meaning the entire course was abandoned rather than just a section
          transfer.

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_section_enrollment_key
