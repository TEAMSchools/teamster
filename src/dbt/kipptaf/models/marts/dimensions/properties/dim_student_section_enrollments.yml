models:
  - name: dim_student_section_enrollments
    description: >-
      Student section enrollment dimension. One row per CC record — each
      enrollment of a student into a section. Multiple rows per student x
      section are possible when a student drops and re-enrolls in the same
      section within a year. FK to dim_student_enrollments via
      student_enrollment_key, dim_course_sections via course_section_key,
      dim_terms via term_key (nullable when CC term does not map to a reporting
      term), and dim_staff via lead_teacher_staff_key.
    columns:
      - name: lead_teacher_staff_key
        data_type: string
        description: >-
          Staff key of the section's lead teacher — the section's teacher of
          record, resolved to a staff member via the staff roster. FK to
          dim_staff. Null when the section's teacher does not resolve to a staff
          record.
        constraints:
          - type: foreign_key
            to: ref('dim_staff')
            to_columns: [staff_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          Surrogate key derived from cc_dcid and _dbt_source_project. Primary
          key for this dimension — unique per CC record per region.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique:
              config:
                severity: error
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          Surrogate key derived from student_number, _dbt_source_project,
          academic_year, and entrydate. FK to dim_student_enrollments. Resolved
          to the school enrollment stint the section enrollment overlaps (the
          stint covering cc_dateenrolled when one exists, else the earliest
          overlapping stint). Null only when no enrollment stint overlaps the
          section enrollment.
        constraints:
          - type: foreign_key
            to: ref('dim_student_enrollments')
            to_columns: [student_enrollment_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key
      - name: course_section_key
        data_type: string
        description: >-
          Surrogate key derived from sections_dcid and _dbt_source_project. FK
          to dim_course_sections.
        constraints:
          - type: foreign_key
            to: ref('dim_course_sections')
            to_columns: [course_section_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_course_sections')
                field: course_section_key
      - name: term_key
        data_type: string
        description: >-
          Surrogate key derived from type, code, name, start_date, region, and
          school_id of the matching reporting term. FK to dim_terms. Null when
          the course-enrollment's term ID does not match any reporting term for
          the section's school and region.

        constraints:
          - type: foreign_key
            to: ref('dim_terms')
            to_columns: [term_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_terms')
                field: term_key
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year in which this section enrollment falls. The
          calendar year in which the academic year begins (e.g., 2025 for the
          2025-26 school year).

      - name: entry_date
        data_type: date
        description: >-
          Date the student enrolled in this section.

      - name: exit_date
        data_type: date
        description: >-
          Date the student left this section.

      - name: is_dropped_section
        data_type: boolean
        description: >-
          TRUE if this specific section enrollment was dropped by the student
          mid-term, determined by the combination of a negative section ID (drop
          marker) and an early exit date.

      - name: is_dropped_course
        data_type: boolean
        description: >-
          TRUE if all enrollments for this student x course x year were dropped,
          meaning the entire course was abandoned rather than just a section
          transfer.

      - name: is_homeroom
        data_type: boolean
        description: >-
          TRUE when the section is a homeroom section, identified by an HR
          course-number prefix. Never null — any other course is FALSE. To
          resolve a student's single current homeroom section and its teacher,
          use is_current_homeroom.

      - name: is_current_section_enrollment
        data_type: boolean
        description: >-
          TRUE for the current section enrollment among a student's sequential
          enrollments in the same course within an academic year — the
          most-recent enrollment, ranking active enrollments ahead of dropped
          ones. Never null; an all-dropped course still resolves one current
          row. General across all courses — for the homeroom teacher use
          is_current_homeroom, which collapses concurrent homerooms to one per
          stint.

      - name: is_current_homeroom
        data_type: boolean
        description: >-
          TRUE for the student's single current homeroom section within an
          enrollment stint — the most-recent homeroom among any sequential or
          concurrent homeroom enrollments. Never null; FALSE for non-homeroom
          sections. Guarantees one homeroom section per stint, so the homeroom
          teacher resolves without fan-out even in the rare data-quality case of
          concurrent homerooms (deduped to the most recent).
