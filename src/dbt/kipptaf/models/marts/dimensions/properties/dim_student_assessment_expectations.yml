models:
  - name: dim_student_assessment_expectations
    description: >-
      Student assessment expectation dimension. One row per student x internal
      assessment x administration window. Represents which assessments each
      student is expected to take based on their grade level and enrollment,
      scaffolded from Illuminate assessment metadata and student session
      affiliation. Only covers internal (Illuminate) assessments.
    columns:
      - name: student_assessment_expectation_key
        data_type: string
        description: >-
          Surrogate key derived from powerschool_student_number, assessment_id,
          and administered_at. Primary key.
        data_tests:
          - unique
          - not_null

      - name: assessment_key
        data_type: string
        description: >-
          FK to dim_assessments. Derived from assessment_type, title,
          subject_area, scope, module_code, and grade_level_id.

      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Derived from reporting term type, code, name,
          start_date, region, and school_id. Null when the administration date
          does not fall within any reporting term.

      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: assessment_id
        data_type: int64
        description: >-
          Illuminate assessment ID.

      - name: academic_year
        data_type: int64
        description: >-
          Academic year of the expected assessment.

      - name: administered_at
        data_type: date
        description: >-
          Scheduled administration date for the assessment.

      - name: assessment_title
        data_type: string
        description: >-
          Display name of the assessment.

      - name: subject_area
        data_type: string
        description: >-
          Subject area of the assessment.

      - name: scope
        data_type: string
        description: >-
          Assessment scope (e.g., CMA, CGI).

      - name: module_type
        data_type: string
        description: >-
          Module type (e.g., QA, CR).

      - name: module_code
        data_type: string
        description: >-
          Module code identifying the assessment variant.

      - name: grade_level_id
        data_type: int64
        description: >-
          Grade level ID the assessment targets.

      - name: powerschool_school_id
        data_type: int64
        description: >-
          PowerSchool school ID where the student is enrolled.

      - name: region
        data_type: string
        description: >-
          Network region (Newark, Camden, Miami, Paterson).

      - name: is_internal_assessment
        data_type: boolean
        description: >-
          Always TRUE for this model, which only includes internal Illuminate
          assessments.
