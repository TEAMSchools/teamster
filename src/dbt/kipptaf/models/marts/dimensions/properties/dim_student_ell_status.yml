models:
  - name: dim_student_ell_status
    description: >-
      SCD2 dimension capturing ELL (English Language Learner) status spans per
      student per district enrollment context. Newark + Camden + Paterson draw
      from PowerSchool `s_nj_stu_x` LEP date columns; Miami carries a single
      current-state span derived from PowerSchool enrollments +
      `studentcorefields.lep_status`. All spans are clipped to the student's
      PowerSchool enrollment range in the source district. Source is
      current-state — historical entry/exit/re-entry transitions that have been
      overwritten in PowerSchool are not recoverable.
    config:
      meta:
        dagster:
          group: marts
          asset_key:
            - kipptaf
            - marts
            - dim_student_ell_status
    columns:
      - name: student_ell_status_key
        data_type: string
        description: Surrogate primary key.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null
      - name: student_key
        data_type: string
        description: Foreign key to `dim_students.student_key`.
        constraints:
          - type: foreign_key
            to: ref('dim_students')
            to_columns: [student_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_students')
                field: student_key
      - name: student_enrollment_key
        data_type: string
        description: >-
          Foreign key to `dim_student_enrollments.student_enrollment_key`. Each
          status row is bound to exactly one enrollment stint (clipped to its
          entry/exit window at build time). Consumers join here directly rather
          than re-deriving the stint via date-range overlap.
        constraints:
          - type: foreign_key
            to: ref('dim_student_enrollments')
            to_columns: [student_enrollment_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key
      - name: _dbt_source_project
        data_type: string
        description: >-
          District context for this status span (`kippnewark`, `kippcamden`,
          `kippmiami`, `kipppaterson`). Part of the dim's grain — a student
          enrolled in two districts has independent ELL timelines under each.
          Consumers joining at student grain must include this column in the
          join key to avoid fan-out for cross-enrolled students.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [kippnewark, kippcamden, kippmiami, kipppaterson]
      - name: effective_date_start_key
        data_type: date
        description: >-
          First date this span is valid for the student in this district.
          Clipped to the later of the LEP record's begin date and the student's
          PowerSchool enrollment_start in the district.
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: effective_date_end_key
        data_type: date
        description: >-
          Last date this span is valid (inclusive). Clipped to the earlier of
          the LEP record's end date and the student's PowerSchool enrollment_end
          in the district. `'9999-12-31'` only when the student is currently
          active in the district AND the LEP record is open-ended.
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: is_current
        data_type: boolean
        description: True when `effective_date_end_key = '9999-12-31'`.
        data_tests:
          - not_null
      - name: is_ell
        data_type: boolean
        description: >-
          True for every emitted row. The dim is inclusion-based — rows exist
          only for `(student × district × span)` combinations where the student
          is classified ELL. Consumers default to `false` when no row covers the
          target date.
        data_tests:
          - not_null
