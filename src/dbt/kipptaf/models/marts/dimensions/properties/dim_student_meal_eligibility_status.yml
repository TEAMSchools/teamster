models:
  - name: dim_student_meal_eligibility_status
    description: >-
      SCD2 dimension capturing meal-eligibility (NSLP) status spans per student
      per district enrollment context. Newark + Camden draw from Titan with
      native effective dates; Paterson + Miami carry a single current-state span
      using the most recent PowerSchool `lunchstatus` value. All spans are
      clipped to the student's PowerSchool enrollment range in the source
      district — phantom Titan records for districts where the student was never
      enrolled drop out at the enrollment inner-join.
    config:
      meta:
        dagster:
          group: marts
          asset_key:
            - kipptaf
            - marts
            - dim_student_meal_eligibility_status
    constraints:
      - type: primary_key
        columns: [student_meal_eligibility_status_key]
        warn_unsupported: false
      - type: foreign_key
        columns: [student_key]
        expression: ref('dim_students')
        to_columns: [student_key]
        warn_unsupported: false
      - type: foreign_key
        columns: [student_enrollment_key]
        expression: ref('dim_student_enrollments')
        to_columns: [student_enrollment_key]
        warn_unsupported: false
      - type: foreign_key
        columns: [effective_date_start_key]
        expression: ref('dim_dates')
        to_columns: [date_key]
        warn_unsupported: false
      - type: foreign_key
        columns: [effective_date_end_key]
        expression: ref('dim_dates')
        to_columns: [date_key]
        warn_unsupported: false
    columns:
      - name: student_meal_eligibility_status_key
        data_type: string
        description: Surrogate primary key.
        data_tests:
          - unique
          - not_null

      - name: student_key
        data_type: string
        description: Foreign key to `dim_students.student_key`.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_students')
                field: student_key

      - name: student_enrollment_key
        data_type: string
        description: >-
          Foreign key to `dim_student_enrollments.student_enrollment_key`. Each
          status row is bound to exactly one enrollment stint (clipped to its
          entry/exit window at build time). Consumers join here directly rather
          than re-deriving the stint via date-range overlap.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key

      - name: _dbt_source_project
        data_type: string
        description: >-
          District context for this status span (`kippnewark`, `kippcamden`,
          `kippmiami`, `kipppaterson`). Part of the dim's grain — a student
          enrolled in two districts has independent meal-eligibility timelines
          under each. Consumers joining at student grain must include this
          column in the join key to avoid fan-out for cross-enrolled students.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [kippnewark, kippcamden, kippmiami, kipppaterson]

      - name: effective_date_start_key
        data_type: date
        description: >-
          First date this span is valid for the student in this district.
          Clipped to the later of the source eligibility record's start date and
          the student's PowerSchool enrollment_start in the district.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key

      - name: effective_date_end_key
        data_type: date
        description: >-
          Last date this span is valid (inclusive). Clipped to the earlier of
          the source eligibility record's end date and the student's PowerSchool
          enrollment_end in the district. `'9999-12-31'` only when the student
          is currently active in the district AND the source record is
          open-ended.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key

      - name: is_current
        data_type: boolean
        description: >-
          Convenience flag — true when `effective_date_end_key = '9999-12-31'`.
        data_tests:
          - not_null

      - name: is_meal_eligible
        data_type: boolean
        description: >-
          True when `meal_eligibility` indicates Free (`F`), Reduced (`R`), or
          Direct Certification (`FDC`). Paid (`P`) and Unknown resolve to false.
        data_tests:
          - not_null

      - name: meal_eligibility
        data_type: string
        description: >-
          Meal-eligibility classification code. Titan-sourced single-letter
          codes for Newark + Camden (`F` / `R` / `P`); raw `lunchstatus` from
          PowerSchool for Paterson + Miami (`F` / `R` / `P` / `FDC`). NULLs are
          coalesced to `Unknown`.
