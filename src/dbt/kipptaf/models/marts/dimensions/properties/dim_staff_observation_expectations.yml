models:
  - name: dim_staff_observation_expectations
    description: >-
      Observation expectation scaffold. One row per staff member x observation
      type term. Built by crossing active teaching staff from roster history
      with PM/walkthrough/O3 term windows from the reporting terms sheet.
      Enables tracking whether each teacher received their expected observations
      in each period. Foreign keys to dim_staff and dim_terms.
    columns:
      - name: staff_observation_expectation_key
        data_type: string
        description: >-
          Surrogate primary key derived from employee_number and term composite
          fields. Generated with generate_surrogate_key(["srh.employee_number",
          "t.type", "t.code", "t.name", "t.start_date", "t.region",
          "t.school_id"]).
        data_tests:
          - unique
          - not_null

      - name: staff_key
        data_type: string
        description: >-
          Foreign key to dim_staff. Surrogate key derived from employee_number.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: term_key
        data_type: string
        description: >-
          Foreign key to dim_terms. Surrogate key derived from term type, code,
          name, start_date, region, and school_id.
        data_tests:
          - not_null

      - name: employee_number
        data_type: int64
        description: >-
          KIPP-assigned unique identifier for the staff member.

      - name: term_type
        data_type: string
        description: >-
          Indicates the Type of the day, such as Holiday, In Session, or Not in
          Session.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: type
      - name: term_code
        data_type: string
        description: >-
          The code value that is stored in the database, such as Home and Work
          for phone types and Mand F for gender types. Indexed with the Code
          Type column. Required

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__codeset
            source_column: code
      - name: term_name
        data_type: string
        description: >-
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: term_start_date
        data_type: date
        description: >-
          The start date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: start_date
      - name: term_end_date
        data_type: date
        description: >-
          The end date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: end_date
      - name: region
        data_type: string
        description: >-
          Region the observation expectation applies to.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if the current date falls within this observation period.

      - name: job_title
        data_type: string
        description: >-
          Staff member's job title during the observation period.

      - name: assignment_status
        data_type: string
        description: >-
          Staff member's assignment status during the observation period.
