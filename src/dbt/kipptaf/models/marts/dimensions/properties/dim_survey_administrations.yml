models:
  - name: dim_survey_administrations
    description: >-
      Survey administration dimension. One row per survey x term combination.
      Each instance of a survey instrument in an administration window. FK to
      dim_surveys via survey_key and to dim_terms via term_key. Linearizes the
      path from any model to dim_terms -- dim_surveys is a pure definition and
      all temporal scoping flows through this model.
    columns:
      - name: survey_administration_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: survey_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: survey_id
        data_type: string
        description: >-
          Source system identifier for the survey instrument.

      - name: survey_name
        data_type: string
        description: >-
          Display name of the survey instrument for this administration.

      - name: term_code
        data_type: string
        description: >-
          Short code for the administration period (e.g., SCD, MGR1, SUP1).

      - name: term_name
        data_type: string
        description: >-
          Display name for the administration period from reporting terms.

      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: administration_status
        data_type: string
        description: >-
          Categorical mapping of term_end_date, term_start_date.

      - name: response_deadline
        data_type: date
        description: >-
          Last date responses are accepted, derived from the term end date.
