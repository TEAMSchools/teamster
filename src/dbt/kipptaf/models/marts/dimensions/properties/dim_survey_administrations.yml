models:
  - name: dim_survey_administrations
    description: >-
      Survey administration dimension. One row per survey x term combination.
      Each instance of a survey instrument in an administration window. FK to
      dim_surveys via survey_key and to dim_terms via term_key. Linearizes the
      path from any model to dim_terms -- dim_surveys is a pure definition and
      all temporal scoping flows through this model.
    columns:
      - name: survey_administration_key
        data_type: string
        description: >-
          Surrogate key derived from survey_id and term composite fields.
          Primary key for this dimension.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: survey_key
        data_type: string
        description: >-
          FK to dim_surveys. Surrogate key derived from survey_id.
        constraints:
          - type: foreign_key
            to: ref('dim_surveys')
            to_columns: [survey_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_surveys')
                field: survey_key
      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from term composite fields
          (type, code, name, start_date, region, school_id).
        constraints:
          - type: foreign_key
            to: ref('dim_terms')
            to_columns: [term_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_terms')
                field: term_key
      - name: academic_year
        data_type: int64
        description: >-
          Academic year this administration falls within.

      - name: response_deadline_date
        data_type: date
        description: >-
          Last date responses are accepted, derived from the term end date.

      - name: status
        data_type: string
        description: >-
          Current status of the administration window: open (currently accepting
          responses), closed (past deadline), or upcoming (not yet started).
