models:
  - name: dim_course_sections
    description: >-
      Course section dimension. One row per section instance per source region.
      Sections are discrete scheduled offerings of a course at a school. Teacher
      and term relationships are on bridge tables, not on this model. FK to
      dim_courses via course_key and dim_locations via location_key.
    columns:
      - name: course_section_key
        data_type: string
        description: >-
          Surrogate key derived from sections_dcid and _dbt_source_project.
          Primary key for this dimension.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: course_key
        data_type: string
        description: >-
          Surrogate key derived from courses_course_number and
          _dbt_source_project. FK to dim_courses.
        constraints:
          - type: foreign_key
            to: ref('dim_courses')
            to_columns: [course_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_courses')
                field: course_key
      - name: location_key
        data_type: string
        description: >-
          Surrogate key derived from location_clean_name. FK to dim_locations.
          Null when the section's school ID does not match any location in the
          crosswalk.

        constraints:
          - type: foreign_key
            to: ref('dim_locations')
            to_columns: [location_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
      - name: identifier
        data_type: string
        description: >-
          The section number associated with this class. This is implied by the
          Section ID but stored here forconvenience.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cc
            source_column: section_number
      - name: period
        data_type: string
        description: >-
          Period expression for this section. Encodes the days and periods when
          the section meets (e.g., '1(A-F)').

      - name: room
        data_type: string
        description: >-
          The room number the section is in. Not currently tied to the master
          scheduler — imported or entered manually.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sections
            source_column: room
