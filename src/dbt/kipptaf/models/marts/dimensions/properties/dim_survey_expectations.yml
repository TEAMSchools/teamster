models:
  - name: dim_survey_expectations
    description: >-
      Survey expectation dimension. One row per respondent x
      survey_administration. Scaffolded from business rules defining which
      respondents should complete which survey administrations. The
      respondent_population discriminator determines which respondent FK is
      populated (exactly one per row). LEFT JOIN to fct_survey_submissions on
      (respondent key, survey_administration_key) for expected-taken/missed
      analysis.
    columns:
      - name: survey_expectation_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: survey_administration_key
        data_type: string
        description: >-
          FK to dim_survey_administrations. Identifies which survey
          administration this expectation belongs to.
        data_tests:
          - not_null

      - name: respondent_population
        data_type: string
        description: >-
          Discriminator for respondent type: staff, student, or family.
          Determines which respondent FK is populated.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - staff
                  - student
                  - family

      - name: staff_key
        data_type: string
        description: >-
          FK to dim_staff. Populated when respondent_population is staff. Null
          for student and family respondents.

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Populated when respondent_population is
          student. Null for staff and family respondents.

      - name: student_contact_person_key
        data_type: string
        description: >-
          FK to dim_student_contact_persons. Populated when
          respondent_population is family. Null for staff and student
          respondents.
