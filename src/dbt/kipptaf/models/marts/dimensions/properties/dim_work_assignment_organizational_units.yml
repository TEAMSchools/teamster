models:
  - name: dim_work_assignment_organizational_units
    description: >-
      Work assignment organizational unit dimension with derived Type 2 SCD
      tracking. One row per assignment x assignment_type (home/assigned) x org
      unit change point. Detects changes to homeOrganizationalUnits[] and
      assignedOrganizationalUnits[] business unit, department, and cost number
      via daily payload-hash comparison. FK to dim_staff_work_assignments via
      work_assignment_key.
    columns:
      - name: work_assignment_organizational_unit_key
        data_type: string
        description: >-
          Surrogate primary key derived from item_id, assignment_type, and
          effective_date_start. Generated with
          generate_surrogate_key(["item_id", "assignment_type",
          "effective_date_start"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Foreign key to dim_staff_work_assignments. Surrogate key derived from
          item_id. Generated with generate_surrogate_key(["item_id"]).
        constraints:
          - type: foreign_key
            to: ref('dim_staff_work_assignments')
            to_columns: [work_assignment_key]
            warn_unsupported: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: assignment_type
        data_type: string
        description: >-
          Whether these organizational units come from homeOrganizationalUnits
          ('home') or assignedOrganizationalUnits ('assigned').

      - name: business_unit_code
        data_type: string
        description: >-
          Code value for the Business Unit organizational unit, from
          nameCode.codeValue where typeCode = 'Business Unit'.

      - name: business_unit_name
        data_type: string
        description: >-
          Display name for the Business Unit, coalesced from longName and
          shortName of the nameCode where typeCode = 'Business Unit'.

      - name: department_code
        data_type: string
        description: >-
          Code value for the Department organizational unit, from
          nameCode.codeValue where typeCode = 'Department'.

      - name: department_name
        data_type: string
        description: >-
          Display name for the Department, coalesced from longName and shortName
          of the nameCode where typeCode = 'Department'.

      - name: cost_center_code
        data_type: string
        description: >-
          Code value for the Cost Center organizational unit, from
          nameCode.codeValue where typeCode = 'Cost Number'.

      - name: cost_center_name
        data_type: string
        description: >-
          Display name for the Cost Center, coalesced from longName and
          shortName of the nameCode where typeCode = 'Cost Number'.

      - name: effective_start_date
        data_type: date
        description: >-
          Date this org unit version was first observed, derived from the daily
          partition date where the org unit attribute hash changed.

      - name: effective_end_date
        data_type: date
        description: >-
          Last date this org unit version was effective. Computed as one day
          before the next version's effective_start_date, or 9999-12-31 for the
          current version.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if this is the most recent org unit version for the work
          assignment and assignment type (effective_end_date = 9999-12-31).
