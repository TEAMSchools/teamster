models:
  - name: dim_work_assignment_reporting_relationships
    description: >-
      Work assignment reporting relationship dimension with derived Type 2 SCD
      tracking. One row per assignment x manager change point. Detects changes
      to reportsTo[] manager identity (associate OID and position ID) via daily
      payload-hash comparison. FK to dim_staff_work_assignments via
      work_assignment_key.
    columns:
      - name: work_assignment_reporting_relationship_key
        data_type: string
        description: >-
          Surrogate primary key derived from item_id and effective_date_start.
          Generated with generate_surrogate_key(["item_id",
          "effective_date_start"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Foreign key to dim_staff_work_assignments. Surrogate key derived from
          item_id. Generated with generate_surrogate_key(["item_id"]).
        constraints:
          - type: foreign_key
            to: ref('dim_staff_work_assignments')
            to_columns: [work_assignment_key]
            warn_unsupported: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: manager_staff_key
        data_type: string
        description: >-
          Surrogate key derived from the reporting manager's employee_number. FK
          to dim_staff identifying the manager this work assignment reports to.
          Null when the manager's associate_oid has no active number mapping in
          stg_people__employee_numbers.
        constraints:
          - type: foreign_key
            to: ref('dim_staff')
            to_columns: [staff_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: effective_start_date
        data_type: date
        description: >-
          Date this reporting relationship version was first observed, derived
          from the daily partition date where the manager attribute hash
          changed.

      - name: effective_end_date
        data_type: date
        description: >-
          Last date this reporting relationship version was effective. Computed
          as one day before the next version's effective_start_date, or
          9999-12-31 for the current version.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if this is the most recent reporting relationship version for the
          work assignment (effective_end_date = 9999-12-31).
