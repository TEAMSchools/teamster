models:
  - name: dim_staff_observation_types
    description: >-
      Observation type dimension. One row per observation type defined in
      SchoolMint Grow as a generic tag of type observationtypes. Contains the
      type name and abbreviation (e.g., Walkthrough/WT, O3, PM). Only includes
      non-archived types.
    columns:
      - name: staff_observation_type_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: observation_type_id
        data_type: string
        description: >-
          SchoolMint Grow generic tag identifier for the observation type.
        data_tests:
          - unique
          - not_null

      - name: observation_type_name
        data_type: string
        description: >-
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: observation_type_abbreviation
        data_type: string
        description: >-
          A short 1 or 2 character version of the Name, such as A.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cycle_day
            source_column: abbreviation
