models:
  - name: dim_dates
    description: >-
      Generated calendar date dimension. One row per calendar date from
      2000-01-01 through 9999-12-31. Conformed dimension joinable from any fact
      or dimension in the mart via DATE key.
    config:
      materialized: table
    columns:
      - name: date_key
        data_type: date
        description: >-
          Calendar date. Primary key and join target for all mart models.
        data_tests:
          - unique
          - not_null

      - name: date_timestamp
        data_type: timestamp
        description: >-
          Timestamp cast of date_key. Required by Cube for date dimension joins.

      - name: day_of_week
        data_type: int64
        description: >-
          Derived from date_value.

      - name: day_of_week_name
        data_type: string
        description: >-
          Derived from date_value.

      - name: day_of_month
        data_type: int64
        description: >-
          Derived from date_value.

      - name: day_of_year
        data_type: int64
        description: >-
          Derived from date_value.

      - name: week_of_year
        data_type: int64
        description: >-
          Derived from date_value.

      - name: month_number
        data_type: int64
        description: >-
          Derived from date_value.

      - name: month_name
        data_type: string
        description: >-
          Derived from date_value.

      - name: quarter_number
        data_type: int64
        description: >-
          Derived from date_value.

      - name: year_number
        data_type: int64
        description: >-
          Derived from date_value.

      - name: is_weekday
        data_type: boolean
        description: >-
          Derived from date_value.

      - name: academic_year
        data_type: int64
        description: >-
          Conditional on date_value.

      - name: fiscal_year
        data_type: int64
        description: >-
          Conditional on date_value.

      - name: week_start_date
        data_type: date
        description: >-
          Derived from date_value.

      - name: week_end_date
        data_type: date
        description: >-
          Derived from date_value.

      - name: week_start_monday
        data_type: date
        description: >-
          Derived from date_value.

      - name: week_end_sunday
        data_type: date
        description: >-
          Derived from date_value.
