models:
  - name: dim_dates
    description: >-
      Generated calendar date dimension. One row per calendar date from
      2000-01-01 through 9999-12-31. Conformed dimension joinable from any fact
      or dimension in the mart via DATE key.
    config:
      materialized: table
    columns:
      - name: date_key
        data_type: date
        description: >-
          Each day of the school year including holidays and weekends, such as
          the school day. Indexed.
        data_tests:
          - unique
          - not_null

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: date_value
      - name: date_timestamp
        data_type: timestamp
        description: >-
          Each day of the school year including holidays and weekends, such as
          the school day. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: date_value
      - name: day_of_week
        data_type: int64
        description: >-
          Derived from date_value.

      - name: day_of_week_name
        data_type: string
        description: >-
          Derived from date_value.

      - name: day_of_month
        data_type: int64
        description: >-
          Derived from date_value.

      - name: day_of_year
        data_type: int64
        description: >-
          Derived from date_value.

      - name: week_of_year
        data_type: int64
        description: >-
          Derived from date_value.

      - name: month_number
        data_type: int64
        description: >-
          Derived from date_value.

      - name: month_name
        data_type: string
        description: >-
          Derived from date_value.

      - name: quarter_number
        data_type: int64
        description: >-
          Derived from date_value.

      - name: year_number
        data_type: int64
        description: >-
          Derived from date_value.

      - name: is_weekday
        data_type: boolean
        description: >-
          Derived from date_value.

      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: fiscal_year
        data_type: int64
        description: >-
          Conditional on date_value.

      - name: week_start_date
        data_type: date
        description: >-
          Derived from date_value.

      - name: week_end_date
        data_type: date
        description: >-
          Derived from date_value.

      - name: week_start_monday
        data_type: date
        description: >-
          Derived from date_value.

      - name: week_end_sunday
        data_type: date
        description: >-
          Derived from date_value.
