models:
  - name: dim_work_assignment_status
    description: >-
      Work assignment status dimension with source-native Type 2 SCD tracking.
      One row per ADP work assignment x assignment status version. Uses
      assignmentStatus.effectiveDate from ADP (not the daily partition date) to
      define version boundaries. Deduplicates across daily partitions by
      (item_id, effectiveDate) before windowing.
    columns:
      - name: work_assignment_status_key
        data_type: string
        description: >-
          Surrogate primary key derived from item_id and effective_date_start.
          Generated with generate_surrogate_key(["item_id",
          "effective_date_start"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Foreign key to dim_staff_work_assignments. Surrogate key derived from
          item_id. Generated with generate_surrogate_key(["item_id"]).
        constraints:
          - type: foreign_key
            to: ref('dim_staff_work_assignments')
            to_columns: [work_assignment_key]
            warn_unsupported: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: status_code
        data_type: string
        description: >-
          ADP assignment status code value (e.g., 'A' for Active, 'T' for
          Terminated, 'L' for Leave), from
          assignmentStatus.statusCode.codeValue.

      - name: status_name
        data_type: string
        description: >-
          Display name for the assignment status, coalesced from longName and
          shortName of assignmentStatus.statusCode.

      - name: reason_code
        data_type: string
        description: >-
          ADP reason code for the status change (e.g., 'NEW', 'W' for voluntary,
          'DIS' for disability leave), from
          assignmentStatus.reasonCode.codeValue.

      - name: reason_name
        data_type: string
        description: >-
          Display name for the status reason, coalesced from longName and
          shortName of assignmentStatus.reasonCode.

      - name: effective_start_date
        data_type: date
        description: >-
          Date this status version became effective, from ADP
          assignmentStatus.effectiveDate.

      - name: effective_end_date
        data_type: date
        description: >-
          Last date this status version was effective. Computed as one day
          before the next version's effective_start_date, or 9999-12-31 for the
          current version.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if this is the most recent status version for the work assignment
          (effective_end_date = 9999-12-31).
