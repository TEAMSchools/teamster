models:
  - name: dim_school_calendars
    description: >-
      School calendar dimension. One row per date per school. Indicates whether
      each date is an in-session day and a membership day. Conformed dimension
      used by attendance (session validity) and assessments (school-day counts
      for progress monitoring goals). FK to dim_dates and dim_locations.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date_key
              - location_key

    columns:
      - name: date_key
        data_type: date
        description: >-
          Each day of the school year including holidays and weekends, such as
          the school day. Indexed.
        data_tests:
          - not_null

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: date_value
      - name: location_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: is_in_session
        data_type: boolean
        description: >-
          Indicates whether this day of the year is an actual school
          day.1=insession, 0=no (holiday, weekend, etc.)This is only used if all
          students attend school on the same date. Otherwise Tracks A-F are used
          to indicateinsession days. Derived from insession.

      - name: is_membership_day
        data_type: boolean
        description: >-
          The amount of a student's membership this school claims. If a student
          attends more than one school eachone will only be able to claim a
          certain portion of the membership. The largest number for this will
          usually be1 and fractions expressed as decimals. Like .5 or .25.
          Derived from membershipvalue.
