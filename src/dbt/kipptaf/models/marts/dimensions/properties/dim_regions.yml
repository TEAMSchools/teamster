models:
  - name: dim_regions
    description: >-
      Region reference dimension. One row per KIPP region. Conformed dimension
      joinable from any fact or dimension that carries a region context.
    columns:
      - name: region_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: region
        data_type: string
        description: >-
          Region name (Newark, Camden, Miami, Paterson).

      - name: state
        data_type: string
        description: >-
          State abbreviation.

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: state
      - name: timezone
        data_type: string
        description: >-
          IANA timezone identifier.

      - name: legal_entity
        data_type: string
        description: >-
          Legal entity name for this region in ADP.
