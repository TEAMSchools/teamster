models:
  - name: dim_regions
    config:
      materialized: table
    description: >-
      Region reference dimension. One row per KIPP region. Conformed dimension
      joinable from any fact or dimension that carries a region context.
    columns:
      - name: business_unit_code
        data_type: string
        description: |
          ADP business-unit code (KCNA, KIPP_MIAMI, KIPP_TAF, KPAT, TEAM). 1:1
          with regions. FK target for
          dim_work_assignment_organizational_units.business_unit_code.
        data_tests:
          - not_null
          - unique

      - name: region_key
        data_type: string
        description: >-
          Surrogate key derived from business_unit_code.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: name
        quote: true
        data_type: string
        description: >-
          Region name (Camden, Miami, Newark, Paterson, TAF).

      - name: state
        data_type: string
        description: >-
          US state (NJ or FL).

      - name: dagster_code_location
        data_type: string
        description: >-
          Dagster code-location identifier (e.g., `kippnewark`, `kippcamden`).
          Inverse of `business_unit_code`. Join key for marts that read
          `_dbt_source_project` on union models and need to derive a region.

      - name: timezone
        data_type: string
        description: >-
          IANA timezone identifier.

      - name: legal_entity
        data_type: string
        description: >-
          Legal entity name for this region in ADP.
