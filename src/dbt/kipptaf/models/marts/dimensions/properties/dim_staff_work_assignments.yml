models:
  - name: dim_staff_work_assignments
    description: >-
      Staff work assignment dimension. One row per ADP work assignment (current
      state only). Contains stable, low-churn assignment-level scalars: position
      identifiers, flags, FTE, payroll fields, dates, pay cycle, standard hours,
      wage law coverage, and worker time profile. Employee number is resolved
      via LEFT JOIN to stg_people__employee_numbers, so staff_key and
      employee_number may be null for work assignments whose employees are not
      in the staging employee numbers table. High-churn attributes (assignment
      status, job title, worker type, location, org units, reports-to,
      compensation) are tracked in separate Type 2 child models that FK to this
      via work_assignment_key.
    columns:
      - name: work_assignment_key
        data_type: string
        description: >-
          Surrogate key derived from item_id. Primary key for this dimension.
          Generated with generate_surrogate_key(["item_id"]).
        data_tests:
          - unique
          - not_null

      - name: staff_key
        data_type: string
        description: >-
          Surrogate key derived from employee_number. FK to dim_staff. Generated
          with generate_surrogate_key(["employee_number"]). Null when employee
          number lookup finds no match (inactive employees excluded from
          stg_people__employee_numbers in staging).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: employee_number
        data_type: int64
        description: >-
          KIPP-assigned unique identifier for the staff member who holds this
          work assignment, from stg_people__employee_numbers. Null when employee
          number lookup finds no match in staging.

      - name: item_id
        data_type: string
        description: >-
          ADP-assigned unique identifier for the work assignment (WorkAssignment
          itemID). Natural key for the assignment.
        data_tests:
          - not_null

      - name: position_id
        data_type: string
        description: >-
          ADP position identifier associated with this work assignment
          (WorkAssignment positionID).

      - name: primary_indicator
        data_type: boolean
        description: >-
          TRUE if this is the primary work assignment for the worker. A worker
          may have multiple assignments; at most one is primary.

      - name: management_position_indicator
        data_type: boolean
        description: >-
          TRUE if this work assignment is designated as a management position in
          ADP.

      - name: voluntary_indicator
        data_type: boolean
        description: >-
          TRUE if participation in this work assignment is voluntary (e.g.,
          stipend-based supplemental assignments).

      - name: full_time_equivalence_ratio
        data_type: float64
        description: >-
          FTE ratio for this work assignment as recorded in ADP. 1.0 represents
          full-time; fractional values represent part-time assignments.

      - name: payroll_file_number
        data_type: string
        description: >-
          Payroll file number associated with this work assignment in ADP, used
          to identify the worker in the payroll system.

      - name: payroll_group_code
        data_type: string
        description: >-
          Payroll group code for this work assignment, indicating which payroll
          processing group the assignment belongs to in ADP.

      - name: payroll_schedule_group_id
        data_type: string
        description: >-
          Payroll schedule group identifier for this work assignment, indicating
          the pay schedule cadence in ADP.

      - name: hire_date
        data_type: date
        description: >-
          Date the worker was hired into this work assignment, from ADP
          WorkAssignment hireDate.

      - name: actual_start_date
        data_type: date
        description: >-
          Date the worker actually started this work assignment, from ADP
          WorkAssignment actualStartDate. May differ from hire_date for
          pre-start workers.

      - name: seniority_date
        data_type: date
        description: >-
          Date used to calculate seniority for this work assignment in ADP. May
          differ from hire_date when prior service credit is applied.

      - name: termination_date
        data_type: date
        description: >-
          Date the work assignment was terminated, from ADP WorkAssignment
          terminationDate. Null for active assignments.

      - name: pay_cycle_code__code_value
        data_type: string
        description: >-
          Code value for the pay cycle associated with this work assignment
          (e.g., 'BW' for biweekly), from ADP payCycleCode.

      - name: standard_hours__hours_quantity
        data_type: float64
        description: >-
          Standard hours per period for this work assignment, from ADP
          WorkAssignment standardHours.hoursQuantity.

      - name: standard_hours__unit_code__code_value
        data_type: string
        description: >-
          Unit code for standard hours (e.g., 'Week'), indicating the time
          period over which standard_hours__hours_quantity is measured.

      - name: standard_pay_period_hours__hours_quantity
        data_type: float64
        description: >-
          Standard hours per pay period for this work assignment, from ADP
          WorkAssignment standardPayPeriodHours.hoursQuantity.

      - name: wage_law_coverage__coverage_code__code_value
        data_type: string
        description: >-
          Code value for the wage law coverage classification applied to this
          assignment (e.g., 'Exempt', 'NonExempt'), from ADP
          wageLawCoverage.coverageCode.

      - name: wage_law_coverage__coverage_code__name
        data_type: string
        description: >-
          Display name for the wage law coverage classification, coalesced from
          longName and shortName in ADP wageLawCoverage.coverageCode.

      - name: wage_law_coverage__wage_law_name_code__code_value
        data_type: string
        description: >-
          Code value identifying the wage law governing this assignment (e.g.,
          'FLSA'), from ADP wageLawCoverage.wageLawNameCode.

      - name: wage_law_coverage__wage_law_name_code__name
        data_type: string
        description: >-
          Display name of the wage law governing this assignment (e.g., 'Fair
          Labor Standards Act'), coalesced from longName and shortName in ADP
          wageLawCoverage.wageLawNameCode.

      - name: worker_time_profile__badge_id
        data_type: string
        description: >-
          Time-and-attendance badge ID for this work assignment, from ADP
          workerTimeProfile.badgeID.

      - name: worker_time_profile__time_and_attendance_indicator
        data_type: boolean
        description: >-
          TRUE if this work assignment participates in time-and-attendance
          tracking, from ADP workerTimeProfile.timeAndAttendanceIndicator.

      - name: worker_time_profile__time_zone_code
        data_type: string
        description: >-
          IANA time zone code for this work assignment's time-and-attendance
          clock, from ADP workerTimeProfile.timeZoneCode.

      - name: worker_time_profile__time_service_supervisor__associate_oid
        data_type: string
        description: >-
          ADP associate OID of the time-service supervisor for this work
          assignment, from ADP workerTimeProfile.timeServiceSupervisor.

      - name: worker_time_profile__time_service_supervisor__position_id
        data_type: string
        description: >-
          Position ID of the time-service supervisor for this work assignment,
          from ADP workerTimeProfile.timeServiceSupervisor.positionID.

      - name: worker_time_profile__time_service_supervisor__worker_id__id_value
        data_type: string
        description: >-
          Worker ID (associate OID / adp_associate_id) of the time-service
          supervisor for this work assignment, from ADP
          workerTimeProfile.timeServiceSupervisor.workerID.idValue.
