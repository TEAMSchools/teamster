models:
  - name: dim_staff_work_assignments
    description: >-
      Staff work assignment dimension. One row per ADP work assignment (current
      state only). Contains stable, low-churn assignment-level scalars: position
      identifiers, flags, FTE, payroll fields, dates, pay cycle, standard hours,
      wage law coverage, and worker time profile. Employee number is resolved
      via LEFT JOIN to stg_people__employee_numbers (filtered to active number
      records), so staff_key and employee_number may be null for work
      assignments whose associate_oid has no active number mapping. High-churn
      attributes (assignment status, job title, worker type, location, org
      units, reports-to, compensation) are tracked in separate Type 2 child
      models that FK to this via work_assignment_key.
    columns:
      - name: work_assignment_key
        data_type: string
        description: >-
          Surrogate key derived from item_id. Primary key for this dimension.
          Generated with generate_surrogate_key(["item_id"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: staff_key
        data_type: string
        description: >-
          Surrogate key derived from employee_number. FK to dim_staff. Generated
          with generate_surrogate_key(["employee_number"]). Null when the
          associate_oid has no active number mapping in
          stg_people__employee_numbers.
        constraints:
          - type: foreign_key
            to: ref('dim_staff')
            to_columns: [staff_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: time_approver_staff_key
        data_type: string
        description: >-
          Surrogate key derived from the time-and-attendance approver's
          employee_number. FK to dim_staff identifying the supervisor who
          approves this assignment's time records (distinct from the org-chart
          manager on dim_work_assignment_reporting_relationships). Null when the
          approver's associate_oid has no active number mapping.
        constraints:
          - type: foreign_key
            to: ref('dim_staff')
            to_columns: [staff_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: position_id
        data_type: string
        description: >-
          Position identifier associated with this work assignment.

      - name: is_primary_position
        data_type: boolean
        description: >-
          TRUE if this is the primary work assignment for the worker. A worker
          may have multiple assignments; at most one is primary.

      - name: is_management_position
        data_type: boolean
        description: >-
          TRUE if this work assignment is designated as a management position.

      - name: is_voluntary_termination
        data_type: boolean
        description: >-
          TRUE if the separation from this work assignment was voluntary (e.g.,
          resignation). Meaningful only for terminated assignments.

      - name: full_time_equivalency
        data_type: float64
        description: >-
          FTE ratio for this work assignment. 1.0 represents full-time;
          fractional values represent part-time assignments.

      - name: payroll_file_number
        data_type: string
        description: >-
          Payroll file number associated with this work assignment, used to
          identify the worker in the payroll system.

      - name: payroll_group_code
        data_type: string
        description: >-
          Payroll group code for this work assignment, indicating which payroll
          processing group the assignment belongs to.

      - name: hire_date
        data_type: date
        description: >-
          Date the worker was hired into this work assignment.

      - name: actual_start_date
        data_type: date
        description: >-
          Date the worker actually started this work assignment. May differ from
          hire_date for pre-start workers.

      - name: seniority_date
        data_type: date
        description: >-
          Date used to calculate seniority for this work assignment. May differ
          from hire_date when prior service credit is applied.

      - name: termination_date
        data_type: date
        description: >-
          Date the work assignment was terminated. Null for active assignments.

      - name: pay_cycle_code
        data_type: string
        description: >-
          Code value for the pay cycle associated with this work assignment
          (e.g., 'BW' for biweekly).

      - name: standard_hours
        data_type: float64
        description: >-
          Standard hours per period for this work assignment.

      - name: standard_hours_unit_code
        data_type: string
        description: >-
          Unit code for standard hours (e.g., 'Week'), indicating the time
          period over which standard_hours is measured.

      - name: standard_pay_period_hours
        data_type: float64
        description: >-
          Standard hours per pay period for this work assignment.

      - name: wage_law_coverage_code
        data_type: string
        description: >-
          Code value for the wage law coverage classification applied to this
          assignment (e.g., 'Exempt', 'NonExempt').

      - name: wage_law_coverage_name
        data_type: string
        description: >-
          Display name for the wage law coverage classification.

      - name: wage_law_code
        data_type: string
        description: >-
          Code value identifying the wage law governing this assignment (e.g.,
          'FLSA').

      - name: wage_law_name
        data_type: string
        description: >-
          Display name of the wage law governing this assignment (e.g., 'Fair
          Labor Standards Act').

      - name: time_badge_id
        data_type: string
        description: >-
          Time-and-attendance badge ID for this work assignment.

      - name: is_time_and_attendance_active
        data_type: boolean
        description: >-
          TRUE if this work assignment participates in time-and-attendance
          tracking.

      - name: time_zone_code
        data_type: string
        description: >-
          IANA time zone code for this work assignment's time-and-attendance
          clock.
