models:
  - name: dim_students
    description: >-
      Student person dimension. One row per student. Contains stable
      person-level attributes only. Enrollment history is in
      dim_student_enrollments, which foreign-keys to this model via student_key.
    columns:
      - name: student_key
        data_type: string
        description: >-
          District-assigned student identification number. Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: local_student_identifier
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: state_student_identifier
        data_type: string
        description: >-
          The state-assigned student number for the student. In most cases, this
          number should stay thesame from school to school.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state_studentnumber
            contains_pii: true
      - name: student_name
        data_type: string
        description: >-
          Last, First, Mi. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: lastfirst
            contains_pii: true
      - name: birth_date
        data_type: date
        description: >-
          Date of birth.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: dob
            contains_pii: true
      - name: gender
        data_type: string
        description: >-
          M=Male F=Female. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: gender
      - name: lunch_status
        data_type: string
        description: >-
          Meal eligibility status (e.g., Free, Reduced, Paid).

      - name: is_gifted
        data_type: boolean
        description: >-
          True when gifted_and_talented is not null.

      - name: is_ell
        data_type: boolean
        description: >-
          Student Limited English Proficiency status. True when lep_status is
          not null.

      - name: has_iep
        data_type: boolean
        description: >-
          Individualized Education Program status. Derived from iep_status.

      - name: ethnicity
        data_type: string
        description: >-
          Heritage background of a student. The codes assigned here are stored
          in the Gen Table [6]Cat=Ethnicity. These are set in school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ethnicity
