models:
  - name: dim_students
    description: >-
      Student person dimension. One row per student. Contains stable
      person-level attributes only. Enrollment history is in
      dim_student_enrollments, which foreign-keys to this model via student_key.
    columns:
      - name: student_key
        data_type: string
        description: >-
          Surrogate key derived from student_number. Primary key for the student
          dimension.
        data_tests:
          - unique
          - not_null

      - name: lea_student_identifier
        data_type: int64
        description: >-
          KIPP's own SIS identifier for the student. KIPP is a charter-LEA
          operating within a host public school district; this column is the
          identifier issued by KIPP as the LEA. Sourced from PowerSchool
          student_number for NJ regions (and Focus local ID for Miami once Focus
          lands). Maps to Ed-Fi District / CEDS District-assigned number from
          KIPP-as-LEA's perspective.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: district_student_identifier
        data_type: int64
        description: >-
          Host public school district's identifier for the student. Populated
          for Miami (MDCPS student ID) and null for NJ regions where the host
          district's ID is not surfaced upstream. Generalizes the previously
          Miami-only mdcps_student_identifier. Ed-Fi District / CEDS
          District-assigned number from the host district's perspective.

      - name: state_student_identifier
        data_type: string
        description: >-
          The state-assigned student number for the student. In most cases, this
          number should stay thesame from school to school.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state_studentnumber
            contains_pii: true
      - name: salesforce_contact_id
        data_type: string
        description: >-
          KIPPADB (Salesforce) contact identifier for the student. Populated
          where the student has a KIPPADB record; null otherwise. Used across
          KIPPADB consumer tools (Overgrad, alumni tracking, etc.).

      - name: student_name
        data_type: string
        description: >-
          Last, First, Mi. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: lastfirst
            contains_pii: true
      - name: birth_date
        data_type: date
        description: >-
          Date of birth.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: dob
            contains_pii: true
      - name: gender_identity
        data_type: string
        description: >-
          Self-identified gender for the student (e.g., M=Male F=Female).
          Matches Ed-Fi's genderIdentity attribute (modern inclusive naming).

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: gender
      - name: meal_eligibility_status
        data_type: string
        description: >-
          NSLP meal eligibility status (e.g., Free, Reduced, Paid).

      - name: is_gifted
        data_type: boolean
        description: >-
          TRUE if the student has a non-null gifted_and_talented value in
          PowerSchool, indicating gifted and talented identification.

      - name: is_ell
        data_type: boolean
        description: >-
          TRUE if the student has a non-null lep_status, indicating active
          English Language Learner classification.

      - name: has_iep
        data_type: boolean
        description: >-
          TRUE if the student's iep_status is 'With IEP'.

      - name: race
        data_type: string
        description: >-
          Racial category for the student. Decoded from PowerSchool ethnicity
          code to the full racial category label (e.g., Black/African American,
          Hispanic or Latino, Two or More Races, White). Cross-model consistency
          with dim_staff.race; Hispanic vs. non-Hispanic ethnicity lives
          separately as the is_hispanic boolean.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ethnicity
