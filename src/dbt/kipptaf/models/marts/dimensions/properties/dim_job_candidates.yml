models:
  - name: dim_job_candidates
    description: >-
      Job candidate dimension. One row per unique candidate. Contains candidate
      profile and contact information from SmartRecruiters. Deduplicates by
      candidate_id, keeping the most recent application record.
    columns:
      - name: job_candidate_key
        data_type: string
        description: >-
          Surrogate primary key derived from candidate_id. Generated with
          generate_surrogate_key(["candidate_id"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: first_name
        data_type: string
        description: Candidate's first name as entered in SmartRecruiters.

      - name: last_name
        data_type: string
        description: Candidate's last name as entered in SmartRecruiters.

      - name: full_name
        data_type: string
        description:
          Candidate's full name (first and last) as entered in SmartRecruiters.

      - name: email
        data_type: string
        description:
          Candidate's primary email address from their SmartRecruiters profile.
