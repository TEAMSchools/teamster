models:
  - name: dim_student_enrollments
    description: >-
      Student enrollment dimension. One row per student x school x academic year
      enrollment record. Each re-enrollment within a year is a distinct record
      identified by entrydate. Entry and exit dates bound each enrollment
      period. FK to dim_students, dim_locations, and dim_dates (role-playing via
      entry_date_key and exit_date_key).
    columns:
      - name: student_enrollment_key
        data_type: string
        description: >-
          Surrogate key derived from student_number, _dbt_source_relation,
          academic_year, and entrydate. Primary key for this dimension — matches
          the uniqueness grain on int_extracts__student_enrollments.
        data_tests:
          - unique
          - not_null

      - name: student_key
        data_type: string
        description: >-
          Surrogate key derived from student_number. FK to dim_students.
        data_tests:
          - not_null

      - name: location_key
        data_type: string
        description: >-
          Surrogate key derived from location_clean_name. FK to dim_locations.
          Null when schoolid does not match any location in the crosswalk (e.g.,
          grade_level 99 placeholder schools).

      - name: entry_date_key
        data_type: date
        description: >-
          Date the student entered this enrollment. FK to dim_dates
          (role-playing as entry date).

      - name: exit_date_key
        data_type: date
        description: >-
          Date the student exited this enrollment. FK to dim_dates (role-playing
          as exit date). Null for open enrollments.

      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this enrollment falls. The
          calendar year in which the academic year begins (e.g., 2025 for the
          2025-26 school year).

      - name: grade_level
        data_type: int64
        description: >-
          Grade level of the student during this enrollment as recorded in
          PowerSchool.

      - name: graduation_year
        data_type: int64
        description: >-
          Expected graduation year (cohort_primary from PowerSchool). Represents
          the calendar year the student is projected to graduate high school.

      - name: school_level
        data_type: string
        description: >-
          School level abbreviation for the enrolling school (ES, MS, HS).

      - name: enroll_status
        data_type: int64
        description: >-
          PowerSchool enrollment status code. 0 = currently enrolled, 1 =
          inactive, 2 = transferred out, 3 = graduated, -1 = pre-registered, -2
          = inactive, 4 = imported as historical.

      - name: is_retained_year
        data_type: boolean
        description: >-
          TRUE if the student repeated this grade level in the same school
          compared to the prior academic year.
