models:
  - name: dim_student_enrollment_status
    description: >-
      Enrollment-grain status rollup. One row per student_enrollment_key.
      Derives a single ELL, IEP, and meal eligibility value per enrollment stint
      from the three SCD2 status dims, following the enrollment-grain
      aggregation rules: ELL via LEFT JOIN (one span per stint); IEP via latest
      span; meal via NJ Oct-15 span or earliest fallback, Miami via latest span.
      Absence of a status row is normalized to false/null — not missing data.
      Consumed by the Cube semantic layer as a snowflake sub-dim joined
      one-to-one to dim_student_enrollments.
    columns:
      - name: student_enrollment_key
        data_type: string
        description: >-
          PK. Surrogate key matching
          dim_student_enrollments.student_enrollment_key. Derived from
          student_number, _dbt_source_project, academic_year, entrydate.
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key

      - name: iep_classification
        data_type: string
        description: >-
          IEP placement classification for this enrollment stint, from the
          latest IEP span. Examples: Resource Center, In-Class Resource,
          Self-Contained. NULL when no IEP span exists for the stint.

      - name: special_education_code
        data_type: string
        description: >-
          NJ state special education code (Newark and Camden only; NULL for
          Miami and Paterson). From the latest IEP span.

      - name: special_education_name
        data_type: string
        description: >-
          Human-readable label for the NJ special education code (Newark and
          Camden only; NULL for Miami and Paterson). From the latest IEP span.

      - name: special_education_placement
        data_type: string
        description: >-
          NJ special education placement category (Newark and Camden only; NULL
          for Miami and Paterson). From the latest IEP span.

      - name: meal_eligibility
        data_type: string
        description: >-
          Meal eligibility category for this enrollment stint. Values: F (Free),
          R (Reduced), FDC (Free Direct Certification), P (Paid), Unknown. NULL
          when no meal span exists for the stint.

      - name: is_ell
        data_type: boolean
        description: >-
          TRUE if the student was classified as an English Language Learner
          during this enrollment stint. FALSE when no ELL span exists for the
          stint (absence of a row = not ELL). Derived from
          dim_student_ell_status via LEFT JOIN; coalesced from NULL to false.

      - name: is_iep
        data_type: boolean
        description: >-
          TRUE if the student had an active Individualized Education Program
          during this enrollment stint. Derived from the latest IEP span by
          effective_date_start_key; coalesced from NULL to false.

      - name: is_meal_eligible
        data_type: boolean
        description: >-
          TRUE if the student was eligible for free, reduced-price, or direct
          certification meals during this enrollment stint. NJ: derived from the
          meal span covering Oct 15 of the academic year, or the earliest span
          if none covers Oct 15. Miami: derived from the latest span. Coalesced
          from NULL to false.
