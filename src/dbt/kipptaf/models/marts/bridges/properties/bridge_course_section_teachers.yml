models:
  - name: bridge_course_section_teachers
    description: >-
      Bridge table resolving the many-to-many relationship between course
      sections and teachers. One row per section x teacher x assignment period.
      A teacher may appear more than once per section when their role or
      effective dates change. FKs to dim_course_sections via course_section_key
      and to dim_staff via staff_key.

    columns:
      - name: course_section_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: staff_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: sections_dcid
        data_type: int64
        description: >-
          PowerSchool sections DCID. Natural key for the section.

      - name: employee_number
        data_type: int64
        description: >-
          KIPP-assigned unique identifier for the staff member. Natural key for
          the staff dimension.

      - name: teachernumber
        data_type: string
        description: >-
          The number the district assigns to track the teacher.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: teachernumber
      - name: teacher_role
        data_type: string
        description: >-
          User configurable name uniquely identifying the role to the user
          within a Role Module Required.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__roledef
            source_column: name
      - name: effective_date_start
        data_type: date
        description: >-
          The start date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: start_date
      - name: effective_date_end
        data_type: date
        description: >-
          The end date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: end_date
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - course_section_key
              - staff_key
              - teacher_role
              - effective_date_start
