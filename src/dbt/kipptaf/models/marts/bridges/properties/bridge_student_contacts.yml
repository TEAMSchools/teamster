models:
  - name: bridge_student_contacts
    description: >-
      Bridge table resolving the many-to-many between students and contact
      persons. One row per student x contact person pair. Relationship
      attributes that vary per pair (relationship type, priority, emergency
      flag, etc.) live here rather than on dim_student_contact_persons. Foreign
      keys to dim_students via student_key and to dim_student_contact_persons
      via student_contact_person_key.

    columns:
      - name: student_key
        data_type: string
        description: >-
          Student Number assigned by the school. Indexed. Surrogate key.
        data_tests:
          - not_null

      - name: student_contact_person_key
        data_type: string
        description: >-
          Identification number of the associated Person table row pertaining to
          the phone number. Indexedwith Address Priority Order. Required.
          Surrogate key.
        data_tests:
          - not_null

      - name: student_number
        data_type: int64
        description: >-
          Student Number assigned by the school. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
      - name: relationship_type
        data_type: string
        description: >-
          Relationship between the contact person and the student (e.g., Mother,
          Father, Grandparent) as coded in PowerSchool.

      - name: contact_priority
        data_type: int64
        description: >-
          Indicates the preferred order in which the student's contacts will be
          selected.Valid values: 1-n. Defaults to 1. Indexed with Student DCID.
          Required.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcontactassoc
            source_column: contactpriorityorder
      - name: is_emergency
        data_type: boolean
        description: >-
          Indicates whether or not the contact is designated as an emergency
          contact. Valid values:0=No, 1=Yes. Defaults to 0. Required. Derived
          from isemergency.

      - name: is_pickup
        data_type: boolean
        description: >-
          Indicates whether or not the the student can be picked up by the
          contact. Valid values: 0=No,1=Yes. Defaults to 0. Required. Derived
          from schoolpickupflg.

      - name: is_custodial
        data_type: boolean
        description: >-
          Indicates whether or not the contact has custody over the student.
          Valid values: 0=No, 1=Yes.Defaults to 0. Required. Derived from
          iscustodial.

      - name: lives_with
        data_type: boolean
        description: >-
          Indicates whether or not the the student lives with the contact. Valid
          values: 0=No, 1=Yes.Defaults to 0. Required. Derived from
          liveswithflg.

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_key
              - student_contact_person_key
