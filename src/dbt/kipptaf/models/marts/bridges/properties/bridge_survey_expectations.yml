models:
  - name: bridge_survey_expectations
    description: >-
      Survey expectation dimension. One row per respondent x
      survey_administration. Scaffolded from business rules defining which
      respondents should complete which survey administrations. The
      respondent_type discriminator determines which respondent FK is populated
      (exactly one per row). LEFT JOIN to fct_survey_submissions on (respondent
      key, survey_administration_key) for expected-taken/missed analysis.
    columns:
      - name: survey_expectation_key
        data_type: string
        description: >-
          Surrogate key derived from survey_administration_key, respondent_type,
          and the three respondent FK columns. Primary key for this dimension.
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: survey_administration_key
        data_type: string
        description: >-
          FK to dim_survey_administrations. Identifies which survey
          administration this expectation belongs to.
        constraints:
          - type: foreign_key
            to: ref('dim_survey_administrations')
            to_columns: [survey_administration_key]
            warn_unsupported: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_survey_administrations')
                field: survey_administration_key
      - name: respondent_type
        data_type: string
        description: >-
          Discriminator for respondent type: staff, student, or family.
          Determines which respondent FK is populated.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - staff
                  - student
                  - family

      - name: staff_key
        data_type: string
        description: >-
          FK to dim_staff. Populated when respondent_type is staff. Null for
          student and family respondents.

        constraints:
          - type: foreign_key
            to: ref('dim_staff')
            to_columns: [staff_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key
      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Populated when respondent_type is
          student. Null for staff and family respondents.

        constraints:
          - type: foreign_key
            to: ref('dim_student_enrollments')
            to_columns: [student_enrollment_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key
      - name: student_contact_person_key
        data_type: string
        description: >-
          FK to dim_student_contact_persons. Populated when respondent_type is
          family. Null for staff and student respondents.
        constraints:
          - type: foreign_key
            to: ref('dim_student_contact_persons')
            to_columns: [student_contact_person_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_student_contact_persons')
                field: student_contact_person_key
