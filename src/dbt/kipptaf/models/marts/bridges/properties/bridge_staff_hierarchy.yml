models:
  - name: bridge_staff_hierarchy
    description: >-
      Transitive closure of the staff reporting hierarchy. One row per
      (ancestor, descendant) staff pair reachable through the org chart, at any
      depth. Direct manager-report edges are derived from each staff member's
      current primary work assignment and its current reporting relationship,
      then closed recursively. Every staff member appears as their own ancestor
      and descendant at depth 0, so a manager's reporting chain includes their
      own record. Powers the Cube reporting_chain access segment: a manager sees
      the data of every descendant in their chain. Both keys FK to dim_staff.
    config:
      materialized: table
    columns:
      - name: staff_hierarchy_key
        data_type: string
        description: >-
          Surrogate primary key derived from ancestor_staff_key and
          descendant_staff_key. Generated with
          generate_surrogate_key(["ancestor_staff_key",
          "descendant_staff_key"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: ancestor_staff_key
        data_type: string
        description: >-
          FK to dim_staff identifying the manager (or the staff member
          themselves at depth 0) at the top of this hierarchy pair.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: descendant_staff_key
        data_type: string
        description: >-
          FK to dim_staff identifying a staff member who reports up to the
          ancestor through the org chart (or the staff member themselves at
          depth 0).
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: depth
        data_type: int64
        description: >-
          Number of reporting hops from ancestor to descendant. 0 for the self
          pair, 1 for a direct report, and higher for indirect reports. When
          multiple paths exist between a pair, the shortest is kept.
