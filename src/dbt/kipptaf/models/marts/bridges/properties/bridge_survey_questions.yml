models:
  - name: bridge_survey_questions
    description: >-
      Bridge table resolving the many-to-many relationship between survey
      definitions and questions. One row per survey x question_shortname pair at
      the instrument definition level (not the administration instance). FK to
      dim_surveys via survey_key and to dim_survey_questions via
      survey_question_key. Questions pair to the instrument, not the instance.
    columns:
      - name: survey_question_bridge_key
        data_type: string
        description: >-
          Surrogate key derived from survey_id and question_shortname. Primary
          key for this bridge.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: survey_key
        data_type: string
        description: >-
          FK to dim_surveys. Surrogate key derived from survey_id.
        constraints:
          - type: foreign_key
            to: ref('dim_surveys')
            to_columns: [survey_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_surveys')
                field: survey_key
      - name: survey_question_key
        data_type: string
        description: >-
          FK to dim_survey_questions. Surrogate key derived from
          question_shortname.
        constraints:
          - type: foreign_key
            to: ref('dim_survey_questions')
            to_columns: [survey_question_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_survey_questions')
                field: survey_question_key
      - name: is_required
        data_type: boolean
        description: >-
          TRUE if the question is required for survey completion. From Google
          Forms question_required flag; always true for SCD scale items.
