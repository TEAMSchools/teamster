models:
  - name: bridge_course_section_terms
    description: >-
      Bridge table resolving the many-to-many relationship between course
      sections and reporting terms. One row per section x reporting term pair
      where the term's date range overlaps with the section's term dates. FK to
      dim_course_sections via course_section_key and to dim_terms via term_key.

    constraints:
      - type: primary_key
        columns: [course_section_key, term_key]
        warn_unsupported: false
        warn_unenforced: false
    columns:
      - name: course_section_key
        data_type: string
        description: >-
          Surrogate key derived from sections_dcid and _dbt_source_project. FK
          to dim_course_sections.
        constraints:
          - type: foreign_key
            to: ref('dim_course_sections')
            to_columns: [course_section_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_course_sections')
                field: course_section_key
      - name: term_key
        data_type: string
        description: >-
          Surrogate key derived from type, code, name, start_date, region, and
          school_id of the matching reporting term. FK to dim_terms.
        constraints:
          - type: foreign_key
            to: ref('dim_terms')
            to_columns: [term_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_terms')
                field: term_key
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year in which this reporting term falls. The calendar
          year in which the academic year begins (e.g., 2025 for the 2025-26
          school year).

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - course_section_key
              - term_key
