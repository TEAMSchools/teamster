models:
  - name: bridge_course_section_terms
    description: >-
      Bridge table resolving the many-to-many relationship between course
      sections and reporting terms. One row per section x reporting term pair
      where the term's date range overlaps with the section's term dates. FK to
      dim_course_sections via course_section_key and to dim_terms via term_key.

    columns:
      - name: course_section_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: sections_dcid
        data_type: int64
        description: >-
          PowerSchool sections DCID. Natural key for the section.

      - name: term_code
        data_type: string
        description: >-
          The code value that is stored in the database, such as Home and Work
          for phone types and Mand F for gender types. Indexed with the Code
          Type column. Required

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__codeset
            source_column: code
      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - course_section_key
              - term_key
