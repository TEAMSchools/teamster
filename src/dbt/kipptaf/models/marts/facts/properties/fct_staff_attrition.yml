models:
  - name: fct_staff_attrition
    description: >-
      Staff attrition fact. One row per employee_number x academic_year x
      attrition_type (foundation, nj_compliance, recruitment). is_attrition is
      true when the employee was in a primary, non-Intern, Active assignment
      during the year window but not on the year-following boundary date.
      Source-of-truth is dim_work_assignment_status (assignment-status SCD)
      intersected with dim_work_assignment_primary (is_primary_position SCD) and
      dim_work_assignment_jobs (position_title SCD, for the intern filter),
      joined to dim_staff_work_assignments to resolve employee_number. FKs to
      dim_staff_status (the worker-status version effective on
      outcome_determination_date). Coverage limitation: pre-2021 NJ Dayforce-era
      staff are not included — the work-assignment dim family sources ADP only.
      Tracked at #3744 for upstream Dayforce union work.
    columns:
      - name: staff_attrition_key
        data_type: string
        description: >-
          Surrogate primary key derived from employee_number, academic_year, and
          attrition_type. Generated with
          generate_surrogate_key(["employee_number", "academic_year",
          "attrition_type"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: staff_status_key
        data_type: string
        description: >-
          Foreign key to dim_staff_status. Points to the worker status version
          effective on the outcome-determination date: return-check date for
          retained staff (9/1 for foundation/recruitment, 7/1 for
          nj_compliance), termination effective date for attritors. Null when no
          matching status version exists.
        constraints:
          - type: foreign_key
            to: ref('dim_staff_status')
            to_columns: [staff_status_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff_status')
                field: staff_status_key

      - name: academic_year
        data_type: int64
        description: >-
          The academic year the staff member belongs to, derived from the fiscal
          year starting in July of that year (e.g., 2023 = July 2023–June 2024).

      - name: type
        quote: true
        data_type: string
        description: >-
          Attrition methodology: foundation (9/1–4/30 window, return check 9/1),
          nj_compliance (7/1–6/30 window, return check 7/1), or recruitment
          (9/1–8/31 window, return check 9/1 of following year).

      - name: cutoff_date
        data_type: date
        description: >-
          Window close date for retained staff (4/30 for foundation, 6/30 for
          nj_compliance, 8/31 for recruitment), or the termination effective
          date for staff who attrited within the window.

      - name: is_attrition
        data_type: boolean
        description: >-
          TRUE if the staff member did not return by the return check date for
          this methodology's window.

      - name: termination_reason
        data_type: string
        description: >-
          Assignment status reason for the first termination event within the
          attrition window. Null for retained staff.

      - name: termination_effective_date
        data_type: date
        description: >-
          Effective date of the first termination event within the attrition
          window. Null for retained staff.
