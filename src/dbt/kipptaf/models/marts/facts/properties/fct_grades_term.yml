models:
  - name: fct_grades_term
    description: >-
      Term-level grade fact table. One row per student x section enrollment x
      term (storecode). Contains percent and letter grades for the term and
      running year-to-date (Y1) calculations, citizenship, grade points, and
      credit hours. FK to dim_student_section_enrollments, dim_terms, and
      dim_dates (role-playing via term_start_date_key and term_end_date_key).
      Reaches dim_student_enrollments by traversing
      student_section_enrollment_key.
    columns:
      - name: grades_term_key
        data_type: string
        description: >-
          Surrogate key derived from cc_dcid, _dbt_source_project, and
          storecode. Primary key for this fact.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_section_enrollments. Surrogate key derived from
          cc_dcid and _dbt_source_project.
        constraints:
          - type: foreign_key
            to: ref('dim_student_section_enrollments')
            to_columns: [student_section_enrollment_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_student_section_enrollments')
                field: student_section_enrollment_key
      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from type, code, name,
          start_date, region, and school_id. Null when storecode does not map to
          a reporting term for the school and region.

        constraints:
          - type: foreign_key
            to: ref('dim_terms')
            to_columns: [term_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_terms')
                field: term_key
      - name: term_start_date_key
        data_type: date
        description: >-
          Start date of the term bin. FK to dim_dates (role-playing as term
          start date).

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: term_end_date_key
        data_type: date
        description: >-
          End date of the term bin. FK to dim_dates (role-playing as term end
          date).

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this grade record falls.

      - name: percent_grade
        data_type: float64
        description: >-
          Term percent grade. Coalesced from storedgrades (if stored) or
          pgfinalgrades (in-progress). Scaled 0-100.

      - name: letter_grade
        data_type: string
        description: >-
          Term letter grade. Coalesced from storedgrades or pgfinalgrades.

      - name: percent_grade_adjusted
        data_type: float64
        description: >-
          Adjusted term percent grade. Uses storedgrades if available, otherwise
          the adjusted pgfinalgrades value.

      - name: letter_grade_adjusted
        data_type: string
        description: >-
          Adjusted term letter grade corresponding to percent_grade_adjusted.

      - name: citizenship_grade
        data_type: string
        description: >-
          Classroom behavior/conduct grade from PowerSchool, such as
          E=Excellent, S=Satisfactory, U=Unsatisfactory, N=Neutral. Renamed from
          citizenship to disambiguate from Ed-Fi citizenshipStatusDescriptor (US
          citizen status).

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: citizenship
      - name: ytd_percent_grade
        data_type: float64
        description: >-
          Year-to-date (Y1) running percent grade, weighted across terms
          completed so far.

      - name: ytd_percent_grade_adjusted
        data_type: float64
        description: >-
          Year-to-date adjusted percent grade with minimum-grade floor applied.

      - name: ytd_letter_grade
        data_type: string
        description: >-
          Year-to-date letter grade derived from ytd_percent_grade_adjusted via
          the weighted grade scale.

      - name: ytd_letter_grade_adjusted
        data_type: string
        description: >-
          Year-to-date adjusted letter grade with F* designation for grades
          below 50%.

      - name: grade_points_earned
        data_type: float64
        description: >-
          Points earned for this term's grade (CEDS
          K12StudentAcademicRecord.GradePointsEarned). For example, 4 for A, 3
          for B, etc.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradescaleitem
            source_column: grade_points
      - name: ytd_grade_points
        data_type: float64
        description: >-
          Year-to-date GPA grade points derived from ytd_percent_grade_adjusted
          via the weighted grade scale.

      - name: potential_credit_hours
        data_type: float64
        description: >-
          Credit hours the student could earn for this course. Coalesced from
          storedgrades potentialcrhrs or courses credit_hours.

      - name: last_grade_update_date
        data_type: date
        description: >-
          The date this grade record was last updated in Power Teacher Gradebook
          or Power Teacher Pro.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: lastgradeupdate
      - name: is_excluded_from_gpa
        data_type: boolean
        description: >-
          TRUE if this course grade is excluded from GPA calculation. Cast from
          upstream int64 0/1 flag per R3 boolean-prefix convention.
