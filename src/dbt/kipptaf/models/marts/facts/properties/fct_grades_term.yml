models:
  - name: fct_grades_term
    description: >-
      Term-level grade fact table. One row per student x section enrollment x
      term (storecode). Contains percent and letter grades for the term and
      running year-to-date (Y1) calculations, citizenship, grade points, and
      credit hours. FK to dim_student_section_enrollments,
      dim_student_enrollments, dim_terms, and dim_dates (role-playing via
      term_start_date_key and term_end_date_key).
    columns:
      - name: grades_term_key
        data_type: string
        description: >-
          Surrogate key derived from cc_dcid, _dbt_source_relation, and
          storecode. Primary key for this fact.
        data_tests:
          - unique
          - not_null

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_section_enrollments. Surrogate key derived from
          cc_dcid and _dbt_source_relation.
        data_tests:
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Surrogate key derived from
          student_number, _dbt_source_relation, academic_year, and entrydate.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from type, code, name,
          start_date, region, and school_id. Null when storecode does not map to
          a reporting term for the school and region.

      - name: term_start_date_key
        data_type: date
        description: >-
          Start date of the term bin. FK to dim_dates (role-playing as term
          start date).

      - name: term_end_date_key
        data_type: date
        description: >-
          End date of the term bin. FK to dim_dates (role-playing as term end
          date).

      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this grade record falls.

      - name: term_code
        data_type: string
        description: >-
          PowerSchool storecode identifying the term (e.g., Q1, Q2, Q3, Q4, E1,
          E2).

      - name: percent_grade
        data_type: float64
        description: >-
          Term percent grade. Coalesced from storedgrades (if stored) or
          pgfinalgrades (in-progress). Scaled 0-100.

      - name: letter_grade
        data_type: string
        description: >-
          Term letter grade. Coalesced from storedgrades or pgfinalgrades.

      - name: percent_grade_adjusted
        data_type: float64
        description: >-
          Adjusted term percent grade. Uses storedgrades if available, otherwise
          the adjusted pgfinalgrades value.

      - name: letter_grade_adjusted
        data_type: string
        description: >-
          Adjusted term letter grade corresponding to percent_grade_adjusted.

      - name: citizenship
        data_type: string
        description: >-
          Citizenship or behavior grade for the term, from pgfinalgrades.

      - name: y1_percent_grade
        data_type: float64
        description: >-
          Year-to-date (Y1) running percent grade, weighted across terms
          completed so far.

      - name: y1_percent_grade_adjusted
        data_type: float64
        description: >-
          Year-to-date adjusted percent grade with minimum-grade floor applied.

      - name: y1_letter_grade
        data_type: string
        description: >-
          Year-to-date letter grade derived from y1_percent_grade_adjusted via
          the weighted grade scale.

      - name: y1_letter_grade_adjusted
        data_type: string
        description: >-
          Year-to-date adjusted letter grade with F* designation for grades
          below 50%.

      - name: grade_points
        data_type: float64
        description: >-
          GPA grade points for this term, derived from the course grade scale.

      - name: y1_grade_points
        data_type: float64
        description: >-
          Year-to-date GPA grade points derived from y1_percent_grade_adjusted
          via the weighted grade scale.

      - name: potential_credit_hours
        data_type: float64
        description: >-
          Credit hours the student could earn for this course. Coalesced from
          storedgrades potentialcrhrs or courses credit_hours.

      - name: exclude_from_gpa
        data_type: int64
        description: >-
          Flag indicating whether this course grade is excluded from GPA
          calculation. 0 = included, 1 = excluded.

      - name: last_grade_update_date
        data_type: date
        description: >-
          Date the grade was last updated in pgfinalgrades.
