models:
  - name: fct_grades_term
    description: >-
      Term-level grade fact table. One row per student x section enrollment x
      term (storecode). Contains percent and letter grades for the term and
      running year-to-date (Y1) calculations, citizenship, grade points, and
      credit hours. FK to dim_student_section_enrollments,
      dim_student_enrollments, dim_terms, and dim_dates (role-playing via
      term_start_date_key and term_end_date_key).
    columns:
      - name: grades_term_key
        data_type: string
        description: >-
          The code used to represent this grade level to term ID and school ID.
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Surrogate key.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          The code value that is stored in the database, such as Home and Work
          for phone types and Mand F for gender types. Indexed with the Code
          Type column. Required Surrogate key.

      - name: term_start_date_key
        data_type: date
        description: >-
          Start date of the term bin. FK to dim_dates (role-playing as term
          start date).

      - name: term_end_date_key
        data_type: date
        description: >-
          End date of the term bin. FK to dim_dates (role-playing as term end
          date).

      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: term_code
        data_type: string
        description: >-
          The code used to represent this grade level to term ID and school ID.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradecalcformulaweight
            source_column: storecode
      - name: percent_grade
        data_type: float64
        description: >-
          Term percent grade. Coalesced from storedgrades (if stored) or
          pgfinalgrades (in-progress). Scaled 0-100.

      - name: letter_grade
        data_type: string
        description: >-
          Term letter grade. Coalesced from storedgrades or pgfinalgrades.

      - name: percent_grade_adjusted
        data_type: float64
        description: >-
          Adjusted term percent grade. Uses storedgrades if available, otherwise
          the adjusted pgfinalgrades value.

      - name: letter_grade_adjusted
        data_type: string
        description: >-
          Adjusted term letter grade corresponding to percent_grade_adjusted.

      - name: citizenship
        data_type: string
        description: >-
          Shows the Citizenship progress of a student in this section, such as
          E=Excellent, S=Satisfactory,U=Unsatisfactory, N=Neutral.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: citizenship
      - name: y1_percent_grade
        data_type: float64
        description: >-
          Year-to-date (Y1) running percent grade, weighted across terms
          completed so far.

      - name: y1_percent_grade_adjusted
        data_type: float64
        description: >-
          Year-to-date adjusted percent grade with minimum-grade floor applied.

      - name: y1_letter_grade
        data_type: string
        description: >-
          Year-to-date letter grade derived from y1_percent_grade_adjusted via
          the weighted grade scale.

      - name: y1_letter_grade_adjusted
        data_type: string
        description: >-
          Year-to-date adjusted letter grade with F* designation for grades
          below 50%.

      - name: grade_points
        data_type: float64
        description: >-
          Points associated to this grade. For example, 4 to A, 3 to B, etc.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradescaleitem
            source_column: grade_points
      - name: y1_grade_points
        data_type: float64
        description: >-
          Year-to-date GPA grade points derived from y1_percent_grade_adjusted
          via the weighted grade scale.

      - name: potential_credit_hours
        data_type: float64
        description: >-
          Credit hours the student could earn for this course. Coalesced from
          storedgrades potentialcrhrs or courses credit_hours.

      - name: exclude_from_gpa
        data_type: int64
        description: >-
          Flag indicating whether this course grade is excluded from GPA
          calculation. 0 = included, 1 = excluded.

      - name: last_grade_update_date
        data_type: date
        description: >-
          The date this grade record was last updated in Power Teacher Gradebook
          or Power Teacher Pro.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: lastgradeupdate
