models:
  - name: fct_grades_gpa
    description: >-
      GPA periodic-snapshot fact table. One row per student enrollment x term.
      Contains term GPA, year-to-date GPA (weighted and unweighted), semester
      GPA, cumulative GPA, credit hours earned and attempted, and failing course
      count. Preserves history across terms with is_current flag to collapse to
      the most recent row per student x school. FK to dim_student_enrollments
      and dim_terms.
    columns:
      - name: grades_gpa_key
        data_type: string
        description: >-
          Surrogate key derived from student_number, _dbt_source_project,
          academic_year, entrydate, and term_name. Grain: one row per
          student_enrollment x term, per spec.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Surrogate key derived from
          student_number, _dbt_source_project, academic_year, and entrydate.
        constraints:
          - type: foreign_key
            to: ref('dim_student_enrollments')
            to_columns: [student_enrollment_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key
      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from type, code, name,
          start_date, region, and school_id of the matching reporting term. Null
          when the PowerSchool term / year / school does not map to a
          reporting-term record.
        constraints:
          - type: foreign_key
            to: ref('dim_terms')
            to_columns: [term_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_terms')
                field: term_key

      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this GPA snapshot falls.

      - name: semester
        data_type: string
        description: >-
          Semester code (S1 for Q1/Q2, S2 for Q3/Q4).

      - name: gpa_term
        data_type: float64
        description: >-
          Weighted GPA for this term only, calculated as weighted grade points
          divided by credit hours for the term.

      - name: gpa_ytd
        data_type: float64
        description: >-
          Year-to-date weighted GPA across all terms in the academic year.

      - name: gpa_ytd_unweighted
        data_type: float64
        description: >-
          Year-to-date unweighted GPA using the unweighted grade scale.

      - name: gpa_semester
        data_type: float64
        description: >-
          Semester-level weighted GPA across the two terms in the semester.

      - name: grade_avg_term
        data_type: float64
        description: >-
          Average percent grade across all courses for this term.

      - name: grade_avg_ytd
        data_type: float64
        description: >-
          Year-to-date average percent grade across all courses.

      - name: cumulative_gpa
        data_type: float64
        description: >-
          Cumulative weighted GPA across all stored end-of-year grades plus
          current year projected grades.

      - name: cumulative_gpa_unweighted
        data_type: float64
        description: >-
          Cumulative unweighted GPA across all stored and projected grades.

      - name: cumulative_gpa_projected
        data_type: float64
        description: >-
          Projected cumulative GPA including current year in-progress grades.

      - name: credit_hours_term
        data_type: float64
        description: >-
          Total credit hours for courses with grades in this term.

      - name: credit_hours_ytd
        data_type: float64
        description: >-
          Total credit hours for courses with Y1 grades in the academic year.

      - name: credit_hours_earned_cumulative
        data_type: float64
        description: >-
          Cumulative credit hours earned (passing grades) across all academic
          years.

      - name: credit_hours_attempted_cumulative
        data_type: float64
        description: >-
          Cumulative credit hours attempted (all enrolled courses) across all
          academic years.

      - name: n_failing_ytd
        data_type: int64
        description: >-
          Count of courses with a failing Y1 letter grade (F or F*) in the
          current academic year.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE for the most recent row per student x school, ordered by yearid
          desc then term desc. Use this flag to collapse to the latest GPA state
          per student-school. For "active term today" filters, traverse term_key
          to dim_terms.is_current instead.
