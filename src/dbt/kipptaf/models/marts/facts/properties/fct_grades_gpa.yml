models:
  - name: fct_grades_gpa
    description: >-
      GPA periodic-snapshot fact table. One row per student enrollment x term.
      Contains term GPA, year-to-date GPA (weighted and unweighted), semester
      GPA, cumulative GPA, credit hours earned and attempted, and failing course
      count. Preserves history across terms with is_current_row flag to collapse
      to the most recent snapshot per student x school. FK to
      dim_student_enrollments and dim_terms.
    columns:
      - name: grades_gpa_key
        data_type: string
        description: >-
          Surrogate key derived from student_number, _dbt_source_relation,
          academic_year, entrydate, and term_name. Grain: one row per
          student_enrollment x term, per spec.
        data_tests:
          - unique
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Surrogate key derived from
          student_number, _dbt_source_relation, academic_year, and entrydate.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from type, code, name,
          start_date, region, and school_id. Null when term_name does not map to
          a reporting term for the school and region.

      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this GPA snapshot falls.

      - name: term_name
        data_type: string
        description: >-
          Term identifier (e.g., Q1, Q2, Q3, Q4).

      - name: semester
        data_type: string
        description: >-
          Semester code (S1 for Q1/Q2, S2 for Q3/Q4).

      - name: gpa_term
        data_type: float64
        description: >-
          Weighted GPA for this term only, calculated as weighted grade points
          divided by credit hours for the term.

      - name: gpa_y1
        data_type: float64
        description: >-
          Year-to-date weighted GPA across all terms in the academic year.

      - name: gpa_y1_unweighted
        data_type: float64
        description: >-
          Year-to-date unweighted GPA using the unweighted grade scale.

      - name: gpa_semester
        data_type: float64
        description: >-
          Semester-level weighted GPA across the two terms in the semester.

      - name: grade_avg_term
        data_type: float64
        description: >-
          Average percent grade across all courses for this term.

      - name: grade_avg_y1
        data_type: float64
        description: >-
          Year-to-date average percent grade across all courses.

      - name: cumulative_y1_gpa
        data_type: float64
        description: >-
          Cumulative weighted GPA across all stored Y1 grades plus current year
          projected grades.

      - name: cumulative_y1_gpa_unweighted
        data_type: float64
        description: >-
          Cumulative unweighted GPA across all stored and projected grades.

      - name: cumulative_y1_gpa_projected
        data_type: float64
        description: >-
          Projected cumulative GPA including current year in-progress grades.

      - name: credit_hours_term
        data_type: float64
        description: >-
          Total credit hours for courses with grades in this term.

      - name: credit_hours_y1
        data_type: float64
        description: >-
          Total credit hours for courses with Y1 grades in the academic year.

      - name: credit_hours_earned_cumulative
        data_type: float64
        description: >-
          Cumulative credit hours earned (passing grades) across all academic
          years.

      - name: credit_hours_attempted_cumulative
        data_type: float64
        description: >-
          Cumulative credit hours attempted (all enrolled courses) across all
          academic years.

      - name: n_failing_y1
        data_type: int64
        description: >-
          Count of courses with a failing Y1 letter grade (F or F*) in the
          current academic year.

      - name: is_current_term
        data_type: boolean
        description: >-
          TRUE if this term is the current active term based on today's date.

      - name: is_current_row
        data_type: boolean
        description: >-
          TRUE for the most recent snapshot per student x school, ordered by
          yearid desc then term desc. Use this flag to collapse to the latest
          GPA state.
