models:
  - name: fct_survey_submissions
    description: >-
      Survey submission fact table. One row per respondent x
      survey_administration. Records survey completion events across all
      populations (staff, student, family). The respondent_population
      discriminator determines which respondent FK is populated (exactly one per
      row). Nullable subject_staff_key is populated only for Manager Survey
      submissions (role-playing FK to dim_staff for the manager being
      evaluated). FK to dim_survey_administrations and dim_dates.
    columns:
      - name: survey_submission_key
        data_type: string
        description: >-
          Surrogate key derived from survey_id, survey_response_id, and
          respondent identifier. Primary key for this fact.
        data_tests:
          - unique
          - not_null

      - name: survey_administration_key
        data_type: string
        description: >-
          FK to dim_survey_administrations. Identifies which survey
          administration this submission belongs to.
        data_tests:
          - not_null

      - name: date_submitted_key
        data_type: date
        description: >-
          FK to dim_dates (role-playing as submission date). The local date the
          survey was submitted.

      - name: respondent_population
        data_type: string
        description: >-
          Discriminator for respondent type: staff, student, or family.
          Determines which respondent FK is populated.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - staff
                  - student
                  - family

      - name: staff_key
        data_type: string
        description: >-
          FK to dim_staff for the respondent. Populated when
          respondent_population is staff. Null for student and family.

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments for the respondent. Populated when
          respondent_population is student. Null for staff and family.

      - name: student_contact_person_key
        data_type: string
        description: >-
          FK to dim_student_contact_persons for the respondent. Populated when
          respondent_population is family. Null for staff and student.

      - name: subject_staff_key
        data_type: string
        description: >-
          Role-playing FK to dim_staff for the subject being evaluated.
          Populated only for Manager Survey submissions where the respondent
          (direct report) evaluates their manager (subject). Null for all other
          survey types.

      - name: survey_id
        data_type: string
        description: >-
          Source system identifier for the survey instrument.

      - name: survey_response_id
        data_type: string
        description: >-
          Source system identifier for the individual survey response.

      - name: date_submitted
        data_type: timestamp
        description: >-
          UTC timestamp when the survey response was submitted.

      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
