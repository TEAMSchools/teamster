models:
  - name: fct_grades_category
    description: >-
      Category-level grade fact table. One row per student x section enrollment
      x term x category type (storecode + storecode_type). Contains percent
      grade by category, citizenship grade, and running year-to-date average.
      Categories are the grade reporting breakdowns within a term (e.g., quarter
      grades vs exam grades). FK to dim_student_section_enrollments and
      dim_terms.
    columns:
      - name: grades_category_key
        data_type: string
        description: >-
          Surrogate key derived from cc_dcid, _dbt_source_relation, storecode,
          and storecode_type. Primary key for this fact.
        data_tests:
          - unique
          - not_null

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_section_enrollments. Surrogate key derived from
          cc_dcid and _dbt_source_relation.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from type, code, name,
          start_date, region, and school_id. Null when storecode does not map to
          a reporting term for the school and region.

      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this category grade falls.

      - name: type
        quote: true
        data_type: string
        description: >-
          Type code distinguishing quarter grades (Q) from exam grades (E).

      - name: order
        quote: true
        data_type: string
        description: >-
          Numeric ordering of the category within its type (e.g., 1 for Q1 or
          E1, 2 for Q2 or E2).

      - name: reporting_term
        data_type: string
        description: >-
          Reporting term label (e.g., RT1, RT2) derived from storecode_order.

      - name: quarter
        data_type: string
        description: >-
          Quarter label (e.g., Q1, Q2) derived from storecode_order.

      - name: percent_grade
        data_type: float64
        description: >-
          Category percent grade. Coalesced from storedgrades or pgfinalgrades
          for this storecode.

      - name: citizenship_grade
        data_type: string
        description: >-
          Citizenship or behavior grade for this category period. Coalesced from
          storedgrades behavior or pgfinalgrades citizenship.

      - name: percent_grade_y1_running
        data_type: float64
        description: >-
          Running year-to-date average of percent_grade across same-type
          storecodes up to and including this term.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if this category grade falls in the current reporting period
          based on today's date.
