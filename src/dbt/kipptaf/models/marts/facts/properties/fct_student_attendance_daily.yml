models:
  - name: fct_student_attendance_daily
    description: >-
      Student daily attendance fact table. One row per student x calendar date
      with attendance recorded. Contains attendance code, present/absent/tardy
      indicators, and membership value. School calendar attributes
      (is_in_session, is_membership_day) are reached via compound join on
      (date_key, location_key) to dim_school_calendars, avoiding a diamond path
      through dim_locations. FK to dim_student_enrollments, dim_dates,
      dim_locations, dim_terms, and dim_school_calendars.

      Four numeric attendance measures coexist — use the right one for the
      question:

      - `attendance_value` (0.0–1.0) — raw fractional attendance contribution
        from the source SIS's attendance mode. Denominator of ADA numerator.
      - `membership_value` (0.0–1.0) — fractional enrollment/membership claim
        on the day (split across schools if dual-enrolled). Denominator of ADA.
      - `present_weight` — like `attendance_value` but tardies weight 0.67.
        Use when a tardy should count as partial presence, not full.
      - `is_present_weighted` — not on this fact; see upstream if needed.

      Most dashboards: divide `SUM(attendance_value) / SUM(membership_value)`
      for ADA, `SUM(is_absent) / SUM(is_membership_day)` for absence rate. Use
      the `is_*` flags for categorical breakdowns (Present/Absent/Tardy/
      OSS/ISS) or the `attendance_category` column for a single GROUP BY axis.
    columns:
      - name: student_attendance_daily_key
        data_type: string
        description: >-
          Surrogate key derived from student_number, _dbt_source_relation, and
          calendardate. Primary key for this fact.
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Surrogate key derived from
          student_number, _dbt_source_relation, academic_year, and entrydate.
        constraints:
          - type: foreign_key
            to: ref('dim_student_enrollments')
            to_columns: [student_enrollment_key]
            warn_unsupported: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_student_enrollments')
                field: student_enrollment_key
      - name: student_number
        data_type: int64
        description: >-
          PowerSchool student identifier. PII — do not expose in aggregate
          outputs or external surfaces. Used as the counting grain for
          chronic-absence and ADA measures in the Cube semantic layer to avoid
          double-counting students with multiple enrollment records in a year.

      - name: date_key
        data_type: date
        description: >-
          Calendar date of the attendance record. FK to dim_dates. Also used
          with location_key to join dim_school_calendars.

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: location_key
        data_type: string
        description: >-
          FK to dim_locations. Surrogate key derived from location_clean_name.
          Used with date_key to join dim_school_calendars.

        constraints:
          - type: foreign_key
            to: ref('dim_locations')
            to_columns: [location_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from (term_type, term_code,
          term_name, term_start_date, region, school_id) via left join to
          stg_google_sheets__reporting__terms on (schoolid, term,
          academic_year). Null when the attendance row's term does not appear in
          the terms sheet for that school-year.
        constraints:
          - type: foreign_key
            to: ref('dim_terms')
            to_columns: [term_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_terms')
                field: term_key

      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this attendance date falls.

      - name: attendance_code
        data_type: string
        description: >-
          Attendance identifier set by school. Examples Tardy, Absent, etc.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_code
            source_column: att_code
      - name: attendance_value
        data_type: float64
        description: >-
          Daily attendance value — a real number, typically a fraction of 1
          where 1 is a full attendance day. Used with membership_value to
          compute ADA. Precision depends on the source SIS's attendance mode
          (full-day vs period-level vs day-part); see source_model for
          provenance. Null for Paterson records before academic_year 2026
          (excluded from ADA — data not fully integrated until AY2026).

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_conversion_items
            source_column: attendance_value
      - name: membership_value
        data_type: float64
        description: >-
          The amount of a student's membership this school claims. If a student
          attends more than one school each one will only be able to claim a
          certain portion of the membership. The largest number for this will
          usually be 1 and fractions expressed as decimals. Like .5 or .25. Null
          for Paterson records before academic_year 2026 (excluded from ADA —
          data not fully integrated until AY2026).

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: membershipvalue
      - name: present_weight
        data_type: float64
        description: >-
          Weighted presence value. 0.67 for tardy (T-prefix codes), otherwise
          equals attendance_value. Fractional by design — not a 0/1 flag. Null
          for Paterson records before academic_year 2026 (excluded from ADA —
          data not fully integrated until AY2026).

      - name: is_truant
        data_type: boolean
        description: >-
          TRUE if the student meets regional truancy criteria. Miami: 15+
          absences in 90-day rolling window. NJ regions: projected absences
          reach 50+ for the year.

      - name: semester
        data_type: string
        description: >-
          Semester code for the attendance date (e.g., S1, S2).

      - name: enroll_status
        data_type: int64
        description: >-
          PowerSchool enrollment status at the time of the attendance record. 0
          = active; 2 = transferred out. Used to exclude transferred-out
          students from chronic-absence metrics, matching the Tableau dashboard
          methodology.

      - name: is_absent
        data_type: int64
        description: >-
          1 if the student was absent, 0 if present. Sum-friendly flag.

      - name: is_tardy
        data_type: int64
        description: >-
          1 if the student was tardy (T-prefix attendance code), 0 otherwise.

      - name: is_ontime
        data_type: int64
        description: >-
          1 if the student arrived on time (non-tardy), 0 if tardy.

      - name: is_oss
        data_type: int64
        description: >-
          1 if the student received out-of-school suspension on this date (OS,
          OSS, OSSP, SHI codes), 0 otherwise.

      - name: is_iss
        data_type: int64
        description: >-
          1 if the student received in-school suspension on this date (S, ISS
          codes), 0 otherwise.

      - name: is_suspended
        data_type: int64
        description: >-
          1 if the student was suspended (any type) on this date. Union of
          is_oss and is_iss codes.

      - name: attendance_category
        data_type: string
        description: >-
          Coarse attendance category derived from the is_* flags with priority
          ordering (suspension > absent > tardy > present). Values:
          Out-of-School Suspension, In-School Suspension, Absent, Tardy,
          Present. Use this column for GROUP BY in BI tools; use the raw
          attendance_code for specific-code drill-down.

      - name: is_chronically_absent
        data_type: boolean
        description: >-
          TRUE if the student's cumulative ADA through this date is at or below
          90%. Running average of attendance_value on full membership days only
          (membership_value = 1), partitioned by student × academic year
          (cross-school), ordered by date. Point-in-time — filter to a single
          date to get YTD CA status as of that date. Filtering to a date range
          overcounts by including students CA at any point in the range. Null
          for Paterson records before academic_year 2026.

      - name: ada_tier
        data_type: string
        description: >-
          ADA tier based on cumulative attendance rate through this date. Tier 1
          = 95%+ ADA (on track). Tier 2 = 90–94% (at risk). Tier 3 = 80–89%
          (chronic). Tier 4 = below 80% (severe chronic). Partitioned by student
          × school × academic year, ordered by date. Null for Paterson records
          before academic_year 2026.

      - name: is_ca_eligible
        data_type: boolean
        description: >-
          TRUE if this student-day should be included in chronic absence
          calculations. FALSE for transferred-out students (enroll_status = 2)
          in the current academic year only, matching Tableau's methodology.
          Prior-year records are always eligible regardless of transfer status.

      - name: is_latest_record
        data_type: boolean
        description: >-
          TRUE for the most recent attendance record within this student
          enrollment. Use to query each student's latest CA status
          (is_chronically_absent, ada_tier) without requiring a date filter —
          equivalent to Tableau's MAX(calendardate) LOD approach. Future dates
          are excluded at the mart level (calendardate <= current_date).
