models:
  - name: fct_grades_assignments
    description: >-
      Assignment-level grade fact table. One row per student x assignment
      (assignmentsectionid x student). Contains score, points possible,
      missing/late/exempt flags, and category information. Assignments are
      matched to student enrollments only when the due date falls within the
      enrollment period. FK to dim_student_section_enrollments,
      dim_student_enrollments, dim_terms, and dim_dates (role-playing via
      due_date_key).
    columns:
      - name: grades_assignment_key
        data_type: string
        description: >-
          Foreign key. Internal number for the associated Assignment
          Section.Assignment Section IDrecord. Required. Indexed. Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Surrogate key.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          The code value that is stored in the database, such as Home and Work
          for phone types and Mand F for gender types. Indexed with the Code
          Type column. Required Surrogate key.

      - name: due_date_key
        data_type: date
        description: >-
          The date the assignment is due. Defaults to Default is the system date
          + 1 day. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: duedate
      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: assignment_name
        data_type: string
        description: >-
          Name of the assignment as entered in the PowerSchool gradebook.

      - name: category_name
        data_type: string
        description: >-
          Gradebook category name the assignment belongs to (e.g., Homework,
          Classwork, Assessment).

      - name: category_code
        data_type: string
        description: >-
          Short code for the gradebook category.

      - name: score_type
        data_type: string
        description: >-
          Indicates if this score is a letter grade or percent.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: scoretype
      - name: score
        data_type: float64
        description: >-
          Score entered for the student. For POINTS type this is scorepoints;
          for PERCENT type this is the numeric value of actualscoreentered. Null
          when the student has no score recorded.

      - name: points_possible
        data_type: float64
        description: >-
          This is the total weighted points that the assignment is worth. If the
          entry points are 25, and theweight is 4, then the total point value is
          100.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: totalpointvalue
      - name: score_percent
        data_type: float64
        description: >-
          Score as a percentage (0-100). For POINTS type this is (scorepoints /
          totalpointvalue) * 100; for PERCENT type this equals the entered
          value.

      - name: is_missing
        data_type: boolean
        description: >-
          Conditional on is_missing.

      - name: is_late
        data_type: boolean
        description: >-
          Conditional on is_late.

      - name: is_exempt
        data_type: boolean
        description: >-
          Conditional on is_exempt.

      - name: is_expected
        data_type: boolean
        description: >-
          TRUE if the student is expected to have a score for this assignment.
          FALSE when the assignment is exempt or not counted in the final grade.

      - name: is_counted_in_final_grade
        data_type: boolean
        description: >-
          Indicates if the assignment will count toward the final grade. Valid
          values: 0=Does not count towardfinal grade, 1=Counts toward final
          grade. Defaults to 1. Required. Conditional on iscountedinfinalgrade.
