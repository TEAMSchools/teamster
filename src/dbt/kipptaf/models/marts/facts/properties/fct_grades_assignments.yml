models:
  - name: fct_grades_assignments
    description: >-
      Assignment-level grade fact table. One row per student x assignment
      (assignmentsectionid x student). Contains score, points possible,
      missing/late/exempt flags, and category information. Assignments are
      matched to student enrollments only when the due date falls within the
      enrollment period. FK to dim_student_section_enrollments,
      dim_student_enrollments, dim_terms, and dim_dates (role-playing via
      due_date_key).
    columns:
      - name: grades_assignment_key
        data_type: string
        description: >-
          Surrogate key derived from assignmentsectionid, _dbt_source_relation,
          and students_dcid. Primary key for this fact.
        data_tests:
          - unique
          - not_null

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_section_enrollments. Surrogate key derived from
          cc_dcid and _dbt_source_relation.
        data_tests:
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Surrogate key derived from
          student_number, _dbt_source_relation, academic_year, and entrydate.
        data_tests:
          - not_null

      - name: term_key
        data_type: string
        description: >-
          FK to dim_terms. Surrogate key derived from type, code, name,
          start_date, region, and school_id. Null when due_date does not fall
          within any reporting term for the school and region.

      - name: due_date_key
        data_type: date
        description: >-
          The date the assignment is due. Defaults to Default is the system date
          + 1 day. Indexed.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: duedate
      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) in which this assignment falls.

      - name: name
        quote: true
        data_type: string
        description: >-
          Name of the assignment as entered in the PowerSchool gradebook.

      - name: category_name
        data_type: string
        description: >-
          Gradebook category name the assignment belongs to (e.g., Homework,
          Classwork, Assessment).

      - name: category_code
        data_type: string
        description: >-
          Short code for the gradebook category.

      - name: score_type
        data_type: string
        description: >-
          Indicates if this score is a letter grade or percent.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: scoretype
      - name: score
        data_type: float64
        description: >-
          Score entered for the student. For POINTS type this is scorepoints;
          for PERCENT type this is the numeric value of actualscoreentered. Null
          when the student has no score recorded.

      - name: max_points
        data_type: float64
        description: >-
          Maximum points possible for the assignment. Ed-Fi gradebookEntry
          max_points. If the entry points are 25 and the weight is 4, then the
          total point value is 100.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: totalpointvalue
      - name: score_percent
        data_type: float64
        description: >-
          Score as a percentage (0-100). For POINTS type this is (scorepoints /
          totalpointvalue) * 100; for PERCENT type this equals the entered
          value.

      - name: is_missing
        data_type: boolean
        description: >-
          TRUE if the assignment is flagged as missing in PowerSchool.

      - name: is_late
        data_type: boolean
        description: >-
          TRUE if the assignment is flagged as late in PowerSchool.

      - name: is_exempt
        data_type: boolean
        description: >-
          TRUE if the assignment is flagged as exempt (not counted).

      - name: is_expected
        data_type: boolean
        description: >-
          TRUE if the student is expected to have a score for this assignment.
          FALSE when the assignment is exempt or not counted in the final grade.

      - name: is_counted_in_final_grade
        data_type: boolean
        description: >-
          TRUE if this assignment contributes to the final grade calculation.
