models:
  - name: fct_work_assignment_additional_earnings
    description: >-
      Work assignment additional earnings fact table with source-native Type 2
      SCD tracking. One row per ADP work assignment x earning type x version.
      Unnests additionalRemunerations[] from the work assignment and uses each
      item's effectiveDate from ADP (not the daily partition date) to define
      version boundaries. Deduplicates across daily partitions by (item_id,
      earning_item_id, effectiveDate) before windowing.
    columns:
      - name: work_assignment_additional_earnings_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: effective_date_key
        data_type: date
        description: >-
          Role-playing foreign key to dim_dates. The effective date of this
          earnings version as a raw DATE value matching dim_dates.date_key.

      - name: earning_code
        data_type: string
        description: >-
          Degenerate dimension. ADP code value identifying the earning type,
          from additionalRemunerations.nameCode.codeValue (e.g., 'Rate 2').

      - name: earning_description
        data_type: string
        description: >-
          Degenerate dimension. Display name for the earning type, coalesced
          from longName and shortName of additionalRemunerations.nameCode.

      - name: rate_amount
        data_type: float64
        description: >-
          Dollar amount of the additional earning rate for this version, from
          additionalRemunerations.rate.amountValue.

      - name: effective_date_start
        data_type: date
        description: >-
          Date this earnings version became effective, from
          additionalRemunerations.effectiveDate.

      - name: effective_date_end
        data_type: date
        description: >-
          Last date this earnings version was effective. Computed as one day
          before the next version's effective_date_start (within the same
          assignment and earning type), or 9999-12-31 for the current version.

      - name: is_current_record
        data_type: boolean
        description: >-
          Conditional on effective_date_end.
