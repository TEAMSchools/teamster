models:
  - name: fct_work_assignment_additional_earnings
    description: >-
      Work assignment additional earnings fact table with source-native Type 2
      SCD tracking. One row per ADP work assignment x earning type x version.
      Unnests additionalRemunerations[] from the work assignment and uses each
      item's effectiveDate from ADP (not the daily partition date) to define
      version boundaries. Deduplicates across daily partitions by (item_id,
      earning_item_id, effectiveDate) before windowing.
    columns:
      - name: work_assignment_additional_earnings_key
        data_type: string
        description: >-
          Surrogate primary key derived from item_id, earning_item_id, and
          effective_date_start. Generated with
          generate_surrogate_key(["item_id", "earning_item_id",
          "effective_date_start"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: work_assignment_key
        data_type: string
        description: >-
          Foreign key to dim_staff_work_assignments. Surrogate key derived from
          item_id. Generated with generate_surrogate_key(["item_id"]).
        constraints:
          - type: foreign_key
            to: ref('dim_staff_work_assignments')
            to_columns: [work_assignment_key]
            warn_unsupported: false
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_staff_work_assignments')
                field: work_assignment_key

      - name: effective_start_date_key
        data_type: date
        description: >-
          Role-playing FK to dim_dates. The date this earnings version became
          effective, from additionalRemunerations.effectiveDate.

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: effective_end_date_key
        data_type: date
        description: >-
          Role-playing FK to dim_dates. Last date this earnings version was
          effective. Computed as one day before the next version's
          effective_start_date_key (within the same assignment and earning
          type), or 9999-12-31 for the current version.

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: earning_code
        data_type: string
        description: >-
          Degenerate dimension. ADP code value identifying the earning type,
          from additionalRemunerations.nameCode.codeValue (e.g., 'Rate 2').

      - name: earning_description
        data_type: string
        description: >-
          Degenerate dimension. Display name for the earning type, coalesced
          from longName and shortName of additionalRemunerations.nameCode.

      - name: rate_amount
        data_type: float64
        description: >-
          Dollar amount of the additional earning rate for this version, from
          additionalRemunerations.rate.amountValue.

      - name: is_current
        data_type: boolean
        description: >-
          TRUE if this is the most recent earnings version for the assignment
          and earning type (effective_end_date_key = 9999-12-31).
