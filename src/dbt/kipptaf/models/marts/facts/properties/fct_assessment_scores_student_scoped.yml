models:
  - name: fct_assessment_scores_student_scoped
    description: >-
      Student-scoped assessment score fact table. One row per student x
      assessment x test date (or academic year for AP). Covers college-entrance
      assessments (SAT, ACT, PSAT) and AP exams. These assessments follow the
      student directly without enrollment context. FK to dim_students via
      student_key, not to dim_student_section_enrollments.
    columns:
      - name: assessment_score_key
        data_type: string
        description: >-
          Surrogate key. Primary key for this fact table.
        data_tests:
          - unique
          - not_null

      - name: student_key
        data_type: string
        description: >-
          FK to dim_students. Derived from student_number.

      - name: assessment_key
        data_type: string
        description: >-
          FK to dim_assessments.

      - name: test_date_key
        data_type: date
        description: >-
          FK to dim_dates. The date the assessment was taken. Null for AP exams
          where only the academic year is recorded.

      - name: academic_year
        data_type: int64
        description: >-
          Academic year the assessment was administered.

      - name: score_type
        data_type: string
        description: >-
          Specific score variant (e.g., act_composite, sat_total_score,
          sat_ebrw, or AP course subject code).

      - name: scale_score
        data_type: numeric
        description: >-
          Scale score achieved on this test section. For AP exams, the exam
          grade (1-5).

      - name: administration_round
        data_type: string
        description: >-
          Administration round label. Null for AP exams.

      - name: test_type
        data_type: string
        description: >-
          Official or Practice.

      - name: score_rank
        data_type: int64
        description: >-
          Rank by highest score within student x score_type (college) or student
          x AP course (AP). 1 = best score.

      - name: max_scale_score
        data_type: numeric
        description: >-
          Highest scale score for this student x score_type across all
          administrations. Null for AP.

      - name: superscore
        data_type: numeric
        description: >-
          Best combined score across test sections and administrations. Null for
          AP.

      - name: running_max_scale_score
        data_type: numeric
        description: >-
          Running maximum scale score up to this test date. Null for AP.

      - name: proficiency_level
        data_type: string
        description: >-
          Proficiency classification. For AP: Qualified (score >= 3) or Not
          Qualified. Null for college-entrance assessments.

      - name: score_provider
        data_type: string
        description: >-
          Source provider: college (SAT/ACT/PSAT) or ap.
