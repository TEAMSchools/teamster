models:
  - name: fct_assessment_scores_enrollment_scoped
    description: >-
      Enrollment-scoped assessment score fact table. One row per student x
      assessment x administration. Covers internal Illuminate assessments and
      state assessments (NJSLA, NJGPA, FAST). Scores are linked to a student
      (via student_key) and an assessment administration (via
      assessment_administration_key).
    columns:
      - name: assessment_score_key
        data_type: string
        description: >-
          Surrogate key. Primary key for this fact table.
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: assessment_administration_key
        data_type: string
        description: >-
          FK to dim_assessment_administrations. Identifies the scheduled
          administration (assessment definition + occurrence context: academic
          year, region, season/window) that this score belongs to.

        constraints:
          - type: foreign_key
            to: ref('dim_assessment_administrations')
            to_columns: [assessment_administration_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_assessment_administrations')
                field: assessment_administration_key
      - name: student_key
        data_type: string
        description: >-
          FK to dim_students. Hashed on student_number (PowerSchool-sourced for
          internal Illuminate, NJ Pearson localstudentidentifier, and FL via
          FLEID lookup in int_fldoe__all_assessments). Null when the source
          identifier does not resolve to a row in dim_students — for state
          assessments, a left join validates that student_number exists in
          dim_students before hashing.

        constraints:
          - type: foreign_key
            to: ref('dim_students')
            to_columns: [student_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_students')
                field: student_key
      - name: test_date_key
        data_type: date
        description: >-
          FK to dim_dates. The date the assessment was taken.

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key

      - name: scale_score
        data_type: numeric
        description: >-
          Scale score achieved. Null for internal assessments that use percent
          correct instead.

      - name: percent_correct
        data_type: numeric
        description: >-
          Percent of questions answered correctly. Null for state assessments.

      - name: proficiency_level
        data_type: string
        description: >-
          Proficiency band label (e.g., performance band for internal,
          achievement level for state).

      - name: is_mastery
        data_type: boolean
        description: >-
          TRUE if the student met the mastery or proficiency threshold for this
          assessment.
