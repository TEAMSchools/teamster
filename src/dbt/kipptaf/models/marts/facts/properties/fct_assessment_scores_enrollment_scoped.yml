models:
  - name: fct_assessment_scores_enrollment_scoped
    description: >-
      Enrollment-scoped assessment score fact table. One row per student x
      assessment x administration. Covers internal Illuminate assessments, state
      assessments (NJSLA, NJGPA, FAST), and vendor benchmark assessments
      (i-Ready Diagnostic, STAR, DIBELS Composite). Each row is linked to an
      assessment administration (via assessment_administration_key) and to the
      student's resolved section enrollment (via student_section_enrollment_key
      and enrollment_resolution).
    config:
      materialized: table
    columns:
      - name: assessment_score_key
        data_type: string
        description: >-
          Surrogate key. Primary key for this fact table.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: assessment_administration_key
        data_type: string
        description: >-
          FK to dim_assessment_administrations. Identifies the scheduled
          administration (assessment definition + occurrence context: academic
          year, region, season/window) that this score belongs to.
        constraints:
          - type: foreign_key
            to: ref('dim_assessment_administrations')
            to_columns: [assessment_administration_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_assessment_administrations')
                field: assessment_administration_key

      - name: enrollment_resolution
        data_type: string
        description: >-
          How the section enrollment was resolved: subject_section (the section
          for the assessment's subject, active on the test date) or homeroom
          (the student's HR section, used when no subject section resolved).
          Filter to subject_section for course/section-level rollups.
        data_tests:
          - accepted_values:
              arguments:
                values: [subject_section, homeroom]

      - name: student_section_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_section_enrollments. The student's section
          enrollment resolved by int_assessments__resolved_section_enrollments —
          subject section active on the test date, falling back to homeroom when
          no subject section resolves (see enrollment_resolution). Populated for
          every row; homeroom-resolved rows are coarser-grained than
          subject_section rows.
        constraints:
          - type: foreign_key
            to: ref('dim_student_section_enrollments')
            to_columns: [student_section_enrollment_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_student_section_enrollments')
                field: student_section_enrollment_key

      - name: test_date_key
        data_type: date
        description: >-
          FK to dim_dates. The date the assessment was taken. Populated for
          state assessments (now threaded from source); nullable for internal
          rows that lack a recorded sitting date upstream.
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key

      - name: assessment_date_key
        data_type: date
        description: >-
          FK to dim_dates for academic-year and calendar rollups. The
          administration date where the administration records one (internal
          Illuminate and college), otherwise the student's test date (state and
          vendor administrations span a window and carry no single date).
          Populated for every row, so academic year resolves for all sources —
          unlike the administration date alone, which is null for state and
          vendor rows.
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key

      - name: scale_score
        data_type: numeric
        description: >-
          Scale score achieved. Null for internal assessments that use percent
          correct instead.

      - name: percent_correct
        data_type: numeric
        description: >-
          Percent of questions answered correctly. Null for state assessments.

      - name: national_percentile
        data_type: numeric
        description: >-
          National norm-referenced percentile rank for the attempt where the
          vendor provides one (i-Ready percentile, STAR percentile rank, DIBELS
          measure percentile). This is an achievement percentile, not a growth
          percentile. Null for internal and state assessments.

      - name: proficiency_level
        data_type: string
        description: >-
          Proficiency band label (e.g., performance band for internal,
          achievement level for state).

      - name: is_mastery
        data_type: boolean
        description: >-
          TRUE if the student met the mastery or proficiency threshold for this
          assessment.

      - name: response_type
        data_type: string
        description: >-
          The response type associated with the assessment score (e.g., overall,
          strand, standard). Null for state assessments.

      - name: response_type_code
        data_type: string
        description: >-
          Short code identifying the response type. Null for state assessments.

      - name: response_type_description
        data_type: string
        description: >-
          Human-readable description of the response type. Null for state
          assessments.

      - name: response_type_root_description
        data_type: string
        description: >-
          Description of the root (top-level) response type in the hierarchy.
          Null for state assessments.

      - name: is_replacement
        data_type: boolean
        description: >-
          Illuminate-only flag. TRUE when a K-8 student sat a
          replacement-curriculum assessment off their enrolled grade level. Null
          for all non-Illuminate sources (state and vendor), which have no
          replacement-curriculum concept.

      - name: performance_band_label_number
        data_type: numeric
        description: >-
          Numeric ordering of the performance band label within the assessment's
          band scale. Null for state assessments.
