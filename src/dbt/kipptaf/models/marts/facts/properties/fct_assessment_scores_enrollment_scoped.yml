models:
  - name: fct_assessment_scores_enrollment_scoped
    description: >-
      Enrollment-scoped assessment score fact table. One row per student x
      assessment x administration. Covers internal Illuminate assessments and
      state assessments (NJSLA, NJGPA, FAST). Scores are linked to a student
      (via student_key) and an assessment definition (via assessment_key).
    columns:
      - name: assessment_score_key
        data_type: string
        description: >-
          Surrogate key. Primary key for this fact table.
        data_tests:
          - unique
          - not_null

      - name: assessment_key
        data_type: string
        description: >-
          FK to dim_assessments.

      - name: student_key
        data_type: string
        description: >-
          FK to dim_students. Derived from student_number, falling back to
          state_student_id for FL state assessments where student_number is
          null. FL fallback keys do not resolve in dim_students (#3626).

      - name: test_date_key
        data_type: date
        description: >-
          FK to dim_dates. The date the assessment was taken.

      - name: student_number
        data_type: int64
        description: >-
          District-assigned student identification number. Source: PowerSchool
          stg_powerschool__student_email.student_number.

        config:
          meta:
            contains_pii: true
      - name: academic_year
        data_type: int64
        description: >-
          Academic year the assessment was administered.

      - name: assessment_title
        data_type: string
        description: >-
          Display name of the assessment.

      - name: scope
        data_type: string
        description: >-
          Assessment scope or discipline.

      - name: subject_area
        data_type: string
        description: >-
          Subject tested.

      - name: module_code
        data_type: string
        description: >-
          Module or test code for the specific assessment variant.

      - name: region
        data_type: string
        description: >-
          Network region or season identifier.

      - name: test_date
        data_type: date
        description: >-
          Date the assessment was taken. Null for state assessments where only
          the administration window is recorded.

      - name: scale_score
        data_type: numeric
        description: >-
          Scale score achieved. Null for internal assessments that use percent
          correct instead.

      - name: percent_correct
        data_type: numeric
        description: >-
          Percent of questions answered correctly. Null for state assessments.

      - name: proficiency_level
        data_type: string
        description: >-
          Proficiency band label (e.g., performance band for internal,
          achievement level for state).

      - name: growth_percentile
        data_type: numeric
        description: >-
          Growth percentile where available. Currently null; reserved for future
          enrichment.

      - name: is_mastery
        data_type: boolean
        description: >-
          TRUE if the student met the mastery or proficiency threshold for this
          assessment.

      - name: score_source
        data_type: string
        description: >-
          Source system: internal, state_nj, or state_fl.
