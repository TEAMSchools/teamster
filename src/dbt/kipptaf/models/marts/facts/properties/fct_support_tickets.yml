models:
  - name: fct_support_tickets
    description: >-
      IT support ticket fact table. One row per staff-submitted ticket. Scoped
      to tickets submitted by active KIPP staff members (inner join to staff
      roster). Contains ticket status, subject, category, tech_tier, reply
      count, and business-hours-to-solve metrics from Zendesk. Foreign keys to
      dim_staff (submitter, assignee, and original_assignee as role-playing
      dimensions — assignee and original_assignee are nullable), dim_dates
      (created and solved as role-playing — solved is nullable), and
      dim_locations.
    columns:
      - name: support_ticket_key
        data_type: string
        description: >-
          Surrogate primary key derived from ticket id. Generated with
          generate_surrogate_key(["t.id"]).
        data_tests:
          - unique
          - not_null

      - name: submitter_staff_key
        data_type: string
        description: >-
          Foreign key to dim_staff for the ticket submitter. Surrogate key
          derived from submitter employee_number.
        data_tests:
          - not_null

      - name: assignee_staff_key
        data_type: string
        description: >-
          Foreign key to dim_staff for the current ticket assignee. Surrogate
          key derived from assignee employee_number. Nullable — unassigned
          tickets have no assignee.

      - name: original_assignee_staff_key
        data_type: string
        description: >-
          Foreign key to dim_staff for the original assignee at ticket creation.
          Surrogate key derived from original assignee employee_number. Nullable
          — not all tickets have a creation-time assignee.

      - name: location_key
        data_type: string
        description: >-
          Foreign key to dim_locations. Surrogate key derived from the Location
          custom field value on the ticket. Currently fails 100% relationships
          against dim_locations pending Zendesk-slug → canonical-location
          crosswalk (#3709).
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
              config:
                severity: warn

      - name: created_date_key
        data_type: date
        description: >-
          Foreign key to dim_dates for the date the ticket was created. Matches
          dim_dates.date_key.
        data_tests:
          - not_null

      - name: solved_date_key
        data_type: date
        description: >-
          Foreign key to dim_dates for the date the ticket was solved. Matches
          dim_dates.date_key. Nullable — open or pending tickets have no solved
          date.

      - name: status
        data_type: string
        description: >-
          Zendesk ticket workflow status (closed, open, new, pending, solved).

      - name: subject
        data_type: string
        description: Subject line of the ticket as entered by the submitter.

      - name: category
        data_type: string
        description: >-
          Ticket category from the Zendesk custom Category field (e.g.,
          Hardware, Software, Access).

      - name: tech_tier
        data_type: string
        description: >-
          Technology tier classification from the Zendesk custom Tech Tier
          field, indicating complexity or routing level.

      - name: reply_count
        data_type: int64
        description:
          Total number of public replies on the ticket from ticket_metrics.

      - name: business_minutes_to_solve
        data_type: int64
        description: >-
          Total time to full resolution in business-hours minutes
          (full_resolution_time_in_minutes.business from ticket_metrics).

      - name: business_minutes_to_first_reply
        data_type: int64
        description: >-
          Time to first reply in business-hours minutes
          (reply_time_in_minutes.business from ticket_metrics).

      - name: agent_reassignment_count
        data_type: int64
        description:
          Number of times the ticket was assigned to a different agent.

      - name: group_reassignment_count
        data_type: int64
        description:
          Number of times the ticket was assigned to a different group.

      - name: created_timestamp
        data_type: timestamp
        description: Timestamp when the ticket was created in Zendesk.

      - name: initially_assigned_timestamp
        data_type: timestamp
        description: Timestamp when the ticket was first assigned to an agent.

      - name: assignee_updated_timestamp
        data_type: timestamp
        description: Timestamp when the ticket assignee was last updated.

      - name: solved_timestamp
        data_type: timestamp
        description:
          Timestamp when the ticket was solved. Null for unsolved tickets.

      - name: url
        data_type: string
        description: Direct URL to the ticket in the Zendesk agent interface.
