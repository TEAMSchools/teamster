models:
  - name: fct_support_tickets
    description: >-
      IT support ticket fact table. One row per staff-submitted ticket. Scoped
      to tickets submitted by active KIPP staff members (inner join to staff
      roster). Contains ticket status, subject, category, tech_tier, reply
      count, and business-hours-to-solve metrics from Zendesk. Foreign keys to
      dim_staff (submitter, assignee, and original_assignee as role-playing
      dimensions — assignee and original_assignee are nullable), dim_dates
      (created and solved as role-playing — solved is nullable), and
      dim_locations.
    columns:
      - name: support_ticket_key
        data_type: string
        description: >-
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed. Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: submitter_staff_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: assignee_staff_key
        data_type: string
        description: >-
          Surrogate key.

      - name: original_assignee_staff_key
        data_type: string
        description: >-
          Surrogate key.

      - name: location_key
        data_type: string
        description: >-
          Surrogate key.

      - name: created_date_key
        data_type: date
        description: >-
          Foreign key to dim_dates for the date the ticket was created. Matches
          dim_dates.date_key.
        data_tests:
          - not_null

      - name: solved_date_key
        data_type: date
        description: >-
          Foreign key to dim_dates for the date the ticket was solved. Matches
          dim_dates.date_key. Nullable — open or pending tickets have no solved
          date.

      - name: ticket_id
        data_type: int64
        description: >-
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        data_tests:
          - unique
          - not_null

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: id
            column_role: primary_key
      - name: ticket_status
        data_type: string
        description: >-
          Indicates if the course was made either by a user or automatically by
          an import. Validvalues: 0=user-created, 3=auto-created.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__courses
            source_column: status
      - name: ticket_subject
        data_type: string
        description: Subject line of the ticket as entered by the submitter.

      - name: category
        data_type: string
        description: >-
          Ticket category from the Zendesk custom Category field (e.g.,
          Hardware, Software, Access).

      - name: tech_tier
        data_type: string
        description: >-
          Technology tier classification from the Zendesk custom Tech Tier
          field, indicating complexity or routing level.

      - name: ticket_location
        data_type: string
        description: >-
          Location value from the Zendesk custom Location field on the ticket.

      - name: reply_count
        data_type: int64
        description:
          Total number of public replies on the ticket from ticket_metrics.

      - name: business_minutes_to_solve
        data_type: int64
        description: >-
          Total time to full resolution in business-hours minutes
          (full_resolution_time_in_minutes.business from ticket_metrics).

      - name: reply_time_in_minutes_business
        data_type: int64
        description: >-
          Time to first reply in business-hours minutes
          (reply_time_in_minutes.business from ticket_metrics).

      - name: assignee_stations
        data_type: int64
        description:
          Number of times the ticket was assigned to a different agent.

      - name: group_stations
        data_type: int64
        description:
          Number of times the ticket was assigned to a different group.

      - name: created_date
        data_type: date
        description: Calendar date the ticket was created.

      - name: created_at
        data_type: timestamp
        description: Timestamp when the ticket was created in Zendesk.

      - name: initially_assigned_at
        data_type: timestamp
        description: Timestamp when the ticket was first assigned to an agent.

      - name: assignee_updated_at
        data_type: timestamp
        description: Timestamp when the ticket assignee was last updated.

      - name: solved_at
        data_type: timestamp
        description:
          Timestamp when the ticket was solved. Null for unsolved tickets.

      - name: ticket_url
        data_type: string
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed. Derived from id.
