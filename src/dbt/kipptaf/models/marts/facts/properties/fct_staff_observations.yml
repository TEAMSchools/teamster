models:
  - name: fct_staff_observations
    description: >-
      Staff observation fact table. One row per observation event. Contains
      overall observation score, glows, grows, and observation metadata.
      Combines SchoolMint Grow live observations (2024+) with historical
      walkthrough data (2023). Foreign keys to dim_staff (teacher and observer
      as role-playing dimensions), dim_locations, and dim_terms.
    columns:
      - name: staff_observation_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - unique
          - not_null

      - name: teacher_staff_key
        data_type: string
        description: >-
          Surrogate key.
        data_tests:
          - not_null

      - name: observer_staff_key
        data_type: string
        description: >-
          Surrogate key.

      - name: location_key
        data_type: string
        description: >-
          Surrogate key.

      - name: term_key
        data_type: string
        description: >-
          Surrogate key.

      - name: observation_id
        data_type: string
        description: >-
          SchoolMint Grow unique identifier for the observation event.
        data_tests:
          - unique
          - not_null

      - name: teacher_employee_number
        data_type: int64
        description: >-
          KIPP employee number of the observed teacher.

      - name: observer_employee_number
        data_type: int64
        description: >-
          KIPP employee number of the observer.

      - name: academic_year
        data_type: int64
        description: >-
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').

        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: observed_at_date
        data_type: date
        description: >-
          Local date the observation was conducted.

      - name: observed_at_timestamp
        data_type: timestamp
        description: >-
          UTC timestamp when the observation was conducted.

      - name: observation_score
        data_type: float64
        description: >-
          Overall numeric score for the observation, averaged across measurement
          items.

      - name: overall_tier
        data_type: int64
        description: >-
          Performance tier (1-4) derived from the overall observation score
          using standard thresholds.

      - name: glows
        data_type: string
        description: >-
          Pipe-delimited list of positive feedback items (strengths) recorded
          during the observation.

      - name: grows
        data_type: string
        description: >-
          Pipe-delimited list of growth areas (improvements needed) recorded
          during the observation.

      - name: locked
        data_type: boolean
        description: >-
          TRUE if the observation has been locked and cannot be edited.

      - name: observation_notes
        data_type: string
        description: >-
          Free-text observation notes (magic notes or shared notes).

      - name: rubric_name
        data_type: string
        description: >-
          Name of the rubric used for this observation.

      - name: observation_type
        data_type: string
        description: >-
          Full name of the observation type (e.g., Walkthrough, One-on-One).

      - name: observation_type_abbreviation
        data_type: string
        description: >-
          A short 1 or 2 character version of the Name, such as A.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cycle_day
            source_column: abbreviation
      - name: term_code
        data_type: string
        description: >-
          Code of the reporting term this observation falls within.

      - name: term_name
        data_type: string
        description: >-
          Name of the reporting term this observation falls within.

      - name: eval_date
        data_type: date
        description: >-
          Evaluation date assigned based on PM round logic. Null for non-PM
          observation types.
