models:
  - name: fct_job_candidate_applications
    description: >-
      Job candidate application fact table. One row per application. Contains
      application status, stage, dates, and time-in-stage metrics from
      SmartRecruiters. Foreign keys to dim_job_candidates, dim_job_postings, and
      dim_locations. No FK to dim_staff or dim_staffing_positions —
      SmartRecruiters is an isolated domain.
    columns:
      - name: job_candidate_application_key
        data_type: string
        description: >-
          Surrogate primary key derived from application_id. Generated with
          generate_surrogate_key(["application_id"]).
        constraints:
          - type: primary_key
            warn_unsupported: false
        data_tests:
          - unique
          - not_null

      - name: job_candidate_key
        data_type: string
        description: >-
          Foreign key to dim_job_candidates. Surrogate key derived from
          candidate_id.
        constraints:
          - type: foreign_key
            to: ref('dim_job_candidates')
            to_columns: [job_candidate_key]
            warn_unsupported: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('dim_job_candidates')
                field: job_candidate_key
      - name: shared_with_location_key
        data_type: string
        description: >-
          Foreign key to dim_locations for the location this application is
          shared with. Resolved by joining `int_people__location_crosswalk` on
          `school_shared_with = name` (SmartRecruiters exposes a typed location
          string, not a stable ID, so resolution goes through the alias
          crosswalk; text variants like `KIPP High School` → `KIPP Cooper
          Norcross High` are alias rows on the crosswalk). Nullable when the
          application has no shared location.
        constraints:
          - type: foreign_key
            to: ref('dim_locations')
            to_columns: [location_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_locations')
                field: location_key
      - name: job_posting_key
        data_type: string
        description: >-
          Foreign key to dim_job_postings. Surrogate key derived from job_title,
          department_internal, and job_city.

        constraints:
          - type: foreign_key
            to: ref('dim_job_postings')
            to_columns: [job_posting_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_job_postings')
                field: job_posting_key
      - name: created_date_key
        data_type: date
        description: >-
          Foreign key to dim_dates for the date the application entered the New
          stage. Matches dim_dates.date_key.

        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: state
        data_type: string
        description: >-
          Current high-level application state (New, Lead, In Review, Interview,
          Offered, Hired, Rejected, Withdrawn).

      - name: reason_for_rejection
        data_type: string
        description:
          Reason code for why the application was rejected, if applicable.

      - name: reason_for_withdrawal
        data_type: string
        description: Reason code for why the candidate withdrew, if applicable.

      - name: status_before_rejection
        data_type: string
        description: The application status immediately before rejection.

      - name: status_before_withdrawal
        data_type: string
        description: The application status immediately before withdrawal.

      - name: source
        data_type: string
        description: Application-level source channel.

      - name: source_type
        data_type: string
        description: Application-level source type.

      - name: source_subtype
        data_type: string
        description: Application-level source subtype.

      - name: subject_preference
        data_type: string
        description: >-
          Candidate's subject area preference for teaching roles. Defaults to
          'No Preference' when not specified.

      - name: average_rating
        data_type: numeric
        description:
          Average numeric rating given to the application by reviewers.

      - name: resume_score
        data_type: int64
        description:
          Integer score assigned to the candidate's resume during review.

      - name: created_timestamp
        data_type: datetime
        description: >-
          Timestamp the application was created (entered the SmartRecruiters New
          state). Pairs with created_date_key.

      - name: lead_date
        data_type: date
        description: Date the application entered the Lead state.

      - name: lead_timestamp
        data_type: datetime
        description: Timestamp the application entered the Lead state.

      - name: hired_date
        data_type: date
        description: Date the application reached the Hired state.

      - name: hired_timestamp
        data_type: datetime
        description: Timestamp the application reached the Hired state.

      - name: offer_date
        data_type: date
        description: Date an offer was made.

      - name: offer_timestamp
        data_type: datetime
        description: Timestamp an offer was made.

      - name: rejected_date
        data_type: date
        description: Date the application was rejected.

      - name: rejected_timestamp
        data_type: datetime
        description: Timestamp the application was rejected.

      - name: last_updated_date
        data_type: date
        description: Date the application record was last updated.

      - name: last_update_timestamp
        data_type: datetime
        description: Timestamp the application record was last updated.

      - name: demo_date
        data_type: date
        description: Date of the demo/teaching demonstration interview step.

      - name: demo_timestamp
        data_type: datetime
        description:
          Timestamp of the demo/teaching demonstration interview step.

      - name: phone_screen_requested_date
        data_type: date
        description: Date the phone screen was requested.

      - name: phone_screen_requested_timestamp
        data_type: datetime
        description: Timestamp the phone screen was requested.

      - name: phone_screen_complete_date
        data_type: date
        description: Date the phone screen was completed.

      - name: phone_screen_complete_timestamp
        data_type: datetime
        description: Timestamp the phone screen was completed.

      - name: invited_to_selection_day_date
        data_type: date
        description: Date the candidate was invited to Selection Day.

      - name: invited_to_selection_day_timestamp
        data_type: datetime
        description: Timestamp the candidate was invited to Selection Day.

      - name: selection_day_date
        data_type: date
        description: Date of the candidate's Selection Day event.

      - name: selection_day_timestamp
        data_type: datetime
        description: Timestamp of the candidate's Selection Day event.

      - name: time_in_application_state_new
        data_type: int64
        description: Number of days the application spent in the New state.

      - name: time_in_application_state_lead
        data_type: int64
        description: Number of days the application spent in the Lead state.

      - name: time_in_application_state_in_review
        data_type: int64
        description:
          Number of days the application spent in the In Review state.

      - name: time_in_application_state_interview
        data_type: int64
        description:
          Number of days the application spent in the Interview state.

      - name: time_in_application_state_offered
        data_type: int64
        description: Number of days the application spent in the Offered state.

      - name: time_in_application_status_in_review_resume_review
        data_type: int64
        description: >-
          Number of days the application spent in the In Review — Resume Review
          status.

      - name: time_in_application_status_interview_demo
        data_type: int64
        description: Number of days spent in the Interview — Demo status.

      - name: time_in_application_status_interview_phone_screen_requested
        data_type: int64
        description:
          Number of days spent in the Interview — Phone Screen Requested status.

      - name: time_in_application_status_interview_phone_screen_complete
        data_type: int64
        description:
          Number of days spent in the Interview — Phone Screen Complete status.

      - name: status_interview_performance_task_timestamp
        data_type: timestamp
        description: >-
          Timestamp the application entered the Interview — Performance Task
          status. Cast from source string at the mart layer.

      - name: phone_interview_score
        data_type: int64
        description: Score assigned during the phone interview.

      - name: url
        data_type: string
        description: Direct URL to the application in SmartRecruiters.
