models:
  - name: fct_behavioral_incidents
    description: >-
      Behavioral incident fact table. One row per student x incident from
      DeansList. Contains incident category, tier, infraction, and referral
      information as degenerate dimensions. Referring staff identified by name
      (no employee_number available from DeansList). FK to
      dim_student_enrollments and dim_dates.
    columns:
      - name: behavioral_incident_key
        data_type: string
        description: >-
          Surrogate key derived from incident_id and _dbt_source_relation.
          Primary key for this fact.
        data_tests:
          - unique
          - not_null

      - name: student_enrollment_key
        data_type: string
        description: >-
          FK to dim_student_enrollments. Surrogate key derived from
          student_number, _dbt_source_relation, academic_year, and entrydate.
        data_tests:
          - not_null

      - name: referring_staff_key
        data_type: string
        description: >-
          FK to dim_staff for the staff member who created the incident. Derived
          from the DeansList user's email resolved to an employee_number via
          int_people__staff_roster, then hashed with generate_surrogate_key.
          Nullable when the DeansList user cannot be matched to a staff record.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_staff')
                field: staff_key

      - name: date_key
        data_type: date
        description: >-
          Date the incident was created. FK to dim_dates.

      - name: academic_year
        data_type: int64
        description: >-
          KIPP academic year (July start) derived from the incident creation
          timestamp.

      - name: incident_category
        data_type: string
        description: >-
          Category assigned to the incident in DeansList.

      - name: category_tier
        data_type: string
        description: >-
          Tier code from DeansList (T1, T2, T3, SW, TX, etc.).

      - name: infraction_description
        data_type: string
        description: >-
          Specific infraction description recorded in DeansList.

      - name: incident_location
        data_type: string
        description: >-
          Physical location within the school where the incident occurred.

      - name: incident_context
        data_type: string
        description: >-
          Context or setting of the incident (e.g., classroom, hallway).

      - name: incident_status
        data_type: string
        description: >-
          Indicates if the course was made either by a user or automatically by
          an import. Validvalues: 0=user-created, 3=auto-created.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__courses
            source_column: status
      - name: referral_tier
        data_type: string
        description: >-
          Normalized severity tier (Low, Middle, High, Social Work,
          Non-Behavioral, Other). Derived from category_tier with
          region-specific mappings.

      - name: is_referral
        data_type: boolean
        description: >-
          TRUE if the incident is flagged as a referral in DeansList.

      - name: is_active
        data_type: boolean
        description: >-
          TRUE if the incident is currently active (not archived/closed).

      - name: incident_date
        data_type: date
        description: >-
          Date the incident was created, cast from create_ts_date.

      - name: close_date
        data_type: date
        description: >-
          Date the incident was closed. Null if still open.

      - name: return_date
        data_type: date
        description: >-
          Date the student is expected to return. Null if not applicable.
