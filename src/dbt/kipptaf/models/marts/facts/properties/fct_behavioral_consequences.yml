models:
  - name: fct_behavioral_consequences
    description: >-
      Behavioral consequence fact table. One row per student x incident x
      consequence (penalty) from DeansList. Child of fct_behavioral_incidents
      via behavioral_incident_key. Student, location, and region context are
      traversed through the parent incident. FK to fct_behavioral_incidents and
      dim_dates (role-playing via start_date_key and end_date_key).
    columns:
      - name: behavioral_consequence_key
        data_type: string
        description: >-
          Surrogate key derived from incident_id, incident_penalty_id, and
          _dbt_source_relation. Primary key for this fact.
        data_tests:
          - unique
          - not_null

      - name: behavioral_incident_key
        data_type: string
        description: >-
          FK to fct_behavioral_incidents. Surrogate key derived from incident_id
          and _dbt_source_relation.
        data_tests:
          - not_null

      - name: start_date_key
        data_type: date
        description: >-
          The start date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: start_date
      - name: end_date_key
        data_type: date
        description: >-
          The end date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: end_date
      - name: incident_id
        data_type: int64
        description: >-
          DeansList incident identifier linking to the parent incident.

      - name: incident_penalty_id
        data_type: int64
        description: >-
          DeansList unique identifier for this specific consequence record.

      - name: consequence_type
        data_type: string
        description: >-
          Name of the consequence/penalty assigned (e.g., Out of School
          Suspension, In School Suspension, Detention).

      - name: suspension_type
        data_type: string
        description: >-
          Normalized suspension type code (OSS or ISS). Null for non-suspension
          consequences.

      - name: num_days
        data_type: float64
        description: >-
          Number of days assigned for this consequence. May be fractional for
          partial-day consequences.

      - name: num_periods
        data_type: numeric
        description: >-
          Number of class periods assigned for this consequence. Null when
          measured in days instead.

      - name: is_suspension
        data_type: boolean
        description: >-
          TRUE if this consequence is classified as a suspension in DeansList.

      - name: is_reportable
        data_type: boolean
        description: >-
          TRUE if this consequence is flagged as reportable for state reporting.

      - name: consequence_start_date
        data_type: date
        description: >-
          The start date of the association of this teacher to this section.

        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: start_date
      - name: consequence_end_date
        data_type: date
        description: >-
          The end date of the association of this teacher to this section.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sectionteacher
            source_column: end_date
