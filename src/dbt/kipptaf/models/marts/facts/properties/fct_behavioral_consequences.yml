models:
  - name: fct_behavioral_consequences
    description: >-
      Behavioral consequence fact table. One row per student x incident x
      consequence (penalty) from DeansList. Child of fct_behavioral_incidents
      via behavioral_incident_key. Student, location, and region context are
      traversed through the parent incident. FK to fct_behavioral_incidents and
      dim_dates (role-playing via start_date_key and end_date_key).
    columns:
      - name: behavioral_consequence_key
        data_type: string
        description: >-
          Surrogate key derived from incident_id, incident_penalty_id, and
          _dbt_source_project. Primary key for this fact.
        constraints:
          - type: primary_key
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - unique
          - not_null

      - name: behavioral_incident_key
        data_type: string
        description: >-
          FK to fct_behavioral_incidents. Surrogate key derived from incident_id
          and _dbt_source_project.
        constraints:
          - type: foreign_key
            to: ref('fct_behavioral_incidents')
            to_columns: [behavioral_incident_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - not_null

          - relationships:
              arguments:
                to: ref('fct_behavioral_incidents')
                field: behavioral_incident_key
      - name: start_date_key
        data_type: date
        description: >-
          FK to dim_dates. The date the consequence began.

        config:
          meta:
            source_system: DeansList
            source_model: int_deanslist__incidents__penalties
            source_column: start_date
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: end_date_key
        data_type: date
        description: >-
          FK to dim_dates. The date the consequence ended.

        config:
          meta:
            source_system: DeansList
            source_model: int_deanslist__incidents__penalties
            source_column: end_date
        constraints:
          - type: foreign_key
            to: ref('dim_dates')
            to_columns: [date_key]
            warn_unsupported: false
            warn_unenforced: false
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: date_key
      - name: type
        quote: true
        data_type: string
        description: >-
          Name of the consequence/penalty assigned (e.g., Out of School
          Suspension, In School Suspension, Detention).

      - name: suspension_type
        data_type: string
        description: >-
          Normalized suspension type code (OSS or ISS). Null for non-suspension
          consequences.

      - name: days_assigned
        data_type: float64
        description: >-
          Number of days assigned for this consequence. May be fractional for
          partial-day consequences.

      - name: periods_assigned
        data_type: numeric
        description: >-
          Number of class periods assigned for this consequence. Null when
          measured in days instead.

      - name: is_suspension
        data_type: boolean
        description: >-
          TRUE if this consequence is classified as a suspension in DeansList.

      - name: is_reportable
        data_type: boolean
        description: >-
          TRUE if this consequence is flagged reportable in the DeansList
          penalty configuration. The specific reporting frame (state DOE / EWEG
          / federal CRDC / internal) is set per-penalty by DeansList admins and
          is not encoded in the flag itself — verify the penalty's intended
          reporting scope in DL config before aggregating for a compliance
          submission.
