models:
  - name: dim_seats

    columns:
      - name: seats_key
        data_type: string
        tests:
          - unique:
              config:
                severity: warn
                store_failures: true

      - name: academic_year
        data_type: int64

      - name: staffing_model_id
        data_type: string

      - name: entity
        data_type: string

      - name: grade_band
        data_type: string

      - name: recruitment_group
        data_type: string

      - name: home_department_name
        data_type: string

      - name: job_title
        data_type: string

      - name: home_work_location_name
        data_type: string

      - name: location_short_name
        data_type: string

      - name: recruiter_employee_number
        data_type: int64

      - name: teammate_employee_number
        data_type: int64

      - name: plan_status
        data_type: string

      - name: staffing_status
        data_type: string

      - name: status_detail
        data_type: string

      - name: is_mid_year_hire
        data_type: boolean

      - name: effective_date_start
        data_type: timestamp

      - name: effective_date_end
        data_type: timestamp
