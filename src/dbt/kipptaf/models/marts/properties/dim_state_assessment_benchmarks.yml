models:
  - name: dim_state_assessment_benchmarks

    columns:
      - name: state_assessment_benchmarks_key
        data_type: string
        description: >
          Surrogate key on (academic_year, assessment_name, aligned_test_code,
          region, school_level, grade_range_band, season,
          aligned_comparison_demographic_group,
          aligned_comparison_demographic_subgroup).
        data_tests:
          - unique

      - name: academic_year
        data_type: int64
        description: Academic year the benchmarks apply to.

      - name: assessment_name
        data_type: string
        description: State assessment test name (e.g. NJSLA, NJGPA).

      - name: season
        data_type: string
        description: Testing season (always Spring for benchmarks).

      - name: school_level
        data_type: string
        description:
          School level the benchmark applies to (ES, MS, HS, or hybrid MS_HS for
          ALG01, or HS_09, and HS_10 for ALG02, GEO01).

      - name: grade_range_band
        data_type: string
        description: Grade band for the benchmark (e.g. 3-8, HS).

      - name: discipline
        data_type: string
        description: Subject discipline (Math, ELA, Science, Social Studies).

      - name: aligned_test_code
        data_type: string
        description: State assessment test code (e.g. ELA05, ALG01).

      - name: region
        data_type: string
        description: >
          Network region the comparison applies to (Newark, Camden, Miami,
          Paterson).

      - name: aligned_comparison_demographic_group
        data_type: string
        description: >
          Demographic group after alignment — Grade rows with subgroups 08/09/10
          are remapped to 'Total'.

      - name: aligned_comparison_demographic_subgroup
        data_type: string
        description: >
          Demographic subgroup after alignment — Grade group rows are remapped
          to 'All Students'.

      - name: city_percent_proficient
        data_type: float64
        description: City-wide percent proficient on this assessment.

      - name: state_percent_proficient
        data_type: float64
        description: State-wide percent proficient on this assessment.

      - name: neighborhood_schools_percent_proficient
        data_type: float64
        description:
          Neighborhood schools percent proficient on this assessment (applies to
          FL only).

      - name: city_total_students
        data_type: int64
        description: Total students tested city-wide.

      - name: state_total_students
        data_type: int64
        description: Total students tested state-wide.

      - name: neighborhood_schools_total_students
        data_type: int64
        description:
          Total students tested at neighborhood schools (applies to FL only).

      - name: city_total_proficient_students
        data_type: float64
        description: Total proficient students city-wide.

      - name: state_total_proficient_students
        data_type: float64
        description: Total proficient students state-wide.

      - name: neighborhood_schools_total_proficient_students
        data_type: float64
        description:
          Total proficient students at neighborhood schools (applies to FL
          only).
