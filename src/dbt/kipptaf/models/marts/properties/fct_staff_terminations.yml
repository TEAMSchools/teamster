models:
  - name: fct_staff_terminations

    columns:
      - name: staff_terminations_key
        data_type: string
        tests:
          - unique:
              config:
                store_failures: true

      - name: employee_number
        data_type: int64

      - name: academic_year
        data_type: int64

      - name: termination_status
        data_type: string

      - name: termination_reason
        data_type: string

      - name: termination_effective_date
        data_type: timestamp

      - name: is_termination
        data_type: boolean
