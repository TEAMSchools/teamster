models:
  - name: fct_staff_attrition

    columns:
      - name: staff_attrition_key
        data_type: string
        tests:
          - unique:
              config:
                store_failures: true

      - name: attrition_type
        data_type: string

      - name: academic_year
        data_type: int64

      - name: employee_number
        data_type: int64

      - name: is_attrition
        data_type: boolean
