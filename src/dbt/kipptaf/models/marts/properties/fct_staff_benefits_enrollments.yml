    columns:
      - name: staff_benefits_enrollments_key
        data_type: string
        tests:
          - unique:
              config:
                severity: warn
                store_failures: true

      - name: employee_number
        data_type: int64

      - name: position_id
        data_type: string

      - name: plan_type
        data_type: string

      - name: plan_name
        data_type: string

      - name: coverage_level
        data_type: string

      - name: effective_date
        data_type: timestamp

      - name: enrollment_end_date
        data_type: timestamp

      - name: enrollment_start_date
        data_type: timestamp

      - name: enrollment_status
        data_type: string

      - name: rn_enrollment_recent
        data_type: int64
