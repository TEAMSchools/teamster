models:
  - name: fct_microgoals

    columns:
      - name: microgoals_key
        data_type: string
        tests:
          - unique:
              config:
                severity: warn
                store_failures: true

      - name: employee_number
        data_type: int64

      - name: assignment_id
        data_type: string

      - name: assignment_date
        data_type: timestamp

      - name: creator_name
        data_type: string

      - name: goal_name
        data_type: string

      - name: strand_name
        data_type: string

      - name: bucket_name
        data_type: string
