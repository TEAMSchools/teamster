models:
  - name: dim_assessment_goals

    columns:
      - name: assessment_goals_key
        data_type: string
        tests:
          - unique:
              config:
                severity: Warn
                store_failures: true

      - name: academic_year
        data_type: int64

      - name: school_id
        data_type: int64

      - name: state_assessment_code
        data_type: string

      - name: illuminate_subject_area
        data_type: string

      - name: assessment_grade_level
        data_type: int64

      - name: grade_goal
        data_type: float64

      - name: school_goal
        data_type: float64

      - name: region_goal
        data_type: float64

      - name: organization_goal
        data_type: float64

      - name: grade_band_goal
        data_type: float64

      - name: assessment_band_goal
        data_type: float64

      - name: school_level
        data_type: string

      - name: region
        data_type: string
