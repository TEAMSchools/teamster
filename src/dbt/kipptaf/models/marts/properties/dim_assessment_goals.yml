models:
  - name: dim_assessment_goals

    columns:
      - name: assessment_goals_key
        data_type: string
        description:
          Surrogate key on (academic_year, school_id, state_assessment_code,
          grade_level, illuminate_subject_area).
        tests:
          - unique:
              config:
                severity: Warn
                store_failures: true

      - name: academic_year
        data_type: int64
        description:
          Academic year the goals apply to (fiscal year start, e.g. 2025 =
          SY2025-26).

      - name: school_id
        data_type: int64
        description: PowerSchool school number.

      - name: state_assessment_code
        data_type: string
        description: State assessment test code (e.g. ELA05, ALG1, SCI08).

      - name: illuminate_subject_area
        data_type: string
        description: Subject area label as used in Illuminate.

      - name: assessment_grade_level
        data_type: int64
        description: Grade level this assessment is administered at.

      - name: grade_goal
        data_type: float64
        description: Target percent proficient for this grade level.

      - name: school_goal
        data_type: float64
        description: Target percent proficient for this school.

      - name: region_goal
        data_type: float64
        description: Target percent proficient for this region.

      - name: organization_goal
        data_type: float64
        description: Organization-wide target percent proficient.

      - name: grade_band_goal
        data_type: float64
        description: Target percent proficient for this grade band.

      - name: assessment_band_goal
        data_type: float64
        description: Target percent proficient for this assessment band.

      - name: school_level
        data_type: string
        description: School level (ES, MS, HS).

      - name: region
        data_type: string
        description: Network region (Newark, Camden, Miami, Paterson).
