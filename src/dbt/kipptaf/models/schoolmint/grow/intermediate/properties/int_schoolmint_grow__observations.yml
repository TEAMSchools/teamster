models:
  - name: int_schoolmint_grow__observations
    columns:
      - name: observation_id
        data_type: string
      - name: rubric_id
        data_type: string
      - name: rubric_name
        data_type: string
      - name: score
        data_type: float64
      - name: glows
        data_type: string
      - name: grows
        data_type: string
      - name: locked
        data_type: boolean
      - name: observed_at
        data_type: timestamp
      - name: observed_at_date_local
        data_type: date
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: is_published
        data_type: boolean
      - name: magic_notes_text
        data_type: string
      - name: school_name
        data_type: string
        description: School name.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: school_name
      - name: observation_type_name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: observation_type_abbreviation
        data_type: string
        description: A short 1 or 2 character version of the Name, such as A.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cycle_day
            source_column: abbreviation
      - name: observation_course
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: observation_grade
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: teacher_internal_id
        data_type: int64
      - name: observer_internal_id
        data_type: int64
