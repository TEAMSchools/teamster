sources:
  - name: coupa
    schema:
      "{%- if target.name in ['defer', 'dev'] -%}zz_{{ env_var('GITHUB_USER',
      'dev') }}_{%- elif target.name == 'staging' -%}zz_stg_{%- endif -%}{{
      project_name }}_coupa"
    tables:
      - name: src_coupa__addresses
        external:
          location: "{{ var('cloud_storage_uri_base') }}/coupa/addresses/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              group: coupa
              asset_key:
                - kipptaf
                - coupa
                - addresses
      - name: src_coupa__users
        external:
          location: "{{ var('cloud_storage_uri_base') }}/coupa/users/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              group: coupa
              asset_key:
                - kipptaf
                - coupa
                - users
