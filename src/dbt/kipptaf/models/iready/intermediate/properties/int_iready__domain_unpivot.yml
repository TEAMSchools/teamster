models:
  - name: int_iready__domain_unpivot
    config:
      materialized: table
    columns:
      - name: student_id
        data_type: int64
      - name: subject
        data_type: string
      - name: academic_year_int
        data_type: int64
      - name: start_date
        data_type: date
      - name: completion_date
        data_type: date
      - name: domain_name
        data_type: string
      - name: relative_placement
        data_type: string
      - name: rn_subject_test
        data_type: int64
        description:
          ROWNUMBER of value partitioned by _dbt_source_relation, student_id,
          subject, academic_year_int, start_date, completion_date ordered by
          domain_name.
