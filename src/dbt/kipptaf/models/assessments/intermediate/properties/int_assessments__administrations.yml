models:
  - name: int_assessments__administrations
    description: >-
      One row per scheduled illuminate-assessment administration: (title,
      subject_area, scope, module_code, grade_level, administered_date,
      academic_year, region). Multiple `assessment_id` values in
      int_assessments__assessments often share the same natural admin grain
      (e.g. region-specific copies of the same module checkpoint), so this model
      deduplicates them upstream so dim_assessment_administrations can consume
      admin-grain rows directly without DISTINCT.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - title
              - subject_area
              - scope
              - module_code
              - grade_level
              - administered_date
              - academic_year
              - region
    columns:
      - name: title
        data_type: string
      - name: subject_area
        data_type: string
      - name: scope
        data_type: string
      - name: module_code
        data_type: string
      - name: grade_level
        data_type: int64
      - name: administered_date
        data_type: date
      - name: academic_year
        data_type: int64
      - name: region
        data_type: string
