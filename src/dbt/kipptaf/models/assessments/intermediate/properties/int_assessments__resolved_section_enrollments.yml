models:
  - name: int_assessments__resolved_section_enrollments
    description: >-
      Resolves one PowerSchool course-section enrollment per score row for all
      assessment types — internal (Illuminate-sourced), NJ state (Pearson), FL
      state (FLDOE), and vendor assessments (iReady, STAR, DIBELS). Joins the
      course-enrollment inventory from int_assessments__course_enrollments
      directly; does not carry cc_dcid as an output column. Resolution is
      tiered: tier 1 matches a subject section whose half-open enrollment window
      contains the score's anchor date (earliest date_taken across the
      canonical's members, falling back to the canonical administered_date for
      internal; test_date for state rows; the vendor completion/screening/
      client date for iReady, STAR, and DIBELS); tier 2 falls back to the
      homeroom section active on the same anchor date. Scores with no matching
      section in either tier are dropped. The resolution_type column identifies
      which tier resolved the row.
    config:
      materialized: table
    columns:
      - name: source_type
        data_type: string
        description: >-
          Assessment source branch that produced the score row. One of internal
          (Illuminate-sourced), state_nj (Pearson NJ), state_fl (FLDOE FL),
          iready (i-Ready diagnostics), star (Renaissance STAR), or dibels
          (Amplify DIBELS benchmark composites).
        data_tests:
          - accepted_values:
              arguments:
                values: [internal, state_nj, state_fl, iready, star, dibels]
      - name: resolution_type
        data_type: string
        description: >-
          Tier at which a matching section was found. subject_section means tier
          1 resolved the row (a subject-matched enrollment window contained the
          anchor date); homeroom means tier 2 resolved it (no subject section
          matched; the homeroom section active on the anchor date was used
          instead).
        data_tests:
          - accepted_values:
              arguments:
                values: [subject_section, homeroom]
      - name: powerschool_student_number
        data_type: int64
        description: >-
          Student identifier. Sourced from int_assessments__scaffold for
          internal scores, from int_pearson__all_assessments for NJ state
          scores, and from int_fldoe__all_assessments for FL state scores.
        config:
          meta:
            source_column: int_assessments__scaffold.powerschool_student_number
      - name: canonical_assessment_id
        data_type: int64
        description: >-
          Canonical assessment identifier grouping member assessments into one
          logical assessment. Populated only for internal scores; NULL for state
          score rows.
        config:
          meta:
            source_column: int_assessments__scaffold.canonical_assessment_id
      - name: academic_year
        data_type: int64
        description: >-
          Academic year of the assessment sitting. Populated only for state
          score rows (sourced from the state intermediate); NULL for internal
          score rows, which derive their year from the enrollment window.
        config:
          meta:
            source_column: int_pearson__all_assessments.academic_year
      - name: administration_period
        data_type: string
        description: >-
          Administration window label within the academic year. Populated only
          for state score rows; NULL for internal score rows.
        config:
          meta:
            source_column: int_pearson__all_assessments.administration_period
      - name: subject_area
        data_type: string
        description: >-
          Subject area of the assessment, aligned to illuminate_subject_area
          values in int_assessments__course_enrollments. For internal scores
          this is the scaffold subject_area; for state scores it is the
          state-to-course mapped illuminate_subject column from the state
          intermediates.
        config:
          meta:
            source_column: int_assessments__scaffold.subject_area
      - name: _dbt_source_project
        data_type: string
        description: >-
          Region identifier (kippnewark, kippcamden, kippmiami, kipppaterson) of
          the score. Used as a discriminator alongside
          powerschool_student_number when joining the course-enrollment
          inventory and when deriving student_section_enrollment_key.
        config:
          meta:
            source_column: int_assessments__scaffold._dbt_source_project
      - name: cc_source_project
        data_type: string
        description: >-
          Region identifier of the matched course enrollment row. Combined with
          cc_dcid in generate_surrogate_key to produce
          student_section_enrollment_key.
        config:
          meta:
            source_column: int_assessments__course_enrollments._dbt_source_project
      - name: student_section_enrollment_key
        data_type: string
        description: >-
          Surrogate key derived from (cc_dcid, cc_source_project) of the
          resolved course enrollment, matching
          dim_student_section_enrollments.student_section_enrollment_key.

unit_tests:
  - name: test_subject_section_in_window_wins
    description: >-
      Subject section whose enrollment window contains the anchor date resolves
      at tier 1 (resolution_type=subject_section). The second section for the
      same student starts after the anchor date and is filtered out by the
      half-open window join.
    model: int_assessments__resolved_section_enrollments
    given:
      - input: ref('int_assessments__scaffold')
        rows:
          - {
              powerschool_student_number: 1,
              canonical_assessment_id: 100,
              _dbt_source_project: kippnewark,
              subject_area: Mathematics,
              date_taken: 2024-03-10,
              is_internal_assessment: true,
              is_replacement: false,
            }
      - input: ref('int_assessments__assessments_canonical')
        rows:
          - { canonical_assessment_id: 100, administered_date: 2024-03-04 }
      - input: ref('int_assessments__course_enrollments')
        rows:
          - {
              powerschool_student_number: 1,
              _dbt_source_project: kippnewark,
              illuminate_subject_area: Mathematics,
              courses_credittype: MATH,
              cc_dateenrolled: 2024-01-01,
              cc_dateleft: 2025-06-15,
              cc_dcid: 111,
            }
          - {
              powerschool_student_number: 1,
              _dbt_source_project: kippnewark,
              illuminate_subject_area: Mathematics,
              courses_credittype: MATH,
              cc_dateenrolled: 2025-09-01,
              cc_dateleft: 2026-06-15,
              cc_dcid: 222,
            }
      - input: ref('int_pearson__all_assessments')
        rows: []
      - input: ref('int_fldoe__all_assessments')
        rows: []
      - input: ref('int_iready__diagnostic_results')
        rows: []
      - input: ref('stg_renlearn__star')
        rows: []
      - input: ref('int_amplify__all_assessments')
        rows: []
    expect:
      rows:
        - {
            powerschool_student_number: 1,
            canonical_assessment_id: 100,
            resolution_type: subject_section,
            cc_source_project: kippnewark,
          }

  - name: test_homeroom_fallback_when_no_subject_section
    description: >-
      When no subject section's enrollment window contains the anchor date the
      homeroom section active on that date is used and resolution_type is
      homeroom.
    model: int_assessments__resolved_section_enrollments
    given:
      - input: ref('int_assessments__scaffold')
        rows:
          - {
              powerschool_student_number: 2,
              canonical_assessment_id: 200,
              _dbt_source_project: kippcamden,
              subject_area: ELA,
              date_taken: 2024-11-05,
              is_internal_assessment: true,
              is_replacement: false,
            }
      - input: ref('int_assessments__assessments_canonical')
        rows:
          - { canonical_assessment_id: 200, administered_date: 2024-11-01 }
      - input: ref('int_assessments__course_enrollments')
        rows:
          - {
              powerschool_student_number: 2,
              _dbt_source_project: kippcamden,
              illuminate_subject_area: HR,
              courses_credittype: HR,
              cc_dateenrolled: 2024-09-01,
              cc_dateleft: 2025-06-15,
              cc_dcid: 333,
            }
      - input: ref('int_pearson__all_assessments')
        rows: []
      - input: ref('int_fldoe__all_assessments')
        rows: []
      - input: ref('int_iready__diagnostic_results')
        rows: []
      - input: ref('stg_renlearn__star')
        rows: []
      - input: ref('int_amplify__all_assessments')
        rows: []
    expect:
      rows:
        - {
            powerschool_student_number: 2,
            canonical_assessment_id: 200,
            resolution_type: homeroom,
          }

  - name: test_no_matching_section_drops_row
    description: >-
      A score with no matching subject section and no matching homeroom section
      produces no output row.
    model: int_assessments__resolved_section_enrollments
    given:
      - input: ref('int_assessments__scaffold')
        rows:
          - {
              powerschool_student_number: 3,
              canonical_assessment_id: 300,
              _dbt_source_project: kippmiami,
              subject_area: Science,
              date_taken: 2024-10-15,
              is_internal_assessment: true,
              is_replacement: false,
            }
      - input: ref('int_assessments__assessments_canonical')
        rows:
          - { canonical_assessment_id: 300, administered_date: 2024-10-01 }
      - input: ref('int_assessments__course_enrollments')
        rows: []
      - input: ref('int_pearson__all_assessments')
        rows: []
      - input: ref('int_fldoe__all_assessments')
        rows: []
      - input: ref('int_iready__diagnostic_results')
        rows: []
      - input: ref('stg_renlearn__star')
        rows: []
      - input: ref('int_amplify__all_assessments')
        rows: []
    expect:
      rows: []

  - name: test_state_nj_resolves_subject_section
    description: >-
      A NJ state score resolves to a subject section active on its test_date and
      source_type is state_nj.
    model: int_assessments__resolved_section_enrollments
    given:
      - input: ref('int_assessments__scaffold')
        rows: []
      - input: ref('int_assessments__assessments_canonical')
        rows: []
      - input: ref('int_assessments__course_enrollments')
        rows:
          - {
              powerschool_student_number: 4,
              _dbt_source_project: kippnewark,
              illuminate_subject_area: Mathematics,
              courses_credittype: MATH,
              cc_dateenrolled: 2024-09-01,
              cc_dateleft: 2025-06-15,
              cc_dcid: 444,
            }
      - input: ref('int_pearson__all_assessments')
        rows:
          - {
              localstudentidentifier: 4,
              academic_year: 2024,
              administration_period: Spring,
              illuminate_subject: Mathematics,
              _dbt_source_project: kippnewark,
              test_date: 2025-04-10,
            }
      - input: ref('int_fldoe__all_assessments')
        rows: []
      - input: ref('int_iready__diagnostic_results')
        rows: []
      - input: ref('stg_renlearn__star')
        rows: []
      - input: ref('int_amplify__all_assessments')
        rows: []
    expect:
      rows:
        - {
            powerschool_student_number: 4,
            academic_year: 2024,
            administration_period: Spring,
            subject_area: Mathematics,
            source_type: state_nj,
            resolution_type: subject_section,
          }

  - name: test_iready_dibels_source_type_prevents_grain_collision
    description: >-
      Regression test for #3625 (fixed in a743b7d6c). An iReady Reading score
      and a DIBELS Composite score for the same student/project/academic
      year/administration_period/subject_area (Text Study) agree on every
      score_grain_key input except source_type. Both must resolve to the subject
      section and survive as distinct output rows -- if source_type were dropped
      from score_grain_key the two would hash identically and the resolved-tier
      dedupe would silently collapse them into one.
    model: int_assessments__resolved_section_enrollments
    given:
      - input: ref('int_assessments__scaffold')
        rows: []
      - input: ref('int_assessments__assessments_canonical')
        rows: []
      - input: ref('int_assessments__course_enrollments')
        rows:
          - {
              powerschool_student_number: 5,
              _dbt_source_project: kippnewark,
              illuminate_subject_area: Text Study,
              courses_credittype: ELA,
              cc_dateenrolled: 2024-09-01,
              cc_dateleft: 2025-06-15,
              cc_dcid: 555,
            }
      - input: ref('int_pearson__all_assessments')
        rows: []
      - input: ref('int_fldoe__all_assessments')
        rows: []
      - input: ref('int_iready__diagnostic_results')
        format: sql
        rows: |
          select
              5 as student_id,
              2024 as academic_year_int,
              'BOY' as test_round,
              'Text Study' as illuminate_subject,
              'kippnewark' as _dbt_source_project,
              date('2024-09-15') as completion_date,
              650 as overall_scale_score
      - input: ref('stg_renlearn__star')
        rows: []
      - input: ref('int_amplify__all_assessments')
        format: sql
        rows: |
          select
              5 as student_number,
              2024 as academic_year,
              'BOY' as `period`,
              'Text Study' as illuminate_subject,
              'kippnewark' as _dbt_source_project,
              date('2024-09-20') as client_date,
              'Benchmark' as assessment_type,
              'Composite' as measure_standard
    expect:
      rows:
        - {
            powerschool_student_number: 5,
            source_type: iready,
            student_section_enrollment_key: 862d5edd93004a2ab12782487a3292a7,
          }
        - {
            powerschool_student_number: 5,
            source_type: dibels,
            student_section_enrollment_key: 862d5edd93004a2ab12782487a3292a7,
          }
