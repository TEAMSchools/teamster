models:
  - name: int_assessments__roster_union
    description: >
      Long-format union of five assessment sources (i-Ready, FAST, DIBELS,
      NJSLA, and internal Illuminate assessments) normalized to one common
      schema. Scoped to ELA and Math, current and prior academic year. One row
      per student, academic year, source, subject, administration round, and
      assessment: assessment_id is null for the benchmark and state sources (one
      score per round) and carries the Illuminate assessment id for internal
      assessments (many per term). Benchmark sources that can record more than
      one sitting per round (i-Ready, DIBELS) are reduced to the most recent
      sitting before the union.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - academic_year
              - assessment_source
              - subject
              - administration_round
              - assessment_id
    columns:
      - name: surrogate_key
        description: >
          Surrogate primary key hashed from student_number, academic_year,
          assessment_source, subject, administration_round, and assessment_id (a
          'none' sentinel replaces a null assessment_id).
        data_tests:
          - unique
          - not_null
      - name: student_number
        description: >
          The raw PowerSchool student number, sourced from each system's student
          identifier and unified to the network PowerSchool number.
        data_tests:
          - not_null
      - name: academic_year
        description: >
          The starting year of the academic year the assessment was administered
          in (e.g. 2025 means the 2025-2026 school year).
        data_tests:
          - not_null
      - name: assessment_source
        description: >
          The assessment system the row originates from.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - i-Ready
                  - FAST
                  - DIBELS
                  - NJSLA
                  - Internal
      - name: subject
        description: >
          The assessment subject normalized to ELA or Math across all sources.
        quote: true
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ELA
                  - Math
      - name: administration_round
        description: >
          The administration round or window the assessment was given in, using
          each source's native label (e.g. i-Ready test round, FAST
          administration window, DIBELS period, NJSLA admin, internal module
          code).
      - name: assessment_id
        description: >
          The Illuminate assessment id for internal assessments; null for the
          benchmark and state sources, which report one score per round.
      - name: assessment_title
        description: >
          The internal assessment title; null for the benchmark and state
          sources.
      - name: scale_score
        description: >
          The overall scale score for the benchmark and state sources, cast to
          numeric for type alignment across the union; null for internal
          assessments, which report percent correct instead.
      - name: percent_correct
        description: >
          The percent of points earned on internal assessments; null for the
          benchmark and state sources.
      - name: is_proficient
        description: >
          Whether the result met the source's proficiency or mastery threshold.
          Derived for DIBELS from an aggregated composite level of At/Above; the
          native proficiency or mastery flag for every other source.
      - name: performance_band_label
        description: >
          The text label of the performance band the result fell into, using
          each source's native label.
      - name: performance_band_int
        description: >
          The numeric rank of the performance band the result fell into, cast to
          an integer for type alignment across the union.
