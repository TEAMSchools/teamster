models:
  - name: int_assessments__fast_previous_year
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - academic_year
              - assessment_subject
          config:
            severity: error
    columns:
      - name: student_number
        data_type: int64
        description: Student Number assigned by the school. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: academic_year
        data_type: int64
      - name: grade_level
        data_type: int64
        description:
          "The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: student_id
        data_type: string
      - name: assessment_subject
        data_type: string
      - name: prev_pm3_scale
        data_type: int64
      - name: prev_pm3_achievement_level
        data_type: string
      - name: prev_pm3_level_int
        data_type: int64
      - name: prev_pm3_sublevel_name
        data_type: string
      - name: prev_pm3_sublevel_number
        data_type: int64
      - name: fldoe_percentile_rank
        data_type: float64
      - name: scale_for_growth
        data_type: int64
      - name: sublevel_for_growth
        data_type: string
      - name: sublevel_number_for_growth
        data_type: int64
      - name: scale_for_proficiency
        data_type: int64
      - name: scale_points_to_growth_pm3
        data_type: int64
        description:
          Categorical mapping of prev_pm3_level_int, prev_pm3_scale,
          prev_pm3_sublevel_number, scale_low, sublevel_number.
      - name: scale_points_to_proficiency_pm3
        data_type: int64
        description: Conditional on prev_pm3_scale, scale_low.
      - name: fldoe_dynamic_percentile_rank
        data_type: float64
