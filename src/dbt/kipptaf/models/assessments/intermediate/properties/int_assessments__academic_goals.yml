models:
  - name: int_assessments__academic_goals
    columns:
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: school_id
        data_type: int64
      - name: grade_level
        data_type: int64
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: grade_level
      - name: state_assessment_code
        data_type: string
      - name: illuminate_subject_area
        data_type: string
      - name: grade_goal
        data_type: float64
      - name: school_goal
        data_type: float64
      - name: region_goal
        data_type: float64
      - name: organization_goal
        data_type: float64
      - name: grade_band_goal
        data_type: float64
      - name: school_level
        data_type: string
      - name: region
        data_type: string
        description: Derived from _dbt_source_relation.
