models:
  - name: int_assessments__course_enrollments
    description: >-
      K-12 course enrollments unioned with synthesized Newark/Camden ES Writing
      enrollments (grade <= 4). Provides the enrollment scaffold that internal
      Illuminate assessments are joined against. One row per (student, academic
      year, subject area, date enrolled), deduplicated to the latest exit per
      enrollment span.
    # config:
    #   materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - powerschool_student_number
              - illuminate_academic_year
              - illuminate_subject_area
              - cc_dateenrolled
    columns:
      - name: powerschool_student_number
        data_type: int64
      - name: courses_credittype
        data_type: string
      - name: powerschool_school_id
        data_type: int64
      - name: cc_dateenrolled
        data_type: date
      - name: cc_dateleft
        data_type: date
      - name: illuminate_subject_area
        data_type: string
      - name: is_foundations
        data_type: boolean
      - name: cc_dcid
        data_type: int64
        description: >-
          PowerSchool course enrollment row identifier. Used as an upstream
          component of
          dim_student_section_enrollments.student_section_enrollment_key.
        config:
          meta:
            source_column: base_powerschool__course_enrollments.cc_dcid
      - name: _dbt_source_project
        data_type: string
        description: >-
          Region prefix identifying the source district project (e.g.
          kippnewark, kippcamden, kippmiami, kipppaterson). Used as a
          discriminator in downstream surrogate keys and as part of the dedup
          partition_by to prevent cross-district student_number collisions. See
          #3142.
        config:
          meta:
            source_column: base_powerschool__course_enrollments._dbt_source_project
      - name: region
        data_type: string
      - name: illuminate_academic_year
        data_type: int64
      - name: illuminate_grade_level_id
        data_type: int64
      - name: is_advanced_math_student
        data_type: boolean
