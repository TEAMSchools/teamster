models:
  - name: int_assessments__scaffold
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - illuminate_student_id
              - assessment_id
    columns:
      - name: illuminate_student_id
        data_type: int64
      - name: powerschool_student_number
        data_type: int64
      - name: assessment_id
        data_type: int64
      - name: title
        data_type: string
        description:
          Stores a title name for the teacher and is used for sorting purposes.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: title
      - name: subject_area
        data_type: string
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: administered_at
        data_type: date
      - name: performance_band_set_id
        data_type: int64
      - name: powerschool_school_id
        data_type: int64
      - name: region
        data_type: string
      - name: grade_level_id
        data_type: int64
      - name: scope
        data_type: string
      - name: module_type
        data_type: string
      - name: module_code
        data_type: string
      - name: student_assessment_id
        data_type: int64
      - name: date_taken
        data_type: date
      - name: is_internal_assessment
        data_type: boolean
      - name: is_replacement
        data_type: boolean
