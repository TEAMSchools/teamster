models:
  - name: int_assessments__scaffold
    description: >-
      Cross-joins the assessment catalog (assessment x administered_at x region)
      against course enrollments to produce the canonical "expected to take"
      grain. Used as the join scaffold for response and score data and as the
      source for assessment-administration bridges.
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - illuminate_student_id
              - assessment_id
    columns:
      - name: illuminate_student_id
        data_type: int64
      - name: powerschool_student_number
        data_type: int64
      - name: assessment_id
        data_type: int64
      - name: title
        data_type: string
        description: >-
          Per-row member assessment title from
          `int_assessments__assessments.title`. See `canonical_title` for the
          canonical-group title.
        config:
          meta:
            source_column: int_assessments__assessments.title
      - name: subject_area
        data_type: string
      - name: academic_year
        data_type: int64
      - name: administered_at
        data_type: date
      - name: performance_band_set_id
        data_type: int64
      - name: powerschool_school_id
        data_type: int64
      - name: region
        data_type: string
      - name: grade_level_id
        data_type: int64
      - name: scope
        data_type: string
      - name: module_type
        data_type: string
      - name: module_code
        data_type: string
      - name: discipline
        data_type: string
        description: >-
          Course discipline from the matched PowerSchool course enrollment.
          Populated only for the internal-assessment branch
          (is_internal_assessment=true and is_replacement=false); null for K-8
          replacement curriculum and external-assessment rows.
        config:
          meta:
            source_column: int_assessments__course_enrollments.discipline
      - name: cc_dcid
        data_type: int64
        description: >-
          PowerSchool course enrollment row identifier from the matched
          enrollment in int_assessments__course_enrollments. Populated only for
          the internal-assessment branch (is_internal_assessment=true and
          is_replacement=false); null for K-8 replacement curriculum and
          external-assessment rows. Used as an upstream component of
          dim_student_section_enrollments.student_section_enrollment_key.
        config:
          meta:
            source_column: int_assessments__course_enrollments.cc_dcid
      - name: cc_source_relation
        data_type: string
        description: >-
          dbt union-relation metadata string identifying the source district
          project for the matched course enrollment. Populated only for the
          internal-assessment branch; null for K-8 replacement curriculum and
          external-assessment rows. Pairs with cc_dcid to uniquely identify a
          course enrollment across the four district projects.
        config:
          meta:
            source_column: int_assessments__course_enrollments._dbt_source_relation
      - name: student_assessment_id
        data_type: int64
      - name: date_taken
        data_type: date
      - name: is_internal_assessment
        data_type: boolean
      - name: is_replacement
        data_type: boolean
      - name: canonical_assessment_id
        data_type: int64
        description: >-
          Pass-through of int_assessments__assessments.canonical_assessment_id —
          the lead assessment_id within the partition (academic_year, scope,
          subject_area, module_code, grade_level_id). See parent column for full
          semantics.
      - name: canonical_title
        data_type: string
        description:
          Pass-through of int_assessments__assessments.canonical_title.
      - name: canonical_administered_at
        data_type: date
        description:
          Pass-through of
          int_assessments__assessments.canonical_administered_at.
      - name: canonical_grade_level_id
        data_type: int64
        description:
          Pass-through of int_assessments__assessments.canonical_grade_level_id.
