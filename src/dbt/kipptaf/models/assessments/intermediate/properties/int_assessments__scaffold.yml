models:
  - name: int_assessments__scaffold
    description: >-
      Cross-joins the assessment catalog (assessment x administered_at x region)
      against course enrollments to produce the canonical "expected to take"
      grain. Used as the join scaffold for response and score data and as the
      source for assessment-administration bridges.
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - illuminate_student_id
              - assessment_id
      # Source data-quality guard: Illuminate occasionally emits a corrupt
      # date_taken (epoch / year-2000 sentinels). Section resolution anchors on
      # administered_date instead (#4183), so this is surveillance only. Scoped
      # to the current academic year to surface fresh corruption without years
      # of legacy noise; warn, not error.
      - dbt_utils.expression_is_true:
          arguments:
            expression: |
              academic_year != {{ var("current_academic_year") }}
              or date_taken is null
              or date_taken >= date(academic_year, 7, 1)
          config:
            severity: warn
    columns:
      - name: illuminate_student_id
        data_type: int64
      - name: powerschool_student_number
        data_type: int64
      - name: assessment_id
        data_type: int64
      - name: title
        data_type: string
        description: >-
          Per-row member assessment title from
          `int_assessments__assessments_members.title`.
        config:
          meta:
            source_column: int_assessments__assessments_members.title
      - name: subject_area
        data_type: string
      - name: academic_year
        data_type: int64
      - name: administered_at
        data_type: date
      - name: performance_band_set_id
        data_type: int64
      - name: powerschool_school_id
        data_type: int64
      - name: region
        data_type: string
      - name: grade_level_id
        data_type: int64
      - name: scope
        data_type: string
      - name: module_type
        data_type: string
      - name: module_code
        data_type: string
      - name: discipline
        data_type: string
        description: >-
          Course discipline from the matched PowerSchool course enrollment.
          Populated only for the internal-assessment branch
          (is_internal_assessment=true and is_replacement=false); null for K-8
          replacement curriculum and external-assessment rows.
        config:
          meta:
            source_column: int_assessments__course_enrollments.discipline
      - name: cc_dcid
        data_type: int64
        description: >-
          PowerSchool course enrollment row identifier from the matched
          enrollment in int_assessments__course_enrollments. Populated only for
          the internal-assessment branch (is_internal_assessment=true and
          is_replacement=false); null for K-8 replacement curriculum and
          external-assessment rows. Used as an upstream component of
          dim_student_section_enrollments.student_section_enrollment_key.
        config:
          meta:
            source_column: int_assessments__course_enrollments.cc_dcid
      - name: cc_source_project
        data_type: string
        description: >-
          Region prefix (e.g. kippnewark, kippcamden, kippmiami, kipppaterson)
          identifying the source district project for the matched course
          enrollment, carried via _dbt_source_project from the upstream union
          tables. Populated only for the internal-assessment branch; null for
          K-8 replacement curriculum and external-assessment rows. Used as a
          discriminator component in downstream surrogate keys such as
          student_section_enrollment_key.
        config:
          meta:
            source_column: int_assessments__course_enrollments._dbt_source_project
      - name: cc_dateenrolled
        data_type: date
        description: >-
          Date the student enrolled in the matched PowerSchool course section.
          Populated only for the internal-assessment branch
          (is_internal_assessment=true and is_replacement=false); null for K-8
          replacement curriculum and external-assessment rows.
        config:
          meta:
            source_column: int_assessments__course_enrollments.cc_dateenrolled
      - name: cc_dateleft
        data_type: date
        description: >-
          Date the student left the matched PowerSchool course section.
          Populated only for the internal-assessment branch
          (is_internal_assessment=true and is_replacement=false); null for K-8
          replacement curriculum and external-assessment rows.
        config:
          meta:
            source_column: int_assessments__course_enrollments.cc_dateleft
      - name: _dbt_source_project
        data_type: string
        description: >-
          Dagster code-location prefix derived from region (e.g. kippnewark,
          kippcamden, kippmiami, kipppaterson). Carried into downstream hashes
          so consumers join/hash on a stable column rather than re-deriving via
          concat(region) or extract_source_project() at each call.
      - name: student_assessment_id
        data_type: int64
      - name: date_taken
        data_type: date
      - name: is_internal_assessment
        data_type: boolean
      - name: is_replacement
        data_type: boolean
      - name: canonical_assessment_id
        data_type: int64
        description: >-
          Pass-through of
          int_assessments__assessments_members.canonical_assessment_id — the
          lead assessment_id within the partition (academic_year, scope,
          subject_area, module_code, grade_level_id). See parent column for full
          semantics. Consumers needing canonical_title,
          canonical_administered_at, or canonical_grade_level_id join
          int_assessments__assessments_canonical via this key.
