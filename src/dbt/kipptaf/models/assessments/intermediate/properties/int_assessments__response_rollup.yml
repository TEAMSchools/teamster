models:
  - name: int_assessments__response_rollup
    description: >-
      Per-student × per-canonical-assessment × per-response-type rollup of
      Illuminate response data. For internal assessments, multipart member
      assessments (sharing a `canonical_assessment_id` per
      `int_assessments__assessments_members`) are aggregated to one row per
      student with summed points and a deterministic single school/region
      selection. `assessment_id` here is the canonical id, not the per-row
      member id; `assessment_ids` (array) preserves the underlying member ids
      for drilldown.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - illuminate_student_id
              - assessment_id
              - response_type
              - response_type_id
              - is_replacement
      - dbt_utils.expression_is_true:
          arguments:
            expression: |-
              date_taken is null or date_taken >= '2000-01-01'
          config:
            severity: warn
    columns:
      - name: illuminate_student_id
        data_type: int64
      - name: powerschool_student_number
        data_type: int64
      - name: academic_year
        data_type: int64
        description: >-
          `academic_year_clean` from `int_assessments__assessments_members`
          propagated via scaffold (not the raw Illuminate `academic_year`).
          Re-join source-of-truth when computing surrogate hashes — see
          `src/dbt/CLAUDE.md` "Hash inputs must be derived identically across
          producer and consumer".
      - name: scope
        data_type: string
      - name: subject_area
        data_type: string
      - name: discipline
        data_type: string
        description: >-
          Course discipline from the matched PowerSchool course enrollment.
          Populated only for the internal-assessment branch
          (`is_internal_assessment=true` and `is_replacement=false`); null for
          K-8 replacement curriculum and external-assessment rows.
      - name: module_type
        data_type: string
      - name: module_code
        data_type: string
      - name: region
        data_type: string
        description: >-
          The student's region for this administration. Selected together with
          `powerschool_school_id` and `_dbt_source_project` from a single source
          row via `first_value(...)` windowed in the `tiebroken_attrs` CTE, then
          read via `any_value()` in the rollup. Not a canonical attribute — it
          is per-response location data that varies across rows in the same
          partition because of upstream canonicalization defects (#3801);
          `first_value` is a deterministic tiebreak, not a canonicalization.
      - name: powerschool_school_id
        data_type: int64
        description: >-
          The student's school for this administration. Selected together with
          `region` and `_dbt_source_project` from a single source row via
          `first_value(...)` windowed in the `tiebroken_attrs` CTE, then read
          via `any_value()` in the rollup. See `region` for the full tiebreak
          semantics.
      - name: _dbt_source_project
        data_type: string
        description: >-
          Dagster code-location prefix derived from region (e.g. kippnewark,
          kippcamden, kippmiami, kipppaterson). Carried into downstream hashes
          so consumers join/hash on a stable column rather than re-deriving via
          concat(region) at each call.
      - name: is_internal_assessment
        data_type: boolean
      - name: is_replacement
        data_type: boolean
      - name: response_type
        data_type: string
      - name: response_type_id
        data_type: int64
      - name: response_type_code
        data_type: string
      - name: response_type_description
        data_type: string
      - name: response_type_root_description
        data_type: string
      - name: date_taken
        data_type: date
      - name: points
        data_type: numeric
        description: >-
          For internal multipart canonical groups, the sum of points across all
          member assessments the student took within the canonical group. For
          non-internal and single-member canonical groups, equals the per-row
          points from `int_illuminate__agg_student_responses`.
        config:
          meta:
            source_column: int_illuminate__agg_student_responses.points
      - name: percent_correct
        data_type: numeric
      - name: title
        data_type: string
        description: >-
          `title` from `int_assessments__assessments_canonical` for the
          canonical group. For non-internal assessments, falls back to the
          member's own title via coalesce.
        config:
          meta:
            source_column: int_assessments__assessments_canonical.title
      - name: assessment_id
        data_type: int64
        description: >-
          `canonical_assessment_id` from `int_assessments__assessments_members`
          — the lowest member id within the canonical partition. Use
          `assessment_ids` for the underlying member ids.
      - name: administered_at
        data_type: date
        description: >-
          `administered_date` from `int_assessments__assessments_canonical`. For
          non-internal assessments, falls back to the member's own
          `administered_at` via coalesce.
      - name: grade_level_id
        data_type: int64
      - name: performance_band_set_id
        data_type: int64
      - name: performance_band_label
        data_type: string
      - name: performance_band_label_number
        data_type: numeric
      - name: is_mastery
        data_type: boolean
      - name: term_administered
        data_type: string
      - name: term_taken
        data_type: string
      - name: n_assessments
        data_type: int64
        description: >-
          Count of distinct member `assessment_id`s that rolled up into this
          canonical row. `1` for non-multipart admins; `>1` for internal
          multipart canonical groups (e.g., FTELA U2 CRA + CRA-Essay).
      - name: is_multipart_assessment
        data_type: boolean
        description: >-
          `true` when `n_assessments > 1` — the student took multiple member
          assessments that share a `canonical_assessment_id` and were rolled up
          here.
      - name: assessment_ids
        data_type: array<int64>
        description: >-
          Array of distinct member `assessment_id`s rolled up into this
          canonical row. Use to drill from the canonical to per-member rows.
