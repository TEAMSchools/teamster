models:
  - name: int_assessments__response_rollup
    description:
      Aggregated assessment response data by student, assessment, and response
      type. Natural grain is (illuminate_student_id, assessment_id,
      response_type_id).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - illuminate_student_id
              - assessment_id
              - response_type_id
    columns:
      - name: illuminate_student_id
        data_type: int64
      - name: powerschool_student_number
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: scope
        data_type: string
      - name: subject_area
        data_type: string
      - name: module_type
        data_type: string
      - name: module_code
        data_type: string
      - name: region
        data_type: string
      - name: is_internal_assessment
        data_type: boolean
      - name: is_replacement
        data_type: boolean
      - name: response_type
        data_type: string
      - name: response_type_id
        data_type: int64
      - name: response_type_code
        data_type: string
      - name: response_type_description
        data_type: string
      - name: response_type_root_description
        data_type: string
      - name: date_taken
        data_type: date
      - name: points
        data_type: numeric
        description: The actual points student received for this section.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: points
      - name: percent_correct
        data_type: numeric
      - name: title
        data_type: string
        description:
          Stores a title name for the teacher and is used for sorting purposes.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: title
      - name: assessment_id
        data_type: int64
      - name: administered_at
        data_type: date
      - name: performance_band_set_id
        data_type: int64
      - name: performance_band_label
        data_type: string
      - name: performance_band_label_number
        data_type: numeric
      - name: is_mastery
        data_type: boolean
      - name: term_administered
        data_type: string
      - name: term_taken
        data_type: string
