models:
  - name: int_assessments__college_assessment
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - score_type
              - test_date
              - rn_highest
    columns:
      - name: student_number
        data_type: int64
      - name: administration_round
        data_type: string
      - name: academic_year
        data_type: int64
      - name: test_date
        data_type: date
      - name: scope
        data_type: string
      - name: subject_area
        data_type: string
      - name: course_discipline
        data_type: string
      - name: score_type
        data_type: string
      - name: scale_score
        data_type: numeric
      - name: rn_highest
        data_type: int64
      - name: salesforce_id
        data_type: string
      - name: row_count_by_test_date
        data_type: int64
      - name: aligned_subject_area
        data_type: string
        description: Conditional on subject_area.
      - name: strategy_case
        data_type: string
      - name: running_max_scale_score
        data_type: numeric
      - name: surrogate_key
        data_type: string
      - name: max_scale_score
        data_type: numeric
      - name: previous_total_score_change
        data_type: numeric
      - name: superscore
        data_type: numeric
      - name: avg_running_max_superscore
        data_type: numeric
      - name: sum_running_max_superscore
        data_type: numeric
      - name: test_type
        data_type: string
        description: Computed expression.
      - name: aligned_subject
        data_type: string
        description: Categorical mapping of score_type, subject_area.
      - name: test_month
        data_type: string
        description: Derived from test_date.
      - name: runnning_superscore
        data_type: numeric
        description:
          Derived from avg_running_max_superscore, scope,
          sum_running_max_superscore.
