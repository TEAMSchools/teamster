models:
  - name: rpt_appsheet__kfwd_career_launch_survey
    config:
      contract:
        enforced: true
    columns:
      - name: contact_id
        data_type: string
        data_tests:
          - unique
      - name: first_name
        data_type: string
      - name: last_name
        data_type: string
      - name: ktc_cohort
        data_type: int64
      - name: primary_email
        data_type: string
      - name: secondary_email
        data_type: string
      - name: currently_enrolled_school
        data_type: string
      - name: current_college_cumulative_gpa
        data_type: numeric
      - name: pursuing_degree_type
        data_type: string
      - name: major
        data_type: string
      - name: primary_phone
        data_type: string
      - name: secondary_phone
        data_type: string
      - name: advising_provider
        data_type: string
      - name: expected_college_grad_date
        data_type: date
      - name: survey_response_count
        data_type: int64
      - name: latest_survey_date
        data_type: timestamp
      - name: contact_owner
        data_type: string
        description: Name of the Salesforce contact owner for the alumnus.
      - name: postsec_advisor
        data_type: string
        description:
          Postsecondary advisor assigned to the alumnus on their Salesforce
          contact record.
      - name: advisor
        data_type: string
        description:
          Effective advisor for the alumnus — 'Collab' when the advising
          provider is KIPP NYC, otherwise the Salesforce contact owner.
