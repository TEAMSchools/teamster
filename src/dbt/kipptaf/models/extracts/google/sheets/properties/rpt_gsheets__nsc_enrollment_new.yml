models:
  - name: rpt_gsheets__nsc_enrollment_new
    data_tests:
      # (student, school, stint_num) is the true PK; (student, school,
      # start_date) is an equivalent proxy because stint chaining guarantees
      # chronological, non-overlapping start_dates per (student, school).
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student__c
              - school__c
              - start_date__c
          config:
            severity: error
    columns:
      - name: student__c
        data_type: string
        description: Salesforce Contact ID of the KIPP alum.
      - name: school__c
        data_type: string
        description: Salesforce Account ID of the college or university.
      - name: start_date__c
        data_type: date
        description: >
          Earliest NSC enrollment_begin in the stint (first term at the college
          in this continuous attendance period).
      - name: actual_end_date__c
        data_type: date
        description: >
          Latest NSC enrollment_end in the stint (last term so far at the
          college in this continuous attendance period).
      - name: attending_status__c
        data_type: string
        description: >
          NSC enrollment status code from the most recent term in the stint
          (e.g. F = Full-time, H = Half-time).
      - name: status__c
        data_type: string
        description: >
          Stint-level outcome: Graduated (NSC reports graduation at this school
          and this is the latest stint there), Withdrew (any term in the stint
          shows withdrawal), or Attending.
      - name: pursuing_degree_type__c
        data_type: string
        description: >
          Degree type mapped from NSC two-year/four-year classification:
          "Bachelor's (4-year)" or "Associate's (2 year)".
      - name: source__c
        data_type: string
        description: Data source identifier; always 'NSC' for this model.
      - name: created_for_nsc_data__c
        data_type: boolean
        description:
          Flag indicating this enrollment record was created from NSC data.
      - name: nsc_verified__c
        data_type: boolean
        description: Flag indicating this enrollment has been verified by NSC.
      - name: alum_name
        data_type: string
        description: >
          Audit helper — alum name in `Last, First` form from the kippadb
          roster. Delete before Salesforce upload.
      - name: contact_advising_provider
        data_type: string
        description: >
          Audit helper — alum's post-secondary advising provider from the
          kippadb roster. Delete before Salesforce upload.
      - name: ktc_status
        data_type: string
        description: >
          Audit helper — alum's KIPP Through College status from the kippadb
          roster (e.g. HSG, TAF, TAFHS, or current school-level + grade). Delete
          before Salesforce upload.
      - name: school_name
        data_type: string
        description: >
          Audit helper — school name from the kippadb account. Delete before
          Salesforce upload.
