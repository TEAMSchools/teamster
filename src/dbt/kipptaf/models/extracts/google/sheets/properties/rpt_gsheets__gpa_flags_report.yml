models:
  - name: rpt_gsheets__gpa_flags_report
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - test_failure_reason
          config:
            store_failures: true
    columns:
      - name: academic_year
        data_type: int64
      - name: region
        data_type: string
      - name: school_name
        data_type: string
      - name: student_number
        data_type: int64
      - name: student_name
        data_type: string
      - name: cumulative_y1_gpa
        data_type: float64
      - name: cumulative_y1_gpa_unweighted
        data_type: float64
      - name: grade_level
        data_type: int64
      - name: year_in_school
        data_type: int64
      - name: test_failure_reason
        data_type: string
