models:
  - name: rpt_coupa__users
    description: >-
      Desired-state Coupa user feed built from the staff roster joined to
      current Coupa accounts, exported nightly to Coupa via SFTP.
    columns:
      - name: "`Login`"
        data_type: string
        description: >-
          Coupa login, from the staff member Active Directory sam_account_name.
          Unique per user; also matches existing Coupa accounts.
        data_tests:
          - not_null:
              config:
                severity: error
          # TODO(#4409): restore severity error once Ops removes the duplicate
          # active Coupa addresses and the duplicate school_name_lookup key that
          # fan out rows
          - unique:
              config:
                severity: warn
      - name: "`Email`"
        data_type: string
        description: >-
          Staff email address (ADP mail) used as the Coupa email; required by
          Coupa.
        data_tests:
          - not_null:
              config:
                severity: error
          # TODO(#4409): restore severity error once the row fan-out data dupes
          # are removed
          - unique:
              config:
                severity: warn
      - name: "`Sso Identifier`"
        data_type: string
      - name: "`First Name`"
        data_type: string
      - name: "`Last Name`"
        data_type: string
      - name: "`Employee Number`"
        data_type: int64
      - name: "`User Role Names`"
        data_type: string
      - name: "`Default Address Location Code`"
        data_type: string
      - name: "`Default Address Street 1`"
        data_type: string
      - name: "`Default Address Street 2`"
        data_type: string
      - name: "`Default Address City`"
        data_type: string
      - name: "`Default Address State`"
        data_type: string
      - name: "`Default Address Postal Code`"
        data_type: string
      - name: "`Default Address Attention`"
        data_type: string
      - name: "`Default Address Name`"
        data_type: string
      - name: "`Status`"
        data_type: string
      - name: "`Sage Intacct ID`"
        data_type: int64
      - name: "`Sage Intacct Fund`"
        data_type: int64
      - name: "`Default Address Country Code`"
        data_type: string
      - name: "`Authentication Method`"
        data_type: string
      - name: "`Generate Password And Notify User`"
        data_type: string
      - name: "`Employee Payment Channel`"
        data_type: string
      - name: "`Expense User`"
        data_type: string
      - name: "`Purchasing User`"
        data_type: string
      - name: "`Content Groups`"
        data_type: string
      - name: "`Mention Name`"
        data_type: string
      - name: "`School Name`"
        data_type: string
      - name: "`Sage Intacct Program`"
        data_type: int64
      - name: "`Sage Intacct Department`"
        data_type: int64
      - name: "`Sage Intacct Location`"
        data_type: int64
