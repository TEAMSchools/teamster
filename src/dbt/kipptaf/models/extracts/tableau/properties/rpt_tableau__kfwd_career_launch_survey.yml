models:
  - name: rpt_tableau__kfwd_career_launch_survey
    config:
      contract:
        enforced: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - contact_id
              - response_id
    columns:
      - name: contact_id
        data_type: string
      - name: sf_first_name
        data_type: string
      - name: sf_last_name
        data_type: string
      - name: sf_lastfirst
        data_type: string
      - name: contact_kipp_ms_graduate
        data_type: boolean
      - name: contact_kipp_hs_graduate
        data_type: boolean
      - name: contact_kipp_hs_class
        data_type: int64
      - name: college_match_display_gpa
        data_type: numeric
      - name: kipp_region_name
        data_type: string
      - name: contact_description
        data_type: string
      - name: contact_gender
        data_type: string
      - name: contact_ethnicity
        data_type: string
      - name: expected_college_grad_date
        data_type: date
      - name: actual_college_grad_date
        data_type: date
      - name: current_kipp_student
        data_type: string
      - name: contact_owner_name
        data_type: string
      - name: pursuing_degree_type
        data_type: string
      - name: type
        data_type: string
      - name: start_date
        data_type: date
      - name: actual_end_date
        data_type: date
      - name: major
        data_type: string
      - name: status
        data_type: string
      - name: ecc
        data_type: numeric
      - name: institution
        data_type: string
      - name: reconciliation_response_id
        data_type: string
      - name: college_programs
        data_type: string
      - name: is_basta
        data_type: boolean
      - name: is_braven
        data_type: boolean
      - name: is_backrs
        data_type: boolean
      - name: is_kippnj_internship
        data_type: boolean
      - name: hs_gpa_bands
        data_type: string
      - name: sf_email
        data_type: string
      - name: sf_secondary_email
        data_type: string
      - name: expected_grad_date_month
        data_type: int64
      - name: expected_grad_date_year
        data_type: int64
      - name: actual_end_date_month
        data_type: int64
      - name: actual_end_date_year
        data_type: int64
      - name: rn_graduated
        data_type: int64
      - name: survey_id
        data_type: string
      - name: survey_title
        data_type: string
      - name: response_id
        data_type: string
      - name: response_date_submitted
        data_type: timestamp
      - name: respondent_user_principal_name
        data_type: string
      - name: after_grad
        data_type: string
      - name: alumni_dob
        data_type: string
      - name: alumni_email
        data_type: string
      - name: alumni_phone
        data_type: string
      - name: cell_number
        data_type: string
      - name: company
        data_type: string
      - name: complete_program
        data_type: string
      - name: debt_amount
        data_type: string
      - name: debt_binary
        data_type: string
      - name: first_name
        data_type: string
      - name: grad_school_major
        data_type: string
      - name: grad_school_name
        data_type: string
      - name: highest_level_of_education
        data_type: string
      - name: job_sat
        data_type: string
      - name: last_name
        data_type: string
      - name: linkedin
        data_type: string
      - name: linkedin_link
        data_type: string
      - name: not_pursuing_plan
        data_type: string
      - name: reenrollment
        data_type: string
      - name: role
        data_type: string
      - name: satisfied_program
        data_type: string
      - name: search_focus
        data_type: string
      - name: annual_income
        data_type: string
      - name: benefits
        data_type: string
      - name: annual_income_clean
        data_type: float64
      - name: season_label_expected
        data_type: string
      - name: season_label
        data_type: string
      - name: is_unmatched_response
        data_type: boolean
      - name: rn_respondent
        data_type: int64
      - name: es_graduated
        data_type: string
      - name: tier
        data_type: string
      - name: advising_provider
        data_type: string
      - name: postsec_advisor
        data_type: string
        description:
          Postsecondary advisor assigned to the alumnus on their Salesforce
          contact record.
      - name: advisor
        data_type: string
        description:
          Effective advisor for the alumnus — 'Collab' when the advising
          provider is KIPP NYC, otherwise the Salesforce contact owner.
      - name: high_school_graduated_from
        data_type: string
        description:
          High school the alumnus graduated from, from their Salesforce contact
          record.
      - name: is_special_education
        data_type: boolean
        description:
          Whether the alumnus has a recorded IEP date, used as a
          special-education indicator.
      - name: middle_school_attended
        data_type: string
        description:
          Middle school the alumnus attended, from their Salesforce contact
          record.
      - name: most_recent_iep_date
        data_type: date
        description:
          Date of the alumnus's most recent IEP on their Salesforce contact
          record.
      - name: ktc_cohort
        data_type: int64
        description:
          KIPP-to-college cohort year for the alumnus, from their Salesforce
          contact record.
      - name: currently_enrolled_school
        data_type: string
        description:
          School the alumnus is currently enrolled in, from their Salesforce
          contact record.
      - name: current_college_cumulative_gpa
        data_type: numeric
        description:
          Current cumulative college GPA, from the alumnus's Salesforce contact
          record.
      - name: primary_phone
        data_type: string
        description: Mobile phone from the alumnus's Salesforce contact record.
      - name: secondary_phone
        data_type: string
        description: Home phone from the alumnus's Salesforce contact record.
      - name: career_conversation_notes
        data_type: string
        description:
          Free-text notes from the alumnus's KFWD career conversation, logged in
          the KFWD AppSheet app. NULL when no conversation is recorded.
      - name: is_resume_score
        data_type: boolean
        description:
          Whether a resume was scored during the KFWD career conversation. False
          when no conversation is recorded.
      - name: is_linkedin
        data_type: boolean
        description:
          Whether the alumnus's LinkedIn profile was discussed during the KFWD
          career conversation. False when no conversation is recorded.
      - name: is_mock_interview_or_prep
        data_type: boolean
        description:
          Whether mock interview or interview preparation was discussed during
          the KFWD career conversation. False when no conversation is recorded.
      - name: is_professional_references_list
        data_type: boolean
        description:
          Whether the professional references list was discussed during the KFWD
          career conversation. False when no conversation is recorded.
      - name: is_job_search_template
        data_type: boolean
        description:
          Whether the job search template was discussed during the KFWD career
          conversation. False when no conversation is recorded.
      - name: is_cover_letter_template
        data_type: boolean
        description:
          Whether the cover letter template was discussed during the KFWD career
          conversation. False when no conversation is recorded.
      - name: is_work_samples
        data_type: boolean
        description:
          Whether work samples were discussed during the KFWD career
          conversation. False when no conversation is recorded.
      - name: cc1_count
        data_type: int64
        description:
          Count of the alumnus's first Career Conversation (CC1) Salesforce
          contact notes, summed across all academic years. Zero when none are
          recorded.
      - name: cc2_count
        data_type: int64
        description:
          Count of the alumnus's second Career Conversation (CC2) Salesforce
          contact notes, summed across all academic years. Zero when none are
          recorded.
      - name: cc3_count
        data_type: int64
        description:
          Count of the alumnus's third Career Conversation (CC3) Salesforce
          contact notes, summed across all academic years. Zero when none are
          recorded.
      - name: cc4_count
        data_type: int64
        description:
          Count of the alumnus's fourth Career Conversation (CC4) Salesforce
          contact notes, summed across all academic years. Zero when none are
          recorded.
      - name: cc5_count
        data_type: int64
        description:
          Count of the alumnus's fifth Career Conversation (CC5) Salesforce
          contact notes, summed across all academic years. Zero when none are
          recorded.
      - name: cc_total_count
        data_type: int64
        description:
          Total count of the alumnus's Career Conversation (CC1 through CC5)
          Salesforce contact notes, summed across all academic years. Zero when
          none are recorded.
