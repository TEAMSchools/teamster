models:
  - name: rpt_tableau__college_assessment_dashboard_benchmark_calcs
    description: >
      Student-level college assessment scores used to calculate the percentage
      of students meeting readiness benchmark for KIPP Forward use.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - scope
              - benchmark_name
    columns:
      - name: region
        data_type: string
      - name: school
        data_type: string
      - name: student_number
        data_type: int64
      - name: student_name
        data_type: string
      - name: iep_status
        data_type: string
      - name: is_504
        data_type: boolean
      - name: lep_status
        data_type: boolean
      - name: graduation_year
        data_type: int64
      - name: year_in_network
        data_type: int64
      - name: college_match_gpa
        data_type: numeric
      - name: college_match_gpa_bands
        data_type: string
      - name: scope
        data_type: string
      - name: aligned_scope
        data_type: string
      - name: test_type
        data_type: string
      - name: score_type
        data_type: string
      - name: subject_area
        data_type: string
      - name: max_score
        data_type: numeric
      - name: benchmark_name
        data_type: string
