models:
  - name: rpt_tableau__college_assessment_dashboard_benchmark_calcs
    description: >
      Student-level college assessment scores used to calculate the percentage
      of students meeting readiness benchmark for KIPP Forward use.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - academic_year
              - score_type
              - test_date
    columns:
      - name: academic_year
        data_type: int64
      - name: region
        data_type: string
      - name: school
        data_type: string
      - name: grade_level
        data_type: int64
      - name: student_number
        data_type: int64
      - name: enroll_status
        data_type: int64
      - name: iep_status
        data_type: string
      - name: is_504
        data_type: boolean
      - name: grad_iep_exempt_status_overall
        data_type: string
      - name: lep_status
        data_type: boolean
      - name: ktc_cohort
        data_type: int64
      - name: graduation_year
        data_type: int64
      - name: year_in_network
        data_type: int64
      - name: college_match_gpa
        data_type: numeric
      - name: college_match_gpa_bands
        data_type: string
      - name: test_type
        data_type: string
      - name: scope
        data_type: string
      - name: score_type
        data_type: string
      - name: subject_area
        data_type: string
      - name: aligned_subject_area
        data_type: string
      - name: aligned_subject
        data_type: string
      - name: test_date
        data_type: date
      - name: max_scale_score
        data_type: numeric
      - name: scale_score
        data_type: numeric
