models:
  - name: rpt_tableau__gradebook_audit
    description: >
      Teacher/section-facing gradebook compliance report. Zero student PII — see
      rpt_gsheets__gradebook_audit_student_flags for the companion student-level
      flags. Floor of one row per section x quarter x assignment category
      (row_type = 'category_summary', four rows: W/H/F/S) plus one additional
      row per assignment that fails the no-flags bar for its category (row_type
      = 'assignment_detail'). A teacher with zero flags anywhere has exactly
      (number of sections) x 4 rows for the quarter — no separate anchor-row
      concept. Three boolean flags carried on every row: not_enough_assignments
      (category_summary rows only), has_grade_above_100 and
      has_grade_below_70_no_comment (broadcast from an aggregate over
      rpt_gsheets__gradebook_audit_student_flags — section x quarter facts,
      identical across all rows for a given section). Two health booleans,
      computed across all of a teacher's sections for the quarter and broadcast
      onto every row: is_healthy_gradebook_all_flags (false if any of the three
      flags fired anywhere) and is_healthy_gradebook_excl_comments (same, but
      has_grade_below_70_no_comment doesn't count toward this one — it's an
      end-of-quarter item, still visible as data). A Tableau parameter picks
      which health column to read.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_project
              - academic_year
              - sectionid
              - quarter
              - assignment_category_code
              - assignmentid
    columns:
      - name: _dbt_source_project
        data_type: string
        description:
          Source PowerSchool instance (kippnewark, kippcamden, kipppaterson).
      - name: academic_year
        data_type: int64
        description:
          Starting year of the academic year (e.g., 2025 for AY 2025-2026).
      - name: academic_year_display
        data_type: string
        description: Human-readable academic year (e.g., '2025-2026').
      - name: region_school_level
        data_type: string
        description: Concatenated region and school level (e.g., 'NewarkMS').
      - name: region
        data_type: string
        description: Region name (Newark, Camden, Paterson).
      - name: school_level
        data_type: string
        description: School level after Sumner G5 override (MS or HS).
      - name: schoolid
        data_type: int64
        description: PowerSchool school ID.
      - name: school
        data_type: string
        description: School abbreviation.
      - name: course_number
        data_type: string
        description: PowerSchool course number.
      - name: course_name
        data_type: string
        description: Course name.
      - name: credit_type
        data_type: string
        description: Course credit type (e.g., MATH, ENG).
      - name: exclude_from_gpa
        data_type: int64
        description:
          1 if the course is excluded from GPA calculation, 0 otherwise.
      - name: sections_dcid
        data_type: int64
        description: PowerSchool sections DCID.
      - name: sectionid
        data_type: int64
        description: PowerSchool section ID.
      - name: section_number
        data_type: string
        description: Section number.
      - name: external_expression
        data_type: string
        description: HS period expression from PowerSchool.
      - name: section_or_period
        data_type: string
        description: >
          Display identifier for the section. Uses external_expression for HS;
          section_number otherwise.
      - name: teacher_number
        data_type: string
        description: PowerSchool teacher number.
      - name: teacher_name
        data_type: string
        description: Teacher full name.
      - name: teacher_employee_number
        data_type: int64
        description: Employee number of the teacher.
      - name: school_leader
        data_type: string
        description: Principal name.
      - name: manager_employee_number
        data_type: int64
        description: ADP employee number of the teacher's direct manager.
      - name: manager_name
        data_type: string
        description: Teacher's direct manager name (Last, First).
      - name: hos
        data_type: string
        description: Head of School name.
      - name: teacher_tableau_username
        data_type: string
        description:
          Teacher's SAM account name (used as Tableau username for row-level
          security).
      - name: manager_tableau_username
        data_type: string
        description: Manager's SAM account name (used as Tableau username).
      - name: school_leader_tableau_username
        data_type: string
        description:
          School leader's SAM account name (used as Tableau username).
      - name: quarter
        data_type: string
        quote: true
        description: Academic quarter (Q1–Q4).
      - name: semester
        data_type: string
        description: Academic semester (S1 or S2).
      - name: quarter_start_date
        data_type: date
        description: First day of the quarter.
      - name: quarter_end_date
        data_type: date
        description: Last day of the quarter.
      - name: is_current_quarter
        data_type: boolean
        description: True if this row belongs to the current academic quarter.
      - name: row_type
        data_type: string
        description: >
          'category_summary' (one of the four W/H/F/S floor rows for this
          section x quarter) or 'assignment_detail' (one row per assignment that
          fails the no-flags bar for its category).
      - name: assignment_category_code
        data_type: string
        description: Assignment category code (W, H, F, S).
      - name: assignment_category_name
        data_type: string
        description: Assignment category name.
      - name: assignment_category_term
        data_type: string
        description: Assignment category term.
      - name: expectation
        data_type: int64
        description: >
          Expected QTD assignment count for this category from
          int_powerschool__u_expectations_qtd_unpivot. Populated on row_type =
          'category_summary' rows only.
      - name: assignments_entered_count
        data_type: int64
        description: >
          Actual count of assignments entered for this category, regardless of
          flag status. Populated on row_type = 'category_summary' rows only.
      - name: not_enough_assignments
        data_type: boolean
        description: >
          True when the count of non-flagged assignments entered for this
          category is below expectation. Populated on row_type =
          'category_summary' rows only.
      - name: assignmentid
        data_type: int64
        description: >
          PowerSchool assignment ID. Populated on row_type = 'assignment_detail'
          rows only.
      - name: assignment_name
        data_type: string
        description: >
          Assignment name. Populated on row_type = 'assignment_detail' rows
          only.
      - name: duedate
        data_type: date
        description: >
          Assignment due date. Populated on row_type = 'assignment_detail' rows
          only.
      - name: scoretype
        data_type: string
        description: >
          Assignment score type. Populated on row_type = 'assignment_detail'
          rows only.
      - name: totalpointvalue
        data_type: float64
        description: >
          Assignment total point value. Populated on row_type =
          'assignment_detail' rows only.
      - name: has_grade_above_100
        data_type: boolean
        description: >
          True if any student in this section x quarter has a quarter course
          percent grade above 100 (see
          rpt_gsheets__gradebook_audit_student_flags for student-level detail).
          Broadcast identically across every row for the section — a
          section-level fact, not a category-level one.
      - name: has_grade_below_70_no_comment
        data_type: boolean
        description: >
          True if any student in this section x quarter has a quarter course
          percent grade below 70 with no end-of-quarter comment entered (see
          rpt_gsheets__gradebook_audit_student_flags for student-level detail).
          Broadcast identically across every row for the section — a
          section-level fact, not a category-level one. This is the "EOQ item"
          excluded from is_healthy_gradebook_excl_comments.
      - name: is_healthy_gradebook_all_flags
        data_type: boolean
        description: >
          True if none of not_enough_assignments, has_grade_above_100, or
          has_grade_below_70_no_comment fired anywhere across all of this
          teacher's sections for the quarter. Broadcast onto every row for the
          teacher x quarter.
      - name: is_healthy_gradebook_excl_comments
        data_type: boolean
        description: >
          Same as is_healthy_gradebook_all_flags, but
          has_grade_below_70_no_comment does not count toward this definition
          (it's an end-of-quarter item, still visible as data on its own
          column). Use a Tableau parameter to pick which health column to read.
