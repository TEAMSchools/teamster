models:
  - name: rpt_tableau__gradebook_audit_v4
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_project
              - sectionid
              - quarter
              - audit_flag_name
              - cte_grouping
              - assignmentid
    columns:
      - name: _dbt_source_project
        data_type: string
        description:
          Source PowerSchool instance (kippnewark, kippcamden, kipppaterson).
      - name: academic_year
        data_type: int64
        description:
          Starting year of the academic year (e.g., 2025 for AY 2025-2026).
      - name: academic_year_display
        data_type: string
        description: Human-readable academic year (e.g., '2025-2026').
      - name: region_school_level
        data_type: string
        description: Concatenated region and school level (e.g., 'NewarkMS').
      - name: region
        data_type: string
        description: Region name (Newark, Camden, Paterson).
      - name: school_level
        data_type: string
        description: School level after Sumner G5 override (MS or HS).
      - name: schoolid
        data_type: int64
        description: PowerSchool school ID.
      - name: school
        data_type: string
        description: School abbreviation.
      - name: students_dcid
        data_type: int64
        description: PowerSchool students DCID. Null for anchor rows.
      - name: studentid
        data_type: int64
        description: PowerSchool student ID. Null for anchor rows.
      - name: student_number
        data_type: int64
        description: PowerSchool student number. Null for anchor rows.
      - name: student_name
        data_type: string
        description: Student full name. Null for anchor rows.
      - name: grade_level
        data_type: int64
        description: Student grade level. Null for anchor rows.
      - name: dateenrolled
        data_type: date
        description: Section enrollment start date. Null for anchor rows.
      - name: dateleft
        data_type: date
        description: Section enrollment end date. Null for anchor rows.
      - name: salesforce_id
        data_type: string
        description: Salesforce contact ID. Null for anchor rows.
      - name: ktc_cohort
        data_type: int64
        description: KIPP Through College cohort year. Null for anchor rows.
      - name: enroll_status
        data_type: int64
        description: PowerSchool enrollment status code. Null for anchor rows.
      - name: cohort
        data_type: int64
        description: Student graduation cohort year. Null for anchor rows.
      - name: gender
        data_type: string
        description: Student gender. Null for anchor rows.
      - name: ethnicity
        data_type: string
        description: Student ethnicity code. Null for anchor rows.
      - name: advisory
        data_type: string
        description: Advisory group name. Null for anchor rows.
      - name: year_in_school
        data_type: int64
        description:
          Number of years enrolled at the current school. Null for anchor rows.
      - name: year_in_network
        data_type: int64
        description:
          Number of years enrolled in the KIPP network. Null for anchor rows.
      - name: rn_undergrad
        data_type: int64
        description: >
          Row number within undergrad enrollment records. Null for anchor rows.
      - name: is_out_of_district
        data_type: boolean
        description:
          True if the student is an out-of-district placement. Null for anchor
          rows.
      - name: is_self_contained
        data_type: boolean
        description:
          True if the student is in a self-contained special education class.
          Null for anchor rows.
      - name: is_retained_year
        data_type: boolean
        description:
          True if the student was retained this year. Null for anchor rows.
      - name: is_retained_ever
        data_type: boolean
        description:
          True if the student has ever been retained. Null for anchor rows.
      - name: lunch_status
        data_type: string
        description:
          Free/reduced lunch eligibility status. Null for anchor rows.
      - name: gifted_and_talented
        data_type: string
        description: Gifted and talented program status. Null for anchor rows.
      - name: iep_status
        data_type: string
        description: IEP status code. Null for anchor rows.
      - name: lep_status
        data_type: boolean
        description:
          True if the student has limited English proficiency. Null for anchor
          rows.
      - name: is_504
        data_type: boolean
        description: True if the student has a 504 plan. Null for anchor rows.
      - name: is_counseling_services
        data_type: int64
        description: Counseling services indicator. Null for anchor rows.
      - name: is_student_athlete
        data_type: int64
        description: Student athlete indicator. Null for anchor rows.
      - name: ada
        data_type: float64
        description: Average daily attendance rate. Null for anchor rows.
      - name: ada_above_or_at_80
        data_type: boolean
        description:
          True if the student's ADA is at or above 80%. Null for anchor rows.
      - name: course_number
        data_type: string
        description: PowerSchool course number.
      - name: course_name
        data_type: string
        description: Course name.
      - name: credit_type
        data_type: string
        description: Course credit type (e.g., MATH, ENG).
      - name: exclude_from_gpa
        data_type: int64
        description:
          1 if the course is excluded from GPA calculation, 0 otherwise.
      - name: sections_dcid
        data_type: int64
        description: PowerSchool sections DCID.
      - name: sectionid
        data_type: int64
        description: PowerSchool section ID.
      - name: section_number
        data_type: string
        description: Section number.
      - name: external_expression
        data_type: string
        description: HS period expression from PowerSchool.
      - name: section_or_period
        data_type: string
        description: >
          Display identifier for the section. Uses external_expression for HS;
          section_number otherwise.
      - name: teacher_number
        data_type: string
        description: PowerSchool teacher number.
      - name: teacher_name
        data_type: string
        description: Teacher full name.
      - name: school_leader
        data_type: string
        description: Principal name.
      - name: manager_employee_number
        data_type: int64
        description: ADP employee number of the teacher's direct manager.
      - name: manager_name
        data_type: string
        description: Teacher's direct manager name (Last, First).
      - name: hos
        data_type: string
        description: Head of School name.
      - name: teacher_tableau_username
        data_type: string
        description:
          Teacher's SAM account name (used as Tableau username for row-level
          security).
      - name: manager_tableau_username
        data_type: string
        description: Manager's SAM account name (used as Tableau username).
      - name: school_leader_tableau_username
        data_type: string
        description:
          School leader's SAM account name (used as Tableau username).
      - name: quarter
        data_type: string
        quote: true
        description: Academic quarter (Q1–Q4).
      - name: semester
        data_type: string
        description: Academic semester (S1 or S2).
      - name: quarter_start_date
        data_type: date
        description: First day of the quarter.
      - name: quarter_end_date
        data_type: date
        description: Last day of the quarter.
      - name: is_current_quarter
        data_type: boolean
        description: True if this row belongs to the current academic quarter.
      - name: assignment_category_code
        data_type: string
        description: >
          Assignment category code (W, H, F, S). Null for Branch 1 anchor rows.
      - name: assignment_category_name
        data_type: string
        description: Assignment category name. Null for Branch 1 anchor rows.
      - name: assignment_category_term
        data_type: string
        description: Assignment category term. Null for Branch 1 anchor rows.
      - name: expectation
        data_type: int64
        description: >
          Expected QTD assignment count for this category from
          int_powerschool__u_expectations_qtd_unpivot. Null for anchor rows.
      - name: notes
        data_type: string
        description: Notes on the expectation value. Null for anchor rows.
      - name: quarter_course_percent_grade
        data_type: float64
        description: >
          Quarter course percent grade. Populated for student_course rows; null
          for anchor and assignment_teacher rows.
      - name: quarter_course_grade_points
        data_type: float64
        description: >
          Quarter course grade points. Populated for student_course rows; null
          for anchor and assignment_teacher rows.
      - name: quarter_comment_value
        data_type: string
        description: >
          PowerSchool quarter comment text. Populated for student_course rows;
          null for anchor and assignment_teacher rows.
      - name: cte_grouping
        data_type: string
        description: >
          Source branch from int_tableau__gradebook_audit_flags_calculations —
          sections_teacher (anchor rows), assignment_teacher (assignment count
          flag), or student_course (grade and comment flags).
      - name: audit_category
        data_type: string
        description: >
          Audit category label from
          int_tableau__gradebook_audit_flags_calculations (e.g. 'No Flags',
          'Teacher Gradebook Flags', 'EOQ').
      - name: assignmentid
        data_type: int64
        description: >
          PowerSchool assignment ID. Non-null for assignment_teacher rows; 0
          sentinel for student_course rows; null for anchor rows.
      - name: assignment_name
        data_type: string
        description: >
          Assignment name. Null for anchor rows; 'No Assignment' sentinel for
          student_course rows.
      - name: duedate
        data_type: date
        description:
          Assignment due date. Null for student_course and anchor rows.
      - name: scoretype
        data_type: string
        description: >
          Assignment score type. Null for anchor rows; 'No Score Type' sentinel
          for student_course rows.
      - name: totalpointvalue
        data_type: float64
        description: >
          Assignment total point value. Null for anchor rows; 0 sentinel for
          student_course rows.
      - name: audit_flag_name
        data_type: string
        description: >
          Name of the audit flag that fired, or 'No Flags' for Branch 1 anchor
          rows (clean sections). Active flags: qt_percent_grade_greater_100,
          qt_grade_70_comment_missing, expected_assign_count_not_met.
      - name: audit_flag_value
        data_type: boolean
        description: >
          True if this specific flag fired for this section x quarter. False for
          Branch 1 anchor rows.
      - name: assignment_has_flags
        data_type: boolean
        description: >
          True if this assignment has any audit flags. Null for student_course
          and anchor rows.
      - name: total_assign_count_qtd_by_cat_section_actual
        data_type: int64
        description: >
          Actual QTD assignment count for this category and section. Null for
          anchor rows.
      - name: total_assign_count_qtd_by_cat_section_no_flags
        data_type: int64
        description: >
          Expected assignment count threshold for a flag-free section. Null for
          anchor rows.
      - name: is_healthy_gradebook
        data_type: boolean
        description: >
          True if no audit flags fired for this teacher x school x quarter.
          Drives the two-branch UNION: Branch 1 (anchor rows) when true, Branch
          2 (flag rows) when false.
