models:
  - name: rpt_tableau__gradebook_audit_v4
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_project
              - sectionid
              - quarter
              - audit_flag_name
              - cte_grouping
    columns:
      - name: _dbt_source_project
        data_type: string
      - name: academic_year
        data_type: int64
      - name: academic_year_display
        data_type: string
      - name: region_school_level
        data_type: string
      - name: region
        data_type: string
      - name: school_level
        data_type: string
      - name: schoolid
        data_type: int64
      - name: school
        data_type: string
      - name: course_number
        data_type: string
      - name: course_name
        data_type: string
      - name: credit_type
        data_type: string
      - name: exclude_from_gpa
        data_type: int64
      - name: sections_dcid
        data_type: int64
      - name: sectionid
        data_type: int64
      - name: section_number
        data_type: string
      - name: external_expression
        data_type: string
      - name: section_or_period
        data_type: string
      - name: teacher_number
        data_type: string
      - name: teacher_name
        data_type: string
      - name: school_leader
        data_type: string
      - name: manager_employee_number
        data_type: int64
      - name: manager_name
        data_type: string
      - name: hos
        data_type: string
      - name: teacher_tableau_username
        data_type: string
      - name: manager_tableau_username
        data_type: string
      - name: school_leader_tableau_username
        data_type: string
      - name: quarter
        data_type: string
        quote: true
      - name: semester
        data_type: string
      - name: quarter_start_date
        data_type: date
      - name: quarter_end_date
        data_type: date
      - name: is_current_quarter
        data_type: boolean
      - name: assignment_category_code
        data_type: string
      - name: assignment_category_name
        data_type: string
      - name: assignment_category_term
        data_type: string
      - name: expectation
        data_type: int64
      - name: notes
        data_type: string
      - name: quarter_course_percent_grade
        data_type: float64
      - name: quarter_course_grade_points
        data_type: float64
      - name: quarter_comment_value
        data_type: string
      - name: cte_grouping
        data_type: string
      - name: assignmentid
        data_type: int64
      - name: assignment_name
        data_type: string
      - name: duedate
        data_type: date
      - name: scoretype
        data_type: string
      - name: totalpointvalue
        data_type: float64
      - name: audit_flag_name
        data_type: string
      - name: audit_flag_value
        data_type: boolean
      - name: assignment_has_flags
        data_type: boolean
      - name: total_assign_count_qtd_by_cat_section_actual
        data_type: int64
      - name: total_assign_count_qtd_by_cat_section_no_flags
        data_type: int64
      - name: is_healthy_gradebook
        data_type: boolean
