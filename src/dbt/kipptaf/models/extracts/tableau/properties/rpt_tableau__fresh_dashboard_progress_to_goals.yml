models:
  - name: rpt_tableau__fresh_dashboard_progress_to_goals
    config:
      enabled: true
      contract:
        enforced: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - region
              - schoolid
              - finalsite_id
              - grade_level
              - latest_status
              - enrollment_type
              - row_type
          config:
            severity: error
    columns:
      - name: academic_year
        data_type: int64
      - name: org
        data_type: string
      - name: region
        data_type: string
      - name: school_level
        data_type: string
      - name: schoolid
        data_type: int64
      - name: school
        data_type: string
      - name: grade_level
        data_type: int64
      - name: enrollment_type
        data_type: string
      - name: finalsite_id
        data_type: string
      - name: powerschool_student_number
        data_type: int64
      - name: first_name
        data_type: string
      - name: last_name
        data_type: string
      - name: latest_status
        data_type: string
      - name: student_enrollment_type
        data_type: string
      - name: self_contained
        data_type: string
      - name: is_enrolled_fdos
        data_type: boolean
      - name: is_enrolled_oct01
        data_type: boolean
      - name: is_enrolled_oct15
        data_type: boolean
      - name: is_enrolled_mar15
        data_type: boolean
      - name: row_type
        data_type: string
      - name: student_count
        data_type: int64
      - name: seat_target
        data_type: numeric
      - name: fdos_target
        data_type: numeric
      - name: budget_target
        data_type: numeric
      - name: new_student_target
        data_type: numeric
      - name: re_enroll_projection
        data_type: numeric
