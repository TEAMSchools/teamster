models:
  - name: rpt_tableau__topline_cascade_dashboard
    description:
      Topline cascade dashboard extract for Tableau. Rows span four period
      grains (week, month, quarter, ytd) for the same metric/scope — every
      worksheet must filter on period_type, or its aggregates mix grains.
    columns:
      - name: metric_type
        data_type: string
      - name: academic_year
        data_type: int64
      - name: schoolid
        data_type: int64
      - name: school
        data_type: string
      - name: layer
        data_type: string
      - name: indicator
        data_type: string
      - name: discipline
        data_type: string
      - name: term
        data_type: date
      - name: term_end
        data_type: date
      - name: is_current_week
        data_type: boolean
      - name: period_type
        description: Grain of the row — week, month, quarter, or ytd.
        data_type: string
      - name: period_label
        description:
          Period instance label — ISO week, full month name, Q1-Q4, or YTD.
        data_type: string
      - name: is_current_period
        description:
          True when today falls inside the row's period window, for the row's
          scope and grain.
        data_type: boolean
      - name: is_most_recent_complete_period
        description:
          True for the latest fully-elapsed period of the row's grain and scope
          in the current academic year.
        data_type: boolean
      - name: indicator_display
        data_type: string
      - name: org_level
        data_type: string
      - name: has_goal
        data_type: boolean
      - name: goal_type
        data_type: string
      - name: goal_direction
        data_type: string
      - name: aggregation_data_type
        data_type: string
      - name: aggregation_type
        data_type: string
      - name: aggregation_hash
        data_type: string
      - name: aggregation_display
        data_type: string
      - name: goal
        data_type: numeric
      - name: metric_aggregate_value
        data_type: float64
      - name: metric_aggregate_value_numeric
        data_type: float64
      - name: metric_aggregate_value_integer
        data_type: float64
      - name: is_goal_met
        data_type: boolean
      - name: goal_difference_percent
        data_type: float64
      - name: progress_to_goal_pct
        data_type: float64
      - name: goal_difference
        description:
          Direction-aware difference from the resolved goal (positive means
          ahead of goal), in the metric's own units.
        data_type: float64
      - name: goal_difference_numeric
        description:
          goal_difference for proportion indicators, else null — formats as
          percentage points in Tableau.
        data_type: float64
      - name: goal_difference_integer
        description: goal_difference for count indicators, else null.
        data_type: float64
      - name: metric_numerator
        description:
          Enrolled count behind the Seat Target / Budget Target ratio; null for
          other indicators.
        data_type: numeric
      - name: metric_denominator
        description:
          Seat or budget target integer behind the ratio; null for other
          indicators.
        data_type: numeric
      - name: region
        data_type: string
      - name: hos_name
        data_type: string
      - name: mdso_name
        data_type: string
      - name: is_most_recent_complete_week
        data_type: boolean
