      - name: application_admission_type
        data_type: string
      - name: application_status
        data_type: string
      - name: application_submission_status
        data_type: string
      - name: matriculation_decision
        data_type: string
      - name: is_early_action_decision
        data_type: boolean
      - name: is_early_action
        data_type: boolean
      - name: is_early_decision
        data_type: boolean
      - name: is_ed_ea
        data_type: string
      - name: student_aid_index
        data_type: numeric
      - name: best_guess_pathway
        data_type: string
      - name: is_graduated
        data_type: boolean
      - name: is_ecc_enrollment
        data_type: boolean
      - name: is_ugrad_enrollment
        data_type: boolean
      - name: is_continuing_completing
        data_type: boolean
      - name: is_same_school
        data_type: int64
      - name: is_4yr_grad_int
        data_type: int64
      - name: is_6yr_grad_int
        data_type: int64
      - name: is_grad_ever_any
        data_type: int64
      - name: hs_gpa_bands
        data_type: string
      - name: highest_sat_score
        data_type: int64
      - name: award_letter__unmet_need
        data_type: float64
        description: >
          Overgrad award letter unmet need matched to the school on this row via
          IPEDS/NCES ID. When multiple Overgrad records exist for the same
          student-school pair, the non-null unmet need record is preferred, then
          most recently updated. Null when no matching Overgrad record exists.
      - name: award_letter__out_of_pocket
        data_type: float64
        description: >
          Overgrad award letter out-of-pocket cost matched to the school on this
          row via IPEDS/NCES ID. Null when no matching Overgrad record exists.
      - name: award_letter__unmet_need_with_max_family_contribution
        data_type: float64
        description: >
          Overgrad award letter unmet need calculated using the maximum family
          contribution, matched to the school on this row via IPEDS/NCES ID.
          Null when no matching Overgrad record exists.
