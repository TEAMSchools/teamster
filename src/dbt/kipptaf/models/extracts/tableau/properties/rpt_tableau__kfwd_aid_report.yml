models:
  - name: rpt_tableau__kfwd_aid_report
    description:
      One row per KIPP Aid award from stg_kippadb__kipp_aid, enriched with
      student demographics from int_kippadb__roster and enrollment data from
      int_kippadb__enrollment_pivot. Includes the MAHER_FUND tag-derived columns
      (is_maher, fund_type, doc_type, notes_clean).
    columns:
      - name: id
        data_type: string
        data_tests:
          - unique:
              config:
                severity: error
      - name: aid_name
        data_type: string
      - name: sf_contact_id
        data_type: string
      - name: amount
        data_type: numeric
      - name: award_date
        data_type: date
      - name: created_date
        data_type: timestamp
      - name: kipp_aid_count
        data_type: numeric
      - name: notes
        data_type: string
      - name: notes_clean
        data_type: string
      - name: fund_type
        data_type: string
      - name: doc_type
        data_type: string
      - name: academic_year
        data_type: int64
      - name: is_maher
        data_type: boolean
      - name: aid_type
        data_type: string
      - name: aid_status
        data_type: string
      - name: student_number
        data_type: int64
      - name: student_name
        data_type: string
      - name: student_first_name
        data_type: string
      - name: student_last_name
        data_type: string
      - name: ktc_cohort
        data_type: int64
      - name: record_type_name
        data_type: string
      - name: es_graduated
        data_type: string
      - name: kipp_region_name
        data_type: string
      - name: counselor_name
        data_type: string
      - name: ethnicity
        data_type: string
      - name: gender
        data_type: string
      - name: current_kipp_student
        data_type: string
      - name: postsecondary_status
        data_type: string
      - name: high_school_graduated_from
        data_type: string
      - name: college_graduated_from
        data_type: string
      - name: currently_enrolled_school
        data_type: string
      - name: actual_hs_graduation_date
        data_type: date
      - name: actual_college_graduation_date
        data_type: date
      - name: expected_college_graduation_date
        data_type: date
      - name: college_match_display_gpa
        data_type: numeric
      - name: current_college_cumulative_gpa
        data_type: numeric
      - name: is_kipp_ms_graduate
        data_type: boolean
      - name: is_kipp_hs_graduate
        data_type: boolean
      - name: ba_pursuing_degree_type
        data_type: string
      - name: ba_status
