models:
  - name: rpt_tableau__ap_assessment_dashboard
    description: >
      AP assessment scores joined to student enrollment and course schedules for
      Tableau reporting. One row per student per AP course subject, including
      students enrolled in AP courses who did not take the exam and students who
      took an exam with no matching AP course enrollment.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - student_number
              - subject_code
    columns:
      - name: academic_year
        data_type: int64
        description: Academic year of enrollment.
      - name: academic_year_display
        data_type: string
        description: Academic year formatted for display (e.g. 2024-25).
      - name: region
        data_type: string
        description: KIPP region of the student's enrollment.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: school
        data_type: string
        description: School abbreviation.
      - name: student_number
        data_type: int64
        description: Student Number assigned by the school. Indexed.
      - name: student_name
        data_type: string
        description: Student full name (last, first).
      - name: grade_level
        data_type: int64
        description: >
          The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed.
      - name: enroll_status
        data_type: int64
        description: The enrollment status of the student.
      - name: entrydate
        data_type: date
        description: >
          The date the student enrolled in school for the current enrollment.
          Indexed.
      - name: exitdate
        data_type: date
        description: >
          The date the student exited for the current/last enrollment. This is
          the day after a student-attended class. Indexed.
      - name: cohort
        data_type: int64
        description: Student cohort (expected graduation year).
      - name: advisory
        data_type: string
        description: Advisory or homeroom assignment.
      - name: is_enrolled_recent
        data_type: boolean
        description: Whether the student was recently enrolled.
      - name: is_enrolled_y1
        data_type: boolean
        description: Whether the student was enrolled for the full year.
      - name: c_504_status
        data_type: boolean
        description: Whether the student has a 504 plan.
      - name: lep_status
        data_type: boolean
        description: Student Limited English Proficiency status.
      - name: gifted_and_talented
        data_type: string
        description: Gifted and talented program designation.
      - name: contact_id
        data_type: string
        description: Salesforce contact ID.
      - name: ktc_cohort
        data_type: int64
        description: KIPP Through College cohort year.
      - name: graduation_year
        data_type: int64
        description: Student graduation year.
      - name: subject_code
        data_type: string
        description: >
          AP subject code bridging course enrollment and exam records for the
          report grain — the course-enrollment subject code when the student is
          enrolled in an AP course, otherwise the exam's own College Board
          subject code. NULL only when the student has neither.
      - name: ap_date_enrolled
        data_type: date
        description: Date the student enrolled in the AP course section.
      - name: ap_date_left
        data_type: date
        description: Date the student left the AP course section.
      - name: ap_course_section
        data_type: string
        description: External expression (period/section) of the AP course.
      - name: ap_teacher_name
        data_type: string
        description: AP course teacher name (last, first).
      - name: ap_course_subject
        data_type: string
        description: AP subject code from PowerSchool course enrollments.
      - name: test_name
        data_type: string
        description: AP exam name as reported by College Board.
      - name: test_subject
        data_type: string
        description: AP exam subject as reported by College Board.
      - name: exam_score
        data_type: numeric
        description: AP exam score (1–5).
      - name: irregularity_code_1
        data_type: string
        description: First exam irregularity code, if any.
      - name: irregularity_code_2
        data_type: string
        description: Second exam irregularity code, if any.
      - name: data_source
        data_type: string
        description: Source of the AP score record (e.g. CB File).
      - name: ps_ap_course_subject_code
        data_type: string
        description:
          AP subject code used to join PowerSchool and College Board data.
      - name: ap_course_name
        data_type: string
        description: >
          AP course name resolved by subject code, in priority order — the
          course-side College Board crosswalk first, then the exam's own
          crosswalk-resolved name, then 'Not an AP course' if neither resolves.
      - name: course_name
        data_type: string
        description: >
          PowerSchool course name; 'Not an AP course' if student has no AP
          course enrollment.
      - name: test_subject_area
        data_type: string
        description: >
          Derived field indicating exam relationship to course: 'Not applicable'
          if no AP course and no exam, 'Took course, but not AP exam.' if
          enrolled but did not test, 'Took AP exam, not enrolled in course.' if
          tested with no matching course enrollment, otherwise the College Board
          AP course name.
      - name: sped
        data_type: int64
        description: Special education indicator (1 = has IEP, 0 = no IEP).
      - name: expected_scope
        data_type: string
        description: >
          'AP' if student is enrolled in an AP course, 'Not applicable'
          otherwise.
      - name: expected_test_type
        data_type: string
        description: >
          'Official' if student is enrolled in an AP course, 'Not applicable'
          otherwise.

unit_tests:
  - name: test_course_enrollment_no_exam
    description: >-
      A student enrolled in an AP course who did not take the exam shows 'Took
      course, but not AP exam.' and resolves ap_course_name from the course-side
      crosswalk. Regression check: this branch existed before the fix and must
      keep working.
    model: rpt_tableau__ap_assessment_dashboard
    given:
      - input: ref('int_extracts__student_enrollments')
        rows:
          - {
              studentid: 101,
              student_number: 1001,
              academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__students,
              rn_year: 1,
              school_level: HS,
              entrydate: 2024-08-01,
              exitdate: 2025-06-15,
              iep_status: No IEP,
            }
      - input: ref('base_powerschool__course_enrollments')
        rows:
          - {
              cc_studentid: 101,
              cc_academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__cc,
              ap_course_subject: ENGLANG,
              is_dropped_section: false,
              rn_course_number_year: 1,
              courses_course_name: AP English Language,
              cc_dateenrolled: 2024-09-01,
              cc_dateleft: 2025-06-15,
              sections_external_expression: P3,
              teacher_lastfirst: "Smith, Jane",
            }
      - input: ref('stg_google_sheets__collegeboard__ap_course_crosswalk')
        rows:
          - {
              PS_AP_Course_Subject_Code: ENGLANG,
              AP_Course_Name: AP English Language and Composition,
              Data_Source: CB File,
            }
      - input: ref('int_assessments__ap_assessments')
        rows: []
    expect:
      rows:
        - {
            subject_code: ENGLANG,
            course_name: AP English Language,
            ap_course_name: AP English Language and Composition,
            test_subject_area: "Took course, but not AP exam.",
            expected_scope: AP,
            expected_test_type: Official,
          }

  - name: test_course_enrollment_and_matching_exam
    description: >-
      A student enrolled in an AP course who also has a matching exam score
      shows the exam's course name as test_subject_area. Regression check for
      the pre-existing matched case.
    model: rpt_tableau__ap_assessment_dashboard
    given:
      - input: ref('int_extracts__student_enrollments')
        rows:
          - {
              studentid: 102,
              student_number: 1002,
              academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__students,
              rn_year: 1,
              school_level: HS,
              entrydate: 2024-08-01,
              exitdate: 2025-06-15,
              iep_status: No IEP,
            }
      - input: ref('base_powerschool__course_enrollments')
        rows:
          - {
              cc_studentid: 102,
              cc_academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__cc,
              ap_course_subject: BIOLOGY,
              is_dropped_section: false,
              rn_course_number_year: 1,
              courses_course_name: AP Biology,
              cc_dateenrolled: 2024-09-01,
              cc_dateleft: 2025-06-15,
              sections_external_expression: P4,
              teacher_lastfirst: "Doe, John",
            }
      - input: ref('stg_google_sheets__collegeboard__ap_course_crosswalk')
        rows:
          - {
              PS_AP_Course_Subject_Code: BIOLOGY,
              AP_Course_Name: AP Biology,
              Data_Source: CB File,
            }
      - input: ref('int_assessments__ap_assessments')
        rows:
          - {
              academic_year: 2024,
              powerschool_student_number: 1002,
              test_name: AP Biology,
              test_subject: Biology,
              exam_score: 4,
              ps_ap_course_subject_code: BIOLOGY,
              ap_course_name: AP Biology,
              data_source: CB File,
            }
    expect:
      rows:
        - {
            subject_code: BIOLOGY,
            course_name: AP Biology,
            ap_course_name: AP Biology,
            test_subject_area: AP Biology,
            expected_scope: AP,
            expected_test_type: Official,
          }

  - name: test_exam_only_no_course_enrollment
    description: >-
      Fix for #4391: a student with an AP exam score but no matching AP course
      enrollment now surfaces as its own row with 'Took AP exam, not enrolled in
      course.' instead of disappearing. ap_course_name falls back to the exam's
      own crosswalk-resolved name since there is no course-side match.
    model: rpt_tableau__ap_assessment_dashboard
    given:
      - input: ref('int_extracts__student_enrollments')
        rows:
          - {
              studentid: 103,
              student_number: 1003,
              academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__students,
              rn_year: 1,
              school_level: HS,
              entrydate: 2024-08-01,
              exitdate: 2025-06-15,
              iep_status: No IEP,
            }
      - input: ref('base_powerschool__course_enrollments')
        rows: []
      - input: ref('stg_google_sheets__collegeboard__ap_course_crosswalk')
        rows: []
      - input: ref('int_assessments__ap_assessments')
        rows:
          - {
              academic_year: 2024,
              powerschool_student_number: 1003,
              test_name: AP Chemistry,
              test_subject: Chemistry,
              exam_score: 3,
              ps_ap_course_subject_code: CHEM,
              ap_course_name: AP Chemistry,
              data_source: CB File,
            }
    expect:
      rows:
        - {
            subject_code: CHEM,
            ap_course_subject: null,
            course_name: Not an AP course,
            ap_course_name: AP Chemistry,
            test_subject_area: "Took AP exam, not enrolled in course.",
            expected_scope: Not applicable,
            expected_test_type: Not applicable,
          }

  - name: test_no_course_no_exam
    description: >-
      A non-participating HS student (no AP course, no AP exam) still gets
      exactly one row, unchanged from pre-fix behavior.
    model: rpt_tableau__ap_assessment_dashboard
    given:
      - input: ref('int_extracts__student_enrollments')
        rows:
          - {
              studentid: 104,
              student_number: 1004,
              academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__students,
              rn_year: 1,
              school_level: HS,
              entrydate: 2024-08-01,
              exitdate: 2025-06-15,
              iep_status: No IEP,
            }
      - input: ref('base_powerschool__course_enrollments')
        rows: []
      - input: ref('stg_google_sheets__collegeboard__ap_course_crosswalk')
        rows: []
      - input: ref('int_assessments__ap_assessments')
        rows: []
    expect:
      rows:
        - {
            subject_code: null,
            course_name: Not an AP course,
            ap_course_name: Not an AP course,
            test_subject_area: Not applicable,
            expected_scope: Not applicable,
            expected_test_type: Not applicable,
          }

  - name: test_two_exam_only_subjects_produce_two_distinct_rows
    description: >-
      A student with exam scores in two different subjects and no course
      enrollment in either gets two distinct rows keyed by subject_code, proving
      the new grain key prevents the collision that ap_course_subject (always
      NULL for both rows) would cause.
    model: rpt_tableau__ap_assessment_dashboard
    given:
      - input: ref('int_extracts__student_enrollments')
        rows:
          - {
              studentid: 105,
              student_number: 1005,
              academic_year: 2024,
              _dbt_source_relation: kippnewark_powerschool.stg_powerschool__students,
              rn_year: 1,
              school_level: HS,
              entrydate: 2024-08-01,
              exitdate: 2025-06-15,
              iep_status: No IEP,
            }
      - input: ref('base_powerschool__course_enrollments')
        rows: []
      - input: ref('stg_google_sheets__collegeboard__ap_course_crosswalk')
        rows: []
      - input: ref('int_assessments__ap_assessments')
        rows:
          - {
              academic_year: 2024,
              powerschool_student_number: 1005,
              test_name: AP Chemistry,
              test_subject: Chemistry,
              exam_score: 3,
              ps_ap_course_subject_code: CHEM,
              ap_course_name: AP Chemistry,
              data_source: CB File,
            }
          - {
              academic_year: 2024,
              powerschool_student_number: 1005,
              test_name: AP Physics 1,
              test_subject: Physics 1,
              exam_score: 5,
              ps_ap_course_subject_code: PHYS1,
              ap_course_name: AP Physics 1,
              data_source: CB File,
            }
    expect:
      rows:
        - {
            subject_code: CHEM,
            test_subject_area: "Took AP exam, not enrolled in course.",
          }
        - {
            subject_code: PHYS1,
            test_subject_area: "Took AP exam, not enrolled in course.",
          }
