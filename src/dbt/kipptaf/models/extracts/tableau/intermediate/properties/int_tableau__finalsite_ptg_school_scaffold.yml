models:
  - name: int_tableau__finalsite_ptg_school_scaffold
    config:
      contract:
        enforced: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - schoolid
              - grade_level
              - enrollment_type
              - goal_granularity
          config:
            store_failures: true
    columns:
      - name: academic_year
        data_type: int64
      - name: org
        data_type: string
      - name: region
        data_type: string
      - name: schoolid
        data_type: int64
      - name: school
        data_type: string
      - name: grade_level
        data_type: int64
      - name: school_level
        data_type: string
      - name: enrollment_type
        data_type: string
      - name: goal_granularity
        data_type: string
