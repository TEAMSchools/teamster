models:
  - name: int_tableau__gradebook_audit_flags__student
    description: >-
      Student-level audit flags across 4 grains (assignment, category, EOQ,
      conduct code) combined via UNION ALL. Each branch UNPIVOTs boolean flag
      columns, joins to the flags configuration sheet, and applies exception
      anti-joins. Materialized as a table — consumed by
      rpt_tableau__gradebook_audit, rpt_tableau__gradebook_es_comments, and
      rpt_tableau__gradebook_ms_hs_comments for student-level detail in the LEFT
      JOIN.
    config:
      materialized: table
      cluster_by:
        - code_type
        - cte_grouping
        - region
        - schoolid
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: academic_year
        data_type: int64
      - name: region
        data_type: string
      - name: schoolid
        data_type: int64
      - name: studentid
        data_type: int64
      - name: student_number
        data_type: int64
      - name: student_name
        data_type: string
      - name: grade_level
        data_type: int64
      - name: salesforce_id
        data_type: string
      - name: ktc_cohort
        data_type: int64
      - name: enroll_status
        data_type: int64
      - name: cohort
        data_type: int64
      - name: gender
        data_type: string
      - name: ethnicity
        data_type: string
      - name: advisory
        data_type: string
      - name: year_in_school
        data_type: int64
      - name: year_in_network
        data_type: int64
      - name: rn_undergrad
        data_type: int64
      - name: is_out_of_district
        data_type: boolean
      - name: is_retained_year
        data_type: boolean
      - name: is_retained_ever
        data_type: boolean
      - name: lunch_status
