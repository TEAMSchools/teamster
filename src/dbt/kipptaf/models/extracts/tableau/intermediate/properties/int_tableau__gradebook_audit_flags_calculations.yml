models:
  - name: int_tableau__gradebook_audit_flags_calculations
    description: >
      Three-branch UNION ALL intermediate for the gradebook audit pipeline.
      Feeds rpt_tableau__gradebook_audit. Branch sections_teacher: one anchor
      row per section x quarter (no student data, flag columns false). Branch
      assignment_teacher: one row per section x quarter x category x assignment
      with QTD assignment count aggregates. Branch student_course: one row per
      student x section x quarter with quarter grade and comment flag columns.
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_project
              - sectionid
              - studentid
              - quarter
              - assignment_category_code
              - assignmentid
    columns:
      - name: _dbt_source_project
        data_type: string
        description:
          Source PowerSchool instance (kippnewark, kippcamden, kipppaterson).
      - name: academic_year
        data_type: int64
        description:
          Starting year of the academic year (e.g., 2025 for AY 2025-2026).
      - name: academic_year_display
        data_type: string
        description: Human-readable academic year (e.g., '2025-2026').
      - name: region_school_level
        data_type: string
        description:
          Concatenated region and school level after Sumner G5 override.
      - name: region
        data_type: string
        description: Region name (Newark, Camden, Paterson).
      - name: school_level
        data_type: string
        description: School level after Sumner G5 override (MS or HS).
      - name: schoolid
        data_type: int64
        description: PowerSchool school ID.
      - name: school
        data_type: string
        description: School abbreviation.
      - name: students_dcid
        data_type: int64
        description: PowerSchool students DCID. Null for sections_teacher rows.
      - name: studentid
        data_type: int64
        description: PowerSchool student ID. Null for sections_teacher rows.
      - name: student_number
        data_type: int64
        description: PowerSchool student number. Null for sections_teacher rows.
      - name: student_name
        data_type: string
        description: Student full name. Null for sections_teacher rows.
      - name: grade_level
        data_type: int64
        description: Student grade level. Null for sections_teacher rows.
      - name: dateenrolled
        data_type: date
        description:
          Section enrollment start date. Null for sections_teacher rows.
      - name: dateleft
        data_type: date
        description:
          Section enrollment end date. Null for sections_teacher rows.
      - name: salesforce_id
        data_type: string
        description: Salesforce contact ID. Null for sections_teacher rows.
      - name: ktc_cohort
        data_type: int64
        description:
          KIPP Through College cohort year. Null for sections_teacher rows.
      - name: enroll_status
        data_type: int64
        description:
          PowerSchool enrollment status code. Null for sections_teacher rows.
      - name: cohort
        data_type: int64
        description:
          Student graduation cohort year. Null for sections_teacher rows.
      - name: gender
        data_type: string
        description: Student gender. Null for sections_teacher rows.
      - name: ethnicity
        data_type: string
        description: Student ethnicity code. Null for sections_teacher rows.
      - name: advisory
        data_type: string
        description: Advisory group name. Null for sections_teacher rows.
      - name: year_in_school
        data_type: int64
        description:
          Years enrolled at current school. Null for sections_teacher rows.
      - name: year_in_network
        data_type: int64
        description:
          Years enrolled in the KIPP network. Null for sections_teacher rows.
      - name: rn_undergrad
        data_type: int64
        description:
          Row number within undergrad enrollment records. Null for
          sections_teacher rows.
      - name: is_out_of_district
        data_type: boolean
        description:
          True if the student is an out-of-district placement. Null for
          sections_teacher rows.
      - name: is_self_contained
        data_type: boolean
        description:
          True if the student is in a self-contained special education class.
          Null for sections_teacher rows.
      - name: is_retained_year
        data_type: boolean
        description:
          True if the student was retained this year. Null for sections_teacher
          rows.
      - name: is_retained_ever
        data_type: boolean
        description:
          True if the student has ever been retained. Null for sections_teacher
          rows.
      - name: lunch_status
        data_type: string
        description:
          Free/reduced lunch eligibility status. Null for sections_teacher rows.
      - name: gifted_and_talented
        data_type: string
        description:
          Gifted and talented program status. Null for sections_teacher rows.
      - name: iep_status
        data_type: string
        description: IEP status code. Null for sections_teacher rows.
      - name: lep_status
        data_type: boolean
        description:
          True if the student has limited English proficiency. Null for
          sections_teacher rows.
      - name: is_504
        data_type: boolean
        description:
          True if the student has a 504 plan. Null for sections_teacher rows.
      - name: is_counseling_services
        data_type: int64
        description:
          Counseling services indicator. Null for sections_teacher rows.
      - name: is_student_athlete
        data_type: int64
        description: Student athlete indicator. Null for sections_teacher rows.
      - name: ada
        data_type: float64
        description:
          Average daily attendance rate. Null for sections_teacher rows.
      - name: ada_above_or_at_80
        data_type: boolean
        description:
          True if ADA is at or above 80%. Null for sections_teacher rows.
      - name: course_number
        data_type: string
        description: PowerSchool course number.
      - name: course_name
        data_type: string
        description: Course name.
      - name: credit_type
        data_type: string
        description: Course credit type (e.g., MATH, ENG).
      - name: exclude_from_gpa
        data_type: int64
        description:
          1 if the course is excluded from GPA calculation, 0 otherwise.
      - name: sections_dcid
        data_type: int64
        description: PowerSchool sections DCID.
      - name: sectionid
        data_type: int64
        description: PowerSchool section ID.
      - name: section_number
        data_type: string
        description: Section number.
      - name: external_expression
        data_type: string
        description: HS period expression from PowerSchool.
      - name: section_or_period
        data_type: string
        description:
          Display identifier; uses external_expression for HS, section_number
          otherwise.
      - name: teacher_number
        data_type: string
        description: PowerSchool teacher number.
      - name: teacher_name
        data_type: string
        description: Teacher full name.
      - name: school_leader
        data_type: string
        description: Principal name.
      - name: manager_employee_number
        data_type: int64
        description: ADP employee number of the teacher's direct manager.
      - name: manager_name
        data_type: string
        description: Teacher's direct manager name (Last, First).
      - name: hos
        data_type: string
        description: Head of School name.
      - name: teacher_tableau_username
        data_type: string
        description: Teacher's SAM account name for Tableau row-level security.
      - name: manager_tableau_username
        data_type: string
        description: Manager's SAM account name for Tableau row-level security.
      - name: school_leader_tableau_username
        data_type: string
        description:
          School leader's SAM account name for Tableau row-level security.
      - name: quarter
        data_type: string
        quote: true
        description: Academic quarter (Q1-Q4).
      - name: semester
        data_type: string
        description: Academic semester (S1 or S2).
      - name: quarter_start_date
        data_type: date
        description: First day of the quarter.
      - name: quarter_end_date
        data_type: date
        description: Last day of the quarter.
      - name: is_current_quarter
        data_type: boolean
        description: True if this row belongs to the current academic quarter.
      - name: assignment_category_code
        data_type: string
        description: >
          Assignment category code (W, H, F, S). 'NC' sentinel for
          sections_teacher and student_course rows.
      - name: assignment_category_name
        data_type: string
        description: >
          Assignment category name. 'No Category' sentinel for sections_teacher
          and student_course rows.
      - name: assignment_category_term
        data_type: string
        description: >
          Assignment category term used as the QTD window partition key. 'NC'
          sentinel for sections_teacher and student_course rows.
      - name: expectation
        data_type: int64
        description: >
          Expected QTD assignment count for this category from
          int_powerschool__u_expectations_qtd_unpivot. 0 for sections_teacher
          and student_course rows.
      - name: notes
        data_type: string
        description:
          Notes on the expectation value. 'No Notes' sentinel for
          non-assignment_teacher rows.
      - name: quarter_course_percent_grade
        data_type: float64
        description:
          Quarter course percent grade. Populated for student_course rows; 0.0
          for others.
      - name: quarter_comment_value
        data_type: string
        description:
          PowerSchool quarter comment. Populated for student_course rows; null
          for others.
      - name: cte_grouping
        data_type: string
        description: >
          Identifies which UNION branch produced the row: sections_teacher
          (anchor rows, one per section x quarter), assignment_teacher
          (per-assignment rows), or student_course (per-student grade and
          comment flag rows).
      - name: audit_category
        data_type: string
        description: >
          Audit category label ('No Flags' for sections_teacher, 'Teacher
          Gradebook Flags' for assignment_teacher, 'EOQ' for student_course).
      - name: assignmentid
        data_type: int64
        description: >
          PowerSchool assignment ID. Populated for assignment_teacher rows; 0
          sentinel for student_course; null for sections_teacher.
      - name: assignment_name
        data_type: string
        description: >
          Assignment name. Populated for assignment_teacher rows; 'No
          Assignment' sentinel for student_course; null for sections_teacher.
      - name: duedate
        data_type: date
        description:
          Assignment due date. Populated for assignment_teacher rows; null for
          others.
      - name: scoretype
        data_type: string
        description: >
          Assignment score type. Populated for assignment_teacher rows; 'No
          Score Type' sentinel for student_course; null for sections_teacher.
      - name: totalpointvalue
        data_type: float64
        description: >
          Assignment total point value. Populated for assignment_teacher rows; 0
          sentinel for student_course; null for sections_teacher.
      - name: assignment_has_flags
        data_type: boolean
        description:
          True if the assignment has any audit flags. Null for
          non-assignment_teacher rows.
      - name: qt_percent_grade_greater_100
        data_type: boolean
        description: >
          True if the student's quarter course percent grade exceeds 100.
          Populated for student_course rows; false for others.
      - name: qt_grade_70_comment_missing
        data_type: boolean
        description: >
          True if the student's quarter grade is below 70 and no comment is
          entered. Populated for student_course rows; false for others.
      - name: total_assign_count_qtd_by_cat_section_actual
        data_type: int64
        description: >
          Actual QTD assignment count for this category and section. Populated
          for assignment_teacher rows; null for others.
      - name: total_assign_count_qtd_by_cat_section_no_flags
        data_type: int64
        description: >
          Expected assignment count threshold (assignments without flags).
          Populated for assignment_teacher rows; null for others.
