models:
  - name: int_tableau__state_assessments_demographic_comps
    description: >
      Student-level assessment scores joined to enrollment demographics, then
      aggregated via GROUPING SETS into one row per demographic focus at a time
      (or a total), crossed with region present-or-rolled-up. Covers NJ official
      scores, NJ preliminary scores (self-deactivating once official scores
      land), and FL official scores.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - district_state
              - region
              - assessment_name
              - test_code
              - comparison_entity
              - comparison_demographic_group
              - comparison_demographic_subgroup
    columns:
      - name: academic_year
        data_type: int64
        description: School year in which the assessment was administered.
      - name: district_state
        data_type: string
        description: KTAF district-state label (e.g. KTAF NJ, KTAF FL).
      - name: region
        data_type: string
        description: >
          KIPP region (Camden, Newark, Paterson, Miami). NULL when this row
          represents the district-level rollup across all regions.
      - name: assessment_name
        data_type: string
        description:
          Top-level assessment program name (e.g. NJSLA, NJGPA, NJSLA Science).
      - name: test_code
        data_type: string
        description: >
          Subject-and-grade test code (e.g. ELA03, MAT08, ELAGP). ALG01 is not
          split by school level; the downstream rpt strips any suffix before
          joining to benchmark data. ELA11 is excluded from NJ scores: it was
          not a valid NJSLA test for Spring 2018-2019 and NJ published no
          comparison benchmarks for it.
      - name: total_proficient_students
        data_type: float64
        description: Rounded count of students who scored proficient or above.
      - name: total_students
        data_type: int64
        description: Total number of students included in the aggregation group.
      - name: percent_proficient
        data_type: float64
        description: Proportion of students who scored proficient or above.
      - name: focus_level
        data_type: string
        description: >
          Which demographic dimension is active in this GROUPING SET row
          (gender, aggregate_ethnicity, lunch_status, ml_status, iep_status).
          'all_null' when all demographic dimensions are rolled up (Total row).
      - name: comparison_demographic_group
        data_type: string
        description: >
          Broad category label for the active demographic dimension (Total,
          Gender, Aggregate Ethnicity, Subgroup).
      - name: comparison_demographic_subgroup
        data_type: string
        description: >
          Specific demographic value for the active dimension (e.g. All
          Students, Female, African American, Economically Disadvantaged, ML,
          Students With Disabilities).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - African American
                  - Asian
                  - American Indian
                  - Hispanic
                  - Native Hawaiian
                  - Other
                  - White
                  - Blank
              config:
                severity: warn
                where: comparison_demographic_group = 'Aggregate Ethnicity'
      - name: comparison_entity
        data_type: string
        description: >
          'Region' when the row is scoped to a specific region; the
          district_state value (e.g. KTAF NJ) when region is rolled up to the
          district level.
      - name: school_level
        data_type: string
        description:
          School level derived from test_code via the state test comparison
          sheet (ES, MS, HS).
      - name: grade_range_band
        data_type: string
        description:
          Grade range derived from test_code via the state test comparison sheet
          (e.g. 3-5, 6-8).
      - name: discipline
        data_type: string
        description:
          Subject discipline derived from test_code via the state test
          comparison sheet (ELA, Math, Science).
