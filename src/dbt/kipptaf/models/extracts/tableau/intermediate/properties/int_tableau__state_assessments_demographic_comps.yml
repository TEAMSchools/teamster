models:
  - name: int_tableau__state_assessments_demographic_comps
    columns:
      - name: academic_year
        data_type: int64
      - name: district_state
        data_type: string
      - name: region
        data_type: string
      - name: assessment_name
        data_type: string
      - name: test_code
        data_type: string
      - name: total_proficient_students
        data_type: float64
      - name: total_students
        data_type: int64
      - name: percent_proficient
        data_type: float64
      - name: focus_level
        data_type: string
      - name: comparison_demographic_group
        data_type: string
      - name: comparison_demographic_subgroup
        data_type: string
      - name: comparison_entity
        data_type: string
      - name: school_level
        data_type: string
      - name: grade_range_band
        data_type: string
      - name: discipline
        data_type: string
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - district_state
              - region
              - assessment_name
              - test_code
              - comparison_entity
              - comparison_demographic_group
              - comparison_demographic_subgroup
          config:
            store_failures: true
