models:
  - name: int_tableau__gradebook_audit_flags__teacher
    description: >-
      Teacher-level audit flags for class_category_assignment and class_category
      grains combined via UNION ALL. UNPIVOTs teacher-specific flags from
      assignments_teacher and categories_teacher. Materialized as a table —
      consumed by teacher_aggs and rpt_tableau__gradebook_audit for teacher-only
      flag data. No uniqueness test — this is a multi-grain UNION ALL
      (class_category_assignment, class_category). Uniqueness is enforced
      upstream on each single-grain scaffold model.
    config:
      materialized: table
      cluster_by:
        - code_type
        - cte_grouping
        - region
        - schoolid
    columns:
      - name: _dbt_source_relation
        data_type: string
