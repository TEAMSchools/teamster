models:
  - name: rpt_nsc__clearinghouse_submission
    description: >
      National Student Clearinghouse submission file rows in H1/D1/T1 format.
      One H1 header record, one D1 detail record per student, one T1 trailer
      record. The 12 fields map to the NSC Enrollment Verification request
      file specification (DA inquiry type).
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - field_1
              - field_12
    columns:
      - name: field_1
        data_type: string
        description: >
          Record type identifier: H1 (header), D1 (detail), or T1 (trailer).
      - name: field_2
        data_type: string
        description: >
          H1: NSC school code. D1: requester return field (blank). T1: total
          count of D1 records.
      - name: field_3
        data_type: string
        description: H1: branch code. D1: student first name. T1: blank.
      - name: field_4
        data_type: string
        description: H1: school name. D1: middle initial (blank). T1: blank.
      - name: field_5
        data_type: string
        description: >
          H1: file creation date (YYYYMMDD). D1: student last name. T1: blank.
      - name: field_6
        data_type: string
        description: H1: inquiry type (DA). D1: suffix (blank). T1: blank.
      - name: field_7
        data_type: string
        description: >
          H1: enrollment type (S). D1: student date of birth (YYYYMMDD).
          T1: blank.
      - name: field_8
        data_type: string
        description: >
          H1: blank. D1: date sought — August 1 of HS graduation year
          (YYYYMMDD). T1: blank.
      - name: field_9
        data_type: string
        description: H1: blank. D1: search begin date (blank). T1: blank.
      - name: field_10
        data_type: string
        description: H1: blank. D1: blank. T1: blank.
      - name: field_11
        data_type: string
        description: >
          H1: blank. D1: NSC school code search scope (00 = all schools).
          T1: blank.
      - name: field_12
        data_type: string
        description: >
          H1: blank. D1: Salesforce contact ID used as requester return field.
          T1: blank.
