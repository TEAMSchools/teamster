models:
  - name: rpt_lattice__users
    description: >
      Daily staff roster for Lattice SFTP import. Includes all KIPP TEAM and
      Family Schools Inc. employees, all KIPP Paterson employees,
      Director/Head/Leader/Dean-tier (or Room 11) staff in Miami, and Newark and
      Camden staff in select Operations director roles or in the Technology or
      Marketing, Comms, and Enrollment departments. Interns are excluded. Covers
      staff who are Active or on Leave, plus any staff who met those same
      criteria and were terminated within the past 30 days. Includes staff
      gender identity and race/ethnicity reporting category for Lattice.
    columns:
      - name: external_user_id
        description: ADP employee number used as the Lattice external user ID.
        data_type: int64
        data_tests:
          - unique
      - name: status
        quote: true
        description:
          Lattice employment status. Accepted values are Active and Inactive.
          Staff with ADP assignment status Active or Leave are mapped to Active;
          all others (including recently terminated) are mapped to Inactive.
        data_type: string
      - name: work_email
        description: Employee work email address.
        data_type: string
      - name: job_title
        description: Employee job title.
        data_type: string
      - name: start_date
        quote: true
        description:
          Most recent hire date — rehire date when present, otherwise original
          hire date.
        data_type: date
      - name: department
        description: Employee home department name.
        data_type: string
      - name: gender
        description: >
          Employee self-reported gender identity from ADP, passed through
          verbatim. The Lattice field options must match these source values.
          Blank when the employee has no recorded gender identity.
        data_type: string
      - name: ethnicity
        description: >
          Employee race and ethnicity reporting category from ADP (a single
          canonical value), passed through verbatim. The Lattice field options
          must match these source values. Blank when none is recorded.
        data_type: string
      - name: birthdate
        description: Employee date of birth from ADP.
        data_type: date
      - name: manager_email
        description: Work email address of the employee's direct manager.
        data_type: string
      - name: first_name
        description:
          Preferred first name from ADP; falls back to legal given name.
        data_type: string
      - name: last_name
        description:
          Preferred last name from ADP; falls back to legal family name.
        data_type: string
      - name: location
        description:
          Home work location abbreviation; falls back to full location name.
        data_type: string
      - name: business_unit
        description:
          Friendly business unit name derived from the employee's home business
          unit (Newark, Camden, Miami, Paterson, KTAF).
        data_type: string
