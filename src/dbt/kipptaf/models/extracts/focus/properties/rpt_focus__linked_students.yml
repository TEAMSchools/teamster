models:
  - name: rpt_focus__linked_students
    description:
      One row per unordered sibling pair, normalized so the student with the
      lexicographically-smaller minted Focus ID is always `PRIMARY_STUDENT_ID`
      (least/greatest dedup handles both bidirectional and one-directional
      edges). Sourced from `stg_finalsite__contact_relationships` (rel_type =
      sibling) with both sides resolved to a minted Focus student ID via
      `int_finalsite__contact_id_attributes`. Pairs where either side has no
      minted ID are dropped. Produces 2 columns in `LINKED_STUDENTS` contract
      order.
    config:
      contract:
        enforced: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - primary_student_id
              - secondary_student_id
    columns:
      - name: primary_student_id
        data_type: string
        description:
          Focus student ID of the student whose ID sorts first in the pair
          (least of the two IDs). From `int_finalsite__contact_id_attributes`.
        data_tests:
          - not_null:
              config:
                severity: error
      - name: secondary_student_id
        data_type: string
        description:
          Focus student ID of the sibling whose ID sorts second in the pair.
          From the sibling contact's `int_finalsite__contact_id_attributes` row
          via `rel_id`.
        data_tests:
          - not_null:
              config:
                severity: error
unit_tests:
  - name: test_linked_students_normalizes_pair
    description:
      A bidirectional sibling edge (a->b and b->a) collapses to one row, with
      the lexicographically-smaller minted Focus id as PRIMARY_STUDENT_ID and
      the larger as SECONDARY_STUDENT_ID. Both sides resolve a minted id via
      int_finalsite__contact_id_attributes.
    model: rpt_focus__linked_students
    given:
      - input: ref('stg_finalsite__contact_relationships')
        rows:
          - {
              finalsite_enrollment_id: enr-stu-a,
              rel_id: enr-stu-b,
              rel_type: sibling,
            }
          - {
              finalsite_enrollment_id: enr-stu-b,
              rel_id: enr-stu-a,
              rel_type: sibling,
            }
      - input: ref('int_finalsite__contact_id_attributes')
        format: sql
        rows: |
          select
              'enr-stu-a' as finalsite_enrollment_id,
              '8400900' as focus_student_id_prefixed
          union all
          select
              'enr-stu-b' as finalsite_enrollment_id,
              '8400100' as focus_student_id_prefixed
    expect:
      rows:
        - { primary_student_id: "8400100", secondary_student_id: "8400900" }
