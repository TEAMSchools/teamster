            'KIPP Royalty Academy' as location_name,
            '0001' as location_focus_school_id
      - input: ref('int_finalsite__contact_id_attributes')
        format: sql
        rows: |
          select
            'e2' as finalsite_enrollment_id,
            '84003003002' as focus_student_id_prefixed
    expect:
      rows:
        - {
            syear: 2025,
            school_id: "0001",
            student_id: "84003003002",
            grade_id: "07",
            start_date: "20250812",
            enrollment_code: E01,
            end_date: "20260115",
            drop_code: (W02) In District Transfer,
            calendar_id: null,
            prior_dist: null,
            prior_state: null,
            prior_country: null,
            ed_choice: null,
            stdt_dis_affect: null,
            offender_transfer_stdt: null,
            came_from: null,
            moved_to: Prior Elementary,
            sec_sch: null,
            grde_prom_st: Retained,
            good_cause_exempt: null,
            graduation_requirement_program: null,
            next_school: null,
            next_grade: null,
            district_ood: null,
            sch_ood: null,
            include_in_class_rank: null,
            fl_days_present: null,
            fl_days_absent: null,
          }
