models:
  - name: rpt_focus__student_enrollment
    description:
      One row per in-scope Finalsite enrollment reshaped into the Focus
      `STUDENT_ENROLLMENT` SFTP template layout, built from
      `int_finalsite__enrollment_lifecycle`. Filtered to enrollments with a
      minted Focus id and a start date — pre-enrollment students
      (`enrollment_in_progress`, `assigned_school`) carry no `enrolled_date` and
      are excluded until they enroll. Grade is translated inline (`k`→`KG`, else
      zero-padded number); enrollment_code is derived from grade (`E05` for KG,
      `E01` otherwise) and does not change on transfer-out; school maps via
      `int_people__location_crosswalk`; Focus student id (`student_id`) via
      `int_finalsite__contact_id_attributes.focus_student_id_prefixed`; and the
      raw Florida state withdrawal label (carried as `drop_code`) from
      `int_finalsite__contact_custom_attributes` — together producing the
      28-column layout consumed by the Focus SFTP transport. The Focus column
      header casing (`SYEAR`, `SCHOOL_ID`, etc.) is applied at transport time
      via `file_config.format.header_replacements`; dbt column names remain
      lowercase snake_case. `end_date`, `drop_code`, and `moved_to` populate
      only for transfer-out rows
      (`int_finalsite__enrollment_lifecycle.is_transfer_out`). This is a delta
      feed — enrollments already present in Focus `student_enrollment` (matched
      on `student_id`, `syear`, and the floored `start_date`) are suppressed
      unless the extract carries an exit (transfer-out or `end_date`) the Focus
      row has not recorded, so only new and changed enrollments are emitted.
      `school_id`, `grade_id`, and `enrollment_code` are Focus import codes
      translated on load, so they are not used to detect changes.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_id
              - start_date
    columns:
      - name: student_id
        data_type: string
        description:
          Focus student id (Focus `STDT_ID`) from
          `int_finalsite__contact_id_attributes.focus_student_id_prefixed`. Rows
          for enrollments without a minted Focus id are excluded from this
          extract.
        data_tests:
          - not_null:
              config:
                severity: error
      - name: syear
        data_type: int64
        description: School year start year (e.g. 2025 for the 2025-26 year).
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: school_id
        data_type: string
        description:
          Focus SCH_ID mapped from `assigned_school` via
          `int_people__location_crosswalk` (`location_focus_school_id`).
        data_tests:
          - not_null:
              config:
                severity: error
      - name: grade_id
        data_type: string
        description:
          Focus grade ID translated inline from `grade_canonical_name` — `KG`
          for `k`, otherwise the grade number zero-padded to two digits.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: start_date
        data_type: string
        description:
          Enrollment start date formatted as `YYYYMMDD` for Focus. This extract
          is filtered to enrollments that have a start date (pre-enrollment
          students without an `enrolled_date` are excluded).
        data_tests:
          - not_null:
              config:
                severity: error
      - name: enrollment_code
        data_type: string
        description:
          Focus enrollment action code derived from grade — `E05` for
          kindergarten (`grade_canonical_name = 'k'`), `E01` for all other
          grades. Always populated; the entry code does not change on
          transfer-out.
      - name: end_date
        data_type: string
        description:
          Enrollment end date formatted as `YYYYMMDD`; populated only for
          `transfer_out` rows.
      - name: drop_code
        data_type: string
        description:
          Raw Florida state withdrawal code label from the Finalsite
          `fl_state_withdraw_codes_ss` custom attribute (e.g. `(W02) In District
          Transfer`); populated only for `transfer_out` rows, null otherwise.
          The kippmiami reconciliation layer decodes this label to the Focus
          `short_name` before import.
      - name: calendar_id
        data_type: string
        description:
          Focus calendar ID; not sourced from Finalsite — always null.
      - name: prior_dist
        data_type: string
        description:
          Prior district code; not sourced from Finalsite — always null.
      - name: prior_state
        data_type: string
        description: Prior state code; not sourced from Finalsite — always null.
      - name: prior_country
        data_type: string
        description:
          Prior country code; not sourced from Finalsite — always null.
      - name: ed_choice
        data_type: string
        description:
          Educational choice indicator; not sourced from Finalsite — always
          null.
      - name: stdt_dis_affect
        data_type: string
        description:
          Student disability/affiliation code; not sourced from Finalsite —
          always null.
      - name: offender_transfer_stdt
        data_type: string
        description:
          Offender transfer student flag; not sourced from Finalsite — always
          null.
      - name: came_from
        data_type: string
        description:
          Prior school/district code; not sourced from Finalsite — always null.
      - name: moved_to
        data_type: string
        description:
          Destination school for a transfer-out, from the
          `withdrawal_school_txt` Finalsite custom field; null otherwise.
      - name: sec_sch
        data_type: string
        description:
          Secondary school indicator; not sourced from Finalsite — always null.
      - name: grde_prom_st
        data_type: string
        description:
          Grade promotion/retention status from the `track_attributes`
          `promotion_status_ss` Finalsite field (e.g. `Retained`); may need a
          Focus code mapping.
      - name: good_cause_exempt
        data_type: string
        description:
          Good cause exemption code; not sourced from Finalsite — always null.
      - name: graduation_requirement_program
        data_type: string
        description:
          Graduation requirement program code; not sourced from Finalsite —
          always null.
      - name: next_school
        data_type: string
        description: Next school code; not sourced from Finalsite — always null.
      - name: next_grade
        data_type: string
        description: Next grade code; not sourced from Finalsite — always null.
      - name: district_ood
        data_type: string
        description:
          Out-of-district district code; not sourced from Finalsite — always
          null.
      - name: sch_ood
        data_type: string
        description:
          Out-of-district school code; not sourced from Finalsite — always null.
      - name: include_in_class_rank
        data_type: string
        description:
          Class rank inclusion flag; not sourced from Finalsite — always null.
      - name: fl_days_present
        data_type: int64
        description:
          Florida days present count; not sourced from Finalsite — always null.
      - name: fl_days_absent
        data_type: int64
        description:
          Florida days absent count; not sourced from Finalsite — always null.

unit_tests:
  - name: test_student_enrollment_shape
    description:
      Verifies the 28-column STUDENT_ENROLLMENT layout for new-enrollment rows —
      grade is translated inline for both a numbered grade (`5th`→`05`) and
      kindergarten (`k`→`KG`); enrollment_code is E05 for KG and E01 otherwise;
      student_id is sourced from
      int_finalsite__contact_id_attributes.focus_student_id_prefixed; and
      end_date/drop_code are null for non-transfer rows. A third enrollment with
      a minted Focus id but no enrollment_start_date (pre-enrollment) is
      excluded by the enrolled-only filter.
    model: rpt_focus__student_enrollment
    given:
      # format: sql (not dict) — is_transfer_out is added in this PR, so the
      # deferred lifecycle relation lacks it and dict introspection fails in CI.
      - input: ref('int_finalsite__enrollment_lifecycle')
        format: sql
        rows: |
          select
            'e1' as finalsite_enrollment_id,
            2025 as school_year_start,
            '5th' as grade_canonical_name,
            cast(null as string) as promotion_status,
            'KIPP Royalty Academy' as assigned_school,
            date '2025-08-12' as enrollment_start_date,
            cast(null as date) as enrollment_end_date,
            false as is_transfer_out
          union all
          select
            'e3',
            2025,
            'k',
            cast(null as string),
            'KIPP Royalty Academy',
            date '2025-08-12',
            cast(null as date),
            false
          union all
          select
            'e4',
            2025,
            '6th',
            cast(null as string),
            'KIPP Royalty Academy',
            cast(null as date),
            cast(null as date),
            false
      - input: ref('int_finalsite__contact_custom_attributes')
        format: sql
        rows: |
          select
            'e1' as finalsite_enrollment_id,
            cast(null as string) as withdrawal_school_txt,
            cast(null as string) as fl_state_withdraw_codes_ss
          union all
          select
            'e3' as finalsite_enrollment_id,
            cast(null as string) as withdrawal_school_txt,
            cast(null as string) as fl_state_withdraw_codes_ss
      - input: ref('int_people__location_crosswalk')
        format: sql
        rows: |
          select
            'KIPP Royalty Academy' as location_name,
            '0001' as location_focus_school_id
      - input: ref('int_finalsite__contact_id_attributes')
        format: sql
        rows: |
          select
            'e1' as finalsite_enrollment_id,
            '84003003001' as focus_student_id_prefixed
          union all
          select
            'e3' as finalsite_enrollment_id,
            '84003003003' as focus_student_id_prefixed
          union all
          select
            'e4' as finalsite_enrollment_id,
            '84003003004' as focus_student_id_prefixed
      - input: ref('int_focus__school_year_first_day')
        format: sql
        rows: |
          select 2025 as syear, date '2025-08-11' as first_day_of_school
      # empty: none of these students exist in Focus yet, so all rows pass the
      # delta filter as new enrollments
      - input: source('kippmiami_dlt_focus', 'student_enrollment')
        rows: []
    expect:
      rows:
        - {
            syear: 2025,
            school_id: "0001",
            student_id: "84003003001",
            grade_id: "05",
            start_date: "20250812",
            enrollment_code: E01,
            end_date: null,
            drop_code: null,
            calendar_id: null,
            prior_dist: null,
            prior_state: null,
            prior_country: null,
            ed_choice: null,
            stdt_dis_affect: null,
            offender_transfer_stdt: null,
            came_from: null,
            moved_to: null,
            sec_sch: null,
            grde_prom_st: null,
            good_cause_exempt: null,
            graduation_requirement_program: null,
            next_school: null,
            next_grade: null,
            district_ood: null,
            sch_ood: null,
            include_in_class_rank: null,
            fl_days_present: null,
            fl_days_absent: null,
          }
        - {
            syear: 2025,
            school_id: "0001",
            student_id: "84003003003",
            grade_id: KG,
            start_date: "20250812",
            enrollment_code: E05,
            end_date: null,
            drop_code: null,
            calendar_id: null,
            prior_dist: null,
            prior_state: null,
            prior_country: null,
            ed_choice: null,
            stdt_dis_affect: null,
            offender_transfer_stdt: null,
            came_from: null,
            moved_to: null,
            sec_sch: null,
            grde_prom_st: null,
