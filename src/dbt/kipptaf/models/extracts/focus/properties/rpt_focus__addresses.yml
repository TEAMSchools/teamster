models:
  - name: rpt_focus__addresses
    config:
      contract:
        enforced: true
    description:
      One row per in-scope Finalsite student reshaped into the Focus `ADDRESS`
      SFTP template layout. Joins `stg_finalsite__contacts` to
      `int_finalsite__enrollment_lifecycle` (the in-scope filter; grain =
      `finalsite_enrollment_id`), then inner joins
      `int_finalsite__contact_id_attributes` for the Focus student ID, excluding
      contacts without a minted Focus id. Produces 12 columns in
      `ADDRESS_LAYOUT` order. Focus column header casing (`STUDENT_ID`,
      `ADDRESS`, etc.) is applied at transport time via
      `file_config.format.header_replacements`; dbt column names remain
      lowercase snake_case. Mailing address columns are always null — Focus does
      not receive a separate mailing address from Finalsite.
    columns:
      - name: student_id
        data_type: string
        description:
          Focus student id (Focus `STDT_ID`) from
          `int_finalsite__contact_id_attributes.focus_student_id_prefixed`. Rows
          for contacts without a minted Focus id are excluded from this extract.
        data_tests:
          - unique
          - not_null:
              config:
                severity: error
      - name: address
        data_type: string
        description: Primary street address line 1 from Finalsite (`address_1`).
      - name: address2
        data_type: string
        description: Primary street address line 2 from Finalsite (`address_2`).
      - name: city
        data_type: string
        description: City from Finalsite.
      - name: state
        data_type: string
        description: State from Finalsite.
      - name: zipcode
        data_type: string
        description: ZIP code from Finalsite (`zip`).
      - name: phone
        data_type: string
        description: Primary phone number from Finalsite (`phone_1_number`).
      - name: mailing
        data_type: string
        description:
          Mailing address flag; not sourced from Finalsite — always null.
      - name: mail_address
        data_type: string
        description:
          Mailing street address line 1; not sourced from Finalsite — always
          null.
      - name: mail_address2
        data_type: string
        description:
          Mailing street address line 2; not sourced from Finalsite — always
          null.
      - name: mail_city
        data_type: string
        description: Mailing city; not sourced from Finalsite — always null.
      - name: mail_state
        data_type: string
        description: Mailing state; not sourced from Finalsite — always null.

unit_tests:
  - name: test_addresses_shape
    description:
      Verifies the 12-column ADDRESS layout for a single student — STUDENT_ID is
      sourced from int_finalsite__contact_id_attributes, address columns map
      from contacts, mailing columns are always null.
    model: rpt_focus__addresses
    given:
      - input: ref('stg_finalsite__contacts')
        rows:
          - {
              finalsite_enrollment_id: enr-001,
              address_1: 123 Main St,
              address_2: Apt 4B,
              city: Miami,
              state: FL,
              zip: "33101",
              phone_1_number: 305-555-0100,
            }
      - input: ref('int_finalsite__enrollment_lifecycle')
        rows:
          - { finalsite_enrollment_id: enr-001 }
      - input: ref('int_finalsite__contact_id_attributes')
        format: sql
        rows: |
          select
            'enr-001' as finalsite_enrollment_id,
            '84004004004' as focus_student_id_prefixed
    expect:
      rows:
        - {
            student_id: "84004004004",
            address: 123 Main St,
            address2: Apt 4B,
            city: Miami,
            state: FL,
            zipcode: "33101",
            phone: 305-555-0100,
            mailing: null,
            mail_address: null,
            mail_address2: null,
            mail_city: null,
            mail_state: null,
          }
