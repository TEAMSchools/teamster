models:
  - name: rpt_focus__contacts
    description:
      One row per (student, guardian) reshaped into the Focus `CONTACTS` SFTP
      template layout. Fans out guardian contact rows from
      `stg_finalsite__contact_relationships` (adult relationship types — parent,
      guardian, grandparent, stepparent, relative, aunt/uncle) inner-joined to
      `stg_finalsite__contacts` for guardian attributes, gated to in-scope
      students via `int_finalsite__enrollment_lifecycle`. The student's Focus id
      (`student_id`) is left-joined from `int_finalsite__contact_id_attributes`.
      Produces 50 columns in `CONTACTS_LAYOUT` order. `SORT_ORDER` ranks
      guardians per student by `is_primary desc` so the primary contact sorts
      first. Phone slots `CONTACT1_*` and `CONTACT2_*` map the guardian's two
      phones; `CONTACT3` through `CONTACT7` are always null. Focus column header
      casing is applied at transport time via
      `file_config.format.header_replacements`; dbt column names remain
      lowercase snake_case.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_id
              - sort_order
    columns:
      - name: student_id
        data_type: string
        description:
          Focus student id of the student this guardian belongs to, from
          `int_finalsite__contact_id_attributes.focus_student_id`; null where
          Finalsite has not minted the id.
        data_tests:
          - not_null
      - name: sort_order
        data_type: int64
        description:
          Ordinal rank of this guardian row within the student, ordered by
          `is_primary desc` — primary contact is rank 1.
        data_tests:
          - not_null
      - name: first_name
        data_type: string
        description: Guardian's first name from their Finalsite contact record.
        data_tests:
          - not_null
      - name: last_name
        data_type: string
        description: Guardian's last name from their Finalsite contact record.
        data_tests:
          - not_null
      - name: student_relation
        data_type: string
        description:
          Relationship type of the guardian to the student (e.g. parent,
          guardian) from `stg_finalsite__contact_relationships.rel_type`.
      - name: middle_name
        data_type: string
        description: Guardian's middle name from their Finalsite contact record.
      - name: resides_with_stud
        data_type: string
        description:
          Whether the guardian resides with the student; not sourced from
          Finalsite — always null.
      - name: custody
        data_type: string
        description: Custody flag; not sourced from Finalsite — always null.
      - name: emergency
        data_type: string
        description:
          Emergency contact flag; not sourced from Finalsite — always null.
      - name: pickup
        data_type: string
        description:
          Authorized pickup flag; not sourced from Finalsite — always null.
      - name: address
        data_type: string
        description: Line 1 of the guardian's household address (`address_1`).
      - name: address2
        data_type: string
        description: Line 2 of the guardian's household address (`address_2`).
      - name: city
        data_type: string
        description: City of the guardian's household address.
      - name: state
        data_type: string
        description: State of the guardian's household address.
      - name: zipcode
        data_type: string
        description: ZIP code of the guardian's household address.
      - name: email
        data_type: string
        description:
          Guardian's email address from their Finalsite contact record.
      - name: contact1_type
        data_type: string
        description: Type label of the guardian's first phone (`phone_1_type`).
      - name: contact1_value
        data_type: string
        description: Number of the guardian's first phone (`phone_1_number`).
      - name: contact1_blocked
        data_type: string
        description:
          Block flag for first phone; not sourced from Finalsite — always null.
      - name: contact1_unlisted
        data_type: string
        description:
          Unlisted flag for first phone; not sourced from Finalsite — always
          null.
      - name: contact1_callout
        data_type: string
        description:
          Callout flag for first phone; not sourced from Finalsite — always
          null.
      - name: contact2_type
        data_type: string
        description: Type label of the guardian's second phone (`phone_2_type`).
      - name: contact2_value
        data_type: string
        description: Number of the guardian's second phone (`phone_2_number`).
      - name: contact2_blocked
