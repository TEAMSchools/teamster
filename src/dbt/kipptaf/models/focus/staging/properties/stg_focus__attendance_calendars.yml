models:
  - name: stg_focus__attendance_calendars
    description: >-
      Kipptaf-level passthrough of kippmiami's stg_focus__attendance_calendars.
      Focus is Miami-only, so no cross-district union is needed here (contrast
      with the powerschool kipptaf staging models, which union all four
      districts). Column docs/tests live on the kippmiami source model.
