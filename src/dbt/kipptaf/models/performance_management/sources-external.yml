sources:
  - name: performance_management
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      {%- endif -%}kipptaf_performance_management
    tables:
      - name: src_performance_management__outlier_detection
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/performance_management/outlier_detection/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix:
              "{{ var('cloud_storage_uri_base')
              }}/performance_management/outlier_detection/"
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - performance_management
                - outlier_detection
      - name: src_performance_management__observation_details_archive
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/performance_management/observation_details/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix:
              "{{ var('cloud_storage_uri_base')
              }}/performance_management/observation_details/"
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - performance_management
                - observation_details
