models:
  - name: int_performance_management__observations
    config:
      materialized: table
    columns:
      - name: observation_id
        data_type: string
        data_tests:
          - unique
          - not_null
      - name: rubric_id
        data_type: string
      - name: rubric_name
        data_type: string
      - name: staff_observation_type_key
        data_type: string
        description: >-
          Pre-hashed FK to dim_staff_observation_types, passed through from
          int_schoolmint_grow__observations.
      - name: staff_observation_rubric_key
        data_type: string
        description: >-
          Pre-hashed FK to dim_staff_observation_rubrics, passed through from
          int_schoolmint_grow__observations.
      - name: term_key
        data_type: string
        description: >-
          Pre-hashed FK to dim_terms. Generated with generate_surrogate_key on
          (term type, code, name, start_date, region, school_id). NULL when
          t.code is NULL (unmatched LEFT JOIN to reporting terms); wrapped in an
          if() per the nullable-surrogate-key convention.
      - name: observation_score
        data_type: float64
      - name: glows
        data_type: string
      - name: grows
        data_type: string
      - name: locked
        data_type: boolean
      - name: observed_at_timestamp
        data_type: timestamp
      - name: observed_at
        data_type: date
      - name: academic_year
        data_type: int64
      - name: is_published
        data_type: boolean
      - name: employee_number
        data_type: int64
      - name: observer_employee_number
        data_type: int64
      - name: observation_type
        data_type: string
      - name: observation_type_abbreviation
        data_type: string
      - name: observation_course
        data_type: string
      - name: observation_grade
        data_type: string
      - name: observation_notes
        data_type: string
      - name: term_code
        data_type: string
      - name: term_name
        data_type: string
      - name: overall_tier
        data_type: int64
      - name: eval_date
        data_type: date
