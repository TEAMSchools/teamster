models:
  - name: int_performance_management__observations
    config:
      materialized: table
    # TODO: add unique test
    # data_tests:
    #   - dbt_utils.unique_combination_of_columns:
    #       arguments:
    #         combination_of_columns:
    #           - ...
    #       config: {}
    columns:
      - name: observation_id
        data_type: string
      - name: rubric_id
        data_type: string
      - name: rubric_name
        data_type: string
      - name: observation_score
        data_type: float64
      - name: glows
        data_type: string
      - name: grows
        data_type: string
      - name: locked
        data_type: boolean
      - name: observed_at_timestamp
        data_type: timestamp
      - name: observed_at
        data_type: date
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: is_published
        data_type: boolean
      - name: employee_number
        data_type: int64
      - name: observer_employee_number
        data_type: int64
      - name: observation_type
        data_type: string
      - name: observation_type_abbreviation
        data_type: string
      - name: observation_course
        data_type: string
      - name: observation_grade
        data_type: string
      - name: observation_notes
        data_type: string
      - name: term_code
        data_type: string
      - name: term_name
        data_type: string
      - name: overall_tier
        data_type: int64
      - name: eval_date
        data_type: date
