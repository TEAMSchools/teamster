models:
  - name: int_performance_management__observation_details
    columns:
      - name: observation_id
        data_type: string
      - name: rubric_name
        data_type: string
      - name: observation_score
        data_type: float64
      - name: glows
        data_type: string
      - name: grows
        data_type: string
      - name: locked
        data_type: boolean
      - name: observed_at_timestamp
        data_type: timestamp
      - name: observed_at
        data_type: date
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: observation_type
        data_type: string
      - name: observation_type_abbreviation
        data_type: string
        description: A short 1 or 2 character version of the Name, such as A.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cycle_day
            source_column: abbreviation
      - name: term_code
        data_type: string
      - name: term_name
        data_type: string
      - name: employee_number
        data_type: int64
      - name: observer_employee_number
        data_type: int64
      - name: eval_date
        data_type: date
      - name: overall_tier
        data_type: float64
      - name: observation_notes
        data_type: string
      - name: etr_score
        data_type: float64
      - name: etr_tier
        data_type: float64
      - name: so_score
        data_type: float64
      - name: so_tier
        data_type: int64
      - name: row_score
        data_type: float64
      - name: measurement_dropdown_selection
        data_type: string
      - name: measurement_name
        data_type: string
      - name: strand_name
        data_type: string
      - name: measurement_comments
        data_type: string
