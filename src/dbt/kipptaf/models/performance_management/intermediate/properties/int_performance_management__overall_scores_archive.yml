models:
  - name: int_performance_management__overall_scores_archive
    # config:
    #   enabled: false
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - employee_number
              - academic_year
          config:
            severity: error
    columns:
      - name: employee_number
        data_type: int64
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: final_score
        data_type: float64
      - name: final_tier
        data_type: int64
