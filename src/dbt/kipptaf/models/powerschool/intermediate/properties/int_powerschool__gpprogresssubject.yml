models:
  - name: int_powerschool__gpprogresssubject
    description: >
      Grad plan progress by node, one row per student per gpnode (plan,
      discipline, or subject level). Unpivots int_powerschool__gpnode into
      degree_plan_section rows and joins to the student's gpprogresssubject
      record for that node. Used for credit lookups in the grad plan reporting
      view.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - id
              - studentsdcid
    columns:
      - name: _dbt_source_relation
        description: Source relation identifier for union models.
        data_type: string
      - name: id
        description: gpnode.id for this node (plan, discipline, or subject).
        data_type: int64
      - name: degree_plan_section
        description: Level of the node — Plan, Discipline, or Subject.
        data_type: string
      - name: name
        description: Name of the node.
        data_type: string
      - name: studentsdcid
        description: Foreign key to the student (students.dcid).
        data_type: int64
      - name: requiredcredits
        description:
          Credits required; falls back to node credit_capacity when
          gpprogresssubject.requiredcredits is null.
        data_type: float64
      - name: enrolledcredits
        description: Credits currently enrolled toward this node.
        data_type: float64
      - name: requestedcredits
        description: Credits requested toward this node.
        data_type: float64
      - name: earnedcredits
        description: Credits earned toward this node.
        data_type: float64
      - name: waivedcredits
        description: Credits waived toward this node.
        data_type: float64
      - name: appliedwaivedcredits
        description:
          Waived credits that have been applied toward the requirement.
        data_type: float64
