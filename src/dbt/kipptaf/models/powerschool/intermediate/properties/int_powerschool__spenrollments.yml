models:
  - name: int_powerschool__spenrollments
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: dcid
        data_type: int64
        description: "Unique identifier for this table. Indexed. Required."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_code
            source_column: dcid
      - name: id
        data_type: int64
        description:
          "Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: id
      - name: studentid
        data_type: int64
        description:
          "The internal number and ID of the associated Students record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: programid
        data_type: int64
        description: "Program identifier value. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__courses
            source_column: programid
      - name: gradelevel
        data_type: int64
        description: "Grade level of the student in this special program."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__spenrollments
            source_column: gradelevel
      - name: sp_comment
        data_type: string
        description:
          "in5.2.0 CLOB Comment value. Populated when modified by a system
          process. Mass Create, Import, Drop."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__spenrollments
            source_column: sp_comment
      - name: enter_date
        data_type: date
        description: "The date the student enters a program."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__spenrollments
            source_column: enter_date
      - name: exit_date
        data_type: date
        description: "The date the student left the program"
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__spenrollments
            source_column: exit_date
      - name: exitcode
        data_type: string
        description:
          "The school specified exit code from the student table for EOY or for
          re-enrollment purposes, suchas S=Transfer."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitcode
      - name: academic_year
        data_type: int64
      - name: specprog_name
        data_type: string
      - name: is_out_of_district
        data_type: boolean
      - name: is_self_contained
        data_type: boolean
