models:
  - name: int_powerschool__calendar_week
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: schoolid
      - name: week_start_date
        data_type: date
      - name: week_end_date
        data_type: date
      - name: school_level
        data_type: string
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: academic_year
        data_type: int64
      - name: quarter
        data_type: string
      - name: semester
        data_type: string
      - name: school_week_start_date
        data_type: date
      - name: school_week_end_date
        data_type: date
      - name: date_count
        data_type: int64
      - name: week_number_academic_year
        data_type: int64
      - name: week_number_quarter
        data_type: int64
      - name: week_start_monday
        data_type: date
      - name: week_end_sunday
        data_type: date
      - name: school_week_start_date_lead
        data_type: date
      - name: region
        data_type: string
