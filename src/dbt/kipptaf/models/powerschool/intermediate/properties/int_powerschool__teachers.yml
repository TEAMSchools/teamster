        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: dcid
            column_role: primary_key
      - name: homeschoolid
        data_type: int64
        description:
          The teacher's home school. This ID is linked to the School_Number from
          the School table. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: homeschoolid
      - name: photo
        data_type: int64
        description: Set to 1 if a photo exists for this user.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: photo
      - name: numlogins
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custom pages.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: numlogins
      - name: allowloginstart
        data_type: int64
        description:
          Time-restricted login. This is the start of the time that teachers can
          log in.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: allowloginstart
      - name: allowloginend
        data_type: int64
        description:
          Time-restricted login. This is the end time that teachers can log in.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: allowloginend
      - name: psaccess
        data_type: int64
        description:
          "Indicates whether the user can log in to Power School Admin. Valid
          values: 0=No, 1=Yes."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: psaccess
      - name: groupvalue
        data_type: int64
        description:
          The security group (from Gen table) this user belongs to in Power
