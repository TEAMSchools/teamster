        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fedethnicity
      - name: fedracedecline
        data_type: int64
        description: "Valid values:"
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fedracedecline
      - name: ptaccess
        data_type: int64
