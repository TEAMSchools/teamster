models:
  - name: int_powerschool__teachers
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: _dbt_source_project
        data_type: string
      - name: lastfirst
        data_type: string
        description: Last, First, Mi. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: lastfirst
            contains_pii: true
      - name: first_name
        data_type: string
        description: Students' first name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: first_name
            contains_pii: true
      - name: middle_name
        data_type: string
        description: Student's middle name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: middle_name
            contains_pii: true
      - name: last_name
        data_type: string
        description: Students last name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: last_name
            contains_pii: true
      - name: title
        data_type: string
        description:
          Stores a title name for the teacher and is used for sorting purposes.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: title
      - name: homeroom
        data_type: string
        description:
          This string does appear on some pages but does not impact any
          calculations.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: homeroom
      - name: email_addr
        data_type: string
        description:
          Stores the teachers email address and is used for email notifications
          to the teacher, such as studentenrollment information.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: email_addr
            contains_pii: true
      - name: password
        data_type: string
        description: The Power School login password.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: password
      - name: ipaddrrestrict
        data_type: string
        description:
          The list of IP addresses the user is allowed to log in from. If blank,
          he or she can log in from any IPaddress.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: ipaddrrestrict
      - name: accessvalue
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custom pages.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: accessvalue
      - name: homepage
        data_type: string
