        description:
          The most courses a teacher can teach in a row without a break.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__schoolstaff
            source_column: sched_maximumconsecutive
      - name: sched_isteacherfree
        data_type: int64
        description:
          Flag stating weather the teacher is always free. True=no limit on how
          many courses a teachercan teach at a time, most often used with fake
          or SPED teachers. False= teacher can onlyteach one class at a time
          unless other wise specified at the course level.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__schoolstaff
            source_column: sched_isteacherfree
      - name: sched_teachermoreoneschool
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
