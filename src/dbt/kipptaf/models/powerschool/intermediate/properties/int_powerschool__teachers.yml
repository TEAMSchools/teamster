        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: homepage
      - name: loginid
        data_type: string
        description: The Power School login name. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: loginid
      - name: defaultstudscrn
        data_type: string
        description: The student page the user wants to appear by default.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: defaultstudscrn
      - name: teachernumber
        data_type: string
        description: The number the district assigns to track the teacher.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: teachernumber
      - name: ssn
        data_type: string
        description: Students Social Security number. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ssn
            contains_pii: true
      - name: home_phone
        data_type: string
        description: Home phone number for the student. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: home_phone
            contains_pii: true
      - name: school_phone
        data_type: string
