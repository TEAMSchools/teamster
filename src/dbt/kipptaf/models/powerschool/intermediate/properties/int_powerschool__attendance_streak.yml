models:
  - name: int_powerschool__attendance_streak
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          "The internal number and ID of the associated Students record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: yearid
        data_type: int64
        description:
          "A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: att_code
        data_type: string
        description:
          "Attendance identifier set by school. Examples Tardy, Absent, etc."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_code
            source_column: att_code
      - name: streak_id
        data_type: string
      - name: streak_start_date
        data_type: date
      - name: streak_end_date
        data_type: date
      - name: streak_length_membership
        data_type: int64
      - name: streak_length_calendar
        data_type: int64
