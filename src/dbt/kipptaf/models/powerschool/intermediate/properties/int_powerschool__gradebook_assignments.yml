models:
  - name: int_powerschool__gradebook_assignments
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: assignmentsectionid
        data_type: int64
        description:
          "Foreign key. Internal number for the associated Assignment
          Section.Assignment Section IDrecord. Required. Indexed. Source:
          PowerSchool
          stg_powerschool__assignmentcategoryassoc.assignmentsectionid."
      - name: sectionsdcid
        data_type: int64
        description:
          "Foreign key. Internal number for the associated sections.DCID record.
          Required. Indexed. Source: PowerSchool
          stg_powerschool__assignmentsection.sectionsdcid."
      - name: assignmentid
        data_type: int64
        description:
          "Foreign key. Internal number for the associated Assignment.ID record.
          Required. Indexed. Source: PowerSchool
          stg_powerschool__assignmentsection.assignmentid."
      - name: name
        data_type: string
        description:
          "Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed. Source: PowerSchool stg_powerschool__assignmentsection.name."
      - name: duedate
        data_type: date
        description:
          "The date the assignment is due. Defaults to Default is the system
          date + 1 day. Indexed. Source: PowerSchool
          stg_powerschool__assignmentsection.duedate."
      - name: scoretype
        data_type: string
        description:
          "Indicates if this score is a letter grade or percent. Source:
          PowerSchool stg_powerschool__assignmentsection.scoretype."
      - name: totalpointvalue
        data_type: float64
        description:
          "This is the total weighted points that the assignment is worth. If
          the entry points are 25, and theweight is 4, then the total point
          value is 100. Source: PowerSchool
          stg_powerschool__assignmentsection.totalpointvalue."
      - name: extracreditpoints
        data_type: numeric
        description:
          "Indicates the number of extra credit points available for this
          assignment. Source: PowerSchool
          stg_powerschool__assignmentsection.extracreditpoints."
      - name: weight
        data_type: numeric
        description:
          "The overall weight of this assignment. This value multiplied by
          Points Possible shows the actualpoints of this assignment for total
          possible points for this section. Defaults to 1. Source: PowerSchool
          stg_powerschool__assignmentsection.weight."
      - name: iscountedinfinalgrade
        data_type: int64
        description:
          "Indicates if the assignment will count toward the final grade. Valid
          values: 0=Does not count towardfinal grade, 1=Counts toward final
          grade. Defaults to 1. Required. Source: PowerSchool
          stg_powerschool__assignmentsection.iscountedinfinalgrade."
      - name: category_id
        data_type: int64
      - name: category_name
        data_type: string
      - name: category_code
        data_type: string
