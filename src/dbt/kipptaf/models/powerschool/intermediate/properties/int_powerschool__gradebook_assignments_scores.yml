models:
  - name: int_powerschool__gradebook_assignments_scores
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: assignmentsectionid
        data_type: int64
        description:
          "Foreign key. Internal number for the associated Assignment Section
          Assignment Section IDrecord. Required. Indexed. Source: PowerSchool
          stg_powerschool__assignmentscore.assignmentsectionid."
      - name: sectionsdcid
        data_type: int64
        description:
          "Foreign key. Internal number for the associated sections.DCID record.
          Required. Indexed. Source: PowerSchool
          stg_powerschool__assignmentsection.sectionsdcid."
      - name: assignmentid
        data_type: int64
        description:
          "Foreign key. Internal number for the associated Assignment.ID record.
          Required. Indexed. Source: PowerSchool
          stg_powerschool__assignmentsection.assignmentid."
      - name: assignment_name
        data_type: string
      - name: duedate
        data_type: date
        description:
          "The date the assignment is due. Defaults to Default is the system
          date + 1 day. Indexed. Source: PowerSchool
          stg_powerschool__assignmentsection.duedate."
      - name: scoretype
        data_type: string
        description:
          "Indicates if this score is a letter grade or percent. Source:
          PowerSchool stg_powerschool__assignmentsection.scoretype."
      - name: totalpointvalue
        data_type: float64
        description:
          "This is the total weighted points that the assignment is worth. If
          the entry points are 25, and theweight is 4, then the total point
          value is 100. Source: PowerSchool
          stg_powerschool__assignmentsection.totalpointvalue."
      - name: category_name
        data_type: string
      - name: category_code
        data_type: string
      - name: iscountedinfinalgrade
        data_type: int64
        description:
          "Indicates if the assignment will count toward the final grade. Valid
          values: 0=Does not count towardfinal grade, 1=Counts toward final
          grade. Defaults to 1. Required. Source: PowerSchool
          stg_powerschool__assignmentsection.iscountedinfinalgrade."
      - name: scorepoints
        data_type: float64
        description:
          "Indicates the number of points for a score. Source: PowerSchool
          stg_powerschool__assignmentscore.scorepoints."
      - name: actualscoreentered
        data_type: string
        description:
          "Identifies the score entered for this assignment. This field may be
          Null. Source: PowerSchool
          stg_powerschool__assignmentscore.actualscoreentered."
      - name: students_dcid
        data_type: int64
      - name: school_level
        data_type: string
      - name: is_late
        data_type: int64
      - name: is_exempt
        data_type: int64
      - name: is_missing
        data_type: int64
      - name: is_expected
        data_type: boolean
      - name: score_entered
        data_type: float64
      - name: assign_final_score_percent
        data_type: float64
      - name: half_total_point_value
        data_type: float64
      - name: is_zero
        data_type: int64
      - name: is_academic_dishonesty
        data_type: int64
      - name: is_null
        data_type: int64
      - name: is_scored
        data_type: int64
      - name: is_expected_zero
        data_type: int64
      - name: is_expected_academic_dishonesty
        data_type: int64
      - name: is_expected_null
        data_type: int64
      - name: is_expected_late
        data_type: int64
      - name: is_expected_missing
        data_type: int64
      - name: is_expected_scored
        data_type: boolean
