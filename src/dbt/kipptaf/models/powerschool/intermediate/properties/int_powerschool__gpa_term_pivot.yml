models:
  - name: int_powerschool__gpa_term_pivot
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - studentid
              - yearid
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
            column_role: foreign_key
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: gpa_term_cur
        data_type: float64
      - name: gpa_term_q1
        data_type: float64
      - name: gpa_term_q2
        data_type: float64
      - name: gpa_term_q3
        data_type: float64
      - name: gpa_term_q4
        data_type: float64
      - name: gpa_y1_cur
        data_type: float64
      - name: gpa_y1_q1
        data_type: float64
      - name: gpa_y1_q2
        data_type: float64
      - name: gpa_y1_q3
        data_type: float64
      - name: gpa_y1_q4
        data_type: float64
