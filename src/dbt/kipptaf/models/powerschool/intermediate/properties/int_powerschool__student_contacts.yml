models:
  - name: int_powerschool__student_contacts
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: family_ident
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: family_ident
      - name: person_type
        data_type: string
      - name: relationship_type
        data_type: string
      - name: isemergency
        data_type: int64
        description:
          Indicates whether or not the contact is designated as an emergency
          contact. Valid values:0=No, 1=Yes. Defaults to 0. Required.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcontactdetail
            source_column: isemergency
            contains_pii: true
      - name: schoolpickupflg
        data_type: int64
        description:
          "Indicates whether or not the the student can be picked up by the
          contact. Valid values: 0=No,1=Yes. Defaults to 0. Required."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcontactdetail
            source_column: schoolpickupflg
      - name: contact_category
        data_type: string
      - name: contact
        data_type: string
      - name: contact_priority_order
        data_type: int64
      - name: contact_name
        data_type: string
      - name: contact_type
        data_type: string
