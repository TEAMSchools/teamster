models:
  - name: int_powerschool__ps_adaadm_daily_ctod
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - studentid
              - calendardate
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: studentid
            column_role: foreign_key
      - name: student_number
        data_type: int64
        description: Student Number assigned by the school. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: schoolid
      - name: calendardate
        data_type: date
      - name: fteid
        data_type: int64
        description:
          The internal number for the FTE with which this record is associated.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fteid
      - name: attendance_conversion_id
        data_type: int64
        description:
          The internal number for the Attendance Conversion with which this
          record is associated. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_conversion_items
            source_column: attendance_conversion_id
      - name: grade_level
        data_type: int64
        description:
          "The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: ontrack
        data_type: int64
      - name: offtrack
        data_type: int64
      - name: student_track
        data_type: string
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. Thenumber is equal to the ID of the year term divided by
          100. Maintained in the Terms table.Required. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradeschoolconfig
            source_column: yearid
      - name: att_code
        data_type: string
        description:
          Attendance identifier set by school. Examples Tardy, Absent, etc.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_code
            source_column: att_code
      - name: attendancevalue
        data_type: float64
      - name: potential_attendancevalue
        data_type: float64
      - name: membershipvalue
        data_type: float64
        description:
          The amount of a student's membership this school claims. If a student
          attends more than one school eachone will only be able to claim a
          certain portion of the membership. The largest number for this will
          usually be1 and fractions expressed as decimals. Like .5 or .25.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__calendar_day
            source_column: membershipvalue
      - name: academic_year
        data_type: int64
      - name: semester
        data_type: int64
      - name: term
        data_type: int64
      - name: week_start_monday
        data_type: date
      - name: week_end_sunday
        data_type: date
      - name: week_number_academic_year
        data_type: int64
      - name: _dbt_source_project
        data_type: string
      - name: is_absent
        data_type: float64
      - name: is_present_weighted
        data_type: float64
      - name: is_tardy
        data_type: float64
      - name: is_ontime
        data_type: float64
      - name: is_oss
        data_type: float64
      - name: is_iss
        data_type: float64
      - name: is_suspended
        data_type: float64
      - name: is_absent_non_susp
        data_type: float64
      - name: n_absent_running_90
        data_type: float64
      - name: pct_absent_running_student_year
        data_type: float64
      - name: n_membership_student_year
        data_type: float64
      - name: n_absent_projected
        data_type: float64
        description:
          Derived from n_membership_student_year,
          pct_absent_running_student_year.
      - name: is_truant
        data_type: boolean
        description:
          Categorical mapping of _dbt_source_project, n_absent_running_90,
          n_membership_student_year, pct_absent_running_student_year.
