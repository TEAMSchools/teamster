models:
  - name: int_powerschool__ada_term
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: term
        data_type: string
      - name: ada_term
        data_type: float64
        description: Derived from ada_term.
      - name: ada_semester
        data_type: float64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Derived from _dbt_source_relation,
          academic_year, count_attendance_value_term, semester, studentid,
          sum_attendance_value_term.
      - name: ada_year
        data_type: float64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Derived from _dbt_source_relation,
          academic_year, count_attendance_value_term, studentid,
          sum_attendance_value_term.
      - name: ada_year_running
        data_type: float64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Derived from _dbt_source_relation,
          academic_year, count_attendance_value_term, studentid,
          sum_attendance_value_term, term.
      - name: ada_weighted_term
        data_type: float64
        description: Derived from sum_attendance_value_weighted_term.
      - name: ada_weighted_semester
        data_type: float64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Derived from _dbt_source_relation,
          academic_year, count_attendance_value_term, semester, studentid,
          sum_attendance_value_weighted_term.
      - name: ada_weighted_year
        data_type: float64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Derived from _dbt_source_relation,
          academic_year, count_attendance_value_term, studentid,
          sum_attendance_value_weighted_term.
      - name: ada_weighted_year_running
        data_type: float64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026'). Derived from _dbt_source_relation,
          academic_year, count_attendance_value_term, studentid,
          sum_attendance_value_weighted_term, term.
