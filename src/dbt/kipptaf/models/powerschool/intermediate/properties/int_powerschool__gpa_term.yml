models:
  - name: int_powerschool__gpa_term
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          "The internal number and ID of the associated Students record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: schoolid
        data_type: int64
        description: "The School_Number of the associated Schools record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: schoolid
      - name: yearid
        data_type: int64
        description:
          "A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: term_name
        data_type: string
      - name: semester
        data_type: string
      - name: is_current
        data_type: boolean
      - name: gpa_points_total_term
        data_type: float64
      - name: gpa_term
        data_type: float64
      - name: gpa_points_total_y1
        data_type: float64
      - name: gpa_y1
        data_type: float64
      - name: gpa_y1_unweighted
        data_type: float64
      - name: n_failing_y1
        data_type: int64
      - name: total_credit_hours_term
        data_type: float64
      - name: total_credit_hours_y1
        data_type: float64
      - name: grade_avg_term
        data_type: float64
      - name: grade_avg_y1
        data_type: float64
      - name: weighted_gpa_points_term
        data_type: float64
      - name: weighted_gpa_points_y1
        data_type: float64
      - name: weighted_gpa_points_y1_unweighted
        data_type: float64
      - name: gpa_points_total_semester
        data_type: float64
      - name: weighted_gpa_points_semester
        data_type: float64
      - name: total_credit_hours_semester
        data_type: float64
      - name: grade_avg_semester
        data_type: float64
      - name: gpa_semester
        data_type: float64
