models:
  - name: int_powerschool__teacher_grade_levels
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: teachernumber
        data_type: string
        description: The number the district assigns to track the teacher.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__users
            source_column: teachernumber
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. Thenumber is equal to the ID of the year term divided by
          100. Maintained in the Terms table.Required. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradeschoolconfig
            source_column: yearid
      - name: academic_year
        data_type: int64
      - name: grade_level
        data_type: int64
        description:
          "The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: section_count_distinct
        data_type: int64
      - name: student_count
        data_type: int64
      - name: student_total_all_grades
        data_type: int64
      - name: grade_level_ratio
        data_type: float64
      - name: grade_level_rank
        data_type: int64
