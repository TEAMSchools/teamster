models:
  - name: int_powerschool__gpa_cumulative
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: studentid
            column_role: foreign_key
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: schoolid
      - name: earned_credits_cum
        data_type: float64
      - name: potential_credits_cum
        data_type: float64
      - name: earned_credits_cum_projected
        data_type: float64
      - name: earned_credits_cum_projected_s1
        data_type: float64
      - name: cumulative_y1_gpa
        data_type: float64
      - name: cumulative_y1_gpa_unweighted
        data_type: float64
      - name: cumulative_y1_gpa_projected
        data_type: float64
      - name: cumulative_y1_gpa_projected_s1
        data_type: float64
      - name: cumulative_y1_gpa_projected_s1_unweighted
        data_type: float64
      - name: cumulative_y1_gpa_projected_unweighted
        data_type: float64
      - name: core_cumulative_y1_gpa
        data_type: float64
      - name: _dbt_source_project
        data_type: string
        description: District code location derived from `_dbt_source_relation`.
      - name: cumulative_y1_gpa_unweighted_band
        data_type: int64
        description: >
          KTAF GPA band for cumulative_y1_gpa_unweighted (4 = ≥3.00, 3 =
          2.50–2.99, 2 = 2.00–2.49, 1 = <2.00).
      - name: cumulative_y1_gpa_projected_unweighted_band
        data_type: int64
        description: >
          KTAF GPA band for cumulative_y1_gpa_projected_unweighted (4 = ≥3.00, 3
          = 2.50–2.99, 2 = 2.00–2.49, 1 = <2.00).
