models:
  - name: int_powerschool__gradescaleitem_lookup
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: gradescaleid
        data_type: int64
        description:
          "The ID for the grade scale attached to this course. Relates to the
          Gradescale Item table. Source: PowerSchool
          stg_powerschool__courses.gradescaleid."
      - name: gradescale_name
        data_type: string
        description:
          "Name of the Gradescale associated to the Section ID. Source:
          PowerSchool stg_powerschool__storedgrades.gradescale_name."
      - name: letter_grade
        data_type: string
      - name: grade_points
        data_type: float64
        description:
          "Points associated to this grade. For example, 4 to A, 3 to B, etc.
          Source: PowerSchool stg_powerschool__gradescaleitem.grade_points."
      - name: min_cutoffpercentage
        data_type: float64
      - name: max_cutoffpercentage
        data_type: float64
