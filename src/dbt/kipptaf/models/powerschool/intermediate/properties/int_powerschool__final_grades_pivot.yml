models:
  - name: int_powerschool__final_grades_pivot
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: studentid
            column_role: foreign_key
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. Thenumber is equal to the ID of the year term divided by
          100. Maintained in the Terms table.Required. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradeschoolconfig
            source_column: yearid
      - name: course_number
        data_type: string
        description:
          The number the school assigns to a particular course. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__courses
            source_column: course_number
      - name: sectionid
        data_type: int64
        description:
          The internal number and ID of the associated Sections record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: sectionid
            column_role: foreign_key
      - name: storecode
        data_type: string
        description:
          The code used to represent this grade level to Term ID and School ID.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: storecode
      - name: y1_letter_grade
