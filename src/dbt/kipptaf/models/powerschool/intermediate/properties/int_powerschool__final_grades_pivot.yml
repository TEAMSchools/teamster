models:
  - name: int_powerschool__final_grades_pivot
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          "The internal number and ID of the associated Students record. Source:
          PowerSchool stg_powerschool__attendance.studentid."
      - name: yearid
        data_type: int64
        description:
          "A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table. Source: PowerSchool
          stg_powerschool__assignmentcategoryassoc.yearid."
      - name: course_number
        data_type: string
        description:
          "The course number associated with this class. This is implied by the
          Section ID but stored here forconvenience. Indexed. Source:
          PowerSchool stg_powerschool__cc.course_number."
      - name: sectionid
        data_type: int64
        description:
          "The internal number and ID of the associated Sections record. Source:
          PowerSchool stg_powerschool__cc.sectionid."
      - name: storecode
        data_type: string
        description:
          "The code used to represent this grade level to term ID and school ID.
          Source: PowerSchool stg_powerschool__gradecalcformulaweight.storecode."
      - name: y1_letter_grade
        data_type: string
      - name: y1_percent_grade_adjusted
        data_type: float64
      - name: y1_letter_grade_adjusted
        data_type: string
      - name: need_90
        data_type: float64
