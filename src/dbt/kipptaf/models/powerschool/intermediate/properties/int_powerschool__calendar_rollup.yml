models:
  - name: int_powerschool__calendar_rollup
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: _dbt_source_project
        data_type: string
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: schoolid
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. Thenumber is equal to the ID of the year term divided by
          100. Maintained in the Terms table.Required. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradeschoolconfig
            source_column: yearid
      - name: track
        data_type: string
        description:
          A-H or blank. This represents the times of year a student goes to
          school. This is most commonwith year-round schools.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: track
      - name: min_calendardate
        data_type: date
      - name: max_calendardate
        data_type: date
      - name: days_total
        data_type: int64
      - name: days_remaining
        data_type: int64
