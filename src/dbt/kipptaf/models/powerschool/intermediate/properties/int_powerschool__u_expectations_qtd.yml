models:
  - name: int_powerschool__u_expectations_qtd
    description:
      Quarter-to-date expectations counts per region and school level. For each
      active quarter, returns the counts from the most recent school week with
      data. Past quarters reflect their final week; the current quarter reflects
      the week in progress.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - region
              - school_level
              - quarter
    columns:
      - name: region
        data_type: string
        description: District region (e.g. Newark, Camden, Paterson).
      - name: school_level
        data_type: string
        description: School level grouping (ES / MS / HS).
      - name: quarter
        data_type: string
        quote: true
        description: Academic quarter (Q1–Q4).
      - name: week_number_qtd
        data_type: int64
        description:
          Week number within the quarter as of which the counts are reported.
      - name: cnt_w
        data_type: int64
        description:
          Count of students in the W expectations bucket as of week_number_qtd.
      - name: cnt_h
        data_type: int64
        description:
          Count of students in the H expectations bucket as of week_number_qtd.
      - name: cnt_f
        data_type: int64
        description:
          Count of students in the F expectations bucket as of week_number_qtd.
      - name: cnt_s
        data_type: int64
        description:
          Count of students in the S expectations bucket as of week_number_qtd.
      - name: week_start_monday
        data_type: date
        description: Monday of the school week represented by week_number_qtd.
      - name: week_end_sunday
        data_type: date
        description: Sunday of the school week represented by week_number_qtd.
