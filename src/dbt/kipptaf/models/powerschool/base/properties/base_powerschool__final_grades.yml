models:
  - name: base_powerschool__final_grades
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          "The internal number and ID of the associated Students record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: sectionid
        data_type: int64
        description:
          "The internal number and ID of the associated Sections record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cc
            source_column: sectionid
      - name: course_number
        data_type: string
        description:
          "The course number associated with this class. This is implied by the
          Section ID but stored here forconvenience. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cc
            source_column: course_number
      - name: yearid
        data_type: int64
        description:
          "A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: academic_year
        data_type: int64
      - name: termid
        data_type: int64
        description:
          "The internal number for the term to which this CC record is
          associated. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cc
            source_column: termid
      - name: dateenrolled
        data_type: date
        description: "The date the student was enrolled in the class. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cc
            source_column: dateenrolled
      - name: dateleft
        data_type: date
        description: "The date the student exited the class. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__cc
            source_column: dateleft
      - name: schoolid
        data_type: int64
        description: "The School_Number of the associated Schools record."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: schoolid
      - name: course_name
        data_type: string
        description: "The name of the course, such as Algebra."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__courses
            source_column: course_name
      - name: credittype
        data_type: string
        description:
          "The type of credit this counts as toward graduation, such as Math or
          elective."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__courses
            source_column: credittype
      - name: is_dropped_section
        data_type: boolean
      - name: storecode
        data_type: string
        description:
          "The code used to represent this grade level to term ID and school ID."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradecalcformulaweight
            source_column: storecode
      - name: term_percent_grade
        data_type: float64
      - name: sg_percent
        data_type: float64
      - name: fg_percent
        data_type: float64
      - name: term_letter_grade
        data_type: string
      - name: sg_letter_grade
        data_type: string
      - name: fg_letter_grade
        data_type: string
      - name: term_percent_grade_adjusted
        data_type: float64
      - name: fg_percent_adjusted
        data_type: float64
      - name: term_letter_grade_adjusted
        data_type: string
      - name: fg_letter_grade_adjusted
        data_type: string
      - name: y1_percent_grade
        data_type: float64
      - name: y1_percent_grade_adjusted
        data_type: float64
      - name: term_grade_points
        data_type: float64
      - name: sg_grade_points
        data_type: float64
      - name: fg_grade_points
        data_type: float64
      - name: courses_gradescaleid
        data_type: int64
      - name: courses_gradescaleid_unweighted
        data_type: int64
      - name: termbin_start_date
        data_type: date
      - name: termbin_end_date
        data_type: date
      - name: termbin_is_current
        data_type: boolean
      - name: exclude_from_gpa
        data_type: int64
      - name: sg_exclude_from_gpa
        data_type: int64
      - name: courses_excludefromgpa
        data_type: int64
      - name: exclude_from_graduation
        data_type: int64
      - name: sg_exclude_from_graduation
        data_type: int64
      - name: potential_credit_hours
        data_type: float64
      - name: sg_potential_credit_hours
        data_type: float64
      - name: courses_credit_hours
        data_type: float64
      - name: term_weighted_points_possible
        data_type: float64
      - name: term_weighted_points_earned
        data_type: float64
      - name: term_weighted_points_earned_adjusted
        data_type: float64
      - name: term_weighted_points_earned_adjusted_running
        data_type: float64
      - name: y1_weighted_points_possible
        data_type: float64
      - name: y1_weighted_points_possible_running
        data_type: float64
      - name: y1_weighted_points_earned_running
        data_type: float64
      - name: y1_weighted_points_earned_adjusted_running
        data_type: float64
      - name: y1_weighted_points_valid_running
        data_type: float64
      - name: lastgradeupdate
        data_type: date
        description:
          "The date this grade record was last updated in Power Teacher
          Gradebook or Power Teacher Pro."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: lastgradeupdate
      - name: whomodified_teachernumber
        data_type: string
      - name: citizenship
        data_type: string
        description:
          "Shows the Citizenship progress of a student in this section, such as
          E=Excellent, S=Satisfactory,U=Unsatisfactory, N=Neutral."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__pgfinalgrades
            source_column: citizenship
      - name: comment_value
        data_type: string
        description:
          "Information regarding this Conversion Item to help in its clarity."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_conversion_items
            source_column: comment_value
      - name: y1_grade_points
        data_type: float64
      - name: y1_letter_grade
        data_type: string
      - name: y1_grade_points_unweighted
        data_type: float64
      - name: y1_letter_grade_adjusted
        data_type: string
      - name: need_90
        data_type: float64
      - name: need_80
        data_type: float64
      - name: need_70
        data_type: float64
      - name: need_60
        data_type: float64
