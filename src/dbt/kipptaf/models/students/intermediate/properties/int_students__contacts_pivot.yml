models:
  - name: int_students__contacts_pivot
    description:
      Wide one-row-per-student contact surface, pivoted from
      `int_students__contacts`. Preserves the legacy contact column surface
      (`contact_1`/`contact_2`, `emergency_1` through `emergency_3`, and
      `pickup_1` through `pickup_3`, each with the nine attribute suffixes) plus
      the new additive `emergency_4` set. Under the 1+4 contact shape only
      `contact_1` and `emergency_1` through `emergency_4` carry data;
      `contact_2` and the `pickup` slots are retained as NULL so downstream
      extracts keep their column lists. Grain is one row per (student, source
      project).
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - _dbt_source_project
          config:
            severity: error
    columns:
      - name: student_number
        data_type: integer
        description: The student's PowerSchool student number.
      - name: _dbt_source_project
        data_type: string
        description:
          Dagster code location (district) the row's contacts were sourced from.
      - name: contact_1_address_home
        data_type: string
        description:
          Home address for the student's single reportable parent contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_email_current
        data_type: string
        description:
          Email address for the student's single reportable parent contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_name
        data_type: string
        description:
          Full name for the student's single reportable parent contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_phone_daytime
        data_type: string
        description:
          Daytime phone number for the student's single reportable parent
          contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_phone_home
        data_type: string
        description:
          Home phone number for the student's single reportable parent contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_phone_mobile
        data_type: string
        description:
          Mobile (Cell) phone number for the student's single reportable parent
          contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_phone_primary
        data_type: string
        description:
          Primary phone number (first regardless of type) for the student's
          single reportable parent contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_phone_work
        data_type: string
        description:
          Work phone number for the student's single reportable parent contact.
        config:
          meta:
            contains_pii: true
      - name: contact_1_relationship
        data_type: string
        description:
          Relationship to the student for the student's single reportable parent
          contact.
      - name: contact_2_address_home
        data_type: string
        description:
          Home address for the second contact slot, always null under the 1+4
          shape.
        config:
          meta:
            contains_pii: true
      - name: contact_2_email_current
        data_type: string
        description:
