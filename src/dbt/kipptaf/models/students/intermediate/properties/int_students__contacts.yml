models:
  - name: int_students__contacts
    description:
      Network-wide long-format student contact list — one row per (student,
      contact slot). NJ cutover regions (Newark today) source from the Finalsite
      `int_finalsite__student_contacts` model, crosswalked to a PowerSchool
      student number and scoped to students that have one; all other regions
      (Miami, plus Camden and Paterson until they cut over) source from
      PowerSchool, mapping the priority-1 contact to `contact_1` and the
      priority-3-and-higher emergency contacts to `emergency_1` through
      `emergency_4`. Feeds the contact pivot, `dim_student_contact_persons`, and
      `bridge_student_contacts`.
    config:
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_number
              - _dbt_source_project
              - contact_slot
          config:
            severity: error
    columns:
      - name: student_number
        data_type: integer
        description: The student this contact belongs to.
        data_tests:
          - not_null:
              config:
                severity: error
      - name: contact_slot
        data_type: string
        description:
          Which contact this row represents — `contact_1` or `emergency_1`
          through `emergency_4`.
        data_tests:
          - not_null:
              config:
                severity: error
          - accepted_values:
              arguments:
                values:
                  - contact_1
                  - emergency_1
                  - emergency_2
                  - emergency_3
                  - emergency_4
              config:
                severity: error
      - name: _dbt_source_project
        data_type: string
        description:
          The district code location this contact was sourced from
          (`kippnewark`, `kippcamden`, `kippmiami`, `kipppaterson`).
        data_tests:
          - not_null:
              config:
                severity: error
      - name: personid
        data_type: string
        description:
          PowerSchool person id of the contact, for PowerSchool-sourced regions;
          null for Finalsite-sourced regions. Used with `_dbt_source_project` to
          key the contact person in the dimension.
      - name: finalsite_contact_id
        data_type: string
        description:
          Finalsite contact UUID of the contact person, for Finalsite-sourced
          `contact_1` rows; null for PowerSchool regions and for emergency slots
          (which have no linked contact record). Used to key the contact person
          in the dimension.
      - name: contact_name
        data_type: string
        description: The contact's full name.
        config:
          meta:
            contains_pii: true
      - name: relationship
        data_type: string
        description: The contact's relationship to the student.
      - name: email_current
        data_type: string
        description: The contact's current email address, if any.
        config:
          meta:
            contains_pii: true
      - name: phone_mobile
        data_type: string
        description: The contact's phone number typed as mobile/cell, if any.
        config:
          meta:
            contains_pii: true
      - name: phone_home
        data_type: string
        description: The contact's phone number typed as home, if any.
        config:
          meta:
            contains_pii: true
      - name: phone_daytime
        data_type: string
        description:
          The contact's phone number typed as daytime, if any. Always null for
          Finalsite-sourced regions, which have no daytime phone type.
        config:
          meta:
            contains_pii: true
      - name: phone_work
        data_type: string
        description: The contact's phone number typed as work, if any.
        config:
          meta:
            contains_pii: true
      - name: phone_primary
        data_type: string
        description:
          The contact's first/best phone number regardless of type — a fallback
          for phones the typed columns miss.
        config:
          meta:
            contains_pii: true
      - name: address_home
        data_type: string
        description:
          The contact's home address. Always null for emergency slots, which
          carry no address.
        config:
          meta:
            contains_pii: true
      - name: is_emergency
        data_type: boolean
        description: False for `contact_1`; true for every `emergency_*` slot.
      - name: is_pickup
        data_type: boolean
        description:
          Whether the contact is authorized for pickup. Null for Finalsite
          `contact_1` rows.
      - name: is_custodial
        data_type: boolean
        description:
          Whether the contact has custody. Null for Finalsite `contact_1` rows.
      - name: is_household_member
        data_type: boolean
        description:
          Whether the contact lives with the student. Null for Finalsite
          `contact_1` rows.
