models:
  - name: int_extracts__student_enrollments_weeks
    config:
      schema: extracts
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - student_number
              - week_start_monday
          config:
            severity: error
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: students_dcid
        data_type: int64
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: student_name
        data_type: string
        description: Last, First, Mi. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: lastfirst
            contains_pii: true
      - name: student_last_name
        data_type: string
        description: Students last name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: last_name
            contains_pii: true
      - name: student_first_name
        data_type: string
        description: Students' first name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: first_name
            contains_pii: true
      - name: student_middle_name
        data_type: string
        description: Student's middle name.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: middle_name
            contains_pii: true
      - name: enroll_status
        data_type: int64
        description: The enrollment status of the student.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: enroll_status
      - name: cohort
        data_type: int64
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: entrydate
        data_type: date
        description:
          The school enrollment entry date from the student table for EOY it the
          next schools beginning date.Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: entrydate
      - name: exitdate
        data_type: date
        description:
          The school enrollment exit date from the student table. If EOY it's
          the schools next end-of-year dateor effective date for other
          re-enrollment purposes. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitdate
      - name: exitcode
        data_type: string
        description:
          The school specified exit code from the student table for EOY or for
          re-enrollment purposes, suchas S=Transfer.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitcode
      - name: exitcomment
        data_type: string
        description:
          The exit comment from the student table as specified for this record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitcomment
      - name: region
        data_type: string
      - name: school_level
        data_type: string
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: schoolid
      - name: reporting_schoolid
        data_type: int64
      - name: school_name
        data_type: string
        description: School name.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: school_name
      - name: school
        data_type: string
      - name: grade_level
        data_type: int64
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: grade_level
      - name: grade_level_prev
        data_type: int64
      - name: advisory_name
        data_type: string
      - name: team
        data_type: string
        description:
          This field identifies the team to which the section is assigned, if
          any, and is necessary to continuesupport of scheduling students by
          team in Automated Walk-In scheduling. This will be capturedduring the
          Power Scheduler commit process from Schedule Sections:Team.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__sections
            source_column: team
      - name: advisor_lastfirst
        data_type: string
      - name: student_email
        data_type: string
      - name: student_web_id
        data_type: string
        description:
          The student user ID for logging in to Power School Parent. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_web_id
      - name: student_web_password
        data_type: string
        description: The password for Student_Web_ID.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_web_password
            contains_pii: true
      - name: gender
        data_type: string
        description: M=Male F=Female. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: gender
      - name: ethnicity
        data_type: string
        description:
          Heritage background of a student. The codes assigned here are stored
          in the Gen Table [6]Cat=Ethnicity. These are set in school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ethnicity
      - name: fedethnicity
        data_type: int64
        description:
          'Numerical answer to the question "Is the student Hispanic or Latino?"
          Valid values :'
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fedethnicity
      - name: dob
        data_type: date
        description: Date of birth.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: dob
            contains_pii: true
      - name: lunch_status
        data_type: string
      - name: spedlep
        data_type: string
        description: Database extension field associated to the Students table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcorefields
            source_column: spedlep
      - name: special_education_code
        data_type: string
      - name: lep_status
        data_type: boolean
        description: Student Limited English Proficiency status.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcorefields
            source_column: lep_status
      - name: gifted_and_talented
        data_type: string
      - name: is_504
        data_type: boolean
      - name: is_homeless
        data_type: boolean
      - name: is_out_of_district
        data_type: boolean
      - name: is_self_contained
        data_type: boolean
      - name: is_enrolled_oct01
        data_type: boolean
      - name: is_enrolled_mar15
        data_type: boolean
      - name: is_enrolled_recent
        data_type: boolean
      - name: is_enrolled_y1
        data_type: boolean
      - name: is_retained_year
        data_type: boolean
      - name: is_retained_ever
        data_type: boolean
      - name: is_fldoe_fte_all
        data_type: boolean
      - name: year_in_school
        data_type: int64
      - name: year_in_network
        data_type: int64
      - name: boy_status
        data_type: string
      - name: rn_year
        data_type: int64
      - name: rn_undergrad
        data_type: int64
      - name: rn_all
        data_type: int64
      - name: code_location
        data_type: string
      - name: salesforce_id
        data_type: string
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: id
      - name: has_fafsa
        data_type: string
      - name: college_match_gpa
        data_type: numeric
      - name: college_match_gpa_bands
        data_type: string
      - name: contact_owner_name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: ktc_cohort
        data_type: int64
      - name: illuminate_student_id
        data_type: int64
      - name: contact_1_name
        data_type: string
      - name: contact_1_phone_home
        data_type: string
      - name: contact_1_phone_mobile
        data_type: string
      - name: contact_1_email_current
        data_type: string
      - name: contact_2_name
        data_type: string
      - name: contact_2_phone_home
        data_type: string
      - name: contact_2_phone_mobile
        data_type: string
      - name: contact_2_email_current
        data_type: string
      - name: is_fldoe_fte_2
        data_type: boolean
      - name: graduation_year
        data_type: int64
        description: Student graduation year.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcorefields
            source_column: graduation_year
      - name: region_official_name
        data_type: string
      - name: deanslist_school_id
        data_type: int64
      - name: ms_attended
        data_type: string
      - name: es_attended
        data_type: string
      - name: territory
        data_type: string
      - name: hos
        data_type: string
      - name: overgrad_fafsa_opt_out
        data_type: string
      - name: ada_unweighted_term_q1
        data_type: float64
      - name: ada_unweighted_semester_s1
        data_type: float64
      - name: unweighted_ada
        data_type: float64
      - name: ada_weighted_term_q1
        data_type: float64
      - name: ada_weighted_semester_s1
        data_type: float64
      - name: weighted_ada
        data_type: float64
      - name: absences_unexcused_year
        data_type: float64
      - name: ada_unweighted_year_prev
        data_type: float64
      - name: ada_weighted_year_prev
        data_type: float64
      - name: next_year_school
        data_type: string
      - name: next_year_schoolid
        data_type: int64
      - name: grad_iep_exempt_status_overall
        data_type: string
      - name: district
        data_type: string
      - name: region_school_level
        data_type: string
      - name: guardian_email
        data_type: string
      - name: academic_year_display
        data_type: string
      - name: iep_status
        data_type: string
        description: Individualized Education Program status.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: iep_status
      - name: state_studentnumber
        data_type: string
        description:
          The state-assigned student number for the student. In most cases, this
          number should stay thesame from school to school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state_studentnumber
            contains_pii: true
      - name: ada
        data_type: float64
      - name: met_fafsa_requirement
        data_type: boolean
      - name: is_counseling_services
        data_type: int64
      - name: is_student_athlete
        data_type: int64
      - name: is_tutoring
        data_type: boolean
      - name: race_ethnicity
        data_type: string
      - name: school_level_alt
        data_type: string
      - name: advisory
        data_type: string
      - name: state
        data_type: string
        description: State element of address.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state
      - name: ada_above_or_at_80
        data_type: boolean
      - name: fafsa_status_mismatch_category
        data_type: string
      - name: region_official_name
        data_type: string
