      - name: advisory
        data_type: string
      - name: state
        data_type: string
        description: State element of address.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state
      - name: ada_above_or_at_80
        data_type: boolean
      - name: fafsa_status_mismatch_category
        data_type: string
      - name: region_official_name
        data_type: string
      - name: week_number_academic_year
        data_type: int64
