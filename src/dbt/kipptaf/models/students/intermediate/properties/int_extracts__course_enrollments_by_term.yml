models:
  - name: int_extracts__course_enrollments_by_term
    description: >
      One row per student per course per quarter based on course enrollment
      overlap with term dates. Students who re-enrolled in the same course
      within a quarter are deduped to the most recent stint.
    config:
      schema: extracts
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_project
              - studentid
              - course_number
              - quarter
          config:
            severity: error
    columns:
      - name: _dbt_source_project
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: studentid
            column_role: foreign_key
      - name: students_dcid
        data_type: int64
      - name: student_number
        data_type: int64
        description: Student number assigned by the school. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
      - name: reenrollments_dcid
        data_type: int64
      - name: grade_level
        data_type: int64
        description: >
          The grade the student is in. Since this is an integer: 0=Kindergarten,
          -2=Preschool. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: schoolid
      - name: entrydate
        data_type: date
        description:
          The date the student enrolled in school for the current enrollment.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: entrydate
      - name: exitdate
        data_type: date
        description: >
          The date the student exited for the current/last enrollment. This is
          the day after the student's last attended class.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: exitdate
      - name: entrycode
        data_type: string
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: entrycode
      - name: exitcode
        data_type: string
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: exitcode
      - name: exitcomment
        data_type: string
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: exitcomment
      - name: fteid
        data_type: int64
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fteid
      - name: enroll_status
        data_type: int64
        description: The enrollment status of the student.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: enroll_status
      - name: dob
