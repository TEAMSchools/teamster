models:
  - name: int_students__dibels_participation_roster
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - academic_year
              - student_number
              - admin_season
              - round_number
              - completed_test_round
    columns:
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: region
        data_type: string
      - name: student_number
        data_type: int64
        description: Student Number assigned by the school. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: grade_level
        data_type: int64
        description:
          "The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: enroll_status
        data_type: int64
        description: The enrollment status of the student.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: enroll_status
      - name: assessment_type
        data_type: string
      - name: admin_season
        data_type: string
      - name: round_number
        data_type: int64
      - name: expected_row_count
        data_type: int64
      - name: actual_row_count
        data_type: int64
      - name: completed_test_round
        data_type: boolean
      - name: completed_test_round_int
        data_type: int64
        description: Conditional on completed_test_round.
