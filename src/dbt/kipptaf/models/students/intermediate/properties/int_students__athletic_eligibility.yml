models:
  - name: int_students__athletic_eligibility

    columns:
      - name: _dbt_source_relation
        data_type: string

      - name: academic_year
        data_type: int64

      - name: yearid
        data_type: int64

      - name: schoolid
        data_type: int64

        description:
          The School_Number of the associated Schools record. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: schoolid
      - name: student_number
        data_type: int64

        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: students_dcid
        data_type: int64

      - name: studentid
        data_type: int64

        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: studentid
      - name: grade_level
        data_type: int64

        description:
          The grade level the student was in when the grade was stored. This
          simply copies the students'current grade level in to this field.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: grade_level
      - name: grade_level_prev
        data_type: int64

      - name: dob
        data_type: date

      - name: ada
        data_type: float64

      - name: cy_unweighted_term_q1
        data_type: float64

      - name: cy_weighted_term_q1
        data_type: float64

      - name: cy_unweighted_s1_ada
        data_type: float64

      - name: cy_weighted_s1_ada
        data_type: float64

      - name: py_y1_unweighted_ada
        data_type: float64

      - name: py_y1_weighted_ada
        data_type: float64

      - name: cy_q1_gpa
        data_type: float64

      - name: cy_s1_gpa
        data_type: float64

      - name: cy_y1_gpa
        data_type: float64

      - name: py_y1_gpa
        data_type: float64

      - name: py_credits
        data_type: float64

      - name: met_py_credits
        data_type: boolean

      - name: met_cy_credits
        data_type: boolean

      - name: is_first_time_ninth
        data_type: boolean

      - name: is_age_eligible
        data_type: boolean

      - name: q1_ae_status
        data_type: string

      - name: q2_ae_status
        data_type: string

      - name: q3_ae_status
        data_type: string

      - name: q4_ae_status
        data_type: string
