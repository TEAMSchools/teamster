models:
  - name: int_students__college_assessment_participation_roster
    columns:
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: salesforce_id
        data_type: string
      - name: grade_level
        data_type: int64
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: grade_level
      - name: psat89_count
        data_type: int64
      - name: psat10_count
        data_type: int64
      - name: psatnmsqt_count
        data_type: int64
      - name: sat_count
        data_type: int64
      - name: act_count
        data_type: int64
      - name: act_1_attempt_min_score
        data_type: float64
      - name: act_2_plus_attempts_min_score
        data_type: float64
      - name: sat_1_attempt_min_score
        data_type: float64
      - name: sat_1_attempt_pct_goal
        data_type: float64
      - name: sat_2_plus_attempts_min_score
        data_type: float64
      - name: sat_2_plus_attempts_pct_goal
        data_type: float64
      - name: psat89_1_attempt_min_score
        data_type: float64
      - name: psat89_2_plus_attempts_min_score
        data_type: float64
      - name: psat10_1_attempt_min_score
        data_type: float64
      - name: psat10_2_plus_attempts_min_score
        data_type: float64
      - name: psatnmsqt_1_attempt_min_score
        data_type: float64
      - name: psatnmsqt_2_plus_attempts_min_score
        data_type: float64
      - name: psat89_count_ytd
        data_type: int64
      - name: psat10_count_ytd
        data_type: int64
      - name: psatnmsqt_count_ytd
        data_type: int64
      - name: sat_count_ytd
        data_type: int64
      - name: act_count_ytd
        data_type: int64
      - name: psat89_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of
