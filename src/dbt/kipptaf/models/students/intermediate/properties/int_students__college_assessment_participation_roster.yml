models:
  - name: int_students__college_assessment_participation_roster
    columns:
      - name: student_number
        data_type: int64
        description: Student Number assigned by the school. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: salesforce_id
        data_type: string
      - name: grade_level
        data_type: int64
        description:
          "The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: psat89_count
        data_type: int64
      - name: psat10_count
        data_type: int64
      - name: psatnmsqt_count
        data_type: int64
      - name: sat_count
        data_type: int64
      - name: act_count
        data_type: int64
      - name: act_1_attempt_min_score
        data_type: float64
      - name: act_2_plus_attempts_min_score
        data_type: float64
      - name: sat_1_attempt_min_score
        data_type: float64
      - name: sat_1_attempt_pct_goal
        data_type: float64
      - name: sat_2_plus_attempts_min_score
        data_type: float64
      - name: sat_2_plus_attempts_pct_goal
        data_type: float64
      - name: psat89_1_attempt_min_score
        data_type: float64
      - name: psat89_2_plus_attempts_min_score
        data_type: float64
      - name: psat10_1_attempt_min_score
        data_type: float64
      - name: psat10_2_plus_attempts_min_score
        data_type: float64
      - name: psatnmsqt_1_attempt_min_score
        data_type: float64
      - name: psatnmsqt_2_plus_attempts_min_score
        data_type: float64
      - name: psat89_count_ytd
        data_type: int64
      - name: psat10_count_ytd
        data_type: int64
      - name: psatnmsqt_count_ytd
        data_type: int64
      - name: sat_count_ytd
        data_type: int64
      - name: act_count_ytd
        data_type: int64
      - name: psat89_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of
          psat89_count_ytd partitioned by student_number.
      - name: psat10_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of
          psat10_count_ytd partitioned by student_number.
      - name: psatnmsqt_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of
          psatnmsqt_count_ytd partitioned by student_number.
      - name: sat_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of sat_count_ytd
          partitioned by student_number.
      - name: act_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of act_count_ytd
          partitioned by student_number.
      - name: rn_lifetime
        data_type: int64
        description:
          District-assigned student identification number. ROWNUMBER of value
          partitioned by student_number.
