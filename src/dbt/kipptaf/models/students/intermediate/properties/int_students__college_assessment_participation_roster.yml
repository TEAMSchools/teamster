      - name: psatnmsqt_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of
          psatnmsqt_count_ytd.
      - name: sat_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of sat_count_ytd.
      - name: act_count_lifetime
        data_type: int64
        description:
          District-assigned student identification number. MAX of act_count_ytd.
      - name: rn_lifetime
        data_type: int64
