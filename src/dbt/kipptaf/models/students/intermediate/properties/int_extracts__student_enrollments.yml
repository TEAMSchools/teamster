models:
  - name: int_extracts__student_enrollments
    config:
      schema: extracts
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - student_number
              - academic_year
              - entrydate
          config:
            severity: error
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__storedgrades
            source_column: studentid
            column_role: foreign_key
      - name: students_dcid
        data_type: int64
      - name: student_number
        data_type: int64
        description: Student Number assigned by the school. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: reenrollments_dcid
        data_type: int64
      - name: grade_level
        data_type: int64
        description:
          "The grade the student is in. Since this is an integer: 0=Kindergarten
          1, -2=Preschool. Indexed."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: grade_level
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: schoolid
      - name: entrydate
        data_type: date
        description:
          The date the student enrolled in school for the current enrollment.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: entrydate
      - name: exitdate
        data_type: date
        description:
          The date the student exited for the current/last enrollment. This is
          the day after a student-attended class. For example, if the last day
          the student is in school is a Wednesday, Thursdayis the exit day.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: exitdate
      - name: entrycode
        data_type: string
        description:
          The code representing how or why the student entered school. These
          codes are stored in Gen Table [6] cat=entrycodes. These are set in
          school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: entrycode
      - name: exitcode
        data_type: string
        description:
          The code representing how or why the student exited the school. These
          codes are stored in Gen Table [6] cat=exitcodes. These are set in
          school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: exitcode
      - name: exitcomment
        data_type: string
        description: Any comments for the student exiting this school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: exitcomment
      - name: fteid
        data_type: int64
        description:
          The internal number for the FTE with which this record is associated.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fteid
      - name: enroll_status
        data_type: int64
        description: The enrollment status of the student.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: enroll_status
      - name: dob
        data_type: date
        description: Date of birth.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: dob
            contains_pii: true
      - name: street
        data_type: string
        description: Student's street address.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: street
            contains_pii: true
      - name: city
        data_type: string
        description: City element of the students address.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: city
            contains_pii: true
      - name: zip
        data_type: string
        description: Students zip code.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: zip
            contains_pii: true
      - name: home_phone
        data_type: string
        description: Home phone number for the student. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: home_phone
            contains_pii: true
      - name: fedethnicity
        data_type: int64
        description:
          'Numerical answer to the question "Is the student Hispanic or Latino?"
          Valid values :'
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fedethnicity
      - name: next_school
        data_type: int64
        description:
          The school the student will be attending the next school year. It is
          likely this will be the sameschool. The information is stored as the
          internal ID on the schools table for that school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: next_school
      - name: sched_nextyeargrade
        data_type: int64
        description:
          The grade the student is going to be in next year. If the student is
          being retained, this shouldbe the same as the current grade level.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: sched_nextyeargrade
      - name: highest_grade_level_achieved
        data_type: int64
      - name: gender
        data_type: string
        description: M=Male F=Female. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: gender
      - name: ethnicity
        data_type: string
        description:
          Heritage background of a student. The codes assigned here are stored
          in the Gen Table [6]Cat=Ethnicity. These are set in school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ethnicity
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. Thenumber is equal to the ID of the year term divided by
          100. Maintained in the Terms table.Required. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__gradeschoolconfig
            source_column: yearid
      - name: academic_year
        data_type: int64
      - name: track
        data_type: string
        description:
          A-H or blank. This represents the times of year a student goes to
          school. This is most commonwith year-round schools.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: track
