models:
  - name: int_extracts__student_enrollments
    config:
      schema: extracts
      materialized: table
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - _dbt_source_relation
              - student_number
              - academic_year
              - entrydate
          config:
            severity: error
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: studentid
      - name: students_dcid
        data_type: int64
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: reenrollments_dcid
        data_type: int64
      - name: grade_level
        data_type: int64
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: grade_level
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: schoolid
      - name: entrydate
        data_type: date
        description:
          The school enrollment entry date from the student table for EOY it the
          next schools beginning date.Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: entrydate
      - name: exitdate
        data_type: date
        description:
          The school enrollment exit date from the student table. If EOY it's
          the schools next end-of-year dateor effective date for other
          re-enrollment purposes. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitdate
      - name: entrycode
        data_type: string
        description: The Enrollment code from the student table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: entrycode
      - name: exitcode
        data_type: string
        description:
          The school specified exit code from the student table for EOY or for
          re-enrollment purposes, suchas S=Transfer.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitcode
      - name: exitcomment
        data_type: string
        description:
          The exit comment from the student table as specified for this record.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: exitcomment
      - name: fteid
        data_type: int64
        description:
          The internal number for the FTE with which this record is associated.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance_conversion_items
            source_column: fteid
      - name: enroll_status
        data_type: int64
        description: The enrollment status of the student.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: enroll_status
      - name: dob
        data_type: date
        description: Date of birth.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: dob
            contains_pii: true
      - name: street
        data_type: string
        description:
          The street name and number element of the address. Usually line one of
          the address. Indexed with Line Two and Unit. Optional.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__personaddress
            source_column: street
            contains_pii: true
      - name: city
        data_type: string
        description: The city element of the address. Optional.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__personaddress
            source_column: city
            contains_pii: true
      - name: zip
        data_type: string
        description: Students zip code.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: zip
            contains_pii: true
      - name: home_phone
        data_type: string
        description: Home phone number for the student. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: home_phone
            contains_pii: true
      - name: fedethnicity
        data_type: int64
        description:
          'Numerical answer to the question "Is the student Hispanic or Latino?"
          Valid values :'
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: fedethnicity
      - name: next_school
        data_type: int64
        description:
          The school the student will be attending the next school year. It is
          likely this will be the sameschool. The information is stored as the
          internal ID on the schools table for that school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: next_school
      - name: sched_nextyeargrade
        data_type: int64
        description:
          The grade the student is going to be in next year. If the student is
          being retained, this shouldbe the same as the current grade level.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: sched_nextyeargrade
      - name: highest_grade_level_achieved
        data_type: int64
      - name: gender
        data_type: string
        description: M=Male F=Female. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: gender
      - name: ethnicity
        data_type: string
        description:
          Heritage background of a student. The codes assigned here are stored
          in the Gen Table [6]Cat=Ethnicity. These are set in school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ethnicity
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentcategoryassoc
            source_column: yearid
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: track
        data_type: string
        description:
          The track the student was in during this enrollment from student
          table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: track
