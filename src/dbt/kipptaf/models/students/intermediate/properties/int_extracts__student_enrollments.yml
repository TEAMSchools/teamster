        data_type: string
        description: Conditional on is_self_contained.
      - name: state_studentnumber
        data_type: string
        description:
          The state-assigned student number for the student. In most cases, this
          number should stay thesame from school to school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state_studentnumber
            contains_pii: true
      - name: secondary_state_studentnumber
        data_type: string
        description: Conditional on region, state_studentnumber.
      - name: ada
        data_type: float64
        description:
          Conditional on academic_year, ada_weighted_year, ada_year,
          school_level.
      - name: met_fafsa_requirement
        data_type: boolean
        description:
          Conditional on fafsa_opt_out, salesforce_contact_df_has_fafsa.
      - name: is_counseling_services
        data_type: int64
        description: Conditional on enter_date, exit_date.
      - name: is_student_athlete
        data_type: int64
        description: Conditional on enter_date, exit_date.
      - name: is_tutoring
        data_type: boolean
        description: Conditional on enter_date, exit_date.
      - name: is_sipps
        data_type: boolean
        description: Conditional on students_student_number.
      - name: student_slideback
        data_type: boolean
        description: >-
          Conditional on cumulative_y1_gpa_projected_unweighted_band,
          cumulative_y1_gpa_unweighted_band.
      - name: enroll_status_string
        data_type: string
        description: Categorical mapping of enroll_status.
      - name: race_ethnicity
        data_type: string
        description: Categorical mapping of ethnicity.
      - name: school_level_alt
        data_type: string
        description:
          Categorical mapping of academic_year, grade_level,
          school_abbreviation, school_level.
      - name: advisory
        data_type: string
        description:
          Categorical mapping of advisor_lastfirst, advisory_name, school_level.
      - name: state
        data_type: string
        description: State element of address.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state
      - name: ada_above_or_at_80
        data_type: boolean
        description:
          Categorical mapping of academic_year, ada_weighted_year, ada_year,
          school_level.
      - name: fafsa_status_mismatch_category
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - No issues
              config:
                where:
                  grade_level != 99 and academic_year = {{
                  var('current_academic_year')}}
        description:
          Categorical mapping of academic_year, fafsa_opt_out, grade_level,
          salesforce_contact_df_has_fafsa.
