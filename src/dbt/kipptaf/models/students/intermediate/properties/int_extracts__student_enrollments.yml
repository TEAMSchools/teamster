        description: Derived from academic_year.
      - name: next_year_enrollment_history
        data_type: string
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted. Conditional on
          grade_level, next_year_enrollment_history.
      - name: overgrad_fafsa_opt_out
        data_type: string
        description: Conditional on fafsa_opt_out.
      - name: grad_iep_exempt_status_overall
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Not Grad IEP Exempt
                  - "Yes"
        description:
          The enrollment status of the student. Conditional on enroll_status,
          grad_iep_exempt_overall.
