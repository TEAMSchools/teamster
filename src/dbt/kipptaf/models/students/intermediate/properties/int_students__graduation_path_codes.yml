models:
  - name: int_students__graduation_path_codes
    config:
      materialized: table
    data_tests:
      - distinct_count:
          arguments:
            group_by: student_number
            distinct_field: grad_eligibility
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: students_dcid
        data_type: int64
      - name: studentsid
        data_type: int64
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
            column_role: primary_key
      - name: state_studentnumber
        data_type: string
        description:
          The state-assigned student number for the student. In most cases, this
          number should stay thesame from school to school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state_studentnumber
            contains_pii: true
      - name: salesforce_id
        data_type: string
      - name: grade_level
        data_type: int64
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__reenrollments
            source_column: grade_level
      - name: cohort
        data_type: int64
      - name: discipline
        data_type: string
      - name: powerschool_credittype
        data_type: string
      - name: ps_grad_path_code
        data_type: string
      - name: has_fafsa
      - name: njgpa_season_11th
        data_type: boolean
      - name: fafsa_season_12th
        data_type: boolean
      - name: pathway_option
        data_type: string
      - name: score_type
        data_type: string
      - name: pathway_code
        data_type: string
      - name: cutoff
        data_type: numeric
      - name: scale_score
        data_type: numeric
      - name: subject_area
        data_type: string
      - name: met_pathway_cutoff
        data_type: boolean
      - name: met_sat_ela
        data_type: boolean
      - name: met_sat_math
        data_type: boolean
      - name: met_dlm
        data_type: boolean
      - name: met_portfolio
        data_type: boolean
      - name: njgpa_attempt
        data_type: boolean
      - name: met_njgpa
        data_type: boolean
      - name: met_act
        data_type: boolean
      - name: met_sat
        data_type: boolean
      - name: met_psat10
        data_type: boolean
      - name: met_psat_nmsqt
        data_type: boolean
      - name: attempted_njgpa_ela
        data_type: boolean
      - name: attemped_njgpa_math
        data_type: boolean
      - name: met_ela
        data_type: boolean
      - name: met_math
        data_type: boolean
      - name: rn_highest
        data_type: int64
      - name: points_short
        data_type: numeric
        description: Conditional on cutoff, scale_score.
      - name: final_grad_path_code
        data_type: string
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted. Categorical
          mapping of grade_level, met_act, met_njgpa, met_psat10,
          met_psat_nmsqt, met_sat, njgpa_attempt, ps_grad_path_code.
      - name: grad_eligibility
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Grad Eligible
                  - ELA Only
                  - Not Grad Eligible
                  - Math Only
                  - No FAFSA
                  - FAFSA Only
                  - ELA Only / No FAFSA
                  - Math Only / No FAFSA
        description:
          The grade level the student was in for this enrollment or if EOY, the
          next grade level unless thestudent is being demoted. First non-null of
          grad_eligibility, grade_level, grade_level.
      - name: test_type
        data_type: string
        description:
          The type of test being administered. 1 = National, 2 = State, 3 =
          Local, 4 =District, 5 = School, 6 = Other, 7 = Fitness (as of 20.11.0)
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__test
            source_column: test_type
      - name: rn_discipline_distict
        data_type: int64
