models:
  - name: int_edplan__njsmart_powerschool_union
    config:
      materialized: table
    columns:
      - name: _dbt_source_relation
        data_type: string
      - name: row_hash
        data_type: string
      - name: student_number
        data_type: int64
        description: District-assigned student identification number.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__student_email
            source_column: student_number
            contains_pii: true
      - name: state_studentnumber
        data_type: int64
        description:
          The state-assigned student number for the student. In most cases, this
          number should stay thesame from school to school.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: state_studentnumber
            contains_pii: true
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: fiscal_year
        data_type: int64
      - name: effective_date
        data_type: date
      - name: effective_end_date
        data_type: date
      - name: spedlep
        data_type: string
        description: Database extension field associated to the Students table.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcorefields
            source_column: spedlep
      - name: special_education_code
        data_type: string
      - name: special_education
        data_type: string
        description: Special education status.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: special_education
      - name: nj_se_consenttoimplementdate
        data_type: date
      - name: nj_se_delayreason
        data_type: int64
      - name: nj_se_earlyintervention
        data_type: string
      - name: nj_se_eligibilityddate
        data_type: date
      - name: nj_se_initialiepmeetingdate
        data_type: date
      - name: nj_se_lastiepmeetingdate
        data_type: date
      - name: nj_se_parentalconsentdate
        data_type: date
      - name: nj_se_parentalconsentobtained
        data_type: string
      - name: nj_se_placement
        data_type: int64
      - name: nj_se_reevaluationdate
        data_type: date
      - name: nj_se_referraldate
        data_type: date
      - name: nj_timeinregularprogram
        data_type: numeric
      - name: ti_serv_counseling
        data_type: string
      - name: ti_serv_occup
        data_type: string
      - name: ti_serv_other
        data_type: string
      - name: ti_serv_physical
        data_type: string
      - name: ti_serv_speech
        data_type: string
      - name: rn_student_year_desc
        data_type: int64
