models:
  - name: int_surveys__survey_responses
    columns:
      - name: survey_id
        data_type: string
      - name: survey_title
        data_type: string
      - name: survey_response_id
        data_type: string
      - name: survey_question_id
        data_type: string
      - name: answer
        data_type: string
      - name: question_title
        data_type: string
      - name: question_shortname
        data_type: string
      - name: rn
        data_type: int64
      - name: respondent_email
        data_type: string
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: term_code
        data_type: string
      - name: term_name
        data_type: string
      - name: respondent_employee_number
        data_type: int64
      - name: respondent_preferred_name
        data_type: string
      - name: respondent_samaccountname
        data_type: string
      - name: respondent_userprincipalname
        data_type: string
      - name: answer_value
        data_type: numeric
      - name: date_started
        data_type: timestamp
      - name: date_submitted
        data_type: timestamp
      - name: survey_response_link
        data_type: string
      - name: is_open_ended
        data_type: int64
