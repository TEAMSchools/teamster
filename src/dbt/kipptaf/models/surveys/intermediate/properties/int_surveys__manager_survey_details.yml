models:
  - name: int_surveys__manager_survey_details
    columns:
      - name: survey_id
        data_type: string
      - name: survey_title
        data_type: string
      - name: survey_response_id
        data_type: string
      - name: effective_survey_response_id
        data_type: string
        description: >-
          Submission identifier used downstream. For live Google Forms rows,
          equals `survey_response_id`. For historic Alchemer archive rows (which
          have no upstream `survey_response_id`), synthesized as
          `concat(respondent_df_employee_number, '_',
          subject_df_employee_number, '_', campaign_reporting_term)` — the
          natural key that uniquely identifies an archive submission. Consumed
          by `fct_survey_submissions.historic_archive_submissions` and
          `fct_survey_responses.manager_responses` for `survey_submission_key`
          hashing.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: date_started
        data_type: timestamp
      - name: date_submitted
        data_type: timestamp
      - name: campaign_academic_year
        data_type: int64
      - name: campaign_name
        data_type: string
      - name: campaign_reporting_term
        data_type: string
      - name: respondent_df_employee_number
        data_type: int64
      - name: subject_df_employee_number
        data_type: int64
      - name: respondent_email
        data_type: string
      - name: survey_question_id
        data_type: string
      - name: question_shortname
        data_type: string
      - name: question_title
        data_type: string
      - name: answer
        data_type: string
      - name: answer_value
        data_type: numeric
      - name: is_open_ended
        data_type: int64
      - name: respondent_preferred_name
        data_type: string
      - name: respondent_race_ethnicity_reporting
        data_type: string
      - name: respondent_gender
        data_type: string
      - name: subject_preferred_name
        data_type: string
      - name: is_manager
        data_type: boolean
      - name: subject_department_name
        data_type: string
      - name: subject_legal_entity_name
        data_type: string
      - name: subject_manager_name
        data_type: string
      - name: subject_primary_job
        data_type: string
      - name: subject_primary_site
        data_type: string
      - name: subject_race_ethnicity_reporting
        data_type: string
      - name: subject_gender
        data_type: string
      - name: subject_samaccountname
        data_type: string
      - name: subject_manager_samaccountname
        data_type: string
      - name: subject_userprincipalname
        data_type: string
      - name: subject_manager_userprincipalname
        data_type: string
