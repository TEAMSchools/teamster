sources:
  - name: tableau
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      {%- endif -%}kipptaf_tableau
    tables:
      - name: src_tableau__view_count_per_view
        external:
          location:
            "{{ var('cloud_storage_uri_base') }}/tableau/view_count_per_view/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - tableau
                - view_count_per_view
      - name: src_tableau__workbook
        config:
          enabled: false
          meta:
            dagster:
              asset_key:
                - kipptaf
                - tableau
                - workbook
        external:
          location: "{{ var('cloud_storage_uri_base') }}/tableau/workbook/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix:
              "{{ var('cloud_storage_uri_base') }}/tableau/workbook/"
            format: AVRO
            enable_logical_types: true
