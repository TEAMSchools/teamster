models:
  - name: base_kippadb__contact
    columns:
      - name: contact_school_specific_id
        data_type: int64
      - name: contact_id
        data_type: string
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: id
      - name: contact_owner_id
        data_type: string
      - name: contact_record_type_id
        data_type: string
      - name: contact_description
        data_type: string
        description: The description of the assignment.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: contact_name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: contact_birthdate
        data_type: date
      - name: contact_email
        data_type: string
      - name: contact_first_name
        data_type: string
        description: The person's first name. Indexed. Optional.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__person
            source_column: firstname
            contains_pii: true
      - name: contact_home_phone
        data_type: string
        description: Home phone number for the student. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: home_phone
            contains_pii: true
      - name: contact_last_name
        data_type: string
        description: The person's last name. Indexed. Optional.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__person
            source_column: lastname
            contains_pii: true
      - name: contact_mobile_phone
        data_type: string
      - name: contact_actual_college_graduation_date
        data_type: date
      - name: contact_actual_hs_graduation_date
        data_type: date
      - name: contact_advising_provider
        data_type: string
      - name: contact_college_graduated_from
        data_type: string
      - name: contact_college_match_display_gpa
        data_type: numeric
      - name: contact_current_college_cumulative_gpa
        data_type: numeric
      - name: contact_current_college_semester_gpa
        data_type: numeric
      - name: contact_current_kipp_student
        data_type: string
      - name: contact_currently_enrolled_school
        data_type: string
      - name: contact_dep_post_hs_simple_admin
        data_type: string
      - name: contact_efc_from_fafsa
        data_type: numeric
      - name: contact_ethnicity
        data_type: string
        description:
          Heritage background of a student. The codes assigned here are stored
          in the Gen Table [6]Cat=Ethnicity. These are set in school setup.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__students
            source_column: ethnicity
      - name: contact_expected_college_graduation
        data_type: date
      - name: contact_expected_hs_graduation
        data_type: date
      - name: contact_full_name
        data_type: string
      - name: contact_gender
        data_type: string
        description: Student gender.
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: gender
      - name: contact_has_hs_graduated_enrollment
        data_type: string
      - name: contact_high_school_graduated_from
        data_type: string
      - name: contact_highest_act_score
        data_type: numeric
      - name: contact_highest_sat_score
        data_type: numeric
      - name: contact_kipp_hs_graduate
        data_type: bool
      - name: contact_kipp_ms_graduate
        data_type: bool
      - name: contact_kipp_region_name
        data_type: string
      - name: contact_last_outreach
        data_type: date
      - name: contact_last_successful_advisor_contact
        data_type: date
      - name: contact_last_successful_contact
        data_type: date
      - name: contact_latest_fafsa_date
        data_type: date
      - name: contact_latest_resume
        data_type: date
      - name: contact_latest_state_financial_aid_app_date
        data_type: date
      - name: contact_middle_school_attended
        data_type: string
      - name: contact_most_recent_college_enrollment_name
        data_type: string
      - name: contact_most_recent_college_enrollment_status
        data_type: string
      - name: contact_most_recent_iep_date
        data_type: date
      - name: contact_opt_out_national_contact
        data_type: bool
      - name: contact_opt_out_regional_contact
        data_type: bool
      - name: contact_other_phone
        data_type: string
      - name: contact_postsecondary_status
        data_type: string
      - name: contact_secondary_email
        data_type: string
      - name: contact_postsec_advisor
        data_type: string
      - name: contact_kipp_hs_class
        data_type: int64
      - name: contact_mailing_address
        data_type: string
      - name: contact_graduation_year
        data_type: int64
        description: Student graduation year.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__studentcorefields
            source_column: graduation_year
      - name: contact_intent_to_enlist
        data_type: bool
      - name: contact_cte_military_interest
        data_type: string
      - name: contact_owner_name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: contact_owner_email
        data_type: string
      - name: contact_owner_phone
        data_type: string
      - name: record_type_name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: record_type_description
        data_type: string
        description: The description of the assignment.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: description
      - name: record_type_last_modified_date
        data_type: timestamp
      - name: record_type_is_active
        data_type: bool
        description:
          "Indicates if the assignment is active. Valid values: 1=Yes=Active,
          0=No=Disabled. Defaults to 1.Required."
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__districtteachercategory
            source_column: isactive
      - name: record_type_business_process_id
        data_type: string
      - name: record_type_system_modstamp
        data_type: timestamp
      - name: record_type_sobject_type
        data_type: string
      - name: record_type_created_by_id
        data_type: string
      - name: record_type_created_date
        data_type: timestamp
      - name: record_type_developer_name
        data_type: string
      - name: record_type_last_modified_by_id
        data_type: string
      - name: record_type_namespace_prefix
        data_type: string
      - name: contact_postsec_advisor_name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__assignmentsection
            source_column: name
      - name: contact_lastfirst
        data_type: string
        description:
          The person's first name. Indexed. Optional. Derived from first_name,
          last_name.
      - name: years_out_of_hs
        data_type: int64
        description: Derived from actual_hs_graduation_date.
