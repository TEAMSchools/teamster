models:
  - name: int_kippadb__enrollment_pivot
    description:
      One row per KIPP alumni student, pivoting the student's post-secondary and
      employment enrollments into track-specific picks (BA, AA, CTE, HS,
      graduate, undergraduate, completed post-secondary, current, employment)
      alongside the attributes of each picked enrollment.
    columns:
      - name: student
        data_type: string
        data_tests:
          - unique:
              config:
                severity: error
      - name: ba_enrollment_id
        data_type: string
      - name: aa_enrollment_id
        data_type: string
      - name: ecc_enrollment_id
        data_type: string
      - name: hs_enrollment_id
        data_type: string
      - name: cte_enrollment_id
        data_type: string
      - name: graduate_enrollment_id
        data_type: string
      - name: ugrad_enrollment_id
        data_type: string
      - name: postsec_completed_enrollment_id
        data_type: string
        description:
          Enrollment id of the student's best post-secondary enrollment across
          the BA, AA, and CTE track picks — preferring a completed (Graduated)
          enrollment over any in-progress or withdrawn one, then higher degree
          level (BA over AA over CTE). Null when the student has no BA, AA, or
          CTE enrollment.
      - name: cur_enrollment_id
        data_type: string
      - name: ba_school_name
        data_type: string
      - name: ba_pursuing_degree_type
        data_type: string
      - name: ba_status
        data_type: string
      - name: ba_start_date
        data_type: date
      - name: ba_actual_end_date
        data_type: date
      - name: ba_anticipated_graduation
        data_type: date
      - name: ba_account_type
        data_type: string
      - name: ba_major
        data_type: string
      - name: ba_major_area
        data_type: string
      - name: ba_college_major_declared
        data_type: boolean
      - name: ba_date_last_verified
        data_type: date
      - name: ba_credits_required_for_graduation
        data_type: numeric
      - name: ba_account_name
        data_type: string
      - name: ba_billing_state
        data_type: string
      - name: ba_nces_id
        data_type: string
      - name: ba_adjusted_6_year_minority_graduation_rate
        data_type: numeric
        description:
          Adjusted six-year minority graduation rate of the institution for the
          most recent BA (4-year) enrollment.
      - name: aa_school_name
        data_type: string
      - name: aa_pursuing_degree_type
        data_type: string
      - name: aa_status
