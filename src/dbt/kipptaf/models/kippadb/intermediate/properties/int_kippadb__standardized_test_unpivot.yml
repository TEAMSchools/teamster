models:
  - name: int_kippadb__standardized_test_unpivot
    config:
      materialized: table
    columns:
      - name: id
        data_type: string
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__attendance
            source_column: id
      - name: contact
        data_type: string
      - name: school_specific_id
        data_type: int64
      - name: academic_year
        data_type: int64
        description:
          Starting calendar year of the school year, extracted from school_year
          (e.g., 2025 from '2025-2026').
        config:
          meta:
            source_system: Amplify
            source_model: stg_amplify__mclass__sftp__pm_student_summary_aimline
            source_column: academic_year
      - name: administration_round
        data_type: string
      - name: date
        data_type: date
      - name: test_type
        data_type: string
        description:
          The type of test being administered. 1 = National, 2 = State, 3 =
          Local, 4 =District, 5 = School, 6 = Other, 7 = Fitness (as of 20.11.0)
        config:
          meta:
            source_system: PowerSchool
            source_model: stg_powerschool__test
            source_column: test_type
      - name: score_type
        data_type: string
      - name: score
        data_type: numeric
      - name: course_discipline
        data_type: string
      - name: test_subject
        data_type: string
      - name: ap_course_name
        data_type: string
      - name: ps_ap_course_subject_code
        data_type: string
      - name: subject_area
        data_type: string
        description: Categorical mapping of score_type, test_subject.
      - name: rn_highest
        data_type: int64
        description:
          The type of test being administered. 1 = National, 2 = State, 3 =
          Local, 4 =District, 5 = School, 6 = Other, 7 = Fitness (as of 20.11.0)
          ROWNUMBER of value.
      - name: row_count_by_test_date
        data_type: int64
      - name: average_rows
        data_type: float64
