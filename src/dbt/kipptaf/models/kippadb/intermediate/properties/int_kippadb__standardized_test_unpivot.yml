models:
  - name: int_kippadb__standardized_test_unpivot
    config:
      materialized: table
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: |-
              `date` is null or `date` >= '2000-01-01'
          config:
            severity: warn
      # TODO(#3802): remove warn once Salesforce dup records cleaned up
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - contact
              - test_type
              - score_type
              - date
          config:
            severity: warn
    columns:
      - name: id
        data_type: string
      - name: contact
        data_type: string
      - name: school_specific_id
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: administration_round
        data_type: string
      - name: date
        data_type: date
      - name: test_type
        data_type: string
      - name: score_type
        data_type: string
      - name: score
        data_type: numeric
      - name: course_discipline
        data_type: string
      - name: test_subject
        data_type: string
      - name: ap_course_name
        data_type: string
      - name: ps_ap_course_subject_code
        data_type: string
      - name: subject_area
        data_type: string
        description: Categorical mapping of score_type, test_subject.
      - name: rn_highest
        data_type: int64
        description:
          ROWNUMBER of value partitioned by contact, test_type, score_type,
          ap_course_name ordered by score.
      - name: row_count_by_test_date
        data_type: int64
      - name: average_rows
        data_type: float64
