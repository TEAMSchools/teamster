models:
  - name: stg_kippadb__kipp_aid
    columns:
      - name: id
        data_type: string
        data_tests:
          - unique:
              config:
                severity: error
      - name: name
        data_type: string
      - name: created_by_id
        data_type: string
      - name: created_date
        data_type: timestamp
      - name: last_activity_date
        data_type: date
      - name: last_modified_by_id
        data_type: string
      - name: last_modified_date
        data_type: timestamp
      - name: system_modstamp
        data_type: timestamp
      - name: amount
        data_type: numeric
      - name: date
        data_type: date
      - name: kipp_aid_count
        data_type: numeric
      - name: notes
        data_type: string
      - name: status
        data_type: string
      - name: student
        data_type: string
      - name: type
        data_type: string
      - name: is_maher
        data_type: boolean
        description:
          True when the note carries the appended MAHER_FUND marker tag
          identifying the record as a Maher Fund award; false otherwise,
          including when the note is null or empty.
      - name: fund_type
        data_type: string
        description:
          Funding classification parsed from the MAHER_FUND tag's type field
          (Emergency, Enrichment, or Unclassified); null when the note is
          untagged.
      - name: doc_type
        data_type: string
        description:
          Source purchase-order or expense-report reference parsed from the
          MAHER_FUND tag's doc field; null when the note is untagged.
      - name: notes_clean
        data_type: string
        description:
          The note with the MAHER_FUND tag and its surrounding whitespace
          removed; equals the original note when untagged.
