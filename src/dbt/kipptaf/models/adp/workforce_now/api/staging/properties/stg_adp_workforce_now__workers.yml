models:
  - name: stg_adp_workforce_now__workers
    description: >-
      Worker records from the ADP Workforce Now Worker Management API
      (/hr/v2/workers). A worker is a person who performs duties and
      responsibilities for an organization, filling one or more positions
      through work assignments as an employee or contractor. Includes personal
      demographics, employment status, and organizational assignments. All
      PII/SPI data (birth date, government IDs, pay rates) is masked by default
      and requires API-Central project configuration to unmask. Code objects
      have short_name and long_name sub-fields; ADP returns long_name instead of
      short_name when the value exceeds 20 characters. legal_address is the
      primary or secondary legal address; other_personal_addresses contains
      non-legal addresses.
    columns:
      - name: associate_oid
        data_type: string
        description: >-
          ADP-internal unique worker identifier (~16 chars). Stable per worker
          across all of ADP; one associate_oid per worker regardless of position
          count. **Do not join directly to
          `stg_people__employee_numbers.adp_associate_id`** — those are
          different identifier formats (the latter is the 9-char
          `worker_id__id_value`). To resolve `employee_number` from a model that
          exposes `associate_oid`, bridge through this model's
          `worker_id__id_value`.
      - name: effective_date_start
        data_type: date
      - name: worker_id__id_value
        data_type: string
        description: >-
          ADP `worker_id` (~9 chars). Equals
          `stg_people__employee_numbers.adp_associate_id` — this is the correct
          join key for resolving `employee_number` from any ADP model that has
          `associate_oid`. Confusingly, the column on
          `stg_people__employee_numbers` is named `adp_associate_id` but the
          value is the worker_id, not the `associate_oid`.
      - name: worker_id__scheme_code__code_value
        data_type: string
      - name: worker_id__scheme_code__long_name
        data_type: string
      - name: worker_id__scheme_code__short_name
        data_type: string
      - name: worker_status__status_code__code_value
        data_type: string
        description: >-
          Employment status code indicating whether the worker is currently
          employed (A = Active). Based on primary work assignment.
      - name: worker_status__status_code__long_name
        data_type: string
        description: Employment status long name.
      - name: worker_status__status_code__short_name
        data_type: string
        description: Employment status short name.
      - name: language_code__code_value
        data_type: string
      - name: language_code__long_name
        data_type: string
      - name: language_code__short_name
