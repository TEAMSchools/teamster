sources:
  - name: adp_workforce_now
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      kipptaf_adp_workforce_now
    tables:
      - name: src_adp_workforce_now__additional_earnings_report
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/adp/workforce_now/additional_earnings_report/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - adp
                - workforce_now
                - additional_earnings_report
      - name: src_adp_workforce_now__pension_and_benefits_enrollments
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/adp/workforce_now/pension_and_benefits_enrollments/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - adp
                - workforce_now
                - pension_and_benefits_enrollments
      - name: src_adp_workforce_now__time_and_attendance
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/adp/workforce_now/time_and_attendance/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - adp
                - workforce_now
                - time_and_attendance
      - name: src_adp_workforce_now__employee_memberships
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/adp/workforce_now/employee_memberships/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - kipptaf
                - adp
                - workforce_now
                - employee_memberships
      - name: src_adp_workforce_now__comprehensive_benefits_report
        config:
          enabled: false
          meta:
            dagster:
              asset_key:
                - kipptaf
                - adp
                - workforce_now
                - comprehensive_benefits_report
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/adp/workforce_now/comprehensive_benefits_report/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
