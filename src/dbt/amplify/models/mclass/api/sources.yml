sources:
  - name: amplify_mclass_api
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      {%- endif -%}{{ var('amplify_schema', project_name + '_amplify') }}
    tables:
      - name: benchmark_student_summary
        external:
          location:
            "{{ var('cloud_storage_uri_base')
            }}/amplify/benchmark_student_summary/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix: |
              "{{ var('cloud_storage_uri_base') }}/amplify/benchmark_student_summary/"
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - "{{ project_name }}"
                - amplify
                - benchmark_student_summary
      - name: pm_student_summary
        external:
          location:
            "{{ var('cloud_storage_uri_base',
            env_var('DBT_DEV_CLOUD_STORAGE_URI_BASE', ''))
            }}/amplify/pm_student_summary/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix: |
              "{{ var('cloud_storage_uri_base', env_var('DBT_DEV_CLOUD_STORAGE_URI_BASE', '')) }}/amplify/pm_student_summary/"
            format: AVRO
            enable_logical_types: true
        config:
          meta:
            dagster:
              asset_key:
                - "{{ project_name }}"
                - amplify
                - pm_student_summary
