sources:
  - name: edplan
    schema:
      "{%- if target.name in ['defer', 'dev'] -%}zz_{{ env_var('GITHUB_USER',
      'dev') }}_{%- elif target.name == 'staging' -%}zz_stg_{%- endif -%}{{
      var('edplan_schema', project_name ~ '_edplan') }}"
    tables:
      - name: src_edplan__njsmart_powerschool_archive
        config:
          enabled: false
          meta:
            dagster:
              asset_key:
                - "{{ project_name }}"
                - edplan
                - njsmart_powerschool_archive
        external:
          options:
            format: CSV
            skip_leading_rows: 1
            uris:
              - https://drive.google.com/open?id=1DRkhapaCivhvrJqEEuKzJja2bMFcUkkh
