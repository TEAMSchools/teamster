sources:
  - name: edplan
    schema: |
      {% if target.name == 'dev' -%}zz_dev_{{ env_var('GITHUB_USER', '') }}_
      {%- elif target.name == 'staging' or env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') == 'staging' -%}zz_staging_
      {%- endif -%}{{ var('edplan_schema', project_name + '_edplan') }}
    tables:
      - name: src_edplan__njsmart_powerschool_archive
        config:
          enabled: false
          meta:
            dagster:
              asset_key:
                - "{{ project_name }}"
                - edplan
                - njsmart_powerschool_archive
        external:
          options:
            format: CSV
            skip_leading_rows: 1
            uris:
              - https://drive.google.com/open?id=1DRkhapaCivhvrJqEEuKzJja2bMFcUkkh
