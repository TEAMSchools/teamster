name: kippcamden
version: 1.0.0
config-version: 2

profile: kippcamden

model-paths: [models]
analysis-paths: [analyses]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets:
  - target
  - dbt_packages

data_tests:
  +severity: warn
  +store_failures: true
  +store_failures_as: view

vars:
  local_timezone: America/New_York
  current_academic_year: 2026
  current_fiscal_year: 2027
  cloud_storage_uri_base: gs://teamster-kippcamden/dagster/kippcamden
  bigquery_external_connection_name: projects/teamster-332318/locations/us/connections/biglake-teamster-gcs

models:
  kippcamden:
    extracts:
      +schema: extracts
      +contract:
        enforced: true
    powerschool:
      +materialized: table
      +schema: powerschool
      sis:
        staging:
          +contract:
            enforced: true
  finalsite:
    api:
      +enabled: true
  deanslist:
    +materialized: table
    staging:
      stg_deanslist__followups:
        +enabled: false
  edplan:
    +materialized: table
    staging:
      stg_edplan__njsmart_powerschool_archive:
        +enabled: false
  overgrad:
    +materialized: table
    staging:
      stg_overgrad__followings:
        +enabled: false
      stg_overgrad__schools:
        +enabled: false
  pearson:
    +materialized: table
  powerschool:
    +materialized: table
    sis:
      staging:
        sftp:
          +enabled: false
        odbc:
          +enabled: false
        dlt:
          +enabled: true
      intermediate:
        int_powerschool__contacts:
          +enabled: false
        int_powerschool__person_contacts:
          +enabled: false
  titan:
    +materialized: table
    staging:
      stg_titan__income_form_data:
        +enabled: false

sources:
  finalsite:
    finalsite:
      contacts:
        +enabled: true
  powerschool:
    sis:
      staging:
        sftp:
          +enabled: false
        odbc:
          +enabled: false
  titan:
    titan:
      src_titan__income_form_data:
        +enabled: false
