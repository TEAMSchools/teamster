name: kippnewark
version: 1.0.0
config-version: 2

profile: kippnewark

model-paths: [models]
analysis-paths: [analyses]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets:
  - target
  - dbt_packages

data_tests:
  +severity: warn
  +store_failures: true
  +store_failures_as: view

vars:
  local_timezone: America/New_York
  current_academic_year: 2026
  current_fiscal_year: 2027
  iready_schema: kippnj_iready
  renlearn_schema: kippnj_renlearn
  cloud_storage_uri_base: gs://teamster-kippnewark/dagster/kippnewark
  bigquery_external_connection_name: projects/teamster-332318/locations/us/connections/biglake-teamster-gcs

models:
  kippnewark:
    extracts:
      +schema: extracts
      +contract:
        enforced: true
    powerschool:
      +materialized: table
      +schema: powerschool
      sis:
        staging:
          +contract:
            enforced: true
  finalsite:
    api:
      +enabled: true
  amplify:
    dds:
      +enabled: false
    mclass:
      api:
        +enabled: false
  deanslist:
    +materialized: table
    staging:
      stg_deanslist__followups:
        +enabled: false
  edplan:
    +materialized: table
    staging:
      stg_edplan__njsmart_powerschool_archive:
        +enabled: false
  iready:
    +materialized: table
    staging:
      stg_iready__instructional_usage_data:
        +enabled: false
  overgrad:
    +materialized: table
    staging:
      stg_overgrad__followings:
        +enabled: false
      stg_overgrad__schools:
        +enabled: false
  pearson:
    +materialized: table
  powerschool:
    +materialized: table
    sis:
      intermediate:
        int_powerschool__contacts:
          +enabled: false
        int_powerschool__person_contacts:
          +enabled: false
      staging:
        sftp:
          +enabled: false
        dlt:
          +enabled: true
  renlearn:
    +materialized: table
    staging:
      stg_renlearn__accelerated_reader:
        +enabled: false
      stg_renlearn__fast_star:
        +enabled: false
      stg_renlearn__star_dashboard_standards:
        +enabled: false
      stg_renlearn__star_skill_area:
        +enabled: false
  titan:
    +materialized: table
    staging:
      stg_titan__income_form_data:
        +enabled: false

sources:
  amplify:
    mclass:
      api:
        amplify_mclass_api:
          +enabled: false
    dds:
      amplify_dds:
        +enabled: false
  finalsite:
    finalsite:
      contacts:
        +enabled: true
  powerschool:
    sis:
      staging:
        sftp:
          +enabled: false
  renlearn:
    renlearn:
      src_renlearn__accelerated_reader:
        +enabled: false
      src_renlearn__fast_star:
        +enabled: false
      src_renlearn__star_dashboard_standards:
        +enabled: false
      src_renlearn__star_skill_area:
        +enabled: false
  titan:
    titan:
      src_titan__income_form_data:
        +enabled: false
