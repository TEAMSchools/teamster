data_tests:
  - name: test_int_powerschool__ps_enrollment_all__fteid_belongs_to_school_year
    description: >-
      Every enrollment row's `fteid` must point to an FTE record whose
      `schoolid` and `yearid` match the enrollment's. PowerSchool defines each
      FTE per `(schoolid, yearid)`; assigning a student an `fteid` from a
      different school or year produces silent NULLs in
      `int_powerschool__ps_adaadm_daily_ctod` because the `(fteid,
      attendance_conversion_id)` join in that model resolves only when the FTE
      matches the school's bell-schedule conversion config. Schools at sentinel
      `schoolid = 999999` (graduated students) are included — they should
      reference one of PowerSchool's 999999-scoped FTEs, not a real-school FTE
      carried over from prior enrollment.
    config:
      meta:
        dagster:
          ref:
            name: int_powerschool__ps_enrollment_all
            package: powerschool

  - name: int_powerschool__student_enrollment_union_no_shared_stint_boundary
    description: >-
      Within a `student_number` partition, consecutive enrollment stints must
      not share a boundary date. A `lead(entrydate)` value equal to the current
      row's `exitdate` indicates a same-day exit and re-entry that fans out
      half-open date-range joins on the boundary day (e.g. survey attribution,
      attendance windows). Source defect surfaced by issue #3902 — currently 78
      violations across ~100k stints network-wide.
    config:
      meta:
        dagster:
          ref:
            name: int_powerschool__student_enrollment_union
            package: powerschool

  - name: test_int_powerschool__gpa_cumulative_year__reconciles_stored
    description: >-
      Drift guard for the year-grain recompute — for each student-school, the
      latest completed-year row of int_powerschool__gpa_cumulative_year must
      match int_powerschool__gpa_cumulative within one rounding step (0.01) on
      both weighted and unweighted cumulative GPA, for students with no stored
      current-year Y1 grades (once current-year grades store, the original model
      includes them and the comparison is no longer like-for-like). Identical
      filters and rounding make this exact in practice; the comparison threshold
      is 0.015 so the one-cent rounding-boundary flip from float summation-order
      noise passes while real drift (0.02 or more) still warns. Runs at the
      project default warn severity so a transient discrepancy surfaces without
      blocking district prod builds — investigate any warning immediately.
    config:
      meta:
        dagster:
          ref:
            name: int_powerschool__gpa_cumulative_year
            package: powerschool
