sources:
  - name: powerschool_sftp
    schema: |
      {% if env_var('DBT_CLOUD_ENVIRONMENT_TYPE', '') in ['dev', 'staging'] -%}z_dev_
      {%- endif -%}{{ var('powerschool_schema', project_name + '_powerschool') }}
    tables:
      - name: src_powerschool__assignmentscore
        config:
          meta:
            dagster:
              asset_key:
                - "{{ project_name }}"
                - powerschool
                - sis
                - sftp
                - assignmentscore
        external:
          location:
            "{{ var('cloud_storage_uri_base',
            env_var('DBT_DEV_CLOUD_STORAGE_URI_BASE', ''))
            }}/powerschool/sis/sftp/assignmentscore/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            format: AVRO
            enable_logical_types: true
