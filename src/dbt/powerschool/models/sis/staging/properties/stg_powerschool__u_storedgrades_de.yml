models:
  - name: stg_powerschool__u_storedgrades_de
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        constraints:
          - type: primary_key
      - name: storedgradesdcid
        data_type: int64
        description:
          DCID (unique identifier) of the associated Storedgrade record.
          Indexed.
        constraints:
          - type: foreign_key
      - name: de_course_name
        data_type: string
      - name: de_institution
        data_type: string
      - name: de_pass_yn
        data_type: int64
      - name: de_score
        data_type: string
      - name: de_semester
        data_type: string
