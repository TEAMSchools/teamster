models:
  - name: stg_powerschool__fte
    description:
      This tables stores Full Time Equivalency information for a school in a
      given year for the various full time, part time, etc. and their associated
      attendance values.
    columns:
      - name: name
        data_type: string
        description: Name provided for this FTE value record.
      - name: description
        data_type: string
        description: Text description for this FTE value record.
      - name: dflt_att_mode_code
        data_type: string
        description: Default attendance mode code.
      - name: dflt_conversion_mode_code
        data_type: string
        description: Default conversion mode code.
      - name: dcid
        data_type: int64
        description: Unique identifier for this table record. Indexed.
        constraints:
          - type: primary_key
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table. Indexed.
      - name: fte_value
        data_type: float64
        description:
          Actual value of this FTE record. This value can be in decimals.
