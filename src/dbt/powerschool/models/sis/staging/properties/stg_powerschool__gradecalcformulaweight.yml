models:
  - name: stg_powerschool__gradecalcformulaweight
    columns:
      - name: storecode
        data_type: string
        description:
          The code used to represent this grade level to term ID and school ID.
        config:
          meta:
            contains_pii: false
      - name: type
        data_type: string
        description:
          "The Type associated with one of the grading elements. Valid values:
          Total_Points,Term_Weighting, Standards_Weighting and
          Category_Weighting. Defaults to Total_Points."
        config:
          meta:
            contains_pii: false
      - name: stndcalculationmetric
        data_type: string
        description:
          "Indicates how higher level standards are calculated. Valid values:
          Mean, Median, Mode, Highest,Specific_Weights, Specific_Sum, Null.
          Defaults to Null."
        config:
          meta:
            contains_pii: false
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: gradecalcformulaweightid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: gradecalculationtypeid
        data_type: int64
        description:
          Foreign key. Internal number for the associated GradeCalculationType
          GradeCalculationTypeIDrecord. Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: teachercategoryid
        data_type: int64
        description:
          Foreign key. Internal number for the associated TeacherCategory
          TeacherCategoryID record.Indexed.
        config:
          meta:
            contains_pii: false
      - name: districtteachercategoryid
        data_type: int64
        description:
          Foreign key. Internal number for the associated
          DistrictTeacherCategoryDistrictTeacherCategoryID record. This allows
          administrators be able to set up district categoryweights. Indexed.
        config:
          meta:
            contains_pii: false
      - name: assignmentid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Assignment
          AssignmentID record. Indexed.
        config:
          meta:
            contains_pii: false
      - name: weight
        data_type: numeric
        description:
          The weight associated with one of the grading elements. A numerical
          value which will becompared with other related rows to determine its
          actual percentage of the whole. Defaults to 1.0
        config:
          meta:
            contains_pii: false
    description:
      "Contains the specific weighting of items used in a calculation formula.
      One row represents each item weighted.  For example: HW 50%, Tests 50%."
