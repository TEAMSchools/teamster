models:
  - name: stg_powerschool__courses
    description:
      This table lists course information such as the Course Name, Number, and
      Scheduling data.
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
        constraints:
          - type: primary_key
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is notguaranteed. Indexed.
      - name: course_number
        data_type: string
        description:
          The number the school assigns to a particular course. Indexed.
      - name: course_name
        data_type: string
        description: The name of the course, such as Algebra.
      - name: code
        data_type: string
        description:
          Used to track state-specific codes associated with a course, such as
          the CIP code.
      - name: prerequisitesvalue
        data_type: string
        description:
          Used to store the value for Course Notes. No longer related to Course
          Prerequisites. Thevalue is copied to Schedule Course Catalog table.
      - name: corequisites
        data_type: string
        description:
          Value is copied from the Schedule Course Catalogs table. These are
          other courses that mustbe taken with this course at the same term.
      - name: powerlink
        data_type: string
        description:
          The name Power Link will use over the phone to phonetically spell a
          course in English.
      - name: powerlinkspan
        data_type: string
        description:
          The name Power Link will use over the phone to phonetically spell a
          course in Spanish.
      - name: reggradelevels
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: regteachers
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: regcoursegroup
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: multiterm
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: termsoffered
        data_type: string
        description: The terms this course can be offered.
      - name: credittype
        data_type: string
        description:
          The type of credit this counts as toward graduation, such as Math or
          elective.
      - name: sched_department
        data_type: string
        description: The department this course belongs to.
      - name: sched_coursesubjectareacode
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_fullcatalogdescription
        data_type: string
        description:
          A description of the course. This is not used in any calculations but
          is available if the schoolwould like to create a course catalog.
      - name: sched_coursepkgcontents
        data_type: string
        description:
          If the Sched_Course Package is selected, these are the courses that
          are part of theparticular package to which this course belongs.
          Includes this course.
      - name: sched_scheduletypecode
        data_type: string
        description:
          "The course type this is going to be built as: Standard, Lab, Lab
          Float, Float, and Custom."
      - name: sched_validstartperiods
        data_type: string
        description: When this course meets, it must start one of these periods.
      - name: sched_validdaycombinations
        data_type: string
        description: When this course meets, it must meet on these days only.
      - name: validextradaycombinations
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_extradayscheduletypecode
        data_type: string
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_facilities
        data_type: string
        description: What facilities are required to teach this course.
      - name: sched_loadtype
        data_type: string
        description:
          Is this an academic or elective class? Power Scheduler will try to
          balance the two forstudents.
      - name: sched_globalsubstitution1
        data_type: string
        description:
          If Sched_Substitution Allowed is True, this is the first course to try
          if this course is notpossible.
      - name: sched_globalsubstitution2
        data_type: string
        description:
          If Sched_Substitution Allowed is True, this is the second course to
          try if this course is notpossible.
      - name: sched_globalsubstitution3
        data_type: string
        description:
          If Sched_Substitution Allowed is True, this is the third course to try
          if this course is notpossible.
      - name: sched_balancepriority
        data_type: string
        description:
          What type of balancing should primarily be used when scheduling
          students into the classes.Section=Try to keep the sections as even as
          possible in the number of students,Gender=Try to keep the number of
          boys and girls even in classes, Grade=try to get an evennumber of
          grade levels represented in each section, Ethnic Code=Try to racially
          balance thesections, house=try to balance the sections with house
          members. Please note foreverything except section if the requests are
          not there sections will not be able to bebalanced. For example, if 3
          boys and 35 girls request a class the number of boys and girlsin a
          class will never be equal no matter how hard you try.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson Success Net/Pearson Success Net
          Plus.
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: transaction_date
        data_type: timestamp
        description: Date and time of the database transaction.
      - name: credit_hours
        data_type: float64
        description: The amount of credit awarded for completing a course.
      - name: add_to_gpa
        data_type: float64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/orcustom pages.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: regavailable
        data_type: int64
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: targetclasssize
        data_type: int64
        description:
          The number of students ideal for the course. This field has no bearing
          on any calculations.It is for informational purposes only.
      - name: maxclasssize
        data_type: int64
        description:
          The maximum number of students for this classroom. This is the number
          that appears onthe master schedule and is used for allowing manual
          entry into a class. This number shouldbe the same as Sched_Maximum
          Enrollment on the Schedule Course Catalog table.
      - name: sectionstooffer
        data_type: int64
        description:
          The number of sections for the year. This is not tied to Power
          Scheduler; in order to specifysections for scheduling, it will need to
          be set up in the course catalog.
      - name: schoolgroup
        data_type: int64
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: vocational
        data_type: int64
        description:
          "Used to flag courses as vocational for searching purposes. Valid
          values: 1=Yes/Selected,0=No/Deselected."
      - name: status
        data_type: int64
        description:
          "Indicates if the course was made either by a user or automatically by
          an import. Validvalues: 0=user-created, 3=auto-created."
      - name: crhrweight
        data_type: float64
        description: The amount of weight this course carries in a weighted GPA.
      - name: sched_year
        data_type: int64
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_coursepackage
        data_type: int64
        description:
          "Indicates if this course is part of a package. All the courses in a
          package are requested atonce: True (selected)=Part of a package. False
          (deselected)=Not part of a package."
      - name: sched_scheduled
        data_type: int64
        description:
          A flag-indicating if this course has been built into the schedule.
          True (Checked) means ithas been build into the schedule and will not
          be build next time the engine is run unless theengine is told to
          reschedule regardless of this flag. False (unchecked) the engine will
          buildinto the next schedule.
      - name: sched_sectionsoffered
        data_type: int64
        description:
          The number of sections that will be offered when it is built.
      - name: sched_teachercount
        data_type: int64
        description:
          If teacher assignments are not done, how many teachers can instruct
          this class at anygiven period.
      - name: sched_periodspermeeting
        data_type: int64
        description:
          When this class meets, how many blocks of time in the day will the
          class occupy.
      - name: sched_frequency
        data_type: int64
        description: How many times this course should meet in the cycle.
      - name: sched_maximumperiodsperday
        data_type: int64
        description:
          If the number of periods a course can meet is flexible, how many
          periods are the absolutemaximum that can be met in one day.
      - name: sched_minimumperiodsperday
        data_type: int64
        description:
          If the number of periods a course can meeting is flexible, how many
          periods are theminimum the course must meet in one day.
      - name: sched_maximumdayspercycle
        data_type: int64
        description:
          If the number of days a course can meet is flexible, what is the
          absolute maximum numberof days the course can meet in one cycle.
      - name: sched_minimumdayspercycle
        data_type: int64
        description:
          If the number of days a course can meet is flexible, what is the
          minimum number of daysthe course must occupy in a cycle.
      - name: sched_consecutiveperiods
        data_type: int64
        description:
          For multiperiod classes must those periods be back to back. True
          (checked)=Yes, False(unchecked)=no.
      - name: sched_blockstart
        data_type: int64
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_lengthinnumberofterms
        data_type: int64
        description: The LCM of terms this course must meet for.
      - name: sched_consecutiveterms
        data_type: int64
        description:
          "If this course spans terms, indicates if they must be back-to-back:
          True (selected)=Yes False (deselected)=No."
      - name: sched_balanceterms
        data_type: int64
        description:
          "Try to put an equal number of sections in each term: True
          (selected)=Yes False(deselected)=No."
      - name: sched_maximumenrollment
        data_type: int64
        description:
          When scheduling, try to keep the enrollment under this number.
      - name: sched_concurrentflag
        data_type: int64
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_multiplerooms
        data_type: int64
        description:
          The value is copied to Schedule Course Catalog table, but not used
          anywhere.
      - name: sched_labflag
        data_type: int64
        description:
          "Does this course have a lab: True (selected)=Yes False
          (deselected)=No."
      - name: sched_labfrequency
        data_type: int64
        description:
          If Sched_Lab Flag is True, how often does the lab need to meet in the
          cycle.
      - name: sched_labperiodspermeeting
        data_type: int64
        description: When the lab does meet, how many periods does it span.
      - name: sched_repeatsallowed
        data_type: int64
        description:
          "Can a student repeat this course with the schedule year: True
          (selected)=Yes False(deselected)=No."
      - name: sched_loadpriority
        data_type: int64
        description:
          When putting students into classes, how important is this class in
          relation to other classes?The lower the number, the higher the
          importance.
      - name: sched_substitutionallowed
        data_type: int64
        description:
          "Will global alternates be used: True (selected)=Yes False
          (deselected)=No."
      - name: sched_usepreestablishedteams
        data_type: int64
        description:
          To maintain the consistency of capturing committed information
          from[Schedule Course Catalog] since Sched_Use Preestablished Teams is
          also new. As with theother Sched fields in the Courses table it is not
          used in any current functionality.
      - name: sched_closesectionaftermax
        data_type: int64
        description:
          "When this course is scheduled to the maximum number of students, this
          indicates if theclass should be closed: True (selected)=Yes False
          (deselected)=No."
      - name: sched_usesectiontypes
        data_type: int64
        description:
          "If a section has a type, use it as a scheduling priority: True
          (selected)=Yes False(deselected)=No."
      - name: sched_periodspercycle
        data_type: int64
        description: The product of periods per meeting and frequency.
      - name: gradescaleid
        data_type: int64
        description:
          The ID for the grade scale attached to this course. Relates to the
          Gradescale Item table.
      - name: gpa_addedvalue
        data_type: float64
        description:
          Number to be added to GPA for this course. Usually, for AP courses
          there is a bump to the GPA, such as 0.125.
      - name: excludefromgpa
        data_type: int64
        description:
          "Indicates whether this course should be excluded during GPA
          calculations. Valid values:"
      - name: excludefromclassrank
        data_type: int64
        description:
          "Indicates whether this course should be excluded during class
          ranking. Valid values:"
      - name: excludefromhonorroll
        data_type: int64
        description:
          "Indicates whether this course should be excluded during Honor Roll
          calculations. Validvalues:"
      - name: sched_lunchcourse
        data_type: int64
        description:
          Introduced for v3.7 as a way of allowing the user to specify which
          course is the lunchcourse. This information is used during the build
          process in Power Scheduler by thescheduling engine. The scheduling
          engine automatically assigns teachers to this course ifthe teacher has
          been assigned to lunch (see Teachers:Sched_Lunch field). There can
          onlybe one course with this flag set to true.
      - name: sched_do_not_print
        data_type: int64
        description:
          This was introduced for v3.7, as a way of allowing the user of this
          course to specify thatshould not be included when producing Report
          Cards and Transcripts. It was initiallyimplemented for Lunch courses
          but there are additional types of courses that, in effect, arenot
          gradable courses and should not be included on those two reports. One
          example is Study Hall courses.
      - name: exclude_ada
        data_type: int64
        description: "Indicates whether or not to exclude ADA. Valid values:"
      - name: programid
        data_type: int64
        description: Program identifier value. Indexed.
      - name: excludefromstoredgrades
        data_type: int64
        description:
          "Indicates whether this course should be excluded during the
          Permanently Store Gradesfunction. Valid values:"
      - name: maxcredit
        data_type: float64
        description:
          The maximum number of credits a student can receive for taking a
          course. The value mustbe greater than or equal to the Credit Hours.
      - name: iscareertech
        data_type: int64
        description:
          Indicates whether this course is a Career & Technical Education
          course. Valid values:1=True, is a Career Tech course, 0=False.
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
      - name: isfitnesscourse
        data_type: int64
        description:
          "Indicates whether this course conducts fitness tests. Valid values:
          1=True, does conductfitness tests, 0=False. Required. Default 0."
      - name: ispewaiver
        data_type: int64
        description:
          "Indicates whether this course will be alerted to a PE Waiver. Valid
          values: 1=True, will see PE Waiver alert, 0=False. Required. Default
          0."
