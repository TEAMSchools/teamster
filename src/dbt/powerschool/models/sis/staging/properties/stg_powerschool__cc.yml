models:
  - name: stg_powerschool__cc
    description:
      This table maintains the student schedules. It contains information such
      as Section ID, Student ID, Term ID and Teacher ID.
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed. Indexed.
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        constraints:
          - type: primary_key
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        constraints:
          - type: foreign_key
      - name: sectionid
        data_type: int64
        description:
          The internal number and ID of the associated Sections record.
        constraints:
          - type: foreign_key
      - name: section_number
        data_type: string
        description:
          The section number associated with this class. This is implied by the
          Section ID but stored here forconvenience.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: studyear
        data_type: int64
        description:
          The Student ID * 100 + Year ID. Speeds selection of student courses
          this year. Indexed.
      - name: termid
        data_type: int64
        description:
          The internal number for the term to which this CC record is
          associated. Indexed.
      - name: dateenrolled
        data_type: date
        description: The date the student was enrolled in the class. Indexed.
      - name: dateleft
        data_type: date
        description: The date the student exited the class. Indexed.
      - name: course_number
        data_type: string
        description:
          The course number associated with this class. This is implied by the
          Section ID but stored here forconvenience. Indexed.
      - name: teacherid
        data_type: int64
        description:
          The internal identification number of the teacher in the associated
          School Staff record. Indexed.
      - name: currentabsences
        data_type: int64
        description:
          A precalculated total of absences this student has in this course.
      - name: currenttardies
        data_type: int64
        description:
          A precalculated total of tardies this student has in this course.
      - name: abs_termid
        data_type: int64
      - name: abs_sectionid
        data_type: int64
      - name: yearid
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: fiscal_year
        data_type: int64
