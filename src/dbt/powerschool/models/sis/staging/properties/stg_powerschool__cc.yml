models:
  - name: stg_powerschool__cc
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            contains_pii: false
      - name: sectionid
        data_type: int64
        description:
          The internal number and ID of the associated Sections record.
        config:
          meta:
            contains_pii: false
      - name: section_number
        data_type: string
        description:
          The section number associated with this class. This is implied by the
          SectionID but stored here forconvenience.
        config:
          meta:
            contains_pii: false
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            contains_pii: false
      - name: studyear
        data_type: int64
        description:
          The Student ID * 100 + YearID. Speeds selection of student courses
          this year. Indexed.
        config:
          meta:
            contains_pii: false
      - name: termid
        data_type: int64
        description:
          The internal number for the term to which this CC record is
          associated. Indexed.
        config:
          meta:
            contains_pii: false
      - name: dateenrolled
        data_type: date
        description: The date the student was enrolled in the class. Indexed.
        config:
          meta:
            contains_pii: false
      - name: dateleft
        data_type: date
        description: The date the student exited the class. Indexed.
        config:
          meta:
            contains_pii: false
      - name: course_number
        data_type: string
        description:
          The course number associated with this class. This is implied by the
          SectionID but stored here forconvenience. Indexed.
        config:
          meta:
            contains_pii: false
      - name: teacherid
        data_type: int64
        description:
          The internal identification number of the teacher in the associated
          SchoolStaff record. Indexed.
        config:
          meta:
            contains_pii: false
      - name: currentabsences
        data_type: int64
        description:
          A precalculated total of absences this student has in this course.
        config:
          meta:
            contains_pii: false
      - name: currenttardies
        data_type: int64
        description:
          A precalculated total of tardies this student has in this course.
        config:
          meta:
            contains_pii: false
      - name: abs_termid
        data_type: int64
      - name: abs_sectionid
        data_type: int64
      - name: yearid
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: fiscal_year
        data_type: int64
    description:
      This table maintains the student schedules. It contains information such
      as Section ID, Student ID, Term ID and Teacher ID.
