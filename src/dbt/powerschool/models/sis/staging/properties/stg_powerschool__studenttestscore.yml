models:
  - name: stg_powerschool__studenttestscore
    columns:
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            contains_pii: false
      - name: testscoreid
        data_type: int64
        description:
          The internal number for the testscore with which this record is
          associated. Indexed.
        config:
          meta:
            contains_pii: false
      - name: studenttestid
        data_type: int64
        description:
          The internal number for the studenttest with which this record is
          associated. Indexed.
        config:
          meta:
            contains_pii: false
      - name: numscore
        data_type: float64
        description: The numeric score student received for this test.
        config:
          meta:
            contains_pii: false
      - name: percentscore
        data_type: float64
        description: The percentage score student received for this test.
        config:
          meta:
            contains_pii: false
      - name: readonly
        data_type: int64
        description:
          "Indicator that the test score has been transferred from another
          district using HET and is read only and unableto be changed at the
          current district. Valid values: 1=Read Only, 0=Writable. Required.
          Default 0."
        config:
          meta:
            contains_pii: false
      - name: alphascore
        data_type: string
        description: The letter grade student received for this test.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.
        config:
          meta:
            contains_pii: false
      - name: notes
        data_type: string
        description: Descriptive notes about the student's test performance.
        config:
          meta:
            contains_pii: false
