models:
  - name: stg_powerschool__gpprogresssubjectenrolled
    description:
      For reporting purposes, this table contains the credits per course in
      which the student is currently enrolled and required by their graduation
      plan. Data assessed byselecting a group of students and then navigating to
      [Select Function] arrow > Graduation Progress Report Data Capture (or
      Special Functions > GroupFunctions > Graduation Progress Report Data
      Capture).
    columns:
      - name: coursenumber
        data_type: string
        description: Value obtained from CC.
      - name: id
        data_type: int64
        description:
          A unique sequential number generated by the Power School. Required.
          Indexed.
      - name: gpprogresssubjectid
        data_type: int64
        description:
          Internal number for the associated GPProgress Subject
          record.  Indexed. Required.
      - name: ccdcid
        data_type: int64
        description:
          Internal number for the associated CC record. Required. Indexed.
      - name: enrolledcredits
        data_type: float64
        description:
          Number of enrolled credits. Values obtained from the Courses table.
          Defaults to 0.
