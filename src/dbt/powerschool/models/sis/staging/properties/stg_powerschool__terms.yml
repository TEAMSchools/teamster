models:
  - name: stg_powerschool__terms
    description:
      Term related information used for the school such as Semester, Full Year,
      etc.
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
        constraints:
          - type: primary_key
      - name: name
        data_type: string
        description: The common name for this term. Like Semester 1
      - name: firstday
        data_type: date
        description: The first day of the term. Indexed.
      - name: lastday
        data_type: date
        description: The last day of the term.
      - name: abbreviation
        data_type: string
        description:
          The shorter name for the term. This will be the most familiar. Like
          S1.
      - name: importmap
        data_type: string
        description: If importing what code will relate to this term.
      - name: terminfo_guid
        data_type: string
        description:
          Globally unique identifier for this table for SIF compliancy. Indexed.
        constraints:
          - type: primary_key
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson Success Net/Pearson Success Net
          Plus.
        constraints:
          - type: primary_key
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: transaction_date
        data_type: timestamp
        description: Date and time of the database transaction.
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number isequal to the ID of the year term divided by
          100. Indexed.
      - name: noofdays
        data_type: int64
        description:
          Calculated number of days between the dates that have school in
          session.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: yearlycredithrs
        data_type: float64
        description:
          No longer used by the application.This field may still be referenced
          on reports and/or custompages.
      - name: termsinyear
        data_type: int64
        description:
          The number of terms this particular term takes up when looking at the
          LCM. For example aschool with quarters, trimesters, and semesters
          would have an LCM of 12 so one semesterwould take up 6 terms while a
          trimester would take up 4 and the quarter would take up 3 eventhough
          the shortest term is a quarter. This field is used in the scheduling
          engine.
      - name: portion
        data_type: int64
        description:
          The fraction of a year the term takes. A Semester is 1/2 a quarter
          1/4. Internally only thedenominator, the bottom part of the fraction,
          is stored.
      - name: autobuildbin
        data_type: int64
        description: Used when copying the master schedule.
      - name: isyearrec
        data_type: int64
        description:
          A flag indicating if this record is the yearlong term. 1=yes 0=no
      - name: periods_per_day
        data_type: int64
        description: Number of periods in a school day for this term.
      - name: days_per_cycle
        data_type: int64
        description: Number of days for a Cycle for this term.
      - name: attendance_calculation_code
        data_type: int64
        description:
          "Indicates whether positive or negative attendance is used in this
          term. Valid values: 1=Negative,2=Positive. Defaults to 1."
      - name: sterms
        data_type: int64
        description: Number of scheduling terms in a school year.
      - name: suppresspublicview
        data_type: int64
        description:
          A flag indicating if sections that meet for this term should be shown
          in the Public Portal and Mobile App. 1 = suppressed, 0 = not
          suppressed
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
      - name: academic_year
        data_type: int64
      - name: fiscal_year
        data_type: int64
      - name: semester
        data_type: string
