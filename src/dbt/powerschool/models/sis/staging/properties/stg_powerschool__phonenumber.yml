models:
  - name: stg_powerschool__phonenumber
    description:
      This table is used to store all the phone numbers related to any Person.
    columns:
      - name: phonenumber
        data_type: string
        description:
          Phone number of the person in digits only. Indexed. Required. Phone
          Number with Phone Number Ext mustbe unique.
        config:
          meta:
            contains_pii: true
      - name: phonenumberext
        data_type: string
        description:
          Extension digits extracted from Person Phone Number
          Assoc.phonenumberasentered. Characters limited tonumbers only. Indexed
          with Phone Number. Optional.
        config:
          meta:
            contains_pii: true
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: phonenumberid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
        constraints:
          - type: primary_key
      - name: issms
        data_type: int64
        description:
          "Indicates whether or not the SMS feature is enabled. Valid values: 1=
          Enabled, 0=Disabled. Defaults to 0.Required."
