models:
  - name: stg_powerschool__studentrace
    columns:
      - name: racecd
        data_type: string
        description:
          User-defined code for the race of the indicated student. Corresponds
          to name in Gen where cat = 'Race'.Gen.value indicates FedCode,
          gen.valueT indicates description and gen.value2 indicates the SIF
          code.
      - name: whocreated
        data_type: string
        description:
          Name of person who invoked the rule evaluation. Defaults to user.
      - name: whomodified
        data_type: string
        description:
          Name of person who last invoked the rule evaluation. Defaults to user.
      - name: whencreated
        data_type: timestamp
        description: Created Timestamp. Defaults to system date.
      - name: whenmodified
        data_type: timestamp
        description: Modified Timestamp. Defaults to system date.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson SuccessNet/Pearson SuccessNet
          Plus.
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
