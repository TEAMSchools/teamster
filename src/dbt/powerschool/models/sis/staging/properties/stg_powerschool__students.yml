models:
  - name: stg_powerschool__students
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is notguaranteed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: lastfirst
        data_type: string
        description: Last, First, Mi. Indexed.
        config:
          meta:
            contains_pii: true
      - name: first_name
        data_type: string
        description: Students' first name.
        config:
          meta:
            contains_pii: true
      - name: middle_name
        data_type: string
        description: Student's middle name.
        config:
          meta:
            contains_pii: true
      - name: last_name
        data_type: string
        description: Students last name.
        config:
          meta:
            contains_pii: true
      - name: gender
        data_type: string
        description: M=Male F=Female. Indexed.
        config:
          meta:
            contains_pii: false
      - name: entrydate
        data_type: date
        description:
          The date the student enrolled in school for the current enrollment.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: exitdate
        data_type: date
        description:
          The date the student exited for the current/last enrollment. This is
          the day after a student-attended class. For example, if the last day
          the student is in school is a Wednesday, Thursdayis the exit day.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: web_id
        data_type: string
