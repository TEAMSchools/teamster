        description: Date of birth.
        config:
          meta:
            contains_pii: true
      - name: street
        data_type: string
        description: Student's street address.
        config:
          meta:
            contains_pii: true
      - name: city
        data_type: string
        description: City element of the students address.
        config:
          meta:
            contains_pii: true
      - name: state
        data_type: string
