        description: Student Number assigned by the school. Indexed.
        config:
          meta:
            contains_pii: false
      - name: sched_loadlock
        data_type: int64
        description:
          This field will lock individual students' schedules from Load.
        config:
          meta:
            contains_pii: false
      - name: sched_lockstudentschedule
        data_type: int64
        description:
          "True/False: True (selected)=Do not allow the schedule to be changed
          by PowerScheduler.False (deselected)=Schedule this student when the
          scheduling engine is run."
        config:
          meta:
            contains_pii: false
      - name: sched_nextyeargrade
        data_type: int64
        description:
          The grade the student is going to be in next year. If the student is
          being retained, this shouldbe the same as the current grade level.
        config:
          meta:
            contains_pii: false
      - name: sched_priority
        data_type: int64
        description:
          Indicates when you want this student to be scheduled in relation to
          the other students. Thelower the number, the sooner he or she is
          scheduled.
        config:
          meta:
            contains_pii: false
      - name: sched_scheduled
        data_type: int64
        description:
          A flag indicating if this student has had a schedule built for them.
          True means they do have aschedule and another will not be made unless
          the engine is told to reschedule regardless ofthis flag. False, the
          engine will build a schedule for this student next time.
        config:
          meta:
            contains_pii: false
      - name: sched_yearofgraduation
        data_type: int64
        description:
          Year of graduation. This changes if the student fails or skips a
          grade.
        config:
          meta:
            contains_pii: false
      - name: schoolentrygradelevel
        data_type: int64
        description: Grade level of the student for entering into this school.
        config:
          meta:
            contains_pii: false
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            contains_pii: false
      - name: sdatarn
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: simple_gpa
        data_type: float64
        description:
          The simple GPA for the student as of the last time GPA calculations
          ran.
        config:
          meta:
            contains_pii: false
      - name: simple_pct
        data_type: float64
        description:
          The simple percent GPA for the student as of the last time GPA
          calculations ran.
        config:
          meta:
            contains_pii: false
      - name: state_enrollflag
        data_type: int64
        description:
          True/False. Used for state reporting to indicate he or she is enrolled
          at the state level.
        config:
          meta:
            contains_pii: false
      - name: state_excludefromreporting
        data_type: int64
        description:
          True/False. Used for state reports to exclude certain students from
          reports. Most often, thesewill be special education students who are
          reported differently.
        config:
          meta:
            contains_pii: false
      - name: student_allowwebaccess
        data_type: int64
        description:
          "Allow student user webID to log in to parent/student page: 1=Yes 0=No"
        config:
          meta:
            contains_pii: false
      - name: summerschoolid
        data_type: int64
        description:
          School Identifier for this Student's Summer School, if applicable.
        config:
          meta:
            contains_pii: false
      - name: teachergroupid
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: tuitionpayer
        data_type: int64
        description:
          "This is an integer code used to represent the tuition status of a
          student. For AZ: 1=State-funded 2=Privately paid or no tuition"
        config:
          meta:
            contains_pii: false
      - name: whomodifiedid
        data_type: int64
      - name: wm_createtime
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: wm_tier
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: gender_code
        data_type: string
      - name: ethnicity_code
        data_type: string
    description:
      This table maintains Student demographics and other School related
      information such as Lunch ID, Grade Level and scheduling data.
