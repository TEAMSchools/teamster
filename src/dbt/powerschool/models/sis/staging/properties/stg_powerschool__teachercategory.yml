models:
  - name: stg_powerschool__teachercategory
    description:
      This table contains all categories used by a teacher to classify their
      assignments.
    columns:
      - name: name
        data_type: string
        description: The name of the category.
      - name: description
        data_type: string
        description: The description of the category.
      - name: categorytype
        data_type: string
        description:
          "The type of category, such as Homework, Project, etc. Valid values:
          user, district. Required."
      - name: color
        data_type: string
        description:
          "The color assigned to the category for display purposes. Valid
          values: Red, Yellow, Blue, Orange,Purple, Green, etc..."
      - name: defaultpublishstate
        data_type: string
        description: The default publish state for this category.
      - name: defaultpublishoption
        data_type: string
        description: The default publish option for this category.
      - name: defaultscoretype
        data_type: string
        description: The default score type for this category.
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: ip_address
        data_type: string
      - name: whomodifiedtype
        data_type: string
      - name: transaction_date
        data_type: timestamp
      - name: executionid
        data_type: string
      - name: teachercategoryid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by Power School.
          Required. Indexed.
      - name: districtteachercategoryid
        data_type: int64
        description:
          Foreign key. The ID of a district category that has been related to
          the teacher category record.Internal number for the associated
          District Teacher Category.District Teacher Category ID record.Indexed.
      - name: usersdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated user DCID record.
          Required. Indexed.
      - name: isinfinalgrades
        data_type: int64
        description:
          "Indicates if this record should be included in the final grade. Valid
          values: 1=Yes, 0=No. Defaults to1. Required."
      - name: isactive
        data_type: int64
        description:
          "Indicates if the category is active for use by the teacher. Valid
          values: 1=Yes=Active,0=No=Disabled. Defaults to 1. Required."
      - name: isusermodifiable
        data_type: int64
        description:
          "Indicates if this record can be modified by the teacher. Valid
          values: 1=Yes, 0=No. Defaults to 1.Required."
      - name: teachermodified
        data_type: int64
        description:
          "Indicates if the teacher modified the record. Valid values: 1=Yes,
          0=No. Defaults to 0. Required."
      - name: displayposition
        data_type: int64
        description:
          Persists a value to maintain the desired display position in the
          application. Required.
      - name: defaultscoreentrypoints
        data_type: numeric
      - name: defaultextracreditpoints
        data_type: numeric
        description: The default extra credit points for this category.
      - name: defaultweight
        data_type: numeric
        description: The default weight for this category.
      - name: defaulttotalvalue
        data_type: numeric
        description: The default total value for this category.
      - name: isdefaultpublishscores
        data_type: int64
        description:
          "Indicates if the scores are published by default. Valid values:
          1=Yes, 0=No. Defaults to 1.Required."
      - name: defaultdaysbeforedue
        data_type: int64
        description: The default days before due.
      - name: whomodifiedid
        data_type: int64
