models:
  - name: stg_powerschool__testscore
    columns:
      - name: name
        data_type: string
        description:
          Name provided for this test score (e.g. Verbal, Math) or fitness score
          (e.g. Pull-Ups, One-Mile Run).
        config:
          meta:
            contains_pii: false
      - name: description
        data_type: string
        description:
          An optional area to describe any information about this item.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.
        config:
          meta:
            contains_pii: false
      - name: importcode
        data_type: string
        description:
          A code used to maintain the test hierarchy during import using Data
          Import Manager
        config:
          meta:
            contains_pii: false
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: testid
        data_type: int64
        description:
          The internal number for the test with which this record is associated.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: sortorder
        data_type: int64
        description: Order these records will appear for the same test ID
        config:
          meta:
            contains_pii: false
