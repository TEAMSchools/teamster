models:
  - name: stg_powerschool__assignmentcategoryassoc
    description:
      This table allows the association of multiple categories to an assignment.
    columns:
      - name: assignmentcategoryassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
        constraints:
          - type: primary_key
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: transaction_date
        data_type: timestamp
        description: Date and time of the database transaction.
      - name: executionid
        data_type: string
        description: Unique identifier for the database transaction.
      - name: assignmentsectionid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Assignment
          Section.Assignment Section IDrecord. Required. Indexed.
        constraints:
          - type: foreign_key
      - name: teachercategoryid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Teacher
          Category.Teacher Category ID record.Required. Indexed.
        constraints:
          - type: foreign_key
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The numberis equal to the ID of the year term divided by
          100. Maintained in the Terms table.
      - name: isprimary
        data_type: int64
        description:
          "Indicates whether this category a primary category. Valid values:
          1=Yes, 0=No. Required."
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
