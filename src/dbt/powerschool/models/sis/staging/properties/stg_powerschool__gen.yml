models:
  - name: stg_powerschool__gen
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: cat
        data_type: string
        description:
          "The category the element belongs to. These are the options: Blank,
          wc, per, stdconv, att, logtype, stdconvscale,cit, access, styles,
          groups, feetype, storedsearch, training, printers, ethnicity, hsn,
          coursegroups, dailyatt,activity, subtype, pgfield, consequence,
          teachergroups, nextschools, exitcodes, specprog,
          dailymembtypes,ipadminallow. Indexed."
      - name: name
        data_type: string
        description: The name of the item. Indexed.
      - name: value
        data_type: string
        description: The value of the item stored in an alpha field.
      - name: valuet
        data_type: string
        description: The value of the item stored in a text field.
      - name: value2
        data_type: string
        description: The value of the item stored in an alpha field.
      - name: valuet2
        data_type: string
        description: The value of the item stored in a text field.
      - name: powerlink
        data_type: string
        description: How Power Link will read this item.
      - name: powerlinkspan
        data_type: string
        description: How Power Link will read this item in Spanish.
      - name: date_value
        data_type: date
        description:
          The value of the item stored in a date field. For reporting this would
          be the build date.
      - name: date2
        data_type: date
        description:
          The value of the item stored in a date field. For reporting this would
          be the response date.
      - name: log
        data_type: string
        description:
          Log of what this record, such as GPA calculation methods or report
          Builds.
      - name: value_x
        data_type: bytes
        description: The value of the item stored in a BLOB field.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson Success Net/Pearson Success Net
          Plus.
      - name: valueli
        data_type: int64
        description: The value of the item stored in a long integer field.
      - name: valueli2
        data_type: int64
        description: The value of the item stored in a long integer field.
      - name: valuer
        data_type: float64
        description: The value of the item stored in a real number field.
      - name: sortorder
        data_type: int64
        description:
          For multi item lists where should this one be displayed. Sorted
          numerically lowest to highest.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: valueli3
        data_type: int64
        description: The value of the item stored in a long integer field.
      - name: valuer2
        data_type: float64
        description: The value of the item stored in a real number field.
      - name: time1
        data_type: int64
        description:
          The value of the item stored in a date field. For reporting this would
          be the build time.
      - name: time2
        data_type: int64
        description:
          The value of the item stored in a date field. For reporting this would
          be the response time.
      - name: spedindicator
        data_type: int64
        description:
          Used to indicate for reporting if you need SPED kids. True=Yes SPED
          Kids False=No SPED kids.
      - name: valueli4
        data_type: int64
        description:
          The value of the item stored in a long integer field. Currently this
          is used for Excused Attendance code for aparticular school.
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number is equal to the ID of the year term divided by
          100. Maintained in the Terms table. Indexed.
