models:
  - name: stg_powerschool__assignmentscore
    columns:
      - name: assignmentscoreid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
      - name: assignmentsectionid
        data_type: int64
        description:
          Foreign key. Internal number for the associated AssignmentSection
          AssignmentSectionIDrecord. Required. Indexed.
      - name: isexempt
        data_type: int64
        description:
          "Indicates whether this assignment is exempt. Valid values: 1=Yes,
          0=No. Defaults to 0.Required."
      - name: islate
        data_type: int64
        description:
          "Indicates whether this assignment was collected late. Valid values:
          1=Yes, 0=No. Defaults to 0.Required."
      - name: ismissing
        data_type: int64
        description:
          "Indicates whether this assignment is missing. Valid values: 1=Yes,
          0=No. Defaults to 0.Required."
      - name: studentsdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated students DCID record.
          Required. Indexed.
      - name: scorepoints
        data_type: float64
        description: Indicates the number of points for a score.
      - name: actualscoreentered
        data_type: string
        description:
          Identifies the score entered for this assignment. This field may be
          Null.
    description:
      This table tracks assignment scores entered for a student in a specific
      section. Comments associated with the assignment score record, whether
      there are retakes ornot, display a Null value in the
      AssignmentRetakeScoreID field of the AssignmentScoreComment field.
      Properties related to the score are also stored in this table.
