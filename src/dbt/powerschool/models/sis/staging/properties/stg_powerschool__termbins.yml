models:
  - name: stg_powerschool__termbins
    description:
      Term information associated for Grading is maintained in this table.
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
      - name: storecode
        data_type: string
        description:
          The code used to store grades for this term. Often matches the term
          abbreviation. Must be one letter thenone number. Indexed.
      - name: date1
        data_type: date
        description: The start date for the grades being stored.
      - name: creditstring
        data_type: string
        description:
          Converted Credit Pct field to a string with the % symbol in it.
      - name: collectiondate
        data_type: date
        description:
          Date the data is to be collected. This is usually the Terms last day.
      - name: description
        data_type: string
        description: A short text description for this record to help the user.
      - name: date2
        data_type: date
        description: The end date for the grades being stored.
      - name: citasmt
        data_type: string
        description: Indicates whether citizenship is being stored.
      - name: changegradeto
        data_type: string
        description: The grade to change to if attendance points are exceeded.
      - name: excludedmarks
        data_type: string
        description:
          A list of grades that get excluded from storages. Like pass-fail.
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: transaction_date
        data_type: timestamp
        description: Date and time of the database transaction.
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: termid
        data_type: int64
        description:
          The internal number for the term with which this record is associated.
          Indexed.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: creditpct
        data_type: float64
        description:
          The percentage amount of credit to multiply the potential credit by.
      - name: collect
        data_type: int64
        description: This is always set to 1 but not currently used.
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number is equal tothe ID of the year term divided by
          100.
      - name: showonspreadsht
        data_type: int64
        description:
          Used to show the credit factor in terms of portion of part of the year
          the term takes up. This would benumerator in a fraction. Full year=1,
          semester=2, quarter=4, etc.
      - name: currentgrade
        data_type: int64
      - name: storegrades
        data_type: int64
        description: The current PG grade this is going to store
      - name: numattpoints
        data_type: float64
        description:
          The number of attendance points that will trigger a grade change at
          that point or higher.
      - name: suppressltrgrd
        data_type: int64
        description:
          Flag to say if the letter grade should be restrained from displaying.
      - name: gradescaleid
        data_type: int64
        description:
          The gradescale to use on this storage, overriding the default for the
          courses.
      - name: suppresspercentscr
        data_type: int64
        description:
          Indicates whether or not to suppress showing the Percent score on
          quick lookups.
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
      - name: storecode_type
        data_type: string
      - name: storecode_order
        data_type: string
      - name: is_current_term
        data_type: boolean
      - name: semester
        data_type: string
