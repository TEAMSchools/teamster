models:
  - name: stg_powerschool__districtteachercategory
    columns:
      - name: name
        data_type: string
        description: The unique name of the category. Required.
      - name: description
        data_type: string
        description: The description of the category.
      - name: color
        data_type: string
        description:
          "Indicates the color displayed for the assignment. Valid values: Red,
          Yellow, Blue, Orange,Purple, Green, etc... Required."
      - name: defaultpublishstate
        data_type: string
        description: The default publish state for this category.
      - name: defaultpublishoption
        data_type: string
        description: The default publish option for this category.
      - name: defaultscoretype
        data_type: string
        description: The default score type for this category.
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: ip_address
        data_type: string
      - name: whomodifiedtype
        data_type: string
      - name: transaction_date
        data_type: timestamp
      - name: executionid
        data_type: string
      - name: districtteachercategoryid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
      - name: isinfinalgrades
        data_type: int64
        description:
          "Indicates if the assignment is included in the final grade. Valid
          values: 1=Yes, 0=No. Defaults to1. Required."
      - name: isactive
        data_type: int64
        description:
          "Indicates if the assignment is active. Valid values: 1=Yes=Active,
          0=No=Disabled. Defaults to 1.Required."
      - name: isusermodifiable
        data_type: int64
        description:
          "Indicates if the assignment record is modifiable by the user. Valid
          values: 1=Yes, 0=No. Defaultsto 1. Required."
      - name: displayposition
        data_type: int64
        description:
          Persists a value to maintain the desired display position in the user
          interface. Defaults to 9999.Required.
      - name: defaultscoreentrypoints
        data_type: numeric
        description: The default score entry points for this category.
      - name: defaultextracreditpoints
        data_type: numeric
        description: The default extra credit points for this category.
      - name: defaultweight
        data_type: numeric
        description: The default weight for this category.
      - name: defaulttotalvalue
        data_type: numeric
        description: The default total value for this category.
      - name: isdefaultpublishscores
        data_type: int64
        description:
          "Indicates the default behavior for publishing scores for this
          category. Valid values: 1=Yes, 0=No.Defaults to 0. Required."
      - name: defaultdaysbeforedue
        data_type: int64
        description: The default days before due.
      - name: whomodifiedid
        data_type: int64
    description:
      This table contains all of the categories defined by the district.
      Categories are then associated for use in specific schools using the
      CategorySchoolAssoc table.
