models:
  - name: stg_powerschool__sections
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
        config:
          meta:
            contains_pii: false
      - name: section_number
        data_type: string
      - name: course_number
        data_type: string
        description: The course number associated with this section. Indexed.
        config:
          meta:
            contains_pii: false
      - name: period_obsolete
        data_type: string
        description:
          Used for backward compatibility. These indicate the period for this
          section. Changed to Expressions.Indexed.
        config:
          meta:
            contains_pii: false
      - name: room
        data_type: string
        description:
          The room number the section is in. This is not presently tied to
          PowerScheduler, so it will need to beimported or entered manually.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: fastperlist
        data_type: string
        description:
          Stored string representation of term ID + Period for the section for
          query purposes. Indexed.
        config:
          meta:
            contains_pii: false
      - name: ccrnarray
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: attendance
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: lastattupdate
        data_type: date
        description:
          The date a teacher last took attendance in this class using either
          PowerTeacher or PowerGrade.Indexed.
        config:
          meta:
            contains_pii: false
      - name: pgflags
        data_type: string
        description:
          This field holds all the PowerGrade flags for this particular section.
        config:
          meta:
            contains_pii: false
      - name: days_obsolete
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: gradeprofile
        data_type: string
        description: Used for Delta communication.
        config:
          meta:
            contains_pii: false
      - name: log
        data_type: string
        description:
          Used with AutoComm for determining which duplicate section to use or
          not.
        config:
          meta:
            contains_pii: false
      - name: teacherdescr
        data_type: string
        description:
          The teachers' description for the class entered in PowerGrade that
          appears in PowerSchool Parent.
        config:
          meta:
            contains_pii: false
      - name: blockperiods_obsolete
        data_type: string
        description:
          Used for backward compatibility. These indicate the block of periods
          this section spans. Changed toExpressions.
        config:
          meta:
            contains_pii: false
      - name: dependent_secs
        data_type: string
        description:
          Text string holding the course numbers of dependent sections.
        config:
          meta:
            contains_pii: false
      - name: expression
        data_type: string
        description:
          The internal schedule expression for the section, which is a
          representation of the day and period itis offered. May contain
          multiple if offered over several days, such as 2(A) would be read as
          2ndperiod A days.
        config:
          meta:
            contains_pii: false
      - name: bitmap
        data_type: bytes
        description:
          A binary string holding the actual schedule for the class. Some can
          understand this string, but theschedule expression is the text
          representation of this.
        config:
          meta:
            contains_pii: false
      - name: original_expression
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
        config:
          meta:
            contains_pii: false
      - name: comment_value
        data_type: string
        description:
          in5.2.0 BLOB An optional area to describe any information about this
          item in one field.
        config:
          meta:
            contains_pii: false
      - name: section_type
        data_type: string
      - name: team
        data_type: string
        description:
          This field identifies the team to which the section is assigned, if
          any, and is necessary to continuesupport of scheduling students by
          team in Automated Walk-In scheduling. This will be capturedduring the
          PowerScheduler commit process from ScheduleSections:Team.
        config:
          meta:
            contains_pii: false
      - name: house
        data_type: string
        description:
          This field identifies the house to which the section is assigned, if
          any, and is necessary to continuesupport of scheduling students by
          house in Automated Walk-In scheduling. This field will becaptured
          during the PowerScheduler commit process from ScheduleSections:House.
          There is nocurrent effort identified to expose this field for editing
          or viewing in PowerAdmin.
        config:
          meta:
            contains_pii: false
      - name: instruction_lang
        data_type: string
        description:
          Currently only used by State Reporting. Maintains the language of
          instruction for this section.
        config:
          meta:
            contains_pii: false
      - name: sectioninfo_guid
        data_type: string
        description:
          Globally unique identifier for this table for SIF compliancy. Indexed.
        config:
          meta:
            contains_pii: false
      - name: att_mode_code
        data_type: string
      - name: max_load_status
        data_type: string
        description:
          Varchar2(24) Used to identify those teachers who are scheduled to
          teach more students in a day than is allowedby their contract.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus. Indexed.
        config:
          meta:
            contains_pii: false
      - name: external_expression
        data_type: string
        description:
          The external schedule expression for the section is similar to the
          expression (internal) however theexternal expression is represented
          using the school/year period and day abbreviations.  Populatedfor
          Sections.TermID >= 2500.
        config:
          meta:
            contains_pii: false
      - name: ip_address
        data_type: string
      - name: whomodifiedtype
        data_type: string
      - name: transaction_date
        data_type: timestamp
      - name: teacher
        data_type: int64
        description:
          The internal ID of the associated primary section teacher record for
          this particular section. Indexed.
        config:
          meta:
            contains_pii: false
      - name: termid
        data_type: int64
        description: The internal number for the term for this section. Indexed.
        config:
          meta:
            contains_pii: false
      - name: no_of_students
        data_type: int64
        description: The number of students currently enrolled in this section.
        config:
          meta:
            contains_pii: false
      - name: schoolid
        data_type: int64
        description:
          The School_Number of the associated Schools record. Indexed.
        config:
          meta:
            contains_pii: false
      - name: noofterms
        data_type: int64
        description: The number of terms this particular section spans.
        config:
          meta:
            contains_pii: false
      - name: trackteacheratt
        data_type: int64
        description:
          Designates if this section should be included when referencing the
          teacher table report.
        config:
          meta:
            contains_pii: false
      - name: maxenrollment
        data_type: int64
        description: The maximum number of students for this particular section.
        config:
          meta:
            contains_pii: false
      - name: distuniqueid
        data_type: int64
        description:
          The unique number for this section district-wide. Used for delta
          download.
        config:
          meta:
            contains_pii: false
      - name: wheretaught
        data_type: int64
        description:
          A field for the USOE report. School ID of where this section is being
          taught if other than currentschool. 0=Current School.
        config:
          meta:
            contains_pii: false
      - name: rostermodser
        data_type: int64
        description:
          Roster-modified serial number. This number is incremented by one each
          time a sections roster ischanged. PowerGrade checks to see if the
          numbers match. If not, the roster and serial number aresynchronized.
        config:
          meta:
            contains_pii: false
      - name: pgversion
        data_type: int64
        description:
          Changed datatype from Integer to Integer in 4.0. The version of
          PowerGrade the teacher is using.
        config:
          meta:
            contains_pii: false
      - name: grade_level
        data_type: int64
        description: Maintains the grade level for the section.
        config:
          meta:
            contains_pii: false
      - name: campusid
        data_type: int64
        description:
          No longer used by the application, but still used for copying
          purposes.
        config:
          meta:
            contains_pii: false
      - name: exclude_ada
        data_type: int64
      - name: gradescaleid
        data_type: int64
        description:
          The grade scale associated with the section; could be the same as the
          one for the course.
        config:
          meta:
            contains_pii: false
      - name: excludefromgpa
        data_type: int64
        description:
          "Indicates whether this section should be excluded during GPA
          calculations. Valid values:"
        config:
          meta:
            contains_pii: false
      - name: buildid
        data_type: int64
        description:
          The internal number for the build associated with this section.
        config:
          meta:
            contains_pii: false
      - name: schedulesectionid
        data_type: int64
        description:
          Internal number of the schedule section associated with this section.
        config:
          meta:
            contains_pii: false
      - name: wheretaughtdistrict
        data_type: int64
        description:
          District ID of where this section is being taught if other than
          current district. 0=CurrentDistrict.
        config:
          meta:
            contains_pii: false
      - name: excludefromclassrank
        data_type: int64
      - name: excludefromhonorroll
        data_type: int64
      - name: parent_section_id
        data_type: int64
      - name: attendance_type_code
        data_type: int64
        description: Meeting attendance recording mode.
        config:
          meta:
            contains_pii: false
      - name: maxcut
        data_type: int64
        description:
          This field identifies whether or not enrollment of new students should
          be allowed after the maxenrollment Sections:MaxEnrollment has been
          reached. This is necessary to support max enrollmentin Automated
          Walk-In scheduling. This field will be captured during the
          PowerScheduler commitprocess from ScheduleSections:MaxCut.
        config:
          meta:
            contains_pii: false
      - name: exclude_state_rpt_yn
        data_type: int64
        description:
          Indicates whether or not to include this section record in a state
          report - migrated from customfields.
        config:
          meta:
            contains_pii: false
      - name: sortorder
        data_type: int64
        description: Attendance sort order. Indexed.
        config:
          meta:
            contains_pii: false
      - name: programid
        data_type: int64
        description: Foreign key to the Programs table. Indexed.
        config:
          meta:
            contains_pii: false
      - name: excludefromstoredgrades
        data_type: int64
        description:
          "Indicates whether this section should be excluded during the
          Permanently Store Grades function.Valid values: 0, 1, 2."
        config:
          meta:
            contains_pii: false
      - name: gradebooktype
        data_type: int64
        description:
          "Indicates which gradebook is associated to this section. Valid
          values: Null, 1, 2. Null=Legacy, 1=Thissection is used by PTG, 2=This
          section is used by PowerTeacher Pro."
        config:
          meta:
            contains_pii: false
      - name: whomodifiedid
        data_type: int64
    description:
      Section maintains occurrences of courses in a period and other related
      information such as Teacher and Grade level.
