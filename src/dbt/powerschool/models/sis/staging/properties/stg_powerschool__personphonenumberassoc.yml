models:
  - name: stg_powerschool__personphonenumberassoc
    columns:
      - name: phonenumberasentered
        data_type: string
        description:
          Exact representation of what the user entered, including the
          extension, such as +001 (714) 123-4567 ext 1211. Required.
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: personphonenumberassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
      - name: personid
        data_type: int64
        description:
          PersonID of the associated Person table row pertaining to the phone
          number. Indexed withPhoneTypeCodeSetID and PhoneNumberID. Also Indexed
          with PhoneNumberPriorityOrder.Required.
        config:
          meta:
            contains_pii: true
      - name: phonenumberid
        data_type: int64
        description:
          PhoneNumberID of the associated PhoneNumber table row. Indexed with
          PhoneTypeCodeSetIDand PersonID. Required.
      - name: phonetypecodesetid
        data_type: int64
        description:
          PhoneTypeCodeSetID of the associated CodeSet table row. Indexed with
          PhoneNumberID andPersonID. Required.
      - name: phonenumberpriorityorder
        data_type: int64
        description:
          Indicates the preferred order in which the person’s phone numbers will
          be selected anddisplayed. Defaults to 1. Indexed with PersonID.
          Required.
        config:
          meta:
            contains_pii: true
      - name: ispreferred
        data_type: int64
        description:
          "Indicates if this phone number is preferred. Used to organize
          preferred home and work numbers.Valid values: 0=Not Preferred,
          1=Preferred. Defaults to 0. Required."
        config:
          meta:
            contains_pii: true
    description:
      This table links a Person record with a person’s phone number information.
