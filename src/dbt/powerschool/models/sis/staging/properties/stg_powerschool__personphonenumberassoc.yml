models:
  - name: stg_powerschool__personphonenumberassoc
    description:
      This table links a Person record with a person’s phone number information.
    columns:
      - name: phonenumberasentered
        data_type: string
        description:
          Exact representation of what the user entered, including the
          extension, such as +001 (714) 123-4567 ext 1211. Required.
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: personphonenumberassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
        constraints:
          - type: primary_key
      - name: personid
        data_type: int64
        description:
          Person ID of the associated Person table row pertaining to the phone
          number. Indexed with Phone Type Code Set ID and Phone Number ID. Also
          Indexed with Phone Number Priority Order.Required.
        config:
          meta:
            contains_pii: true
      - name: phonenumberid
        data_type: int64
        description:
          Phone Number ID of the associated Phone Number table row. Indexed with
          Phone Type Code Set IDand Person ID. Required.
        config:
          meta:
            contains_pii: true
      - name: phonetypecodesetid
        data_type: int64
        description:
          Phone Type Code Set ID of the associated Code Set table row. Indexed
          with Phone Number ID and Person ID. Required.
        config:
          meta:
            contains_pii: true
      - name: phonenumberpriorityorder
        data_type: int64
        description:
          Indicates the preferred order in which the person’s phone numbers will
          be selected anddisplayed. Defaults to 1. Indexed with Person ID.
          Required.
        config:
          meta:
            contains_pii: true
      - name: ispreferred
        data_type: int64
        description:
          "Indicates if this phone number is preferred. Used to organize
          preferred home and work numbers.Valid values: 0=Not Preferred,
          1=Preferred. Defaults to 0. Required."
        config:
          meta:
            contains_pii: true
