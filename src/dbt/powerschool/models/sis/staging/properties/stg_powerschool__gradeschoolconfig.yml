models:
  - name: stg_powerschool__gradeschoolconfig
    columns:
      - name: gradeschoolconfigid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: gradecalcpreferenceorder
        data_type: string
        description:
          "Indicates the order of precedence for calculating the grade. For
          example, the course settingsoverride the school setting. Valid values:
          School, Course. Defaults to School. Required."
        config:
          meta:
            contains_pii: false
      - name: defaultroundingrule
        data_type: string
        description:
          "Indicates the default rounding rule at the course level. Valid
          values: Round, Truncate.Defaults to Round. Required."
        config:
          meta:
            contains_pii: false
      - name: calculationmetric
        data_type: string
        description:
          "Indicates how higher-level standards are calculated. Valid values:
          Power, Most_Recent,Mean, Weighted_Mean, Median, Mode, Highest.
          Defaults to Most_Recent. Required."
        config:
          meta:
            contains_pii: false
      - name: higherlevelstndmetric
        data_type: string
        description:
          "Defines the metric to be used for the higher-level standard. Valid
          values: Highest, Mean,Median, Mode, Specific_Weighting, Specific_Sum.
          Defaults to Mean. Required."
        config:
          meta:
            contains_pii: false
      - name: recentscoreweightlist
        data_type: string
        description:
          Indicates the weighting across the most recent scores. The number of
          weight values enteredprovides the number of most recent scores. Stored
          as a comma-separated list. Defaults to1,1,1 (string). Required.
        config:
          meta:
            contains_pii: false
      - name: calcmetricschoolfromstd
        data_type: string
        description:
          Indicates the calculation metric used to calculate standards for the
          school. Valid values:Mean, Median, Mode, Weighted_Mean,
          Specific_Weighting. Defaults to Mean. Required.
        config:
          meta:
            contains_pii: false
      - name: sectionnames
        data_type: string
        description:
          Defines how sections are differentiated/displayed for teachers at a
          school. Valid values:PeriodAndDay, SectionNumber, Alphabetical.
          Defaults to PeriodAndDay. Required.
        config:
          meta:
            contains_pii: false
      - name: standardtraditionalorder
        data_type: string
        description:
          "When both Traditional and Standards are used, which appears first in
          the gradebook. Validvalues: TraditionalFirst=Order by Traditional then
          Standards, StandardsFirst=Order byStandards then Traditional. Defaults
          to TraditionalFirst. Required."
        config:
          meta:
            contains_pii: false
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to the database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to the database
          user. Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: schoolsdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Schools.DCID record.
          Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. Thenumber is equal to the ID of the year term divided by
          100. Maintained in the Terms table.Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: defaultdecimalcount
        data_type: int64
        description:
          "Indicates the default decimal count at the course level. Valid
          values: 0,1,2,3. Defaults to 0.Required."
        config:
          meta:
            contains_pii: false
      - name: iscalcformulaeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation formula. Valid
          values: 1=Yes, 0=No. Defaultsto 1. Required."
        config:
          meta:
            contains_pii: false
      - name: isdropscoreeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the drop score. Valid values:
          1=Yes, 0=No. Defaults to 1.Required."
        config:
          meta:
            contains_pii: false
      - name: iscalcprecisioneditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation precision (number
          of decimal places). Validvalues: 1=Yes, 0=No. Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: iscalcmetriceditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation metric. Valid
          values: 1=Yes, 0=No. Defaults to1. Required."
        config:
          meta:
            contains_pii: false
      - name: isrecentscoreeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the recent score. Valid values:
          1=Yes, 0=No. Defaults to 1.Required."
        config:
          meta:
            contains_pii: false
      - name: ishigherstndautocalc
        data_type: int64
        description:
          "Indicates if the higher standard is auto-calculated. Valid values:
          1=Yes, 0=No. Defaults to 0.Required."
        config:
          meta:
            contains_pii: false
      - name: ishigherstndcalceditable
        data_type: int64
        description:
          "Indicates if the user can edit the higher standard auto calculation.
          Valid values: 1=Yes, 0=No.Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: ishighstandardeditable
        data_type: int64
        description:
          "Indicates if the user can edit the higher standard. Valid values:
          1=Yes, 0=No. Defaults to 1.Required."
        config:
          meta:
            contains_pii: false
      - name: iscalcmetricschooledit
        data_type: int64
        description:
          "Indicates if the user at the school can edit the calculation metric.
          Valid values: 1=Yes, 0=No.Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: isstandardsshown
        data_type: int64
        description:
          "Describes if the standards pages appear in the gradebook. Valid
          values: 1=Yes, 0=No.Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: isstandardsshownonasgmt
        data_type: int64
        description:
          "Describes if teachers are able to associate standards to assignments.
          Valid values: 1=Yes,0=No. Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: istraditionalgradeshown
        data_type: int64
        description:
          "Describes if the traditional grades appear in the gradebook. Valid
          values: 1=Yes, 0=No.Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: iscitizenshipdisplayed
        data_type: int64
      - name: termbinlockoffset
        data_type: int64
        description:
          Number of days after the end of the reporting term that grades should
          be locked. Optional.Default NULL.
        config:
          meta:
            contains_pii: false
      - name: lockwarningoffset
        data_type: int64
      - name: issectstndweighteditable
        data_type: int64
      - name: minimumassignmentvalue
        data_type: int64
      - name: isgradescaleteachereditable
        data_type: int64
      - name: isstandardslimited
        data_type: int64
        description:
          Indicates whether to Limit Assignment Standard Selection to Lowest
          Level. Valid values:1=Yes, 0=No. Defaults to 0.
        config:
          meta:
            contains_pii: false
      - name: isstandardslimitededitable
        data_type: int64
        description:
          "Indicates if the teacher can set Limit Assignment Standard Selection
          to Lowest Level. Validvalues: 1=Yes, 0=No. Defaults to 0."
        config:
          meta:
            contains_pii: false
      - name: isusingpercentforstndautocalc
        data_type: int64
        description:
          "Indicates whether to use the assignment percent score when
          auto-calculating standardsscores. Valid values: 1=Use the assignment
          percent score, 0=Use the earned standard levelvalue. Defaults to 0."
        config:
          meta:
            contains_pii: false
      - name: startingpagekey
        data_type: string
        description:
          The URL specified in StartingPageURL may contain one or more pages
          that can bedisplayed.  This StartingPageKey uniquely identifies the
          page to display as the starting page.
        config:
          meta:
            contains_pii: false
      - name: startingpageurl
        data_type: string
        description:
          The URL for the starting page to use if the teacher has not selected
          their own starting page. Ifnot set, the teacher will start on the
          Assignment List page.
        config:
          meta:
            contains_pii: false
      - name: ismulticategoryallowed
        data_type: int64
      - name: ismulticategoryeditable
        data_type: int64
    description:
      This table contains configuration settings at the school level that can
      affect how grades are calculated and who may edit those settings. In some
      cases, these settingsmay be overridden by course-specific settings.
