models:
  - name: stg_powerschool__personemailaddressassoc
    columns:
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: personemailaddressassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required
        config:
          meta:
            contains_pii: false
      - name: personid
        data_type: int64
        description:
          Identification number of the associated Person table row pertaining to
          the phone number.Indexed. Required.
        config:
          meta:
            contains_pii: true
      - name: emailaddressid
        data_type: int64
        description:
          Unique identifier of the row in the table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: emailtypecodesetid
        data_type: int64
        description:
          Identification number of the associated CodeSet table row. Indexed.
          Required.
        config:
          meta:
            contains_pii: false
      - name: isprimaryemailaddress
        data_type: int64
        description:
          Indicates whether or not the email address is the person’s primary
          email address. Valid values:1=Primary, 0=Not Primary. Defaults to 0.
          Required.
        config:
          meta:
            contains_pii: true
      - name: emailaddresspriorityorder
        data_type: int64
        description:
          Indicates the preferred order in which the person’s email addresses
          will be selected. Defaults to1. Required.
        config:
          meta:
            contains_pii: true
    description:
      This table links a Person record with a person’s email address
      information.
