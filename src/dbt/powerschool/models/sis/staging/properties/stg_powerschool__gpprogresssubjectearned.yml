models:
  - name: stg_powerschool__gpprogresssubjectearned
    description:
      For reporting purposes, this table contains the credits a student earned
      per course for their graduation plan. Data assessed by selecting a group
      of students andthen navigating to [Select Function] arrow > Graduation
      Progress Report Data Capture (or Special Functions > Group Functions >
      Graduation ProgressReport Data Capture).
    columns:
      - name: coursenumber
        data_type: string
        description: Value obtained from the Stored Grades table.
      - name: lettergrade
        data_type: string
        description: Value obtained from the Stored Grades table.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          A unique sequential number generated by the Power School. Required.
          Indexed.
        constraints:
          - type: primary_key
      - name: gpprogresssubjectid
        data_type: int64
        description:
          Internal number for the associated GPProgress Subject record. Indexed.
          Required.
        constraints:
          - type: foreign_key
      - name: storedgradesdcid
        data_type: int64
        description:
          Internal number for the associated Stored Grades record. Required.
          Indexed.
        constraints:
          - type: foreign_key
      - name: earnedcredits
        data_type: float64
        description:
          Number of earned credits. Values obtained from the Stored Grades
          table. Defaults to 0.
      - name: percentgrade
        data_type: float64
        description: Value obtained from the Stored Grades table.
