models:
  - name: stg_powerschool__gpprogresssubjectearned
    columns:
      - name: coursenumber
        data_type: string
        description: Value obtained from the StoredGrades table.
        config:
          meta:
            contains_pii: false
      - name: lettergrade
        data_type: string
        description: Value obtained from the StoredGrades table.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          A unique sequential number generated by the PowerSchool. Required.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: gpprogresssubjectid
        data_type: int64
        description:
          Internal number for the associated GPProgressSubject record. Indexed.
          Required.
        config:
          meta:
            contains_pii: false
      - name: storedgradesdcid
        data_type: int64
        description:
          Internal number for the associated StoredGrades record. Required.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: earnedcredits
        data_type: float64
        description:
          Number of earned credits. Values obtained from the StoredGrades table.
          Defaults to 0.
        config:
          meta:
            contains_pii: false
      - name: percentgrade
        data_type: float64
        description: Value obtained from the StoredGrades table.
        config:
          meta:
            contains_pii: false
    description:
      For reporting purposes, this table contains the credits a student earned
      per course for their graduation plan. Data assessed by selecting a group
      of students andthen navigating to [Select Function] arrow > Graduation
      Progress Report Data Capture (or Special Functions > Group Functions >
      Graduation ProgressReport Data Capture).
