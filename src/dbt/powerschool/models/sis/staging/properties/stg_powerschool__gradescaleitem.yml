models:
  - name: stg_powerschool__gradescaleitem
    columns:
      - name: name
        data_type: string
        description:
          The actual letter grade associated to this record, such as A, B, etc.
        config:
          meta:
            contains_pii: false
      - name: description
        data_type: string
        description:
          The description given to this grade scale item such as Above Average
          or if parent level, APGrade Scale.
        config:
          meta:
            contains_pii: false
      - name: gradescaletype
        data_type: string
        description:
          "Within PowerTeacher Pro, type used when scoring this grade scale.
          Valid values: Alpha,Numeric, Special. Required."
        config:
          meta:
            contains_pii: false
      - name: color
        data_type: string
        description:
          "Within PowerTeacher Pro, indicates the color to be used for this
          grade label. Is paired withproficiency setting. Valid values: 1,2 =
          not proficient, 3,4,5 = proficient"
        config:
          meta:
            contains_pii: false
      - name: numericextras
        data_type: string
        description:
          "Within PowerTeacher Pro, for zero decimal numeric grade scales, this
          value determines ifadditional discrete options are valid:  (HALF_PLUS
          = +, THIRD_PLUS_MINUS = +/-,HALF_POINT_5 = 0.5, THIRD_POINT_33 = 0.33,
          QUARTER_POINT_25 = 0.25, NONE)."
        config:
          meta:
            contains_pii: false
      - name: conversiontonumeric
        data_type: string
        description:
          Within PowerTeacher Pro, when scoring standards this value indicates
          the method of convertingother scales into a numeric scales. Determines
          if a decimal value is allowed. Valid values:Cutoff,  Percent. Defaults
          to NULL.
        config:
          meta:
            contains_pii: false
      - name: altfinalnumericrange
        data_type: string
        description:
          Planned future use. The numeric effective range used for assignments
          and standards in place ofthe course grade scale.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, andPearson SuccessNet/Pearson SuccessNet
          Plus.
        config:
          meta:
            contains_pii: false
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: numericmode
        data_type: string
        description:
          For Scales, where GradeScaleType is NUMERIC, and isForCourseGrade is
          1, determineswhether the PERCENT or LEVEL will be used when
          calculating course final grades
        config:
          meta:
            contains_pii: false
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
        config:
          meta:
            contains_pii: false
      - name: gradescaleid
        data_type: int64
        description:
          The parent ID of this grade scale. If -1, then this is the parent.
          Otherwise, this could be thegeneral grade scale, such as Weighted GPA,
          Total GPA. Indexed.
        config:
          meta:
            contains_pii: false
      - name: isforcoursegrade
        data_type: int64
        description:
          "Within PowerTeacher Pro, indicates if this gradescale applies for the
          final grade for a courseValid values: 0 = No, 1 = Yes. Defaults to 1.
          Required."
        config:
          meta:
            contains_pii: false
      - name: isforstandards
        data_type: int64
        description:
          "Within PowerTeacher Pro, indicates if this gradescale applies to
          standards and standard finalgrades Valid values: 0 = No, 1 = Yes.
          Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: isgpashown
        data_type: int64
        description:
          "1 Indicates the GPA related columns are displayed in the grade scale
          grid. Valid values: 0=No,1=Yes. Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: countsingpa
        data_type: int64
        description:
          "Indicates whether this grade scale item will count toward GPA
          calculation. Valid values: 0 = No,1 = Yes. Defaults to NULL."
        config:
          meta:
            contains_pii: false
      - name: displayposition
        data_type: int64
        description:
          Within PowerTeacher Pro, the sort order of the score codes and other
          special grade labels willappear. For an alpha scale, it also
          determines which item is the default zero cut-off grade labelwhen
          multiple zero cutoffs exist.
        config:
          meta:
            contains_pii: false
      - name: grade_points
        data_type: float64
        description:
          Points associated to this grade. For example, 4 to A, 3 to B, etc.
        config:
          meta:
            contains_pii: false
      - name: addedvalue
        data_type: int64
        description:
          Number to be added to GPA for this grade scale. Usually for AP courses
          there is a bump to theGPA, such as 0.125.
        config:
          meta:
            contains_pii: false
      - name: graduationcredit
        data_type: int64
        description:
          "Indicates whether this grade scale item is high enough to earn
          graduation credit. Valid values: 0= No, 1 = Yes. Default is NULL."
        config:
          meta:
            contains_pii: false
      - name: teacherscale
        data_type: int64
        description:
          "Indicates whether these are valid for Teacher grade scales. Valid
          values: 0=No, 1=Yes. Defaultsto NULL"
        config:
          meta:
            contains_pii: false
      - name: cutoffpercentage
        data_type: float64
        description:
          Anything at or above this percentage points (less than the next
          record) receives the letter gradeof this record.
        config:
          meta:
            contains_pii: false
      - name: value
        data_type: int64
        description: The grade point value assigned to this grade scale.
        config:
          meta:
            contains_pii: false
      - name: colorlevels
        data_type: int64
        description:
          Within PowerTeacher Pro, indicates the number of initial available
          color levels for the gradescale.
        config:
          meta:
            contains_pii: false
      - name: isproficient
        data_type: int64
        description:
          "Within PowerTeacher Pro, indicates this grade label is considered to
          be proficient. Is paired withthe Color Valid values: 0=No, 1=Yes.
          Defaults to 1. Required."
        config:
          meta:
            contains_pii: false
      - name: isscorecodeonassignments
        data_type: int64
        description:
          "Within PowerTeacher Pro, for Special Grade Scales, a 1 indicates that
          the grade label can alsobe used on assignments by the teacher. It is
          an attribute of the item. Valid values: 0=No, 1=Yes."
        config:
          meta:
            contains_pii: false
      - name: modify_code
        data_type: int64
        description:
          "Indicates whether this grade scale can be modified. Valid values:
          0=Locked,1=Modifiable. Defaults to NULL."
        config:
          meta:
            contains_pii: false
      - name: numericmin
        data_type: int64
        description:
          Within PowerTeacher Pro, for a numeric scale, this value indicates the
          minimum numeric integervalue allowed for the grade scale item.
        config:
          meta:
            contains_pii: false
      - name: numericmax
        data_type: int64
        description:
          Within PowerTeacher Pro, for a numeric scale, this value indicates the
          maximum numericinteger value allowed for the grade scale.
        config:
          meta:
            contains_pii: false
      - name: numericdecimals
        data_type: int64
        description:
          Within PowerTeacher Pro, the number of decimal places to be used for
          numeric scales.
        config:
          meta:
            contains_pii: false
      - name: numericcutoff
        data_type: numeric
        description:
          Within PowerTeacher Pro, for a numeric scale, anything at or above
          this numeric value (lessthan the next record) receives the numeric
          grade of this record.
        config:
          meta:
            contains_pii: false
      - name: numericvalue
        data_type: numeric
        description:
          "Within PowerTeacher Pro,. For a numeric scale, the numeric value of
          the scale item. Necessaryfor mapping numeric items with extras. ex: 4-
          = 3.67"
        config:
          meta:
            contains_pii: false
      - name: hasspecialgrades
        data_type: int64
        description:
          "Within PowerTeacher Pro, 1 indicates a special grade scale is used in
          conjunction with thisgrade scale. Valid values: 0 = No, 1 = Yes.
          Defaults to 0. Required."
        config:
          meta:
            contains_pii: false
      - name: specialgradescaledcid
        data_type: int64
        description:
          Within PowerTeacher Pro, internal number of the associated grade scale
          item record containingthe special grade scale. No value for grade
          label records.
        config:
          meta:
            contains_pii: false
      - name: hasrelatedscales
        data_type: int64
        description:
          "Planned future use. 1 indicates other alpha and numeric grades scales
          can be used inconjunction with this grade scale. Valid values: 0 = No,
          1 = Yes. Defaults to 0. Required."
        config:
          meta:
            contains_pii: false
      - name: altconvertgradescaledcid
        data_type: int64
        description:
          Planned future use. Internal number of the associated grade scale item
          record containing thealternate assignment conversion grade scale to be
          used in place of the course grade scale.
        config:
          meta:
            contains_pii: false
      - name: altfinalnumericcutoff
        data_type: numeric
        description:
          Planned future use. The numeric final grade conversion cutoff used for
          assignments andstandards in place of the course grade scale.
        config:
          meta:
            contains_pii: false
      - name: istermweightingshown
        data_type: int64
        description:
          "1 Indicates the term weighting related columns are displayed in the
          grade scale grid. Validvalues: 0=No, 1=Yes.Defaults to 0. Required."
        config:
          meta:
            contains_pii: false
      - name: alt_grade_points
        data_type: int64
        description: Alternate grade point value.
        config:
          meta:
            contains_pii: false
      - name: cutoffpoints
        data_type: int64
        description:
          Similar to the cutoff for percentage, except that this field will
          specify the point's demarcationrather than the percentage.
        config:
          meta:
            contains_pii: false
      - name: excludefromafg
        data_type: int64
        description:
          "Flag to specify that this record should be excluded from the average
          final grade calculation.Valid values: 0 = False, 1 = True. Defaults to
          NULL."
        config:
          meta:
            contains_pii: false
      - name: grade_replacement_policy
        data_type: int64
        description:
          "Indicates whether the repeated course grade suppression policy rule
          has been enabled for thisgrade. Valid values: 0 = False, 1 = True.
          Defaults to 0."
        config:
          meta:
            contains_pii: false
      - name: parentgradescaledcid
        data_type: int64
    description:
      "This table contains grade scale and grade label information. Note: The
      GradeScaleItem (ver3.6.1) table is no longer used by the application and
      has been renamed GradeScaleItem_Backup. For more information, seethe
      GradeScaleItem_Backup table."
