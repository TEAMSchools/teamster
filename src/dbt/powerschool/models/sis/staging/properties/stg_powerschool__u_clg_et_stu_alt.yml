models:
  - name: stg_powerschool__u_clg_et_stu_alt
    columns:
      - name: exit_code
        data_type: string
      - name: exit_date
        data_type: date
      - name: whocreated
        data_type: string
        description: User login that created the record.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
      - name: whomodified
        data_type: string
        description: User login that last modified the record.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was last modified. Defaults to system date.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
      - name: studentsdcid
        data_type: int64
        description:
          DCID (unique identifier) of the associated Student record. Indexed.
      - name: when_modified_or_created
        data_type: timestamp
