models:
  - name: stg_powerschool__roledef
    description: This table stores roles for a given RoleModule.
    columns:
      - name: name
        data_type: string
        description:
          User configurable name uniquely identifying the role to the user
          within a Role Module Required.
      - name: rolekey
        data_type: string
        description:
          Internal code uniquely identifying a role within a Role Module.
          Required.
      - name: description
        data_type: string
        description: User configurable description.
      - name: whocreated
        data_type: string
        description: User login that created the record.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who last modified the record. Defaults to database
          user. Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was last modified. Defaults to system
          date. Required.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Required.
      - name: rolemoduleid
        data_type: int64
        description:
          Internal number for the associated Role Module record. Indexed.
          Required.
      - name: islocked
        data_type: int64
        description:
          1 indicates the user can delete this role. 0 indicates the user cannot
          delete this role. Defaults to 0.Required.
      - name: isvisible
        data_type: int64
        description:
          1 indicates this role appears in the Role Administration page.
          Defaults to 1. Required.
      - name: isenabled
        data_type: int64
        description:
          1 indicates this role should continue to be usable in the application
          for new associations. Defaults to 1.Required.
      - name: sortorder
        data_type: int64
        description:
          Determines the order in which this item appears in the list of roles
          from lowest to highest number Defaults to 0. Required.
      - name: productname
        data_type: string
