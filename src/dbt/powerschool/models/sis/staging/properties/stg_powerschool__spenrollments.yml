models:
  - name: stg_powerschool__spenrollments
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: enter_date
        data_type: date
        description: The date the student enters a program.
        config:
          meta:
            contains_pii: false
      - name: exit_date
        data_type: date
        description: The date the student left the program
        config:
          meta:
            contains_pii: false
      - name: code1
        data_type: string
        description: SEOP self-contained code.
        config:
          meta:
            contains_pii: false
      - name: code2
        data_type: string
        description: SEOP setting code.
        config:
          meta:
            contains_pii: false
      - name: exitcode
        data_type: string
        description: The reason the student left the program.
        config:
          meta:
            contains_pii: false
      - name: sp_comment
        data_type: string
        description:
          in5.2.0 CLOB Comment value. Populated when modified by a system
          process. Mass Create, Import, Drop.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
        config:
          meta:
            contains_pii: false
      - name: programid
        data_type: int64
        description:
          Program ID from GEN table (cat=specprog) that is associated to this
          record. Indexed.
        config:
          meta:
            contains_pii: false
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            contains_pii: false
      - name: gradelevel
        data_type: int64
        description: Grade level of the student in this special program.
        config:
          meta:
            contains_pii: false
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            contains_pii: false
      - name: academic_year
        data_type: int64
      - name: is_current
        data_type: boolean
      - name: rn_student_program_year_desc
        data_type: int64
