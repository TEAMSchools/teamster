models:
  - name: stg_powerschool__gpprogresssubject
    description:
      For reporting purposes, this table contains a summary per subject group of
      a student's credits for their graduation plan. Data is accessed by
      selecting a group ofstudents and then navigating to [Select Function]
      arrow > Graduation Progress Report Data Capture (or Special Functions >
      Group Functions > GraduationProgress Report Data Capture).
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          A unique sequential number generated by the Power School. Required.
          Indexed.
        constraints:
          - type: primary_key
      - name: gpnodeid
        data_type: int64
        description:
          Internal number for the associated GPNode record. Indexed. Required.
        constraints:
          - type: foreign_key
      - name: isadvancedplan
        data_type: int64
        description:
          Column holds Boolean value indicating if the plan version is Advanced
          (value=1) or Legacy/Deprecated (value=0). Required
      - name: issinglesitting
        data_type: int64
        description:
          If true, test scores must come from a single sitting. Otherwise, the
          best score is used. 1 = Yes(True), 0 = No (False). Defaults to 0.
          Required.
      - name: issummation
        data_type: int64
      - name: nodetype
        data_type: int64
      - name: isgroupsatisfied
        data_type: int64
        description:
          Boolean value indicating if this group node satisfies (value = 1) the
          student's courses/tests.
      - name: istestgroupwaived
        data_type: int64
        description:
          Boolean value indicating if this test group node requirement was
          waived (value = 1) for this student.
      - name: mingpamet
        data_type: int64
        description:
          Boolean value indicating that this node meets minimum GPA requirements
          (value = 1). Reserved forfuture use.
      - name: testnodepassed
        data_type: int64
      - name: studentsdcid
        data_type: int64
        description:
          Internal number for the associated Student record. Required. Indexed.
        constraints:
          - type: foreign_key
      - name: appliedwaivedcredits
        data_type: float64
        description:
          Number of waived credits that have been applied to this subject group.
          Defaults to 0.
      - name: earnedcredits
        data_type: float64
        description:
          Number of earned credits. Values obtained from the Stored Grades
          table. Defaults to 0.
      - name: enrolledcredits
        data_type: float64
        description:
          Number of enrolled credits. Values obtained from the CC table.
          Defaults to 0.
      - name: requestedcredits
        data_type: float64
        description:
          Number of requested credits. Values obtained from the Schedule
          Requests table. Defaults to 0.
      - name: requiredcredits
        data_type: float64
        description:
          Number of required credits. Values obtained from the GPNode table.
          Defaults to 0.
      - name: waivedcredits
        data_type: float64
        description:
          Number of credits waived from this subject group. Defaults to 0.
      - name: nodegpa
        data_type: float64
        description:
          GPA that has been calculated for this node. Reserved for future use.
