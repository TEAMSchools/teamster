models:
  - name: stg_powerschool__gradeformulaset
    columns:
      - name: name
        data_type: string
        description: The unique name of the formula set. Required.
        config:
          meta:
            contains_pii: false
      - name: description
        data_type: string
        description: The description of the formula set.
        config:
          meta:
            contains_pii: false
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to a database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to a database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: type
        data_type: string
        description:
          'The Formula Set Type. Valid values: ''School'' = The formula set is
          at the school level, ''Course'' =The formula set is at the course
          level. Defaults to ''School". Required.'
        config:
          meta:
            contains_pii: false
      - name: gradeformulasetid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by PowerSchool.
          Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number isequal to the ID of the year term divided by
          100. Maintained in the Terms table. Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: iscoursegradecalculated
        data_type: int64
        description:
          "Indicates if the course grade is calculated. Valid values: 0=Course
          Grade Not Calculated,1=Course Grade Calculated. Defaults to 1.
          Required."
        config:
          meta:
            contains_pii: false
      - name: isreporttermsetupsame
        data_type: int64
        description:
          "Indicates whether this setup is the same for all reporting terms.
          Valid values: 0=Reporting TermSetup is NOT the Same, 1=Reporting Term
          Setup Same. Defaults to 0. Required."
        config:
          meta:
            contains_pii: false
      - name: sectionsdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated sections.DCID record.
          Indexed.
        config:
          meta:
            contains_pii: false
    description:
      A Grade Formula Set is a container that includes a grouping of related
      terms to be configured for Grading Formulas. The Terms and Reporting Terms
      for a set arefound in the GradeCalculationType table.
