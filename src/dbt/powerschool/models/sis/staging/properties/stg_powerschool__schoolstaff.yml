models:
  - name: stg_powerschool__schoolstaff
    description:
      "This table maintains School information related to the one or more
      teachers are assigned to. Note: The Teachers table is no longer used and
      has been renamed Teachers_ncf31. The SchoolStaff table and Users table
      have been created in its place. Theinformation that appeared in the
      Teachers table can now be viewed in the Teachers reporting view."
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
        constraints:
          - type: primary_key
      - name: classpua
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: log
        data_type: string
        description: Log file is updated with importing.
      - name: sched_gender
        data_type: string
        description: "Valid values: M = Male, F = Female."
      - name: sched_classroom
        data_type: string
        description: The classroom this teacher is in most of the time.
      - name: sched_homeroom
        data_type: string
        description: The teachers' homeroom.
      - name: sched_department
        data_type: string
        description: The department to which the teacher belongs.
      - name: sched_housecode
        data_type: string
        description: The house to which the teacher belongs.
      - name: sched_buildingcode
        data_type: string
        description: The building the teacher is in.
      - name: sched_activitystatuscode
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_primaryschoolcode
        data_type: string
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_team
        data_type: string
        description: The team the teacher is on.
      - name: notes
        data_type: string
        description: Miscellaneous notes.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson Success Net/Pearson Success Net
          Plus.
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: transaction_date
        data_type: timestamp
        description: Date and time of the database transaction.
      - name: id
        data_type: int64
        description:
          Sequential number generated by the application, but uniqueness in the
          table is notguaranteed. Indexed.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: users_dcid
        data_type: int64
        description:
          Internal number for the associated User record. Indexed. Required.
        constraints:
          - type: foreign_key
      - name: balance1
        data_type: float64
        description: Lunch balance.
      - name: balance2
        data_type: float64
        description:
          Beginning lunch balance for the year, copied from balance 1 in the
          end-of-year process.
      - name: balance3
        data_type: float64
        description: Fees balance.
      - name: balance4
        data_type: float64
        description:
          Beginning fee balance for the year, copied from balance 3 in the
          end-of-year process.
      - name: noofcurclasses
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: staffstatus
        data_type: int64
        description:
          "Current title for staff. Valid values: 0 = Not Assigned, 1 = Teacher,
          2 = Staff, 3 = Lunch Staff, 4= Substitute. Indexed."
      - name: status
        data_type: int64
        description:
          "Indicates whether the teacher is active or not. Valid values: 1 =
          Current, 2 = No longer here.Indexed."
      - name: sched_maximumcourses
        data_type: int64
        description: The maximum number of courses the teacher can teach.
      - name: sched_maximumduty
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_maximumfree
        data_type: int64
        description:
          The maximum number of preparatory periods the teacher can have.
      - name: sched_totalcourses
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_maximumconsecutive
        data_type: int64
        description:
          The most courses a teacher can teach in a row without a break.
      - name: sched_isteacherfree
        data_type: int64
        description:
          Flag stating weather the teacher is always free. True=no limit on how
          many courses a teachercan teach at a time, most often used with fake
          or SPED teachers. False= teacher can onlyteach one class at a time
          unless other wise specified at the course level.
      - name: sched_teachermoreoneschool
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_substitute
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_scheduled
        data_type: int64
        description:
          "Flag indicating whether or not this user is used for scheduling:
          True=Is used for scheduling.False=Not used for scheduling."
      - name: sched_usebuilding
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custompages.
      - name: sched_usehouse
        data_type: int64
      - name: sched_lunch
        data_type: int64
        description:
          Identifies the teacher to the engine as one who should be assigned a
          lunch period for eachvalid lunch day (according to the lunch courses
          valid days) when automated lunch isscheduled. This flag is used in
          lieu of creating course assignments for lunch.
      - name: sched_maxpers
        data_type: int64
        description:
          Reflects a long-standing setting in the Engine for Max Periods Per Day
          the Teacher is to bescheduled.
      - name: sched_maxpreps
        data_type: int64
        description:
          Reflects the setting in the Engine for Max Prep Codes (per Term) a
          Teacher is to be scheduled.
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
