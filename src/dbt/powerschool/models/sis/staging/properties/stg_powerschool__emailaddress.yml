models:
  - name: stg_powerschool__emailaddress
    description: This table is used to store a person's email information.
    columns:
      - name: emailaddress
        data_type: string
        description:
          The email address of the Person record. Unique. Indexed. Required.
        config:
          meta:
            contains_pii: true
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: emailaddressid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
        constraints:
          - type: primary_key
