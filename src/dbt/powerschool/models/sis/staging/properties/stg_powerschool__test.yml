models:
  - name: stg_powerschool__test
    columns:
      - name: name
        data_type: string
        description:
          Name provided for this test, such as ACT I, SAT2, etc. Indexed.
        config:
          meta:
            contains_pii: false
      - name: description
        data_type: string
        description:
          An optional area to describe any information about this item.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant,Schoolnet, and Pearson SuccessNet/Pearson SuccessNet
          Plus.
        config:
          meta:
            contains_pii: false
      - name: importcode
        data_type: string
        description:
          A code used to maintain the test hierarchy during import using Data
          ImportManager
        config:
          meta:
            contains_pii: false
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in
          thetable is not guaranteed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: test_type
        data_type: int64
        description:
          The type of test being administered. 1 = National, 2 = State, 3 =
          Local, 4 =District, 5 = School, 6 = Other, 7 = Fitness (as of 20.11.0)
        config:
          meta:
            contains_pii: false
      - name: alpha_entry_type
        data_type: int64
      - name: historical_test
        data_type: int64
      - name: number_entry_type
        data_type: int64
      - name: percent_entry_type
        data_type: int64
      - name: teacher_access
        data_type: int64
    description:
      Academic or Fitness Tests offered at the school/district such as SATs,
      ACTs or the President's Physical Fitness Challenge.
