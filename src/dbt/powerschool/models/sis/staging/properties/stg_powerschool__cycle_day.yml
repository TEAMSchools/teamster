models:
  - name: stg_powerschool__cycle_day
    columns:
      - name: letter
        data_type: string
        description:
          Similar to the abbreviation but just limited to a character. It is
          used in place of a missing abbreviation.
      - name: abbreviation
        data_type: string
        description: A short 1 or 2 character version of the Name, such as A.
      - name: day_name
        data_type: string
        description: Name given for this day, such as A Day.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson Success Net/Pearson Success Net
          Plus.
        constraints:
          - type: primary_key
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        constraints:
          - type: primary_key
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: year_id
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004, if not cumulative. See Store Code. The number is equal to
          the ID of the year term divided by 100.
      - name: day_number
        data_type: int64
        description: Number assigned to this Day, such as 1.
      - name: sortorder
        data_type: int64
        description: Table sort order. Indexed.
