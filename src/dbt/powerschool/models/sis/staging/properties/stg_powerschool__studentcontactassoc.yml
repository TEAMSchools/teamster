models:
  - name: stg_powerschool__studentcontactassoc
    columns:
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: studentcontactassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application that uniquely
          identifies the row in the table.Indexed. Required.
      - name: studentdcid
        data_type: int64
        description:
          DCID of the associated Students row in the Student table. Indexed.
          Required.
      - name: personid
        data_type: int64
        description:
          Identification number of the associated Person table record. Indexed.
          Required.
      - name: contactpriorityorder
        data_type: int64
        description:
          "Indicates the preferred order in which the student's contacts will be
          selected.Valid values: 1-n. Defaults to 1. Indexed with StudentDCID.
          Required."
      - name: currreltypecodesetid
        data_type: int64
        description:
          Indicates the RelationshipTypeCodeSetId of the active
          StudentContactDetail child record. A trigger isin place to keep it
          synchronized. Indexed. Optional.
    description:
      This table links a Student Contact record with a student's contact
      information.
