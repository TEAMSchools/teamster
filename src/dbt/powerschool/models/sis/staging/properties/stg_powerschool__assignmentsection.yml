models:
  - name: stg_powerschool__assignmentsection
    description:
      This table identifies sections that are associated to an assignment.
      Typically, there will only be one section associated to an assignment. It
      is possible to have multiplesections associated to the same assignment, in
      which case one row appears for each section associated to an assignment.
      The properties of an assignment can bechanged for each section.
    columns:
      - name: assignmentsectionid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
        config:
          meta:
            column_role: primary_key
      - name: name
        data_type: string
        description:
          Name of the assignment, such as Essay, Homework, etc. Required.
          Indexed.
      - name: duedate
        data_type: date
        description:
          The date the assignment is due. Defaults to Default is the system date
          + 1 day. Indexed.
      - name: description
        data_type: string
        description: The description of the assignment.
      - name: scoretype
        data_type: string
        description: Indicates if this score is a letter grade or percent.
      - name: publishoption
        data_type: string
        description:
          "Indicates when the assignment is available to view in the Power
          School Student and Parent portal,and in Power School Mobile. Valid
          values: Immediately, On Specific Date, Days Before Due,On Due Date,
          Never. Defaults to Immediately. Required."
      - name: publishonspecificdate
        data_type: date
        description:
          Indicates the specific date on which the assignment will be published.
          Default is the system date.
      - name: publisheddate
        data_type: date
        description:
          Indicated the date the assignment was published. Default is the system
          date.
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: transaction_date
        data_type: timestamp
        description: Date and time of the database transaction.
      - name: executionid
        data_type: string
        description: Unique identifier for the database transaction.
      - name: _dagster_partition_fiscal_year
        data_type: int64
      - name: _dagster_partition_date
        data_type: date
      - name: _dagster_partition_hour
        data_type: int64
      - name: _dagster_partition_minute
        data_type: int64
      - name: assignmentid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Assignment.ID record.
          Required. Indexed.
        config:
          meta:
            column_role: foreign_key
      - name: extracreditpoints
        data_type: numeric
        description:
          Indicates the number of extra credit points available for this
          assignment.
      - name: iscountedinfinalgrade
        data_type: int64
        description:
          "Indicates if the assignment will count toward the final grade. Valid
          values: 0=Does not count towardfinal grade, 1=Counts toward final
          grade. Defaults to 1. Required."
      - name: isscorespublish
        data_type: int64
        description:
          "Flag to indicate if the assignment score, percent earned, and letter
          grade are published. Validvalues: 0=Do not publish, 1=Publish.
          Defaults to 1. Required."
      - name: isscoringneeded
        data_type: int64
        description:
          "Indicates if this assignment needs to be scored. Valid values:
          0=False, 1=True. Defaults to 0.Required."
      - name: maxretakeallowed
        data_type: int64
        description:
          "Indicates the maximum number of retakes allowed for an assignment.
          Valid values: 0=No retakesare allowed for this assignment, Any Number
          Greater Than 0=Allows that number of retakes, 99=Anunlimited number of
          retakes are allowed. Defaults to 0."
      - name: publishdaysbeforedue
        data_type: int64
        description:
          Indicates the number of days before the assignment due date that the
          assignment will be published.Defaults to 0.
      - name: publishedscoretypeid
        data_type: int64
        description:
          Indicates if the scores appear on the Power School Student and Parent
          portal, and in Power School Mobile. This is separate from the
          assignments publish status. For example, an assignment may
          bepublished, but the teacher does not want the score to appear to
          parents or students.
      - name: relatedgradescaleitemdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Assignment Assignment
          ID record. Ties theassignment to a grade scale. It will only be set if
          the grade scale used for the Assignment Section isnot the section's
          main grade scale. Indexed.
        config:
          meta:
            column_role: foreign_key
      - name: sectionsdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated sections.DCID record.
          Required. Indexed.
        config:
          meta:
            column_role: foreign_key
      - name: weight
        data_type: numeric
        description:
          The overall weight of this assignment. This value multiplied by Points
          Possible shows the actualpoints of this assignment for total possible
          points for this section. Defaults to 1.
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number isequal to the ID of the year term divided by
          100. Maintained in the Terms table.
      - name: scoreentrypoints
        data_type: float64
        description: Identifies the score entered for this assignment. Required.
      - name: totalpointvalue
        data_type: float64
        description:
          This is the total weighted points that the assignment is worth. If the
          entry points are 25, and theweight is 4, then the total point value is
          100.
