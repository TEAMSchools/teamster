models:
  - name: stg_powerschool__pgfinalgrades
    description:
      Students final grades stored PowerTeacher Gradebook and PowerTeacher Pro.
    columns:
      - name: finalgradename
        data_type: string
        description:
          Name assigned to this final grade. This might be the term
          abbreviation, such as S1.
      - name: startdate
        data_type: date
        description:
          The day the section started and this grade is for. Usually the terms
          first day.
      - name: enddate
        data_type: date
        description:
          The day the section ended and this grade is for. Usually the terms end
          day.
      - name: lastgradeupdate
        data_type: date
        description:
          The date this grade record was last updated in Power Teacher Gradebook
          or Power Teacher Pro.
      - name: overridefg
        data_type: string
        description:
          This field is used to indicate if the final grade has been overridden.
      - name: calculatedgrade
        data_type: string
        description: The value of the calculated grade.
      - name: ip_address
        data_type: string
      - name: whomodifiedtype
        data_type: string
      - name: transaction_date
        data_type: timestamp
      - name: executionid
        data_type: string
      - name: _dagster_partition_fiscal_year
        data_type: int64
      - name: _dagster_partition_date
        data_type: date
      - name: _dagster_partition_hour
        data_type: int64
      - name: _dagster_partition_minute
        data_type: int64
      - name: dcid
        data_type: int64
        description:
          Unique identifier for this table. Primary key. Required. Indexed.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: sectionid
        data_type: int64
        description:
          The internal number and ID of the associated Sections record. Indexed.
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record. Indexed.
      - name: points
        data_type: float64
        description: The actual points student received for this section.
      - name: pointspossible
        data_type: float64
        description: The total points possible for this section.
      - name: varcredit
        data_type: float64
        description:
          In support of AEP analysis that teachers have the ability to assign
          variable credit to students in their classif they wish to do so.
      - name: gradebooktype
        data_type: int64
        description:
          "Indicates the type of gradebook used by the teacher. Valid values:
          0=Power Grade, 1=Power Teacher Gradebook, 2=Power Teacher Pro."
      - name: calculatedpercent
        data_type: float64
        description: The value of the calculated percent.
      - name: isincomplete
        data_type: int64
        description:
          "Indicates whether this assignment is incomplete. Valid values:
          0=Complete, 1=Incomplete, Defaults to 0.Required."
      - name: isexempt
        data_type: int64
        description:
          "Indicates whether this assignment is exempt. Valid values: 1=Yes,
          0=No. Defaults to 0. Required."
      - name: whomodifiedid
        data_type: int64
      - name: grade
        data_type: string
        description: The letter grade assigned to this section for this student.
      - name: citizenship
        data_type: string
        description:
          Shows the Citizenship progress of a student in this section, such as
          E=Excellent, S=Satisfactory,U=Unsatisfactory, N=Neutral.
      - name: comment_value
        data_type: string
        description: Any comment teacher added for this final grade.
      - name: percent
        data_type: float64
        description:
          The percentage points that was received by the student for this
          section.
      - name: percent_decimal
        data_type: float64
      - name: percent_decimal_adjusted
        data_type: float64
      - name: grade_adjusted
        data_type: string
