models:
  - name: stg_powerschool__sectionteacher
    description:
      his table contains co-teaching information and maintains the associations
      between sections, teachers, and roles.
    columns:
      - name: start_date
        data_type: timestamp
        description:
          The start date of the association of this teacher to this section.
      - name: end_date
        data_type: timestamp
        description:
          The end date of the association of this teacher to this section.
      - name: notes
        data_type: string
        description: General comments and notes.
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
      - name: sectionnickname
        data_type: string
        description: Nickname of the section. Optional.
      - name: ip_address
        data_type: string
      - name: whomodifiedtype
        data_type: string
      - name: transaction_date
        data_type: timestamp
      - name: executionid
        data_type: string
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
      - name: teacherid
        data_type: int64
        description:
          The internal identification number of the teacher in the associated
          School Staff record.
      - name: sectionid
        data_type: int64
        description:
          The teacher's section ID. The section ID is related to the
          Sections.ID.
      - name: roleid
        data_type: int64
        description:
          The teacher's role ID. This role ID is related to the Role Def.ID.
      - name: allocation
        data_type: numeric
        description:
          The percentage allocation this teacher has for this section.
      - name: priorityorder
        data_type: int64
        description: The priority order for this teacher and section.
      - name: whomodifiedid
        data_type: int64
