models:
  - name: stg_powerschool__studenttest
    columns:
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        config:
          meta:
            contains_pii: false
      - name: grade_level
        data_type: int64
        description: Grade level of the student taking this test.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            contains_pii: false
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            contains_pii: false
      - name: termid
        data_type: int64
        description:
          The internal number for the term with which this record is associated.
        config:
          meta:
            contains_pii: false
      - name: testid
        data_type: int64
        description:
          The internal number for the test with which this record is associated.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: test_date
        data_type: date
        description: The date this test was given. Indexed.
        config:
          meta:
            contains_pii: false
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.
        config:
          meta:
            contains_pii: false
