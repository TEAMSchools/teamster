models:
  - name: stg_powerschool__gpnode
    description:
      Details of the nodes of the GradPlan. Hierarchy with each node containing
      a capacity.
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier.
      - name: name
        data_type: string
        description: Name of this node.
      - name: minimumgrade
        data_type: string
        description:
          If set, the minimum letter grade is required to fulfill this node of
          the graduation plan.
      - name: gpamethod
        data_type: string
        description:
          If set, it specifies which GPA method is used to calculate the
          student's earned GPA for coursecredits applied to this node.
      - name: requirementcount
        data_type: int64
        description:
          If set, it specifies how many programs are needed to fulfill
          graduation requirements for this node ofthe graduation plan.
      - name: verifyminimumgradefirst
        data_type: int64
        description:
          If true, letter grades are verified before percent grades. Else
          percent grades are verified first.
      - name: allowanyof
        data_type: int64
        description:
          'Indicates whether the node supports "Any of" for credits. Valid
          values: 1 = Yes, 0 = No. Defaults to0. Required.'
      - name: allowwaiver
        data_type: int64
        description:
          "Indicates whether the node can have credit hours waived. Valid
          values: 1 = Yes, 0 = No. Defaultsto 0. Required."
      - name: altcompletioncount
        data_type: int64
        description:
          Indicates how many alternative items are needed to satisfy each
          individual requirement. . Defaultsto 0. Required.
      - name: completioncount
        data_type: int64
        description:
          Indicates how many items are needed to satisfy each individual
          requirement. . Defaults to 0.Required.
      - name: gpversionid
        data_type: int64
        description: Foreign key to GPVersion.ID.
        config:
          meta:
            column_role: foreign_key
      - name: ishidden
        data_type: int64
        description:
          If true, this node will not be displayed on the progress screen (not
          used currently).
      - name: issinglesitting
        data_type: int64
        description:
          If true, test scores must come from a single sitting. Otherwise, the
          best score is used. 1 = Yes(True), 0 = No (False). Defaults to 0.
          Required.
      - name: issummation
        data_type: int64
        description:
          If true, this node acts as a Summation Node for all the individual
          Test Scores that belong to it.
      - name: nodetype
        data_type: int64
        description: Type of Node, Default value 0.
      - name: sortorder
        data_type: int64
        description: Order of the node amongst its siblings.
      - name: parentid
        data_type: int64
        description:
          '"Parent" node, such as node, which contains this one, or null for the
          "root" node in a version.Indexed.'
      - name: creditcapacity
        data_type: float64
        description:
          The number of credits required at this node for it to be fully
          satisfied.
      - name: minimumgpa
        data_type: float64
        description:
          If set, the minimum GPA for course credits is applied to this node of
          the graduation plan. Must begreater than 0 if set.
      - name: minimumgradepercentage
        data_type: float64
        description:
          If set, the minimum percent grade is required to fulfill this node of
          the graduation plan. Valid valueis between 0 and 100.
