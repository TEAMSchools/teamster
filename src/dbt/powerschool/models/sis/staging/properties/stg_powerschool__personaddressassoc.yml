models:
  - name: stg_powerschool__personaddressassoc
    columns:
      - name: startdate
        data_type: date
        description:
          First day on which the address is related to the person. Defaults to
          NULL. Optional
      - name: enddate
        data_type: date
        description:
          Last day on which the address is related to the person. Defaults to
          NULL. Optional.
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: personaddressassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
      - name: personid
        data_type: int64
        description:
          Identification number of the associated Person table row pertaining to
          the phone number. Indexedwith AddressPriorityOrder. Required.
        config:
          meta:
            contains_pii: true
      - name: personaddressid
        data_type: int64
        description:
          Identification number of the associated Address table row. Indexed.
          Required.
      - name: addresstypecodesetid
        data_type: int64
        description:
          Identification number of the associated CodeSet table row. Indexed.
          Required.
      - name: addresspriorityorder
        data_type: int64
        description:
          Indicates the preferred order in which the person’s addresses will be
          selected. Indexed withPersonID. Defaults to 1. Required.
    description:
      This table links a Person record with a person’s address information.
