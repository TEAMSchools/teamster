models:
  - name: stg_powerschool__gpstudentwaiver
    description:
      This table stores details about waived credits in a graduation plan for a
      student.
    config:
      enabled: false
    columns:
      - name: authorizedby
        data_type: string
        description: Name of person who authorized the waiver for the student.
      - name: waiveddate
        data_type: timestamp
        description:
          Date the waiver was authorized. Defaults to system date. Required.
      - name: gpwaiverconfigidforsource
        data_type: int64
        description:
          Foreign key. Internal number for the associated GPWaiver Config record
          identifying the sourceof this waiver. Required.
      - name: gpwaiverconfigidforreason
        data_type: int64
        description:
          Foreign key. Internal number for the associated GPWaiver Config record
          identifying the reasonfor this waiver. Required.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. A unique sequential number generated by the Power School.
          Required. Indexed.
      - name: studentid
        data_type: int64
        description:
          Internal number, ID, for the associated Students record. Required.
      - name: gpnodeidforwaived
        data_type: int64
        description:
          Foreign key. Internal number for the associated GPNode record for the
          node from which credithours were waived for student. Required.
      - name: gpnodeidforelective
        data_type: int64
        description:
          Foreign key. Internal number for the associated GPNode record for the
          node where any excesscredit hours in node with waived credits will be
          applied. Required.
      - name: gpwaiverconfigidfortype
        data_type: int64
        description:
          Foreign key. Internal number for the associated GPWaiver Config record
          identifying the type forthis waiver.  Required.
      - name: credithourswaived
        data_type: float64
        description:
          Number of credit hours waived from the student's graduation plan.
          Required.
