models:
  - name: stg_powerschool__calendar_day
    description:
      School year calendar is maintained is this table. It's used for Bell
      Schedules, ADM/ADA reports and overall attendance by showing which days
      are in-session withindifferent tracks or overall. This used to be named
      DailySchedules.
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: date_value
        data_type: date
        description:
          Each day of the school year including holidays and weekends, such as
          the school day. Indexed.
      - name: scheduleid
        data_type: string
        description: Schedule ID this date belongs to. Defaults to A.
      - name: note
        data_type: string
        description:
          Comments that describe the schedule on this date, such as Half-Day,
          Holiday, or Spring Break.
      - name: type
        data_type: string
        description:
          Indicates the Type of the day, such as Holiday, In Session, or Not in
          Session.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and Pearson Success Net/Pearson Success Net
          Plus.
      - name: whomodifiedtype
        data_type: string
        description: Type of user account that last modified the record.
      - name: ip_address
        data_type: string
        description: IP address of the client that initiated the transaction.
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
        constraints:
          - type: primary_key
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: a
        data_type: int64
        description:
          Standard track names that can be used if students belong to a track
          and do not all attend school on thesame dates. If 1 then insession for
          this date for this track. Track on or off. 0=off 1=on.
      - name: b
        data_type: int64
        description:
          Standard track names that can be used if students belong to a track
          and do not all attend school on thesame dates. If 1 then insession for
          this date for this track. Track on or off. 0=off 1=on.
      - name: c
        data_type: int64
        description:
          Standard track names that can be used if students belong to a track
          and do not all attend school on thesame dates. If 1 then insession for
          this date for this track. Track on or off. 0=off 1=on.
      - name: d
        data_type: int64
        description:
          Standard track names that can be used if students belong to a track
          and do not all attend school on thesame dates. If 1 then insession for
          this date for this track. Track on or off. 0=off 1=on.
      - name: e
        data_type: int64
        description:
          Standard track names that can be used if students belong to a track
          and do not all attend school on thesame dates. If 1 then insession for
          this date for this track. Track on or off. 0=off 1=on.
      - name: f
        data_type: int64
        description:
          Standard track names that can be used if students belong to a track
          and do not all attend school on thesame dates. If 1 then insession for
          this date for this track. Track on or off. 0=off 1=on.
      - name: insession
        data_type: int64
        description:
          Indicates whether this day of the year is an actual school
          day.1=insession, 0=no (holiday, weekend, etc.)This is only used if all
          students attend school on the same date. Otherwise Tracks A-F are used
          to indicateinsession days.
      - name: membershipvalue
        data_type: float64
        description:
          The amount of a student's membership this school claims. If a student
          attends more than one school eachone will only be able to claim a
          certain portion of the membership. The largest number for this will
          usually be1 and fractions expressed as decimals. Like .5 or .25.
      - name: cycle_day_id
        data_type: int64
        description:
          The internal number for the Cycle Day with which this record is
          associated.
      - name: bell_schedule_id
        data_type: int64
        description:
          The internal number for the Bell Schedule with which this record is
          associated. Indexed.
      - name: week_num
        data_type: int64
        description:
          No longer used by the application. This field may still be referenced
          on reports and/or custom pages.
      - name: whomodifiedid
        data_type: int64
        description:
          Internal identifier of the user who last modified the record.
      - name: week_start_date
        data_type: date
      - name: week_end_date
        data_type: date
