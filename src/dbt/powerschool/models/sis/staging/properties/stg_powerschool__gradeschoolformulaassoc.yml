models:
  - name: stg_powerschool__gradeschoolformulaassoc
    description:
      This table associates grade school configurations with grade formula sets.
    columns:
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: gradeschoolformulaassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
        config:
          meta:
            column_role: primary_key
      - name: gradeformulasetid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Grade Formula
          Set.Grade Formula Set IDrecord. Required. Indexed.
        config:
          meta:
            column_role: foreign_key
      - name: gradeschoolconfigid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Grade School
          Config.Grade School Config Idrecord. Required. Indexed.
        config:
          meta:
            column_role: foreign_key
      - name: isdefaultformulaset
        data_type: int64
        description:
          "Indicates whether this is the default formula set. Valid values:
          1=Yes, 0=No. Defaults to 0.Required."
