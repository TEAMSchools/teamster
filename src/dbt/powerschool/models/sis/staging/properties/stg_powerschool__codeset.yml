models:
  - name: stg_powerschool__codeset
    description:
      "This is a general-purpose table for storing code sets used in various
      parts of PowerSchool. Note: This table is for internal use only and is
      designed to be flexible enough so that other projects may use it to store
      code sets."
    columns:
      - name: codesetid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
      - name: codetype
        data_type: string
        description:
          A code that describes the group of values. Indexed with Display Value
          column. Required.
      - name: code
        data_type: string
        description:
          The code value that is stored in the database, such as Home and Work
          for phone types and Mand F for gender types. Indexed with the Code
          Type column. Required
      - name: displayvalue
        data_type: string
        description:
          The value that displays in the codeset dropdowns, such as Home and
          Work for phone types and Male and Female for gender types. If the
          value is null the Code field value is used for display.Optional
      - name: description
        data_type: string
        description: Description of the code set. Optional.
      - name: codeorigin
        data_type: string
        description:
          Indicates the organization (Power School or the user) that defined the
          code. Required.
      - name: reportedvalue
        data_type: string
        description: Value that can be exported into other systems. Optional.
      - name: alternatecode1
        data_type: string
        description:
          The primary alternate code value as defined by Power School or the
          user. Optional.
      - name: alternatecode2
        data_type: string
        description:
          The secondary alternate code value as defined by Power School or the
          user. Optional.
      - name: effectivestartdate
        data_type: date
        description: The date the code becomes valid. Optional.
      - name: effectiveenddate
        data_type: date
        description: The date the code is no longer valid. Optional.
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: originalcodetype
        data_type: string
        description:
          Does not appear on any Power School pages. Used to hold the value of
          Code Set.Code Typewhen retiring (effectively deleting) a code set item
          for historical tracking.
      - name: changevalidation
        data_type: string
        description:
          The name of a Power Query that validates changes and/or deletions of
          records in this codeset.Optional.
      - name: parentcodesetid
        data_type: int64
        description:
          Reference to the Parent Code Set ID. Indexed. Null indicates this is a
          Code Set Category.
      - name: uidisplayorder
        data_type: int64
        description:
          The order by which the code values display in the application.
          Optional.
      - name: isvisible
        data_type: int64
        description:
          "Indicates whether or not administrators can view the values code.
          Valid values: 1=True, 0=False.Default 1. Required."
      - name: ismodifiable
        data_type: int64
        description:
          "Indicates whether or not administrators can modify the code values.
          Valid values: 1=True,0=False. Default 1. Required."
      - name: isdeletable
        data_type: int64
        description:
          "Indicates whether or not administrators can delete the code values.
          Valid values: 1=True,0=False. Default 1. Required."
      - name: excludefromstatereporting
        data_type: int64
        description:
          "Indicates whether a code set item is excluded from State Reporting.
          Valid values: 1=True,0=False. Default 0. Required."
