models:
  - name: stg_powerschool__gradesectionconfig
    columns:
      - name: gradesectionconfigid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Required.
          Indexed.
      - name: type
        data_type: string
        description:
          "Determines if the formula is defined by the Power School
          administrator or the teacher.Valid values: Admin, Teacher. Required.
          Indexed."
      - name: defaultroundingrule
        data_type: string
        description:
          "Defines the default rounding rule at the course level. Valid values:
          Round, Truncate, Null."
      - name: stndcalculationmetric
        data_type: string
        description:
          "Indicates how higher level standards are calculated. Valid values:
          Power, Most_Recent,None, Mean, Weighted_Mean, Median, Mode, Highest,
          Null. Defaults to Null."
      - name: recentscoreweightlist
        data_type: string
        description:
          Indicates the weighting across the most recent scores. The number of
          weight valuesentered provides the number of most recent scores. Stored
          as a comma separated list.Defaults to Null.
      - name: higherlevelstndmetric
        data_type: string
        description:
          "Defines the metric to be used for the higher level standard. Valid
          values: Highest, Mean,Median, Mode, Specific_Weighting, Specific_Sum,
          Null. Defaults to Null."
      - name: calcmetricsectionfromstnd
        data_type: string
        description:
          "Defines the metric to be used when calculating the course grade from
          the standard grade.Valid values: Most_Recent, None, Mean,
          Weighted_Mean, Median, Mode, Highest, Null.Defaults to Null."
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: sectionsdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Sections.DCID record.
          Required. Indexed.
      - name: gradeformulasetid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Grade Formula
          Set.Grade Formula Set IDrecord. Indexed.
      - name: defaultdecimalcount
        data_type: int64
        description:
          "Defines the default decimal count at the course level. Valid values:
          0, 1, 2, 3, Null. Defaultsto Null"
      - name: iscalcformulaeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation formula. Valid
          values: 1=Yes, 0=No, Null.Defaults to Null."
      - name: isdropscoreeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the drop score. Valid values:
          1=Yes, 0=No, Null. Defaultsto Null."
      - name: iscalcprecisioneditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation precision (number
          of decimal places). Validvalues: 1=Yes, 0=No, Null. Defaults to Null."
      - name: isstndcalcmeteditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation metric. Valid
          values: 1=Yes, 0=No, Null.Defaults to Null."
      - name: isstndrcntscoreeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the recent score. Valid values:
          1=Yes, 0=No, Null. Defaultsto Null."
      - name: ishigherlvlstndeditable
        data_type: int64
        description:
          "Indicates if the user can edit the higher standard. Valid values:
          1=Yes, 0=No, Null.Defaults to Null."
      - name: ishigherstndautocalc
        data_type: int64
        description:
          "Indicates whether the higher standard is auto calculated. Valid
          values: 1=Yes, 0=No, Null.Defaults to Null."
      - name: ishigherstndcalceditable
        data_type: int64
        description:
          "Indicates if the user can edit the higher standard auto calculation.
          Valid values: 1=Yes,0=No, Null. Defaults to Null."
      - name: iscalcsectionfromstndedit
        data_type: int64
        description:
          "Indicates if the user can edit the calculation metric for calculating
          a section grade from astandard grade. Valid values: 1=Yes, 0=No, Null.
          Defaults to Null."
      - name: issectstndweighteditable
        data_type: int64
      - name: minimumassignmentvalue
        data_type: int64
      - name: isgradescaleteachereditable
        data_type: int64
      - name: isusingpercentforstndautocalc
        data_type: int64
        description:
          "Indicates whether to use the assignment percent score when
          auto-calculating standardsscores. Valid values: 1=Use the assignment
          percent score, 0=Use the earned standardlevel value, Null. Defaults to
          Null."
