models:
  - name: stg_powerschool__attendance
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
        config:
          meta:
            contains_pii: false
      - name: att_comment
        data_type: string
        description:
          Free form text that staff can enter for this attendance record.
        config:
          meta:
            contains_pii: false
      - name: att_date
        data_type: date
        description:
          This is the date the attendance was taken for this record. Although a
          relationship to Calendar_Dayexists, this is done for performance
          reasons. Indexed.
        config:
          meta:
            contains_pii: false
      - name: att_mode_code
        data_type: string
        description:
          "Classification of attendance records: section, daily, hbyh, and
          hbyday. Indexed."
        config:
          meta:
            contains_pii: false
      - name: attendance_codeid
        data_type: int64
        description:
          The internal number for the Parent Attendance with which this record
          is associated. This shows if thisrow is linked to another in this
          table, such as backfilling purposes. Indexed.
        config:
          meta:
            contains_pii: false
      - name: calendar_dayid
        data_type: int64
        description:
          The internal number for the Calendar Day with which this record is
          associated. Indexed.
        config:
          meta:
            contains_pii: false
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
        config:
          meta:
            contains_pii: false
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
        config:
          meta:
            contains_pii: false
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number is equalto the ID of the year term divided by
          100. Maintained in the Terms table. Indexed.
        config:
          meta:
            contains_pii: false
    description:
      This is the main attendance table (4.0 and later) and can hold both
      Positive and Negative attendance. There are different methods of keeping
      attendance, Time, Day,Period, etc. for a student for a given year. This
      table also can be used for backfilling purposes.
