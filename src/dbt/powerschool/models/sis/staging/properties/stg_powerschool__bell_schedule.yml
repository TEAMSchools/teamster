models:
  - name: stg_powerschool__bell_schedule
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
      - name: name
        data_type: string
        description:
          Name assigned to this Bell Schedule, such as H=Half-Day, A=Assembly,
          etc.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: year_id
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004, if notcumulative. See StoreCode. The number is equal to the
          ID of the year term divided by 100.Indexed.
      - name: attendance_conversion_id
        data_type: int64
        description:
          The internal number for the Attendance Conversion with which this
          record is associated. Thenumber of periods of this Attendance
          Conversion record must not exceed the number of periodsfor this Bell
          Schedule. Indexed.
    description:
      Correlates periods with the times that the periods meet and to determine
      which periods are taught on which calendar days. Associate different bell
      schedules todifferent days of the year in Calendar_Day. For example, a
      bell schedule called Assembly, where each period meets for a shorter
      amount of time in order toaccommodate a school event that day.
