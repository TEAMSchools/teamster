models:
  - name: stg_powerschool__prefs
    columns:
      - name: name
        data_type: string
        description:
          "The name of preferences of almost anything in the system. User
          specific preferences are the name-U0#### where##### represents the
          users internal ID relating to the Users table. And school specific
          preferences are name-S##### where ##### is the schools number.
          Indexed."
      - name: value
        data_type: string
        description: The actual data stored for the preference.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, and PearsonSuccessNet/Pearson SuccessNet
          Plus.
      - name: ip_address
        data_type: string
      - name: whomodifiedtype
        data_type: string
      - name: transaction_date
        data_type: timestamp
      - name: executionid
        data_type: string
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed. Indexed.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to, such as 13 for
          2003-2004. The number is equal to the ID ofthe year term divided by
          100. Maintained in the Terms table. Indexed.
      - name: userid
        data_type: int64
        description:
          User ID of the person associated with this preference record. Indexed.
      - name: whomodifiedid
        data_type: int64
