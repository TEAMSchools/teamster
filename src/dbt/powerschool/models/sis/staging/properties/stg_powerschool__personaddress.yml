models:
  - name: stg_powerschool__personaddress
    columns:
      - name: street
        data_type: string
        description:
          The street name and number element of the address. Usually line one of
          the address. Indexed withLineTwo and Unit. Optional.
        config:
          meta:
            contains_pii: true
      - name: linetwo
        data_type: string
        description:
          The second line of the address. Indexed with Street and Unit.
          Optional.
      - name: city
        data_type: string
        description: The city element of the address. Optional.
        config:
          meta:
            contains_pii: true
      - name: postalcode
        data_type: string
        description: The zip code element of the address. Optional.
      - name: unit
        data_type: string
        description:
          The suite or apartment number element of the address. Indexed with
          Street and LineTwo. Optional.
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: personaddressid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
      - name: statescodesetid
        data_type: int64
        description:
          Internal number for the associated CodeSet State record. Indexed.
          Required.
      - name: countrycodesetid
        data_type: int64
        description:
          Internal number for the associated CodeSet Country record. Indexed.
          Required.
      - name: geocodelatitude
        data_type: numeric
        description:
          The latitude coordinates for the student's address. Optional.
      - name: geocodelongitude
        data_type: numeric
        description:
          The longitude coordinates for the student's address. Optional.
      - name: addressline3
        data_type: string
        description: The third line of the person's address.
      - name: addressline4
        data_type: string
        description: The fourth line of the person's address.
      - name: addressline5
        data_type: string
        description: The fifth line of the person's address.
      - name: countycodesetid
        data_type: int64
        description:
          Internal number for the associated CodeSet County record. Indexed.
      - name: isverified
        data_type: int64
        description:
          "Indicates whether or not the person's address has been verified.
          Valid values: 1=True, 0=False.Default 1. Optional."
      - name: verification
        data_type: string
        description: Indicates how the person's address was verified
    description:
      is table stores address records for a student and related contacts, such
      as parents, guardians, etc.
