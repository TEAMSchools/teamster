models:
  - name: stg_powerschool__studentcontactdetail
    description:
      This table provides details for a Student Contact record for a period of
      time beginning on the start date and ending on the end date.
    columns:
      - name: relationshipnote
        data_type: string
        description:
          Any associated note for the Student Contact record. Optional.
      - name: startdate
        data_type: date
        description:
          Start date of the relationship between the contact and the student.
          Does not relate to lives withor school pick up columns. Null date
          implies that the relationship is permanent. Indexed with Student
          Contact Assoc ID. Optional.
      - name: enddate
        data_type: date
        description:
          End date of the relationship between the contact and the student. Does
          not relate to lives withor school pick up columns. Null date implies
          that the relationship is permanent. Optional
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: studentcontactdetailid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application that uniquely
          identifies the row in thetable. Indexed. Required.
        constraints:
          - type: primary_key
      - name: studentcontactassocid
        data_type: int64
        description:
          Identification number of the related Student Contact Assoc table row.
          Indexed. Required.
      - name: relationshiptypecodesetid
        data_type: int64
        description:
          Identification number of the related Code Set table row. Indexed.
          Required.
      - name: isactive
        data_type: int64
        description:
          "Flag indicating if this record is the currently active record among
          all records associated withthe same parent Student Contact Assoc
          record. The active record will be the one that has thecurrent date
          contained by the start and end date values. If no record contains the
          current date,active will be the record with the closest future start
          date. If there are also no future records,active will be the one with
          the closest past end date. Valid values: 0=No, 1=Yes. Defaults to
          0.Required."
      - name: isemergency
        data_type: int64
        description:
          Indicates whether or not the contact is designated as an emergency
          contact. Valid values:0=No, 1=Yes. Defaults to 0. Required.
        config:
          meta:
            contains_pii: true
      - name: iscustodial
        data_type: int64
        description:
          "Indicates whether or not the contact has custody over the student.
          Valid values: 0=No, 1=Yes.Defaults to 0. Required."
      - name: liveswithflg
        data_type: int64
        description:
          "Indicates whether or not the the student lives with the contact.
          Valid values: 0=No, 1=Yes.Defaults to 0. Required."
      - name: schoolpickupflg
        data_type: int64
        description:
          "Indicates whether or not the the student can be picked up by the
          contact. Valid values: 0=No,1=Yes. Defaults to 0. Required."
      - name: receivesmailflg
        data_type: int64
        description:
          "Indicates if the student contact receives mail from the school. Valid
          values: 0=No, 1=Yes.Defaults to 0. Required."
      - name: excludefromstatereportingflg
        data_type: int64
        description:
          "Indicates if this record should be excluded from state reports. Valid
          values: 0=No, 1=Yes.Defaults to 0. Required."
      - name: generalcommflag
        data_type: int64
        description:
          "Indicates whether or not the contact will receive general information
          for the selected student.Valid values: 0=No, 1=Yes. Defaults to 0.
          Reserved for Unified Home Communication."
      - name: confidentialcommflag
        data_type: int64
        description:
          "Indicates whether or not the contact will receive confidential
          information for the selectedstudent. Valid values: 0=No, 1=Yes.
          Defaults to 0. Reserved for Unified Home Communication."
