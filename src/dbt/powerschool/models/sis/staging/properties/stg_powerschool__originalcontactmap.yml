models:
  - name: stg_powerschool__originalcontactmap
    columns:
      - name: originalcontacttype
        data_type: string
        description:
          "Indicates six legacy contact types (case sensitive): mother, father,
          emergency1, emergency2,emergency3, guardian. Indexed along with the
          StudentContactAssocID column. Required."
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
      - name: originalcontactmapid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application that identifies
          the row in the table. Indexed.Required.
      - name: studentcontactassocid
        data_type: int64
        description:
          Identification number of the associated StudentContactAssoc table row.
          Indexed along with theOriginalContactType column. Required.
    description:
      This table is created to support a single contact having more than one
      legacy contact association. It is used by the Students view to populate
      legacy contact columns.
