models:
  - name: stg_powerschool__attendance_conversion_items
    description:
      Defines the number of periods in which the student must be present in
      order to receive the number of points defined, such as full attendance =
      1.
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
      - name: comment_value
        data_type: string
        description:
          Information regarding this Conversion Item to help in its clarity.
      - name: conversion_mode_code
        data_type: string
        description:
          "Changed name from Att_Mode_CD to better reflect the data. One of
          three values: periodday,codeday, timeday. This field indicates the
          conversion mode associated with the specific conversionitem. Section
          attendance will use periodday, daily attendance will use codeday and
          all can usetimeday. Used in conjunction with Input_Value and FTEID
          (and Day Part ID, if day part processing isenabled) that determines
          which record to use to return the Attendance_Value."
      - name: dcid
        data_type: int64
        description: Unique identifier for this table record. Indexed.
        constraints:
          - type: primary_key
      - name: attendance_conversion_id
        data_type: int64
        description:
          The internal number for the Attendance Conversion with which this
          record is associated. Indexed.
      - name: input_value
        data_type: int64
        description:
          Changed name from Number_Of_Periods to better reflect the data. Used
          to only support perioddayconversion. Now the application supports two
          other conversion modes, codeday and timeday.Therefore, this field name
          was changed to be more generic.
      - name: attendance_value
        data_type: float64
        description:
          Changed name from Membership_Percentage to better reflect the data.
          This is the attendancevalue to use for a student for a day based on
          the Conversion_Mode_CD, FTEID and Input_Valuespecified (and Day Part
          ID, if day part processing is enabled). This value is a real number
          andtypically, but not necessarily, reflects a fraction of 1 where 1 is
          a full attendance value. Used inconjunction with ADA to aggregate
          attendance.
      - name: fteid
        data_type: int64
        description:
          The internal number for the FTE with which this record is associated.
          Indexed.
      - name: unused
        data_type: int64
        description: Unused at this time.
      - name: daypartid
        data_type: int64
