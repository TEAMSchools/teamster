models:
  - name: stg_powerschool__attendance_code
    columns:
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Sequential Number generated by the application, but uniqueness in the
          table is not guaranteed.Indexed.
      - name: att_code
        data_type: string
        description:
          Attendance identifier set by school. Examples Tardy, Absent, etc.
      - name: alternate_code
        data_type: string
        description:
          If there is an alternate code that can be used. Shows up on
          PowerTeacher and PowerGrade.
      - name: description
        data_type: string
        description:
          A description supplied for this attendance code. For example, TR could
          be for Tardy.
      - name: presence_status_cd
        data_type: string
        description:
          Indicates whether this code translates to an Absent or Present.
      - name: unused1
        data_type: string
        description: Currently no used.
      - name: attendancecodeinfo_guid
        data_type: string
        description:
          Globally unique identifier for this table for SIF compliancy. Indexed.
      - name: psguid
        data_type: string
        description:
          If used, a unique identifier for the row. Currently applicable to
          multi-tenant, Schoolnet, andPearson SuccessNet/Pearson SuccessNet
          Plus.
      - name: lock_teacher_yn
        data_type: int64
        description:
          Indicates whether the attendance code can be changed by a teacher. 0 =
          No, 1= Y. Default 1.
      - name: dcid
        data_type: int64
        description: Unique identifier for this table. Indexed. Required.
      - name: schoolid
        data_type: int64
        description: The School_Number of the associated Schools record.
      - name: yearid
        data_type: int64
        description:
          A Number representing which year the term belongs to, such as 13 for
          2003-2004. The Number isequal to the ID of the year term divided by
          100. Maintained in the Terms table. Indexed.
      - name: course_credit_points
        data_type: float64
        description:
          Used in stored grade process to withhold course credit, not used in
          ADA or ADM.
      - name: assignment_filter_yn
        data_type: int64
        description:
          Flag used to filter code options in PowerTeacher and PowerGrade.
      - name: calculate_ada_yn
        data_type: int64
        description:
          Attendance based on this code will be counted in ADA calculation.
      - name: calculate_adm_yn
        data_type: int64
        description:
          Certain codes can be set up to exclude membership, assumes all periods
          that days are markedwith the same code. Examples are some religious
          holidays or etc.
      - name: sortorder
        data_type: int64
        description: Order codes are displayed in UI.
    description:
      The attendance codes that a school set up are maintained in this table.
      These could be codes for when student is tardy, present, absent or
      whatever they prefer torelate to attendance.
