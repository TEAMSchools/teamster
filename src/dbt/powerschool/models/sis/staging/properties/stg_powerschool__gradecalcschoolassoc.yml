models:
  - name: stg_powerschool__gradecalcschoolassoc
    description:
      This table associates GradeCalculationType records to Schools records.
    columns:
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
      - name: gradecalcschoolassocid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
      - name: gradecalculationtypeid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Grade Calculation Type
          Grade Calculation Type Idrecord. Required. Indexed.
      - name: schoolsdcid
        data_type: int64
        description:
          Foreign key. Internal number for the associated Schools DCID record.
          Required. Indexed.
