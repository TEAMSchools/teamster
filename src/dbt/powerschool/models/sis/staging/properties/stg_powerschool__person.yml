models:
  - name: stg_powerschool__person
    columns:
      - name: firstname
        data_type: string
        description: The person's first name. Indexed. Optional.
        config:
          meta:
            contains_pii: true
      - name: middlename
        data_type: string
        description: The person's middle name. Optional.
        config:
          meta:
            contains_pii: true
      - name: lastname
        data_type: string
        description: The person's last name. Indexed. Optional.
        config:
          meta:
            contains_pii: true
      - name: statecontactid
        data_type: string
        description:
          For state and provincial reporting use. Can be a combination of
          letters and numbers. Indexed.Optional.
        config:
          meta:
            contains_pii: false
      - name: employer
        data_type: string
        description: The name of the person’s employer. Optional.
        config:
          meta:
            contains_pii: false
      - name: whocreated
        data_type: string
        description:
          The name of the person who created the record. Defaults to user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          The date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The name of person who modified the record. Defaults to user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          The date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: dcid
        data_type: int64
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Unique sequential number generated by the application. Indexed.
          Required.
        config:
          meta:
            contains_pii: false
      - name: prefixcodesetid
        data_type: int64
        description:
          Indicates person’s prefix, such as Mr. or Mrs. Indexed. Optional.
        config:
          meta:
            contains_pii: false
      - name: suffixcodesetid
        data_type: int64
        description:
          Indicates person’s suffix, such as Jr. or Sr. Indexed. Optional.
        config:
          meta:
            contains_pii: false
      - name: gendercodesetid
        data_type: int64
        description:
          Indicates the hierarchical code sets for gender. Indexed. Optional.
        config:
          meta:
            contains_pii: false
      - name: statecontactnumber
        data_type: int64
        description: Generated by the school district. Indexed. Optional.
        config:
          meta:
            contains_pii: false
      - name: isactive
        data_type: int64
        description:
          "Decides if this contact person is active. Valid values: 1=Active,
          0=Inactive. Defaults to 1.Required."
        config:
          meta:
            contains_pii: false
      - name: excludefromstatereporting
        data_type: int64
        description:
          "Indicates if this contact is excluded from reporting to state. Valid
          values: 1=Exclude, 0=Do notexclude. Defaults to 0. Required."
        config:
          meta:
            contains_pii: false
    description:
      "This table is now used to manage unlimited contacts. Person ID is used to
      associate a person's contact information with the person. This table is
      utilized in FamilyManagement. Due to the integral place this table holds
      for the Student Contact functionality, it is no longer available in DDA
      and is no longer considered a core tableable to be referenced by table
      number. Note: There is expanded data in this table, both in content and
      types of records created. The Person table will contain information for
      Students, Parents, Guardians,Emergency Contacts, etc. now. If there are
      any customizations or reports that access the Person table, they should be
      retested with this content."
