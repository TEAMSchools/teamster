models:
  - name: stg_powerschool__gradecalculationtype
    columns:
      - name: gradecalculationtypeid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          Primary key. Unique sequential number generated by the application.
          Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: abbreviation
        data_type: string
        description: The abbreviated name for the term. Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: storecode
        data_type: string
        description:
          The code used to represent this grade level to term ID and school ID.
          Required.
        config:
          meta:
            contains_pii: false
      - name: type
        data_type: string
        description:
          "The type associated with one of the grading elements. Valid values:
          Total_Points, Term_Weighting,Standards_Weighting, Category_Weighting,
          Mix_and_Match, and None - No Course Grade. Defaultsto Total_Points."
        config:
          meta:
            contains_pii: false
      - name: droplowscoreoption
        data_type: string
        description:
          'The drop lowest score by category can be set even if the calculation
          type is "Total Points" or anothertype. Valid values: Drop Lowest
          Overall, Drop Lowest by Category, Null. Defaults to Null.'
        config:
          meta:
            contains_pii: false
      - name: whocreated
        data_type: string
        description:
          The user login that created the record. Defaults to database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whencreated
        data_type: timestamp
        description:
          Date and time the record was created. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whomodified
        data_type: string
        description:
          The user login that modified the record. Defaults to database user.
          Required.
        config:
          meta:
            contains_pii: false
      - name: whenmodified
        data_type: timestamp
        description:
          Date and time the record was modified. Defaults to system date.
          Required.
        config:
          meta:
            contains_pii: false
      - name: gradeformulasetid
        data_type: int64
        description:
          Foreign key. Internal number for the associated GradeFormulaSet
          GradeFormulaSetID record.Required. Indexed.
        config:
          meta:
            contains_pii: false
      - name: yearid
        data_type: int64
        description:
          A number representing which year the term belongs to. Required.
          Indexed.
        config:
          meta:
            contains_pii: false
      - name: isnograde
        data_type: int64
        description:
          "Indicates there is not a grade. Valid values: 1=Yes (No grade),
          0=Grade. Defaults to 0. Required."
        config:
          meta:
            contains_pii: false
      - name: isdroplowstudentfavor
        data_type: int64
        description:
          "Indicates whether the selected drop score will be adjusted to favor
          the students final grade. Validvalues: 1=Yes, 0=No. Defaults to 0."
        config:
          meta:
            contains_pii: false
      - name: isalternatepointsused
        data_type: int64
        description:
          "Indicates whether alternate points are to be used. Valid values:
          1=Yes, 0=No. Defaults to 0.Required."
        config:
          meta:
            contains_pii: false
      - name: iscalcformulaeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the calculation formula by
          reporting term. Valid values: 1=Yes, 0=No,Null. Defaults to Null."
        config:
          meta:
            contains_pii: false
      - name: isdropscoreeditable
        data_type: int64
        description:
          "Indicates if the teacher can edit the drop score by reporting term.
          Valid values: 1=Yes, 0=No, Null.Defaults to Null."
        config:
          meta:
            contains_pii: false
      - name: ismulticategoryeditable
        data_type: int64
    description:
      This table defines the grade calculation formula for a reporting term.
      Individual item weights can be found in the GradeCalcFormulaWeight table.
