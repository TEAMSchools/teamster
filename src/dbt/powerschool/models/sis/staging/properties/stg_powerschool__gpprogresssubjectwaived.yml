models:
  - name: stg_powerschool__gpprogresssubjectwaived
    description:
      For reporting purposes, this table contains, per waiver, the credits
      required by their graduation plan but waived for the student. Data
      assessed by selecting a group ofstudents and then navigating to [Select
      Function] arrow > Graduation Progress Report Data Capture (or Special
      Functions > Group Functions > GraduationProgress Report Data Capture).
    config:
      enabled: false
    columns:
      - name: gpprogresssubjectid
        data_type: int64
        description:
          Internal number for the associated GPProgress Subject record. Indexed.
          Required.
        constraints:
          - type: foreign_key
      - name: gpstudentwaiverid
        data_type: int64
        description:
          Internal number for the associated GPStudent Waiver record. Required.
          Indexed.
        constraints:
          - type: foreign_key
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          A unique sequential number generated by the Power School. Required.
          Indexed.
        constraints:
          - type: primary_key
      - name: waivedcredits
        data_type: float64
        description:
          Number of credits waived. Values obtained from the GPStudent Waiver
          table. Defaults to 0.
