models:
  - name: stg_powerschool__gpprogresssubjectwaived
    config:
      enabled: false
    columns:
      - name: gpprogresssubjectid
        data_type: int64
        description:
          Internal number for the associated GPProgressSubject record.  Indexed.
          Required.
      - name: gpstudentwaiverid
        data_type: int64
        description:
          Internal number for the associated GPStudentWaiver record. Required.
          Indexed.
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          A unique sequential number generated by the PowerSchool. Required.
          Indexed.
      - name: waivedcredits
        data_type: float64
        description:
          Number of credits waived. Values obtained from the GPStudentWaiver
          table. Defaults to 0.
    description:
      For reporting purposes, this table contains, per waiver, the credits
      required by their graduation plan but waived for the student. Data
      assessed by selecting a group ofstudents and then navigating to [Select
      Function] arrow > Graduation Progress Report Data Capture (or Special
      Functions > Group Functions > GraduationProgress Report Data Capture).
