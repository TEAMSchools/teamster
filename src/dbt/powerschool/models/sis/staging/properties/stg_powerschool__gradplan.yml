models:
  - name: stg_powerschool__gradplan
    config:
      enabled: false
    columns:
      - name: name
        data_type: string
        description: Unique name for the plan.
        config:
          meta:
            contains_pii: false
      - name: id
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier.
        config:
          meta:
            contains_pii: false
      - name: plantype
        data_type: int64
        description:
          0 for a graduation contract; 1 for a post-secondary preparation plan.
        config:
          meta:
            contains_pii: false
    description:
      The primary table for the Graduation Plan district-level object.
