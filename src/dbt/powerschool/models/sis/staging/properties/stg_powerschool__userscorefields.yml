models:
  - name: stg_powerschool__userscorefields
    description:
      Schema extension table associated to the Users table. Fields include those
      that were migrated from PowerSchool custom fields. These fields store
      generalinformation.
    columns:
      - name: usersdcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description:
          DCID (unique identifier) of the associated User record. Indexed.
        constraints:
          - type: foreign_key
      - name: dob
        data_type: date
        description: Staff date of birth.
        config:
          meta:
            contains_pii: true
      - name: gender
        data_type: string
        description: Staff gender.
      - name: photolastupdated
        data_type: string
        description:
          Date user photo was last updated. String formatted using ISO-8601,
          "yyyy-mm-dd Thh:mm:ss Z".
      - name: pscore_legal_first_name
        data_type: string
        description:
          Staff legal first name. Currently, this field only used by State
          Reporting. However, it mayalso be used on any Power School custom
          page.
        config:
          meta:
            contains_pii: true
      - name: pscore_legal_gender
        data_type: string
        description:
          Staff legal gender. Currently, this field only used by State
          Reporting. However, it may alsobe used on any Power School custom
          page.
      - name: pscore_legal_last_name
        data_type: string
        description:
          Staff legal last name. Currently, this field only used by State
          Reporting. However, it mayalso be used on any Power School custom
          page.
        config:
          meta:
            contains_pii: true
      - name: pscore_legal_middle_name
        data_type: string
        description:
          Staff legal middle name. Currently, this field only used by State
          Reporting. However, it mayalso be used on any Power School custom
          page.
        config:
          meta:
            contains_pii: true
      - name: pscore_legal_suffix
        data_type: string
        description:
          Staff legal suffix. Currently, this field only used by State
          Reporting. However, it may also beused on any Power School custom
          page.
