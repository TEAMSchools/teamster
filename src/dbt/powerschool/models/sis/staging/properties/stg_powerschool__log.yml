models:
  - name: stg_powerschool__log
    description:
      This table stored student log entries for various purposes. Administrators
      or teachers enter this free text in order to keep track of necessary
      information.
    columns:
      - name: dcid
        data_type: int64
        data_tests:
          - unique:
              config:
                severity: error
        description: Unique identifier for this table. Indexed. Required.
      - name: studentid
        data_type: int64
        description:
          The internal number and ID of the associated Students record.
      - name: logtypeid
        data_type: int64
        description:
          The internal number for the Gen table associated with the log entry.
          The name is taken fromhere.
      - name: entry_date
        data_type: date
        description: The date the log entry was made. Indexed.
      - name: entry
        data_type: string
        description: The actual description of the log.
