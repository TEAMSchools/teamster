sources:
  - name: powerschool_odbc
    schema:
      "{%- if target.name in ['defer', 'dev'] -%}zz_{{ env_var('GITHUB_USER',
      'dev') }}_{%- elif target.name == 'staging' -%}zz_stg_{%- endif -%}{{
      var('powerschool_schema', project_name ~ '_powerschool') }}"
    tables:
      - name: src_powerschool__assignmentscore
        config:
          meta:
            dagster:
              asset_key:
                - "{{ project_name }}"
                - powerschool
                - assignmentscore
        external:
          location:
            "{{ 'gs://teamster-test/dagster/' ~ project_name if
            env_var('DAGSTER_CLOUD_IS_BRANCH_DEPLOYMENT', '0') == '1' else
            var('cloud_storage_uri_base',
            env_var('DBT_DEV_CLOUD_STORAGE_URI_BASE', ''))
            }}/powerschool/assignmentscore/*"
          options:
            connection_name: "{{ var('bigquery_external_connection_name') }}"
            metadata_cache_mode: MANUAL
            max_staleness: INTERVAL 7 DAY
            hive_partition_uri_prefix:
              "{{ 'gs://teamster-test/dagster/' ~ project_name if
              env_var('DAGSTER_CLOUD_IS_BRANCH_DEPLOYMENT', '0') == '1' else
              var('cloud_storage_uri_base',
              env_var('DBT_DEV_CLOUD_STORAGE_URI_BASE', ''))
              }}/powerschool/assignmentscore/"
            format: AVRO
            enable_logical_types: true
