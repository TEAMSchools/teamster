models:
  - name: int_powerschool__student_contacts
    # Legacy long-form PS contacts model. Superseded by int_students__contacts
    # (Finalsite for NJ, int_powerschool__contacts for Miami); no live
    # consumers remain. Disabled network-wide (#4346).
    config:
      enabled: false
    columns:
      - name: student_number
        data_type: int64
      - name: family_ident
        data_type: string
      - name: person_type
        data_type: string
      - name: relationship_type
        data_type: string
      - name: isemergency
        data_type: int64
      - name: schoolpickupflg
        data_type: int64
      - name: contact_category
        data_type: string
      - name: contact
        data_type: string
      - name: contact_priority_order
        data_type: int64
      - name: contact_name
        data_type: string
      - name: contact_type
        data_type: string
