models:
  - name: int_powerschool__gpa_cumulative
    columns:
      - name: studentid
        data_type: int64
      - name: schoolid
        data_type: int64
      - name: earned_credits_cum
        data_type: float64
      - name: potential_credits_cum
        data_type: float64
      - name: earned_credits_cum_projected
        data_type: float64
      - name: earned_credits_cum_projected_s1
        data_type: float64
      - name: cumulative_y1_gpa
        data_type: float64
      - name: cumulative_y1_gpa_unweighted
        data_type: float64
      - name: cumulative_y1_gpa_projected
        data_type: float64
      - name: cumulative_y1_gpa_projected_s1
        data_type: float64
      - name: cumulative_y1_gpa_projected_s1_unweighted
        data_type: float64
      - name: core_cumulative_y1_gpa
        data_type: float64
      - name: potential_gpa_credits_cum_projected
        data_type: float64
        description: >-
          Sum of potential GPA credit hours across all years, including
          in-progress current-year courses — the denominator behind
          `cumulative_y1_gpa_projected`, exposed so the projected ratio is
          auditable and joinable downstream.
      - name: potential_gpa_credits_current_year
        data_type: float64
        description: >-
          Potential GPA credit hours the student is enrolled in for the current
          academic year (in-progress courses with a Y1 grade plus any
          already-stored current-year courses). NULL when the student has no
          current-year GPA credits.
      - name: gpa_needed_for_cumulative_3_0
        data_type: float64
        description: >-
          Weighted Y1 GPA the student must average across all current-year GPA
          credits to finish with a projected cumulative Y1 GPA of exactly 3.00.
          Computed as (3.0 x (prior credits + current credits) - prior weighted
          points) / current credits. Assumes the current credit denominator
          stays fixed — course adds/drops move the target. Negative values mean
          3.00 is already guaranteed; values above the student's scale maximum
          are not attainable this year. NULL when the student has no
          current-year GPA credits.
      - name: is_cumulative_3_0_attainable
        data_type: boolean
        description: >-
          True when `gpa_needed_for_cumulative_3_0` is less than or equal to the
          credit-weighted maximum weighted GPA achievable across the student's
          current-year courses (each in-progress course capped at the max grade
          points of its weighted grade scale; already-stored current-year grades
          locked at their actual points). NULL when the needed value is NULL.

unit_tests:
  - name: unit_gpa_cumulative_needed_gpa
    description: >-
      Needed-GPA algebra and attainability flag. Student 1 (junior, prior 2.6
      over 70 credits, 35 current credits) needs 3.8. Student 2 (freshman, no
      prior years) needs exactly 3.0. Student 3 (prior 4.2 over 105 credits)
      needs -0.6 — already guaranteed, still attainable. Student 4 (prior 2.0
      over 105 credits) needs 6.0 — above the 4.5 scale max, not attainable.
      Student 5 has no current-year enrollment — needed and flag are NULL.
    model: int_powerschool__gpa_cumulative
    overrides:
      vars:
        current_academic_year: 2025
    given:
      - input: ref('stg_powerschool__storedgrades')
        rows:
          - {
              studentid: 1,
              schoolid: 101,
              course_number: C1,
              academic_year: 2023,
              storecode: Y1,
              excludefromgpa: 0,
              excludefromgraduation: 0,
              potentialcrhrs: 35.0,
              earnedcrhrs: 35.0,
              gpa_points: 2.6,
              percent: 80,
              gradescale_name_unweighted: UT Unweighted,
            }
          - {
              studentid: 1,
              schoolid: 101,
              course_number: C1,
              academic_year: 2024,
              storecode: Y1,
              excludefromgpa: 0,
              excludefromgraduation: 0,
              potentialcrhrs: 35.0,
              earnedcrhrs: 35.0,
              gpa_points: 2.6,
              percent: 80,
              gradescale_name_unweighted: UT Unweighted,
            }
          - {
              studentid: 3,
              schoolid: 101,
              course_number: C1,
              academic_year: 2022,
              storecode: Y1,
              excludefromgpa: 0,
              excludefromgraduation: 0,
              potentialcrhrs: 35.0,
              earnedcrhrs: 35.0,
              gpa_points: 4.2,
              percent: 95,
              gradescale_name_unweighted: UT Unweighted,
            }
          - {
