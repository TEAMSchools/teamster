              storecode: Y1,
              excludefromgpa: 0,
              excludefromgraduation: 0,
              potentialcrhrs: 35.0,
              earnedcrhrs: 35.0,
              gpa_points: 4.2,
              percent: 95,
              gradescale_name_unweighted: UT Unweighted,
            }
          - {
              studentid: 3,
              schoolid: 101,
              course_number: C1,
              academic_year: 2024,
              storecode: Y1,
              excludefromgpa: 0,
              excludefromgraduation: 0,
              potentialcrhrs: 35.0,
              earnedcrhrs: 35.0,
              gpa_points: 4.2,
              percent: 95,
              gradescale_name_unweighted: UT Unweighted,
            }
          - {
