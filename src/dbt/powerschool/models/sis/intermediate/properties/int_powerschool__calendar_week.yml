models:
  - name: int_powerschool__calendar_week
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - schoolid
              - week_start_date
          config:
            severity: error
    columns:
      - name: schoolid
        data_type: int64
      - name: week_start_date
        data_type: date
      - name: week_end_date
        data_type: date
      - name: school_level
        data_type: string
      - name: yearid
        data_type: int64
      - name: academic_year
        data_type: int64
      - name: quarter
        data_type: string
      - name: semester
        data_type: string
      - name: school_week_start_date
        data_type: date
      - name: school_week_end_date
        data_type: date
      - name: first_day_school_year
        data_type: date
        description: Calendar Monday of the first school week of the year.
      - name: last_week_start_school_year
        data_type: date
        description: Calendar Monday of the last school week of the year.
      - name: last_day_school_year
        data_type: date
        description:
          Last actual instructional day of the school year for this school.
      - name: date_count
        data_type: int64
      - name: week_number_academic_year
        data_type: int64
      - name: week_number_quarter
        data_type: int64
      - name: week_start_monday
        data_type: date
      - name: week_end_sunday
        data_type: date
      - name: school_week_start_date_lead
        data_type: date
      - name: is_current_week_mon_sun
        data_type: boolean
        description:
          True if this is the current school week (Mon–Sun window), or the last
          school week of the year once its Sunday has passed.
