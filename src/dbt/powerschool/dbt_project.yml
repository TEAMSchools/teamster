name: powerschool
version: 1.0.0
config-version: 2
require-dbt-version: [">=1.3.0", <2.0.0]

profile: powerschool

model-paths: [models]
analysis-paths: [analyses]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets:
  - target
  - dbt_packages

vars:
  current_academic_year: 0
  local_timezone: UTC
  bigquery_external_connection_name: null

models:
  +schema: powerschool
  powerschool:
    sis:
      staging:
        +contract:
          enforced: true
        # dlt is the live PowerSchool SIS ingestion path — enabled by default
        # for every consuming district.
        dlt:
          +enabled: true
        # ARCHIVED (#4442): the ODBC ingestion path is retired; models are
        # kept in-tree for reference. No district enables this variant.
        odbc:
          +enabled: false
        # SFTP ingestion is unused (no district enables it).
        sftp:
          +enabled: false

sources:
  powerschool:
    sis:
      staging:
        # ARCHIVED (#4442): see models note above.
        odbc:
          +enabled: false
        # SFTP ingestion is unused (no district enables it).
        sftp:
          +enabled: false
