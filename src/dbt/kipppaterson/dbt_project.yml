name: kipppaterson
version: 1.0.0
config-version: 2

profile: kipppaterson

model-paths: [models]
analysis-paths: [analyses]
test-paths: [tests]
seed-paths: [seeds]
macro-paths: [macros]
snapshot-paths: [snapshots]

target-path: target
clean-targets:
  - target
  - dbt_packages

data_tests:
  +severity: warn
  +store_failures: true
  +store_failures_as: view

vars:
  local_timezone: America/New_York
  current_academic_year: 2026
  current_fiscal_year: 2027
  cloud_storage_uri_base: gs://teamster-kipppaterson/dagster/kipppaterson
  bigquery_external_connection_name: projects/teamster-332318/locations/us/connections/biglake-teamster-gcs

models:
  kipppaterson:
    extracts:
      +schema: extracts
      +contract:
        enforced: true
    powerschool:
      +materialized: table
      +schema: powerschool
      sis:
        staging:
          +contract:
            enforced: true
    pearson:
      +materialized: table
      +schema: pearson
  finalsite:
    api:
      +enabled: true
  amplify:
    dds:
      +enabled: false
    mclass:
      api:
        +enabled: false
      sftp:
        staging:
          stg_amplify__mclass__sftp__pm_student_summary_aimline:
            +enabled: false
  deanslist:
    +materialized: table
    staging:
      stg_deanslist__dff_stats:
        +enabled: false
      stg_deanslist__followups:
        +enabled: false
      stg_deanslist__homework:
        +enabled: false
      stg_deanslist__lists:
        +enabled: false
  pearson:
    +materialized: table
    staging:
      stg_pearson__njgpa:
        +enabled: false
      stg_pearson__parcc:
        +enabled: false
      stg_pearson__student_test_update:
        +enabled: false
  powerschool:
    +materialized: table
    sis:
      intermediate:
        # data-forced exception: needs gradesectionconfig, which is empty in
        # Paterson's PowerSchool (no dlt model)
        int_powerschool__section_grade_config:
          +enabled: false
        # contacts layer disabled for Paterson (parity with kippnewark)
        int_powerschool__contacts:
          +enabled: false
        int_powerschool__person_contacts:
          +enabled: false
      staging:
        dlt:
          stg_powerschool__gpnode:
            +enabled: false
          stg_powerschool__gpprogresssubject:
            +enabled: false
          stg_powerschool__gpprogresssubjectearned:
            +enabled: false
          stg_powerschool__gpprogresssubjectenrolled:
            +enabled: false
          stg_powerschool__gradesectionconfig:
            +enabled: false
          stg_powerschool__u_clg_et_stu:
            +enabled: false
          stg_powerschool__u_clg_et_stu_alt:
            +enabled: false
          stg_powerschool__u_expectations:
            +enabled: false
          stg_powerschool__u_storedgrades_de:
            +enabled: false

sources:
  amplify:
    mclass:
      api:
        amplify_mclass_api:
          +enabled: false
      sftp:
        amplify_mclass_sftp:
          pm_student_summary_aimline:
            +enabled: false
    dds:
      amplify_dds:
        +enabled: false
  finalsite:
    finalsite:
      contacts:
        +enabled: true
  deanslist:
    deanslist:
      src_deanslist__dff_stats:
        +enabled: false
      src_deanslist__followups:
        +enabled: false
      src_deanslist__homework:
        +enabled: false
      src_deanslist__lists:
        +enabled: false
  pearson:
    pearson:
      src_pearson__njgpa:
        +enabled: false
      src_pearson__parcc:
        +enabled: false
      src_pearson__student_test_update:
        +enabled: false
