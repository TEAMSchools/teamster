models:
  - name: stg_finalsite__contacts
    columns:
      - name: finalsite_enrollment_id
        data_type: string
        data_tests:
          - unique:
              config:
                severity: error
      - name: first_name
        data_type: string
      - name: middle_name
        data_type: string
      - name: last_name
        data_type: string
      - name: full_name
        data_type: string
      - name: preferred_name
        data_type: string
      - name: email
        data_type: string
      - name: gender
        data_type: string
      - name: gender_display
        data_type: string
      - name: gender_full_text
        data_type: string
      - name: status
        data_type: string
      - name: enrollment_type
        data_type: string
      - name: inquiry_submit_date
        data_type: string
      - name: application_submit_date
        data_type: string
      - name: contract_submit_date
        data_type: string
      - name: grade_canonical_name
        data_type: string
      - name: grade_name
        data_type: string
      - name: grade_school_level
        data_type: string
      - name: school_year_start
        data_type: int64
      - name: phone_1_type
        data_type: string
      - name: phone_1_number
        data_type: string
      - name: phone_2_type
        data_type: string
      - name: phone_2_number
        data_type: string
      - name: phone_3_type
        data_type: string
      - name: phone_3_number
        data_type: string
      - name: custom_attributes
        data_type:
          array<struct<field_id string, field_name string, field_display_name
          string, value struct<boolean_value bool, string_value string,
          array_string_value array<string>>>>
      - name: id_attributes
        data_type:
          array<struct<field_id string, field_name string, field_display_name
          string, value struct<boolean_value bool, string_value string,
          array_string_value array<string>>>>
      - name: birth_date
        data_type: date
      - name: address_1
        data_type: string
      - name: address_2
        data_type: string
      - name: city
        data_type: string
      - name: state
        data_type: string
      - name: zip
        data_type: string
      - name: country
        data_type: string
