models:
  - name: stg_finalsite__contact_relationships
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - finalsite_enrollment_id
              - relationship_id
          config:
            severity: error
    columns:
      - name: finalsite_enrollment_id
        data_type: string
      - name: relationship_id
        data_type: string
      - name: rel_id
        data_type: string
      - name: rel_name
        data_type: string
      - name: rel_type
        data_type: string
      - name: is_primary
        data_type: boolean
      - name: is_financial
        data_type: boolean
      - name: has_portal_access
        data_type: boolean
      - name: guardian_finalsite_id
        data_type: string
      - name: guardian_first_name
        data_type: string
      - name: guardian_middle_name
        data_type: string
      - name: guardian_last_name
        data_type: string
      - name: guardian_full_name
        data_type: string
      - name: guardian_preferred_name
        data_type: string
      - name: guardian_email
        data_type: string
      - name: guardian_gender
        data_type: string
      - name: guardian_phone_1_type
        data_type: string
      - name: guardian_phone_1_number
        data_type: string
      - name: guardian_custom_attributes
        data_type:
          array<struct<field_id string, field_name string, field_display_name
          string, value struct<boolean_value bool, string_value string,
          array_string_value array<string>>>>
      - name: guardian_id_attributes
        data_type:
          array<struct<field_id string, field_name string, field_display_name
          string, value struct<boolean_value bool, string_value string,
          array_string_value array<string>>>>
      - name: relationship_label
        data_type: string
