models:
  - name: stg_finalsite__contact_relationships
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - finalsite_enrollment_id
              - relationship_id
          config:
            severity: error
    columns:
      - name: finalsite_enrollment_id
        data_type: string
      - name: relationship_id
        data_type: string
      - name: rel_type
        data_type: string
      - name: is_primary
        data_type: boolean
      - name: guardian_finalsite_id
        data_type: string
      - name: guardian_first_name
        data_type: string
      - name: guardian_last_name
        data_type: string
      - name: guardian_email
        data_type: string
      - name: guardian_gender
        data_type: string
      - name: guardian_phone
        data_type: string
      - name: guardian_powerschool_contact_id
        data_type: string
      - name: relationship_label
        data_type: string
