models:
  - name: int_finalsite__enrollment_lifecycle
    description:
      One row per Finalsite contact in scope to push to Focus (KIPP Miami) — the
      shared eligibility and enrollment-state layer for the Focus extracts.
      Built from `stg_finalsite__contacts` joined to the latest-partition
      snapshot of `stg_finalsite__status_report`, the track attributes, and the
      custom attributes. In scope = an active accepted-to-enrolled status
      (`accepted`, `enrollment_in_progress`, `assigned_school`, `enrolled`,
      `retained`), OR a transfer-out (a `withdrawal_last_attended_date` on or
      after the enrollment start). SIS-agnostic.
    columns:
      - name: finalsite_enrollment_id
        data_type: string
        description: Finalsite contact UUID; the grain of this model.
        data_tests:
          - unique
          - not_null
      - name: school_year_start
        data_type: int64
        description: Start year of the contact's Finalsite school year.
      - name: grade_canonical_name
        data_type: string
        description: Finalsite canonical grade name for the enrollment.
      - name: promotion_status
        data_type: string
        description:
          Promotion/retention status (e.g. `Retained`), joined from
          `int_finalsite__contact_track_attributes.promotion_status_ss`; null
          when unset.
      - name: assigned_school
        data_type: string
        description:
          School assigned in the Status Report; the Focus enrollment school
          before crosswalk mapping.
      - name: enrollment_start_date
        data_type: date
        description:
          Enrolled date from the Status Report (= Focus `START_DATE`); null
          until the student reaches the enrolled status.
      - name: enrollment_end_date
        data_type: date
        description:
          The `withdrawal_last_attended_date` custom attribute when it is on or
          after `enrollment_start_date` (the official withdrawal signal); null
          otherwise.
      - name: is_transfer_out
        data_type: boolean
        description:
          True when the enrollment has both a start date and a valid withdrawal
          (end) date — the student withdrew from the current enrollment.

unit_tests:
  - name: test_enrollment_lifecycle_eligibility_and_withdrawal
    description:
      Applies the in-scope filter (active status, or a valid withdrawal) and
      derives the withdrawal signal from withdrawal_last_attended_date. A
      withdrawal on or after the enrollment start transfers out; one before it
      is stale and ignored; an out-of-scope status with no valid withdrawal is
      dropped.
    model: int_finalsite__enrollment_lifecycle
    given:
      - input: ref('stg_finalsite__contacts')
        rows:
          - {
              finalsite_enrollment_id: c_active,
              status: enrolled,
              school_year_start: 2025,
              grade_canonical_name: KF,
            }
          - {
              finalsite_enrollment_id: c_xfer,
              status: enrolled,
              school_year_start: 2025,
              grade_canonical_name: "02",
            }
          - {
              finalsite_enrollment_id: c_stale,
              status: enrolled,
              school_year_start: 2025,
              grade_canonical_name: "03",
            }
          - {
              finalsite_enrollment_id: c_denied,
              status: denied,
              school_year_start: 2025,
              grade_canonical_name: "05",
            }
          - {
              finalsite_enrollment_id: c_denied_xfer,
              status: denied,
              school_year_start: 2025,
              grade_canonical_name: "06",
            }
          - {
              finalsite_enrollment_id: c_null,
              status: assigned_school,
              school_year_start: 2025,
              grade_canonical_name: "07",
            }
      - input: ref('stg_finalsite__status_report')
        rows:
          - {
              finalsite_enrollment_id: c_active,
              _dagster_partition_key: 2026-06-15,
              enrolled_date: 2025-08-15,
              assigned_school: School A,
            }
          - {
              finalsite_enrollment_id: c_xfer,
              _dagster_partition_key: 2026-06-15,
              enrolled_date: 2025-08-15,
              assigned_school: School A,
            }
          - {
              finalsite_enrollment_id: c_stale,
              _dagster_partition_key: 2026-06-15,
              enrolled_date: 2025-08-15,
              assigned_school: School A,
            }
          - {
              finalsite_enrollment_id: c_denied,
              _dagster_partition_key: 2026-06-15,
              enrolled_date: null,
              assigned_school: null,
            }
          - {
              finalsite_enrollment_id: c_denied_xfer,
              _dagster_partition_key: 2026-06-15,
              enrolled_date: 2025-08-15,
              assigned_school: School A,
            }
          - {
              finalsite_enrollment_id: c_null,
              _dagster_partition_key: 2026-06-15,
              enrolled_date: null,
              assigned_school: School B,
            }
      - input: ref('int_finalsite__contact_custom_attributes')
        format: sql
        rows: |
          select
              'c_xfer' as finalsite_enrollment_id,
              '2026-01-10' as withdrawal_last_attended_date
          union all
          select 'c_stale', '2025-01-10'
          union all
          select 'c_denied_xfer', '2026-03-01'
      - input: ref('int_finalsite__contact_track_attributes')
        format: sql
        rows: |
          select 'c_active' as finalsite_enrollment_id, 'Retained' as promotion_status_ss
    expect:
      rows:
        - {
            finalsite_enrollment_id: c_active,
            school_year_start: 2025,
            grade_canonical_name: KF,
            promotion_status: Retained,
            assigned_school: School A,
            enrollment_start_date: 2025-08-15,
            enrollment_end_date: null,
            is_transfer_out: false,
          }
        - {
            finalsite_enrollment_id: c_xfer,
            school_year_start: 2025,
            grade_canonical_name: "02",
            promotion_status: null,
            assigned_school: School A,
            enrollment_start_date: 2025-08-15,
            enrollment_end_date: 2026-01-10,
            is_transfer_out: true,
          }
        - {
            finalsite_enrollment_id: c_stale,
            school_year_start: 2025,
            grade_canonical_name: "03",
            promotion_status: null,
            assigned_school: School A,
            enrollment_start_date: 2025-08-15,
            enrollment_end_date: null,
            is_transfer_out: false,
          }
        - {
            finalsite_enrollment_id: c_denied_xfer,
            school_year_start: 2025,
            grade_canonical_name: "06",
            promotion_status: null,
            assigned_school: School A,
            enrollment_start_date: 2025-08-15,
            enrollment_end_date: 2026-03-01,
            is_transfer_out: true,
          }
        - {
            finalsite_enrollment_id: c_null,
            school_year_start: 2025,
            grade_canonical_name: "07",
            promotion_status: null,
            assigned_school: School B,
            enrollment_start_date: null,
            enrollment_end_date: null,
            is_transfer_out: false,
          }
