models:
  - name: int_finalsite__contact_id_attributes
    description:
      One row per Finalsite contact, pivoting the repeated `id_attributes`
      key-value array into one column per identifier field, each aliased to its
      original Finalsite field name. Contacts with no `id_attributes` are absent
      (resolve via a left join). When the Finalsite-minted student number (the
      future Focus `STDT_ID`) lands as a new `id_attributes` field, it appears
      here automatically and downstream extracts repoint to it.
    columns:
      - name: finalsite_enrollment_id
        data_type: string
        description: Finalsite contact UUID; the grain of this model.
        data_tests:
          - unique
          - not_null
      - name: power_school_contact_id
        data_type: string
        description: PowerSchool contact id from the `id_attributes` array.
      - name: powerschool_student_number
        data_type: string
        description: PowerSchool student number from the `id_attributes` array.
