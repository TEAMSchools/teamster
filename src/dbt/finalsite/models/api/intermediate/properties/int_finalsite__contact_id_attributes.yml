models:
  - name: int_finalsite__contact_id_attributes
    description:
      One row per Finalsite contact, pivoting the repeated `id_attributes`
      key-value array into the identifier columns downstream models need.
      `focus_student_id` is the value of the identifier field named by the
      `finalsite_focus_student_id_field` var (the Finalsite-minted student
      number exported to Focus as `STDT_ID`); null when the contact has no such
      identifier yet. Contacts with no `id_attributes` are absent (resolve via a
      left join).
    columns:
      - name: finalsite_enrollment_id
        data_type: string
        description: Finalsite contact UUID; the grain of this model.
        data_tests:
          - unique
          - not_null
      - name: focus_student_id
        data_type: string
        description:
          Finalsite-minted student number from the `id_attributes` field named
          by the `finalsite_focus_student_id_field` var; exported to Focus as
          `STDT_ID`.
