unit_tests:
  - name: test_contacts_two_guardians
    description:
      Verifies the 51-column CONTACTS layout for one student with two guardian
      relationships — primary guardian sorts to SORT_ORDER 1, non-primary to 2.
      Asserts STUDENT_RELATION, FIRST_NAME, LAST_NAME, and CONTACT1_VALUE.
    model: rpt_finalsite__contacts
    given:
      - input: ref('stg_finalsite__contacts')
        format: sql
        rows: |
          select
            'enr-stu-001' as finalsite_enrollment_id,
            cast(null as string) as first_name,
            cast(null as string) as middle_name,
            cast(null as string) as last_name,
            cast(null as string) as full_name,
            cast(null as string) as preferred_name,
            cast(null as string) as email,
            cast(null as string) as gender,
            cast(null as string) as gender_display,
            cast(null as string) as gender_full_text,
            cast(null as string) as status,
            cast(null as string) as enrollment_type,
            cast(null as string) as inquiry_submit_date,
            cast(null as string) as application_submit_date,
            cast(null as string) as contract_submit_date,
            cast(null as string) as grade_canonical_name,
            cast(null as string) as grade_name,
            cast(null as string) as grade_school_level,
            cast(null as string) as prospect_entry_grade_canonical_name,
            cast(null as int64) as school_year_start,
            cast(null as int64) as prospect_entry_year_start,
            cast(null as string) as phone_1_type,
            cast(null as string) as phone_1_number,
            cast(null as string) as phone_2_type,
            cast(null as string) as phone_2_number,
            cast(null as string) as phone_3_type,
            cast(null as string) as phone_3_number,
            cast(null as array<struct<field_id string, field_name string, field_display_name string, value struct<boolean_value bool, string_value string, array_string_value array<string>>>>) as custom_attributes,
            [
              struct(
                'id-001' as field_id,
                'focus_id' as field_name,
                'Focus ID' as field_display_name,
                struct(
                  false as boolean_value,
                  'S100001' as string_value,
                  cast(null as array<string>) as array_string_value
                ) as value
              )
            ] as id_attributes,
            cast(null as array<struct<field_id string, field_name string, field_display_name string, value struct<boolean_value bool, string_value string, array_string_value array<string>>, school_year struct<id string, name string, start_year int64, created_at string>>>) as track_attributes,
            cast(null as date) as birth_date,
            cast(null as string) as address_1,
            cast(null as string) as address_2,
            cast(null as string) as city,
            cast(null as string) as state,
            cast(null as string) as zip,
            cast(null as string) as country
          union all
          select
            'enr-grd-pri' as finalsite_enrollment_id,
            'Alice' as first_name,
            'B' as middle_name,
            'Johnson' as last_name,
            'Alice Johnson' as full_name,
            cast(null as string) as preferred_name,
            'alice@example.com' as email,
            cast(null as string) as gender,
            cast(null as string) as gender_display,
            cast(null as string) as gender_full_text,
            cast(null as string) as status,
            cast(null as string) as enrollment_type,
            cast(null as string) as inquiry_submit_date,
            cast(null as string) as application_submit_date,
            cast(null as string) as contract_submit_date,
            cast(null as string) as grade_canonical_name,
            cast(null as string) as grade_name,
            cast(null as string) as grade_school_level,
            cast(null as string) as prospect_entry_grade_canonical_name,
            cast(null as int64) as school_year_start,
            cast(null as int64) as prospect_entry_year_start,
            'Home' as phone_1_type,
            '305-555-0100' as phone_1_number,
            'Cell' as phone_2_type,
            '305-555-0101' as phone_2_number,
            cast(null as string) as phone_3_type,
            cast(null as string) as phone_3_number,
            cast(null as array<struct<field_id string, field_name string, field_display_name string, value struct<boolean_value bool, string_value string, array_string_value array<string>>>>) as custom_attributes,
            cast(null as array<struct<field_id string, field_name string, field_display_name string, value struct<boolean_value bool, string_value string, array_string_value array<string>>>>) as id_attributes,
            cast(null as array<struct<field_id string, field_name string, field_display_name string, value struct<boolean_value bool, string_value string, array_string_value array<string>>, school_year struct<id string, name string, start_year int64, created_at string>>>) as track_attributes,
            cast(null as date) as birth_date,
            '100 Main St' as address_1,
            cast(null as string) as address_2,
            'Miami' as city,
            'FL' as state,
            '33101' as zip,
            cast(null as string) as country
          union all
          select
            'enr-grd-sec' as finalsite_enrollment_id,
            'Bob' as first_name,
            cast(null as string) as middle_name,
            'Smith' as last_name,
            'Bob Smith' as full_name,
