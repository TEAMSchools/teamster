models:
  - name: rpt_focus__linked_students
    description:
      One row per unordered sibling pair, normalized so the student with the
      lexicographically-smaller minted Focus ID is always `PRIMARY_STUDENT_ID`
      (least/greatest dedup handles both bidirectional and one-directional
      edges). Sourced from `stg_finalsite__contact_relationships` (rel_type =
      sibling) with both sides resolved to a minted Focus STDT_ID via the
      `finalsite_focus_student_id_field` var. Pairs where either side is outside
      the pulled cohort (no contact row) or has no minted ID are dropped.
      Produces 3 columns in `LINKED_STUDENTS` contract order.
    config:
      contract:
        enforced: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - primary_student_id
              - secondary_student_id
    columns:
      - name: primary_student_id
        data_type: string
        description:
          Focus STDT_ID of the student whose ID sorts first in the pair (least
          of the two IDs). Pivoted from `id_attributes` using
          `var("finalsite_focus_student_id_field")`.
        data_tests:
          - not_null
      - name: secondary_student_id
        data_type: string
        description:
          Focus STDT_ID of the sibling whose ID sorts second in the pair.
          Pivoted from the sibling contact's `id_attributes` via `rel_id` →
          `stg_finalsite__contacts`.
        data_tests:
          - not_null
      - name: relationship
        data_type: string
        description:
          Focus-recognised relationship type for this linked-students pair.
          Always `sibling` for rows produced by this model.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [sibling, step_sibling, cousin, parent]

unit_tests:
  - name: test_linked_students_bidirectional_pair_yields_one_row
    description:
      Two students linked as siblings via stg_finalsite__contact_relationships
      with one relationship row per direction (A to B and B to A). Both have
      minted Focus IDs and are in-scope in int_finalsite__enrollment_lifecycle.
      Expects exactly one output row with primary_student_id = S100001 (lesser
      ID) and secondary_student_id = S200002 (greater ID).
    model: rpt_focus__linked_students
    given:
      - input: ref('stg_finalsite__contact_relationships')
        rows:
          - {
              finalsite_enrollment_id: enr-stu-a,
              relationship_id: rel-001,
              rel_id: enr-stu-b,
              rel_name: Student B,
              rel_type: sibling,
              is_primary: false,
              is_financial: false,
              has_portal_access: false,
            }
          - {
              finalsite_enrollment_id: enr-stu-b,
              relationship_id: rel-002,
              rel_id: enr-stu-a,
              rel_name: Student A,
              rel_type: sibling,
              is_primary: false,
              is_financial: false,
              has_portal_access: false,
            }
      - input: ref('stg_finalsite__contacts')
        format: sql
        rows: |
          select
            'enr-stu-a' as finalsite_enrollment_id,
            cast(null as string) as first_name,
            cast(null as string) as middle_name,
            cast(null as string) as last_name,
            cast(null as string) as full_name,
            cast(null as string) as preferred_name,
            cast(null as string) as email,
            cast(null as string) as gender,
            cast(null as string) as gender_display,
            cast(null as string) as gender_full_text,
            cast(null as string) as status,
            cast(null as string) as enrollment_type,
            cast(null as string) as inquiry_submit_date,
            cast(null as string) as application_submit_date,
            cast(null as string) as contract_submit_date,
            cast(null as string) as grade_canonical_name,
            cast(null as string) as grade_name,
            cast(null as string) as grade_school_level,
            cast(null as string) as prospect_entry_grade_canonical_name,
            cast(null as int64) as school_year_start,
            cast(null as int64) as prospect_entry_year_start,
            cast(null as string) as phone_1_type,
            cast(null as string) as phone_1_number,
            cast(null as string) as phone_2_type,
            cast(null as string) as phone_2_number,
            cast(null as string) as phone_3_type,
            cast(null as string) as phone_3_number,
            cast(
              null as array<struct<
                field_id string,
                field_name string,
                field_display_name string,
                value struct<
                  boolean_value bool,
                  string_value string,
                  array_string_value array<string>
                >
              >>
            ) as custom_attributes,
            [
              struct(
                'id-001' as field_id,
                'focus_id' as field_name,
                'Focus ID' as field_display_name,
                struct(
                  false as boolean_value,
                  'S100001' as string_value,
                  cast(null as array<string>) as array_string_value
                ) as value
              )
            ] as id_attributes,
            cast(
              null as array<struct<
                field_id string,
                field_name string,
                field_display_name string,
                value struct<
                  boolean_value bool,
                  string_value string,
                  array_string_value array<string>
                >,
                school_year struct<
                  id string,
                  name string,
                  start_year int64,
                  created_at string
                >
              >>
            ) as track_attributes,
            cast(null as date) as birth_date,
            cast(null as string) as address_1,
            cast(null as string) as address_2,
            cast(null as string) as city,
            cast(null as string) as state,
            cast(null as string) as zip,
            cast(null as string) as country
          union all
          select
            'enr-stu-b' as finalsite_enrollment_id,
            cast(null as string) as first_name,
            cast(null as string) as middle_name,
            cast(null as string) as last_name,
            cast(null as string) as full_name,
            cast(null as string) as preferred_name,
            cast(null as string) as email,
            cast(null as string) as gender,
            cast(null as string) as gender_display,
            cast(null as string) as gender_full_text,
            cast(null as string) as status,
            cast(null as string) as enrollment_type,
            cast(null as string) as inquiry_submit_date,
            cast(null as string) as application_submit_date,
            cast(null as string) as contract_submit_date,
            cast(null as string) as grade_canonical_name,
            cast(null as string) as grade_name,
            cast(null as string) as grade_school_level,
            cast(null as string) as prospect_entry_grade_canonical_name,
            cast(null as int64) as school_year_start,
            cast(null as int64) as prospect_entry_year_start,
            cast(null as string) as phone_1_type,
            cast(null as string) as phone_1_number,
            cast(null as string) as phone_2_type,
            cast(null as string) as phone_2_number,
            cast(null as string) as phone_3_type,
            cast(null as string) as phone_3_number,
            cast(
              null as array<struct<
                field_id string,
                field_name string,
                field_display_name string,
                value struct<
                  boolean_value bool,
                  string_value string,
                  array_string_value array<string>
                >
              >>
            ) as custom_attributes,
            [
              struct(
                'id-002' as field_id,
                'focus_id' as field_name,
                'Focus ID' as field_display_name,
                struct(
                  false as boolean_value,
                  'S200002' as string_value,
                  cast(null as array<string>) as array_string_value
                ) as value
              )
            ] as id_attributes,
            cast(
              null as array<struct<
                field_id string,
                field_name string,
                field_display_name string,
                value struct<
                  boolean_value bool,
                  string_value string,
                  array_string_value array<string>
                >,
                school_year struct<
                  id string,
