models:
  - name: rpt_focus__demographics
    description: >-
      Demographics export for Focus SIS — import-once: emits a student's
      demographics only when the student is absent from Focus (anti-join on
      stg_focus__students). Existing Focus values are never overwritten, so a
      later Finalsite change does not re-emit; enrollment ops harmonize
      post-import changes manually.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - stdt_id
    columns:
      - name: stdt_id
        data_type: string
      - name: last_name
        data_type: string
      - name: first_name
        data_type: string
      - name: name_suffix
        data_type: string
      - name: middle_name
        data_type: string
      - name: nickname
        data_type: string
      - name: dt_birth
        data_type: string
      - name: gender
        data_type: string
      - name: lang
        data_type: string
      - name: stdt_email
        data_type: string
      - name: ethnic_hl
        data_type: string
      - name: single_ethnic
        data_type: string
      - name: race_am_ind_ak_nat
        data_type: string
      - name: race_asian
        data_type: string
      - name: race_black
        data_type: string
      - name: race_nat_haw_pac_isl
        data_type: string
      - name: race_white
        data_type: string
      - name: residence_county
        data_type: string
