models:
  - name: rpt_focus__demographics
    description: >-
      Demographics export for Focus SIS — emits only rows whose student is
      absent from Focus or whose populated export fields differ from current
      Focus state. Idempotent import guard: a fully-matching row is suppressed.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - stdt_id
    columns:
      - name: stdt_id
        data_type: string
      - name: last_name
        data_type: string
      - name: first_name
        data_type: string
      - name: name_suffix
        data_type: string
      - name: middle_name
        data_type: string
      - name: nickname
        data_type: string
      - name: dt_birth
        data_type: string
      - name: gender
        data_type: string
      - name: lang
        data_type: string
      - name: stdt_email
        data_type: string
      - name: ethnic_hl
        data_type: string
