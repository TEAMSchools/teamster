models:
  - name: rpt_focus__addresses
    columns:
      - name: student_id
        data_type: string
      - name: address
        data_type: string
      - name: address2
        data_type: string
      - name: city
        data_type: string
      - name: state
        data_type: string
      - name: zipcode
        data_type: string
      - name: phone
        data_type: string
      - name: mailing
        data_type: string
      - name: mail_address
        data_type: string
      - name: mail_address2
        data_type: string
      - name: mail_city
        data_type: string
      - name: mail_state
        data_type: string

unit_tests:
  - name: addresses_import_once_suppresses_existing
    description: >-
      Import-once — a student with no address in Focus is kept; a student who
      already has an address (present in stg_focus__students_join_address) is
      suppressed.
    model: rpt_focus__addresses
    given:
      - input: source("kipptaf_extracts", "rpt_focus__addresses")
        format: sql
        rows: |
          select
              '8400000001' as student_id, '1 Main St' as address,
              cast(null as string) as address2, 'Miami' as city,
              'FL' as state, '33101' as zipcode, cast(null as string) as phone,
              cast(null as string) as mailing,
              cast(null as string) as mail_address,
              cast(null as string) as mail_address2,
              cast(null as string) as mail_city, cast(null as string) as mail_state
          union all
          select
              '8400000002' as student_id, '2 Oak Ave' as address,
              cast(null as string) as address2, 'Miami' as city,
              'FL' as state, '33102' as zipcode, cast(null as string) as phone,
              cast(null as string) as mailing,
              cast(null as string) as mail_address,
              cast(null as string) as mail_address2,
              cast(null as string) as mail_city, cast(null as string) as mail_state
      - input: ref("stg_focus__students_join_address")
        format: sql
        rows: |
          select 8400000002 as student_id
    expect:
      format: sql
      rows: |
        select
            '8400000001' as student_id, '1 Main St' as address,
            cast(null as string) as address2, 'Miami' as city,
            'FL' as state, '33101' as zipcode, cast(null as string) as phone,
            cast(null as string) as mailing,
            cast(null as string) as mail_address,
            cast(null as string) as mail_address2,
            cast(null as string) as mail_city, cast(null as string) as mail_state
