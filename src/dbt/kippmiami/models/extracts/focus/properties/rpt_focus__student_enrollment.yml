models:
  - name: rpt_focus__student_enrollment
    description: >-
      Focus STUDENT_ENROLLMENT import feed for KIPP Miami — emits only rows
      absent from Focus or whose end_date differs from current Focus state.
      Decodes the raw drop_code label to the Focus short_name via
      stg_focus__student_enrollment_codes. enrollment_code and drop_code are
      nulled when Focus already carries them (import-once guard).
    columns:
      - name: syear
        data_type: int64
      - name: school_id
        data_type: string
      - name: student_id
        data_type: string
      - name: grade_id
        data_type: string
      - name: start_date
        data_type: string
      - name: enrollment_code
        data_type: string
      - name: end_date
        data_type: string
      - name: drop_code
        data_type: string
      - name: calendar_id
        data_type: string
      - name: prior_dist
        data_type: string
      - name: prior_state
        data_type: string
      - name: prior_country
        data_type: string
      - name: ed_choice
        data_type: string
      - name: stdt_dis_affect
        data_type: string
      - name: offender_transfer_stdt
        data_type: string
      - name: came_from
        data_type: string
      - name: moved_to
        data_type: string
      - name: sec_sch
        data_type: string
      - name: grde_prom_st
        data_type: string
      - name: good_cause_exempt
        data_type: string
      - name: graduation_requirement_program
        data_type: string
      - name: next_school
        data_type: string
      - name: next_grade
        data_type: string
      - name: district_ood
        data_type: string
      - name: sch_ood
        data_type: string
      - name: include_in_class_rank
        data_type: string
      - name: fl_days_present
        data_type: int64
      - name: fl_days_absent
        data_type: int64

unit_tests:
  - name: enrollment_diff_unmatched_kept_codes_populated
    description: >-
      Unmatched student (no Focus row) is kept; enrollment_code and decoded
      drop_code are populated; all other columns pass through unchanged.
    model: rpt_focus__student_enrollment
    given:
      - input: source("kipptaf_extracts", "rpt_focus__student_enrollment")
        format: sql
        rows: |
          select
              2025 as syear,
              '2332A' as school_id,
              '8400000001' as student_id,
              '05' as grade_id,
              '20250812' as start_date,
              'E01' as enrollment_code,
              cast(null as string) as end_date,
              '(W02) In District Transfer' as drop_code,
              cast(null as string) as calendar_id,
              cast(null as string) as prior_dist,
              cast(null as string) as prior_state,
              cast(null as string) as prior_country,
              cast(null as string) as ed_choice,
              cast(null as string) as stdt_dis_affect,
              cast(null as string) as offender_transfer_stdt,
              cast(null as string) as came_from,
              cast(null as string) as moved_to,
              cast(null as string) as sec_sch,
              cast(null as string) as grde_prom_st,
              cast(null as string) as good_cause_exempt,
              cast(null as string) as graduation_requirement_program,
              cast(null as string) as next_school,
              cast(null as string) as next_grade,
              cast(null as string) as district_ood,
              cast(null as string) as sch_ood,
              cast(null as string) as include_in_class_rank,
              cast(null as int64) as fl_days_present,
              cast(null as int64) as fl_days_absent
      - input: ref("stg_focus__student_enrollment")
        format: sql
        rows: |
          select
              cast(null as int64) as student_id,
              cast(null as date) as start_date,
              cast(null as date) as end_date,
              cast(null as int64) as enrollment_code,
              cast(null as int64) as drop_code
          from (select 1) where false
      - input: ref("stg_focus__student_enrollment_codes")
        format: sql
        rows: |
          select
              '(W02) In District Transfer' as title,
              'W02' as short_name,
              'Drop' as type
    expect:
      format: sql
      rows: |
        select
            2025 as syear,
            '2332A' as school_id,
            '8400000001' as student_id,
            '05' as grade_id,
            '20250812' as start_date,
            'E01' as enrollment_code,
            cast(null as string) as end_date,
            'W02' as drop_code,
            cast(null as string) as calendar_id,
            cast(null as string) as prior_dist,
            cast(null as string) as prior_state,
            cast(null as string) as prior_country,
            cast(null as string) as ed_choice,
            cast(null as string) as stdt_dis_affect,
            cast(null as string) as offender_transfer_stdt,
            cast(null as string) as came_from,
            cast(null as string) as moved_to,
            cast(null as string) as sec_sch,
            cast(null as string) as grde_prom_st,
            cast(null as string) as good_cause_exempt,
            cast(null as string) as graduation_requirement_program,
            cast(null as string) as next_school,
            cast(null as string) as next_grade,
            cast(null as string) as district_ood,
            cast(null as string) as sch_ood,
            cast(null as string) as include_in_class_rank,
            cast(null as int64) as fl_days_present,
            cast(null as int64) as fl_days_absent

