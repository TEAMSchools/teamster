models:
  - name: rpt_focus__student_enrollment
    description:
      One row per in-scope Finalsite enrollment reshaped into the Focus
      `STUDENT_ENROLLMENT` SFTP template layout. Joins
      `int_finalsite__enrollment_lifecycle` and `stg_finalsite__contacts` to
      four Google Sheets crosswalks (grade, school, enrollment code, drop code)
      to produce the 29-column layout consumed by the Focus SFTP transport. The
      Focus column header casing (`SYEAR`, `SCHOOL_ID`, etc.) is applied at
      transport time via `file_config.format.header_replacements`; dbt column
      names remain lowercase snake_case. `end_date` and `drop_code` populate
      only for `lifecycle_action = 'transfer_out'` rows.
    columns:
      - name: student_id
        data_type: string
        description:
          Focus student ID, pivoted from `id_attributes` using the var
          `finalsite_focus_student_id_field` (default `focus_id`). Null until
          Focus mints an ID for the student.
        data_tests:
          - unique
          - not_null
      - name: syear
        data_type: int64
        description: School year start year (e.g. 2025 for the 2025-26 year).
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: school_id
        data_type: string
        description:
          Focus school ID mapped from `assigned_school` via the school
          crosswalk.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: grade_id
        data_type: string
        description:
          Focus grade ID mapped from `grade_canonical_name` via the grade
          crosswalk.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: start_date
        data_type: string
        description:
          Enrollment start date formatted as `YYYYMMDD` for Focus. Null until
          the student reaches enrolled status.
        data_tests:
          - not_null:
              config:
                severity: warn
      - name: enrollment_code
        data_type: string
        description:
          Focus enrollment action code mapped from `lifecycle_action` via the
          enrollment-code crosswalk (e.g. `EA1` for a new enrollment).
      - name: end_date
        data_type: string
        description:
          Enrollment end date formatted as `YYYYMMDD`; populated only for
          `transfer_out` rows.
      - name: drop_code
        data_type: string
        description:
          Focus drop/withdrawal code mapped from `withdrawal_reason` via the
          drop-code crosswalk; populated only for `transfer_out` rows.
      - name: calendar_id
        data_type: string
        description:
          Focus calendar ID; not sourced from Finalsite — always null.
      - name: prior_dist
        data_type: string
        description:
          Prior district code; not sourced from Finalsite — always null.
      - name: prior_state
        data_type: string
        description: Prior state code; not sourced from Finalsite — always null.
      - name: prior_country
        data_type: string
        description:
          Prior country code; not sourced from Finalsite — always null.
      - name: ed_choice
        data_type: string
        description:
          Educational choice indicator; not sourced from Finalsite — always
          null.
      - name: stdt_dis_affect
        data_type: string
        description:
          Student disability/affiliation code; not sourced from Finalsite —
          always null.
      - name: offender_transfer_stdt
        data_type: string
        description:
          Offender transfer student flag; not sourced from Finalsite — always
          null.
      - name: came_from
        data_type: string
        description:
          Prior school/district code; not sourced from Finalsite — always null.
      - name: moved_to
        data_type: string
        description:
          Destination school/district code; not sourced from Finalsite — always
          null.
      - name: sec_sch
        data_type: string
        description:
          Secondary school indicator; not sourced from Finalsite — always null.
      - name: grde_prom_st
        data_type: string
        description:
          Grade promotion status; not sourced from Finalsite — always null.
      - name: good_cause_exempt
        data_type: string
        description:
          Good cause exemption code; not sourced from Finalsite — always null.
      - name: graduation_requirement_program
        data_type: string
        description:
          Graduation requirement program code; not sourced from Finalsite —
          always null.
      - name: next_school
        data_type: string
        description: Next school code; not sourced from Finalsite — always null.
      - name: next_grade
        data_type: string
        description: Next grade code; not sourced from Finalsite — always null.
      - name: district_ood
        data_type: string
        description:
          Out-of-district district code; not sourced from Finalsite — always
          null.
      - name: sch_ood
        data_type: string
        description:
          Out-of-district school code; not sourced from Finalsite — always null.
      - name: include_in_class_rank
        data_type: string
        description:
          Class rank inclusion flag; not sourced from Finalsite — always null.
      - name: fl_days_present
        data_type: int64
        description:
          Florida days present count; not sourced from Finalsite — always null.
      - name: fl_days_absent
        data_type: int64
        description:
          Florida days absent count; not sourced from Finalsite — always null.
      - name: fl_days_absent_not_disc
        data_type: int64
        description:
          Florida unexcused absent count; not sourced from Finalsite — always
          null.

unit_tests:
  - name: test_student_enrollment_shape
    description:
      Verifies the 29-column STUDENT_ENROLLMENT layout for a new-enrollment row
      — crosswalk joins resolve grade/school/enrollment code, student_id is null
      (no Focus ID minted yet), and end_date/drop_code are null for a
      non-transfer row.
    model: rpt_focus__student_enrollment
    given:
      - input: ref('stg_finalsite__contacts')
        rows:
          - {
              finalsite_enrollment_id: e1,
              school_year_start: 2025,
              grade_canonical_name: "05",
              id_attributes: [],
            }
      - input: ref('int_finalsite__enrollment_lifecycle')
        rows:
          - {
              finalsite_enrollment_id: e1,
              lifecycle_action: create,
              school_year_start: 2025,
              grade_canonical_name: "05",
              assigned_school: KIPP Royalty Academy,
              enrollment_start_date: 2025-08-12,
              enrollment_end_date: null,
              withdrawal_reason: null,
              enrollment_type: new,
            }
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__grade_crosswalk' )
        format: sql
        rows: |
          select '05' as finalsite_grade_canonical_name, '5' as focus_grade_id
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__school_crosswalk' )
        format: sql
        rows: |
          select 'KIPP Royalty Academy' as finalsite_assigned_school,
            '0001' as focus_school_id
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__enrollment_code_crosswalk' )
        format: sql
        rows: |
          select 'create' as finalsite_lifecycle_action, 'EA1' as focus_enrollment_code
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__drop_code_crosswalk' )
        format: sql
        rows: |
          select 'mid_year_withdrawal' as finalsite_withdrawal_reason,
            'W05' as focus_drop_code
    expect:
      rows:
        - {
            syear: 2025,
            school_id: "0001",
            student_id: null,
            grade_id: "5",
            start_date: "20250812",
            enrollment_code: EA1,
            end_date: null,
            drop_code: null,
            calendar_id: null,
            prior_dist: null,
            prior_state: null,
            prior_country: null,
            ed_choice: null,
            stdt_dis_affect: null,
            offender_transfer_stdt: null,
            came_from: null,
            moved_to: null,
            sec_sch: null,
            grde_prom_st: null,
            good_cause_exempt: null,
            graduation_requirement_program: null,
            next_school: null,
            next_grade: null,
            district_ood: null,
            sch_ood: null,
            include_in_class_rank: null,
            fl_days_present: null,
            fl_days_absent: null,
            fl_days_absent_not_disc: null,
          }
  - name: test_student_enrollment_transfer_out
    description:
      Verifies that end_date and drop_code populate for a transfer_out row, and
      that end_date is formatted as YYYYMMDD.
    model: rpt_focus__student_enrollment
    given:
      - input: ref('stg_finalsite__contacts')
        rows:
          - {
              finalsite_enrollment_id: e2,
              school_year_start: 2025,
              grade_canonical_name: "07",
              id_attributes: [],
            }
      - input: ref('int_finalsite__enrollment_lifecycle')
        rows:
          - {
              finalsite_enrollment_id: e2,
              lifecycle_action: transfer_out,
              school_year_start: 2025,
              grade_canonical_name: "07",
              assigned_school: KIPP Royalty Academy,
              enrollment_start_date: 2025-08-12,
              enrollment_end_date: 2026-01-15,
              withdrawal_reason: mid_year_withdrawal,
              enrollment_type: returning,
            }
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__grade_crosswalk' )
        format: sql
        rows: |
          select '07' as finalsite_grade_canonical_name, '7' as focus_grade_id
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__school_crosswalk' )
        format: sql
        rows: |
          select 'KIPP Royalty Academy' as finalsite_assigned_school,
            '0001' as focus_school_id
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__enrollment_code_crosswalk' )
        format: sql
        rows: |
          select 'transfer_out' as finalsite_lifecycle_action,
            'W01' as focus_enrollment_code
      - input:
          source( 'kipptaf_google_sheets',
          'stg_google_sheets__focus__drop_code_crosswalk' )
        format: sql
        rows: |
          select 'mid_year_withdrawal' as finalsite_withdrawal_reason,
            'W05' as focus_drop_code
    expect:
      rows:
        - {
            syear: 2025,
            school_id: "0001",
            student_id: null,
            grade_id: "7",
            start_date: "20250812",
            enrollment_code: W01,
            end_date: "20260115",
            drop_code: W05,
            calendar_id: null,
            prior_dist: null,
            prior_state: null,
            prior_country: null,
            ed_choice: null,
            stdt_dis_affect: null,
            offender_transfer_stdt: null,
            came_from: null,
            moved_to: null,
            sec_sch: null,
            grde_prom_st: null,
            good_cause_exempt: null,
            graduation_requirement_program: null,
            next_school: null,
            next_grade: null,
            district_ood: null,
            sch_ood: null,
            include_in_class_rank: null,
            fl_days_present: null,
            fl_days_absent: null,
            fl_days_absent_not_disc: null,
          }
