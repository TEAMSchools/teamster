models:
  - name: rpt_focus__student_enrollment
    description: >-
      Focus STUDENT_ENROLLMENT import feed for KIPP Miami — the single
      reconciliation layer between the kipptaf desired-state enrollment record
      and live Focus, matched on (student_id, syear). Emits an entry row in full
      for any student-year absent from Focus. Emits an exit row — drop_code
      populated, start_date keyed to Focus's OPEN enrollment for that
      student-year (its actual, possibly manually-drifted date) — when that open
      row has no drop_code yet and the desired state now carries a withdrawal;
      enrollment_code stays null so the entry is never overwritten. A
      student-year whose open row already has a drop_code, or that has no open
      row (already closed), emits nothing. Decodes the raw drop_code label to
      the Focus short_name via stg_focus__student_enrollment_codes.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_id
              - syear
          config:
            severity: error
    columns:
      - name: syear
        data_type: int64
      - name: school_id
        data_type: string
      - name: student_id
        data_type: string
      - name: grade_id
        data_type: string
      - name: start_date
        data_type: string
      - name: enrollment_code
        data_type: string
      - name: end_date
        data_type: string
      - name: drop_code
        data_type: string
      - name: calendar_id
        data_type: string
      - name: prior_dist
        data_type: string
      - name: prior_state
        data_type: string
      - name: prior_country
        data_type: string
      - name: ed_choice
        data_type: string
      - name: stdt_dis_affect
        data_type: string
      - name: offender_transfer_stdt
        data_type: string
      - name: came_from
        data_type: string
      - name: moved_to
        data_type: string
      - name: sec_sch
        data_type: string
      - name: grde_prom_st
        data_type: string
      - name: good_cause_exempt
        data_type: string
      - name: graduation_requirement_program
        data_type: string
      - name: next_school
        data_type: string
      - name: next_grade
        data_type: string
      - name: district_ood
        data_type: string
      - name: sch_ood
        data_type: string
      - name: include_in_class_rank
        data_type: string
      - name: fl_days_present
        data_type: int64
      - name: fl_days_absent
        data_type: int64

unit_tests:
  - name: entry_new_student_year_emitted
    description: >-
      Student-year has no Focus row at all — the full desired entry row is
      emitted as-is, with enrollment_code populated and no exit
      (end_date/drop_code stay null).
    model: rpt_focus__student_enrollment
    given:
      - input: source("kipptaf_extracts", "rpt_focus__student_enrollment")
        format: sql
        rows: |
          select
              2026 as syear,
              '2332A' as school_id,
              '8400000001' as student_id,
              '05' as grade_id,
              '20260811' as start_date,
              'E01' as enrollment_code,
              cast(null as string) as end_date,
              cast(null as string) as drop_code,
              cast(null as string) as calendar_id,
              cast(null as string) as prior_dist,
              cast(null as string) as prior_state,
              cast(null as string) as prior_country,
              cast(null as string) as ed_choice,
              cast(null as string) as stdt_dis_affect,
              cast(null as string) as offender_transfer_stdt,
              cast(null as string) as came_from,
              cast(null as string) as moved_to,
              cast(null as string) as sec_sch,
              cast(null as string) as grde_prom_st,
              cast(null as string) as good_cause_exempt,
              cast(null as string) as graduation_requirement_program,
              cast(null as string) as next_school,
              cast(null as string) as next_grade,
              cast(null as string) as district_ood,
              cast(null as string) as sch_ood,
              cast(null as string) as include_in_class_rank,
              cast(null as int64) as fl_days_present,
              cast(null as int64) as fl_days_absent
      - input: ref("stg_focus__student_enrollment")
        format: sql
        rows: |
          select
              cast(null as int64) as syear,
              cast(null as int64) as student_id,
              cast(null as date) as start_date,
              cast(null as date) as end_date,
              cast(null as int64) as enrollment_code,
              cast(null as int64) as drop_code
          from (select 1) where false
      - input: ref("stg_focus__student_enrollment_codes")
        format: sql
        rows: |
          select
              1520 as id,
              '(W02) In District Transfer' as title,
              'W02' as short_name,
              'Drop' as type
    expect:
      format: sql
      rows: |
        select
            2026 as syear,
            '2332A' as school_id,
            '8400000001' as student_id,
            '05' as grade_id,
            '20260811' as start_date,
