models:
  - name: int_iready__personalized_instruction_unpivot
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - student_id
              - date_range
              - date_range_start
              - lesson_type
              - domain
          config:
            store_failures: true
    columns:
      - name: student_id
        data_type: int64
      - name: academic_year_int
        data_type: int64
      - name: subject
        data_type: string
      - name: date_range_start
        data_type: date
      - name: date_range_end
        data_type: date
      - name: date_range
        data_type: string
      - name: lesson_type
        data_type: string
      - name: domain
        data_type: string
      - name: completed
        data_type: int64
      - name: passed
        data_type: int64
      - name: percent_passed
        data_type: int64
